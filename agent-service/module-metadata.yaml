# Module metadata for agent-service.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Authority: ADR-0078 (agent-service consolidation), ADR-0088 (agent-runtime-core dissolution).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-service
kind: domain
version: 0.1.0-SNAPSHOT
semver_compatibility: 0.x
description: "Engine dispatch host + taskflow control. Sub-package layering: service.engine owns the stateless engine dispatch surface (engine.spi StatelessEngine SPI, engine.dispatch, engine.handler, engine.queue, engine.event, engine.model, engine.adapter.openjiuwen reference adapter); service.taskflow owns the task-control queue and control API."
architecture_doc: architecture/docs/L1/agent-service/README.md
dfx_doc: docs/dfx/agent-service.yaml
spi_packages:
  - com.huawei.ascend.service.engine.spi
allowed_dependencies:
  - agent-execution-engine    # engine SPI + orchestration SPI (RunMode, RunContext, SuspendSignal, ...) per ADR-0088
  - agent-bus                 # S2cCallbackTransport SPI + IngressGateway SPI per ADR-0088 + ADR-0089
  - agent-middleware
forbidden_dependencies: []
deployment_plane: compute_control
deployment_loci:
  - platform_centric    # mode_a default per ADR-0101
  - business_centric    # mode_b — agent-service co-deploys with agent-execution-engine on business side per ADR-0101
