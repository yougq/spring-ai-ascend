# Module metadata for agent-service.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# ADR-0159 has been archived and is not normative authority for this module.
# Gateway facade examples live under examples/agent-runtime-a2a-llm-e2e until a dedicated
# service module decision is made.
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-service
kind: domain
version: 0.2.0-SNAPSHOT
semver_compatibility: 0.x
description: "Enterprise serviceization facade skeleton. Runtime-facing service contracts are reserved here; Gateway facade examples live under examples/agent-runtime-a2a-llm-e2e."
architecture_doc: architecture/docs/L1/agent-service/README.md
dfx_doc: docs/dfx/agent-service.yaml
spi_packages:
  - com.huawei.ascend.service.spi   # placeholder namespace for future serviceization SPIs
allowed_dependencies:
  - agent-runtime    # framework-neutral engine SPI (engine.spi.AgentRuntimeHandler / StreamAdapter)
  - agent-bus                 # neutral bus.spi.engine + bus.spi.s2c SPIs
forbidden_dependencies: []
deployment_plane: compute_control
deployment_loci:
  - platform_centric    # mode_a default per ADR-0101
  - business_centric    # mode_b - agent-service co-deploys with agent-runtime on business side per ADR-0101
