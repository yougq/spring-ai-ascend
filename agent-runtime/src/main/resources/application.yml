# W0 agent-service application config (post-Phase-C / ADR-0078; pre-Phase-C this was the agent-platform config).
# Per docs/cross-cutting/posture-model.md: APP_POSTURE drives strict-mode behavior.
# Per agent-service/ARCHITECTURE.md §bootstrap (post-Phase-C; pre-Phase-C this referenced agent-platform/bootstrap/ARCHITECTURE.md): required-config matrix.

spring:
  application:
    name: spring-ai-ascend
  ai:
    # W1.x credential placeholders. The agent-service depends on
    # spring-ai-starter-model-openai + spring-ai-starter-model-anthropic for
    # compile-time access to the SPI types, but the W1.x runtime path does NOT
    # invoke OpenAI/Anthropic audio-speech/transcription/image models. Spring
    # Boot 4's Spring AI starters instantiate the model beans EAGERLY at context
    # refresh and require a non-null credential at construction time. We
    # satisfy that requirement with a dummy default so the context boots; real
    # credentials still resolve from the OPENAI_API_KEY / ANTHROPIC_API_KEY env
    # var when set. Calling these models without a real key produces a 401 at
    # API time — by design.
    openai:
      api-key: ${OPENAI_API_KEY:dummy-no-call-expected}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:dummy-no-call-expected}
  autoconfigure:
    exclude:
      # Resilience4j 2.4.0 ships a SpringBoot3Verifier that hard-fails when run
      # under Spring Boot 4. Rule 7 (Resilience) is deferred to W2 per
      # docs/CLAUDE-deferred.md, so the autoconfig is excluded here; the
      # dependency is retained so PlatformOssApiProbe still compiles.
      - io.github.resilience4j.springboot3.verifier.autoconfigure.SpringBoot3VerifierAutoConfiguration
  cloud:
    vault:
      # Vault starter is pinned for W2 secrets work; W0 has no Vault token,
      # so the autoconfig would fail at startup. PlatformOssApiProbe only
      # references VaultProperties as a compile-time citation.
      enabled: false
  threads:
    virtual:
      enabled: true   # ADR-01 + Loom; HikariCP 5 pool is virtual-thread-friendly.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/springaiascend}
    username: ${DB_USER:springaiascend}
    password: ${DB_PASS:springaiascend}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 5000
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    # Jackson 3.x default already serializes java.time.* as ISO-8601 strings;
    # WRITE_DATES_AS_TIMESTAMPS was removed from tools.jackson.databind.SerializationFeature
    # in Jackson 3 (moved to DateTimeFeature). Boot 4 binder fails when the legacy key
    # is bound to the new SerializationFeature enum, so the explicit override is dropped.

server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 1MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      # Historical metric tag value preserved post-Phase-C / ADR-0078 for dashboard
      # backwards compatibility — Grafana queries keyed on service=agent-platform continue
      # to work. The deployed reactor module is `agent-service`; see docs/telemetry/policy.md
      # for the rationale and a future-flip note. A migration ADR will flip this once
      # downstream consumers acknowledge the rename.
      service: agent-platform   # historical tag value preserved post-Phase-C / ADR-0078; deployed module is agent-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

# L1: oauth2-resource-server JWT validation (ADR-0056).
# `dev` posture boots clean with no `app.auth.*` set (permit list + denyAll for the rest);
# `research`/`prod` require `app.auth.issuer`, `jwks-uri`, `audience` and `PostureBootGuard`
# (ADR-0058) aborts startup if any are missing.
# Set `app.auth.dev-local-mode=true` AND `app.posture=dev` to wire a local-keypair decoder
# from classpath `auth/dev-jwk.json` (test fixture; never enable outside dev).

logging:
  level:
    root: INFO
    com.huawei.ascend: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"

# Posture marker -- read at boot by PostureBootGuard (W0 lite; full guard in W1).
app:
  posture: ${APP_POSTURE:dev}
  sha: ${APP_SHA:dev}
  # L1 idempotency dedup defaults (ADR-0057). research/prod inherit; dev may
  # override allow-in-memory=true to opt into the in-memory store when no
  # Postgres is available.
  idempotency:
    ttl: PT24H
    allow-in-memory: false
  runs:
    dispatch:
      core-threads: 4
      max-threads: 16
      queue-capacity: 256
      # Overload fallback for dedicated run-dispatch executor.
      # CALLER_RUNS keeps current behavior; ABORT fails fast on saturation.
      rejection-policy: CALLER_RUNS
