# Module metadata for agent-runtime.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Authority: ADR-0159 (agent-runtime consolidation / pure rebuild).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-runtime
kind: domain             # platform | domain | starter | bom | sample
version: 0.0.1-SNAPSHOT
semver_compatibility: experimental
description: "Run-owning runtime SDK that drives Agent instances built on heterogeneous agent frameworks through a single framework-neutral SPI (engine.spi.AgentRuntimeHandler + optional AgentCardProvider + MessageAdapter + StreamAdapter + narrow SetState/MemoryProvider SPIs; openJiuwen adapter first). Owns engine dispatch + Run lifecycle + session + task-centric control + internal event queue + access (A2A) + the bootable runtime application."
architecture_doc: architecture/docs/L1/agent-runtime/README.md
dfx_doc: docs/dfx/agent-runtime.yaml
spi_packages:
  # Framework-neutral runtime SPI: AgentRuntimeHandler, optional AgentCardProvider,
  # MessageAdapter, StreamAdapter, SetState, and MemoryProvider - the
  # per-framework plug-in surface (openJiuwen first).
  - com.huawei.ascend.runtime.engine.spi
allowed_dependencies:
  - agent-bus              # consumes the neutral bus.spi.engine RunContext/SuspendSignal types
forbidden_dependencies:
  - agent-service          # engine is upstream of agent-service; reverse direction forbidden
deployment_plane: compute_control   # Rule R-I / P-I 鈥?engine runs in-process with the runtime kernel
