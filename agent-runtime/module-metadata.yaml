# Module metadata for agent-runtime.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Authority: ADR-0159 (agent-runtime consolidation / pure rebuild).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-runtime
kind: domain             # platform | domain | starter | bom | sample
version: 0.2.0-SNAPSHOT
semver_compatibility: experimental
description: "Framework-neutral agent-hosting runtime SDK: AgentRuntimeHandler SPI + A2A SDK bridge (task lifecycle/store/queue from the SDK's replaceable in-memory facilities; session persistence delegated to framework checkpointers) + trajectory observability + remote A2A tool invocation + northbound A2A access + embeddable entry app.RuntimeApp"
architecture_doc: architecture/docs/L1/agent-runtime/README.md
dfx_doc: docs/dfx/agent-runtime.yaml
spi_packages:
  # Framework-neutral runtime SPI: AgentRuntimeHandler, StreamAdapter, and
  # MemoryProvider - the per-framework plug-in surface (openJiuwen first).
  - com.huawei.ascend.runtime.engine.spi
allowed_dependencies: []   # no sibling-module dependencies; the only external protocol contract is the A2A SDK
forbidden_dependencies:
  - agent-service          # engine is upstream of agent-service; reverse direction forbidden
deployment_plane: compute_control   # Rule R-I / P-I - engine runs in-process with the runtime kernel
