# Default values for the 中台-mode reference deployment.
#
# product_claim: PC-002 (中台 topology)
# target_personas: ["Persona-A", "Persona-D"]
# authority: ADR-0156
# status: design_only — schema_shipped scaffold; runtime soak deferred to Phase B
#
# Resource sizing is sourced UPSTREAM from docs/perf/v1.0-baselines.yaml.
# Do NOT raise these without updating the perf-baselines file first (Rule
# R-D + Rule G-13 single-source rendering).

# Global posture defaults (Rule D-6 Posture-Aware Defaults).
global:
  posture: prod                                    # dev | research | prod; prod = fail-closed
  productClaim: PC-002
  cluster:
    architecture: arm64                            # Kunpeng ARM64 — see nodeSelector + tolerations below
    arch_label: "kubernetes.io/arch"
  imageRegistry: "registry.example.com"
  imagePullSecrets:
    - name: spring-ai-ascend-pull-secret

# Image references — every deployment template consumes these via Helm
# template interpolation. The example registry placeholder is replaced at
# bank deployment time with the bank's internal Harbor registry.
images:
  agentService:
    repository: spring-ai-ascend/agent-service
    tag: v1.0.0-finance
    pullPolicy: IfNotPresent
  agentBus:
    repository: spring-ai-ascend/agent-bus
    tag: v1.0.0-finance
    pullPolicy: IfNotPresent
  modelGateway:
    repository: spring-ai-ascend/model-gateway
    tag: v1.0.0-finance
    pullPolicy: IfNotPresent
  sandboxRuntime:
    repository: spring-ai-ascend/sandbox-runtime
    tag: v1.0.0-finance
    pullPolicy: IfNotPresent
  postgres:
    repository: docker.io/library/postgres
    tag: "16.2-bookworm"
    pullPolicy: IfNotPresent
  otelCollector:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.96.0"
    pullPolicy: IfNotPresent

# Agent service — the runtime pod. Sized per docs/perf/v1.0-baselines.yaml#reference_hardware
# (4-core / 8GiB Kunpeng 920 ARM64 slice; supports 100 concurrent Runs per pod).
agentService:
  replicaCount: 2
  resources:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      cpu: "4"
      memory: "8Gi"                                 # request == limit for predictable Persona-D capacity planning
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "ascend_local_llama_class"        # overridden in values-bank-example.yaml when bank opts into Pangu / OpenAI
    SPRING_PROFILES_ACTIVE: "prod,middle-office,kunpeng"
  serviceAccountName: agent-service
  service:
    type: ClusterIP
    port: 8080
  livenessProbe:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    path: /actuator/health/readiness
    initialDelaySeconds: 15
    periodSeconds: 5

# Agent bus — the StatefulSet hosting the three-track channel hub
# (control / data / rhythm per Rule R-E). 2-core / 4GiB per replica.
agentBus:
  replicaCount: 3
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  storageClass: "ssd-arm64"
  persistentVolumeSize: "20Gi"
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "n/a"
    BUS_CHANNELS_CONTROL_PORT: "9091"
    BUS_CHANNELS_DATA_PORT: "9092"
    BUS_CHANNELS_RHYTHM_PORT: "9093"

# Model gateway — Persona-A's tiered model routing point.
modelGateway:
  replicaCount: 2
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "ascend_local_llama_class"
    GATEWAY_DEFAULT_TIMEOUT_MS: "60000"

# Sandbox runtime — physical-enforcement pool consuming
# docs/governance/sandbox-policies.yaml#financial_default.
sandboxRuntime:
  replicaCount: 3
  resources:
    requests:
      cpu: "2"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  policyRef: "financial_default"                    # docs/governance/sandbox-policies.yaml
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "n/a"
    SANDBOX_POLICY: "financial_default"

# Postgres — tenant-isolated storage. RLS-enforced via Flyway init job.
postgres:
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  storageClass: "ssd-arm64"
  persistentVolumeSize: "100Gi"
  database: "spring_ai_ascend"
  rlsEnabled: true                                   # Rule R-J.a Storage-Engine Tenant Isolation
  flywayMigrationPath: "/flyway/migrations"

# Audit trail — append-only Postgres with checksum chain (PC-003 / Persona-F).
auditTrail:
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  storageClass: "ssd-arm64"
  persistentVolumeSize: "200Gi"
  contractRef: "docs/contracts/audit-trail.v1.yaml"
  appendOnlyTrigger: true
  checksumChainVerifier:
    schedule: "0 2 * * *"                            # daily 02:00 UTC chain-recompute

# Observability — OTel Collector + Prometheus + Grafana.
observability:
  enabled: true
  otelCollector:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
  prometheus:
    enabled: true
    scrapeInterval: "30s"
    retention: "30d"
  grafana:
    enabled: true
    adminPasswordSecret: "grafana-admin"

# IAM bridge — OAuth2/OIDC delegation for agent identity (Persona-F mandate).
iamBridge:
  enabled: true
  contractRef: "docs/contracts/iam-bridge.v1.yaml"
  provider: "keycloak"                               # keycloak | okta | azure-ad | auth0 | custom-oidc
  jwksUri: "https://iam.bank.example.com/realms/agents/protocol/openid-connect/certs"
  tenantClaim: "tenant_id"
  userContextTokenPropagation: true

# Cost governance — Persona-A budget enforcement (PC-003 cost_capacity_governance).
costGovernance:
  enabled: true
  contractRef: "docs/contracts/cost-governance.v1.yaml"
  defaultBudgetRef: "docs/governance/skill-capacity.yaml#v1_0_financial_default_budget"
  enforcementMode: "block"                           # block | degrade | notify

# Kunpeng ARM64 scheduling — all pods land on ARM64 nodes.
nodeSelector:
  kubernetes.io/arch: arm64

tolerations:
  - key: "arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"
  - key: "kunpeng.huawei.com/dedicated"
    operator: "Equal"
    value: "agent-platform"
    effect: "NoSchedule"

# Network policies — Calico/Cilium isolation of sandbox + audit storage.
# Rendered via templates/NETWORK-POLICY.yaml (chart-root for visibility).
networkPolicies:
  enabled: true
  isolateSandbox: true
  isolateAuditTrail: true
  allowedEgressCidrs:
    - "10.0.0.0/8"                                   # bank internal VPC only
