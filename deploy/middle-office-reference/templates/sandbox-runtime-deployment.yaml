# product_claim: PC-002
# 中台-mode sandbox runtime — physical-enforcement executor pool consuming
# docs/governance/sandbox-policies.yaml#financial_default (PC-003 / Persona-F).
# Per Rule R-L Sandbox Permission Subsumption: this is the PHYSICAL boundary;
# logical permission grants from the runtime MUST NOT widen what these pods
# can do. Pods run as restricted (no root, no privileged, dropped capabilities).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sandbox-runtime
  labels:
    app.kubernetes.io/name: sandbox-runtime
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: sandbox
  annotations:
    product_claim: PC-002
    authority: ADR-0156
    rule_ref: "Rule R-L (Sandbox Permission Subsumption)"
    sandbox_policy_ref: "docs/governance/sandbox-policies.yaml#financial_default"
spec:
  replicas: {{ .Values.sandboxRuntime.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-runtime
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-runtime
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sandbox
      annotations:
        container.apparmor.security.beta.kubernetes.io/sandbox-runtime: "runtime/default"
    spec:
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      automountServiceAccountToken: false
      containers:
        - name: sandbox-runtime
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.sandboxRuntime.repository }}:{{ .Values.images.sandboxRuntime.tag }}"
          imagePullPolicy: {{ .Values.images.sandboxRuntime.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_POSTURE
              value: {{ .Values.sandboxRuntime.env.APP_POSTURE | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.sandboxRuntime.env.LLM_PROVIDER | quote }}
            - name: SANDBOX_POLICY
              value: {{ .Values.sandboxRuntime.env.SANDBOX_POLICY | quote }}
            - name: SANDBOX_POLICY_PATH
              value: "/etc/agent-config/readonly/sandbox-policies.yaml"
          resources:
            requests:
              cpu: {{ .Values.sandboxRuntime.resources.requests.cpu | quote }}
              memory: {{ .Values.sandboxRuntime.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.sandboxRuntime.resources.limits.cpu | quote }}
              memory: {{ .Values.sandboxRuntime.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: sandbox-scratch
              mountPath: /var/agent-data/scratch
            - name: sandbox-policy
              mountPath: /etc/agent-config/readonly
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: sandbox-scratch
          emptyDir:
            sizeLimit: "1Gi"
        - name: sandbox-policy
          configMap:
            name: {{ .Release.Name }}-sandbox-policy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-sandbox-policy
  labels:
    app.kubernetes.io/name: sandbox-runtime
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
    policy_source: "docs/governance/sandbox-policies.yaml#financial_default"
data:
  sandbox-policies.yaml: |
    # Materialised from docs/governance/sandbox-policies.yaml#financial_default
    # at deploy time. SOURCE OF TRUTH stays in the repo; Persona-A regenerates
    # this ConfigMap when financial_default changes.
    policy: financial_default
    product_claim: PC-003
    target_persona: Persona-F
    outbound_network: deny
    outbound_network_allowlist: []
    filesystem_read:
      - /var/agent-data/scratch
      - /etc/agent-config/readonly
    filesystem_write:
      - /var/agent-data/scratch
    cpu_cap_millicores: 2000
    memory_cap_megabytes: 2048
    wall_clock_cap_seconds: 60
    pii_egress_to_model: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-sandbox-runtime
  labels:
    app.kubernetes.io/name: sandbox-runtime
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: sandbox-runtime
    app.kubernetes.io/instance: {{ .Release.Name }}
