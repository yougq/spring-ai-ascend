# product_claim: PC-002
# 中台-mode Postgres with Row-Level Security + Flyway init for the runtime
# state store (Run + Checkpoint + Idempotency + Memory tables). RLS is
# REQUIRED per Rule R-J.a Storage-Engine Tenant Isolation — Persona-D
# cannot promote this to prod without RLS enabled.
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres-secret
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: "spring_ai_ascend"
  POSTGRES_PASSWORD: "REPLACE_AT_DEPLOY_TIME_VIA_SEALED_SECRET"
  DATABASE_URL: "r2dbc:postgresql://{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.database }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: state-store
  annotations:
    product_claim: PC-002
    authority: ADR-0156
    rule_ref: "Rule R-J.a (Storage-Engine Tenant Isolation)"
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1                                        # primary; HA replica wiring lands in a follow-up impl-mode wave
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: APP_POSTURE
              value: "prod"
            - name: LLM_PROVIDER
              value: "n/a"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: {{ .Values.postgres.resources.requests.cpu | quote }}
              memory: {{ .Values.postgres.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.postgres.resources.limits.cpu | quote }}
              memory: {{ .Values.postgres.resources.limits.memory | quote }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "spring_ai_ascend"]
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "spring_ai_ascend"]
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.postgres.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistentVolumeSize | quote }}
---
# Flyway init Job — applies migrations under flywayMigrationPath. Migrations
# under agent-service/src/main/resources/db/migration MUST enable RLS on
# every tenant_id-bearing table per Rule R-J.a.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-flyway-init
  labels:
    app.kubernetes.io/name: flyway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: state-store-init
  annotations:
    product_claim: PC-002
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flyway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: flyway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.agentService.repository }}:{{ .Values.images.agentService.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - "java -cp /app/agent-service.jar org.springframework.boot.loader.launch.JarLauncher --spring.profiles.active=flyway-only,prod"
          env:
            - name: APP_POSTURE
              value: "prod"
            - name: LLM_PROVIDER
              value: "n/a"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-secret
                  key: DATABASE_URL
            - name: SPRING_FLYWAY_LOCATIONS
              value: "classpath:db/migration"
            - name: SPRING_FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: RLS_ENABLED
              value: {{ .Values.postgres.rlsEnabled | quote }}
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
