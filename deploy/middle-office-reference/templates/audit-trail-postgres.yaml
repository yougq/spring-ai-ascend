# product_claim: PC-002
# 中台-mode immutable audit storage — Postgres with append-only trigger +
# checksum-chain daily verifier. Realises PC-003 + Persona-F audit-trail
# mandate per docs/contracts/audit-trail.v1.yaml. SEPARATE Postgres
# instance from the runtime state store so backup/retention policies
# can differ (banks retain audit 7+ years per JR/T 0223-2021).
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-audit-trail-postgres-secret
  labels:
    app.kubernetes.io/name: audit-trail-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
    target_persona: Persona-F
type: Opaque
stringData:
  POSTGRES_DB: "audit_trail"
  POSTGRES_USER: "audit_writer"
  POSTGRES_PASSWORD: "REPLACE_AT_DEPLOY_TIME_VIA_SEALED_SECRET"
  DATABASE_URL: "r2dbc:postgresql://{{ .Release.Name }}-audit-trail-postgres:5432/audit_trail"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-audit-trail-postgres
  labels:
    app.kubernetes.io/name: audit-trail-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: audit-store
  annotations:
    product_claim: PC-002
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: audit-trail-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-audit-trail-init
  labels:
    app.kubernetes.io/name: audit-trail-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
data:
  01-schema.sql: |
    -- Authority: docs/contracts/audit-trail.v1.yaml
    -- Append-only by trigger; UPDATE / DELETE forbidden by Postgres rule.
    CREATE TABLE IF NOT EXISTS audit_trail_entries (
        audit_id          UUID PRIMARY KEY,
        tenant_id         TEXT NOT NULL,
        run_id            UUID NOT NULL,
        event_type        TEXT NOT NULL,
        user_id           TEXT,
        agent_id          TEXT NOT NULL,
        occurred_at       TIMESTAMPTZ NOT NULL,
        payload_jsonb     JSONB NOT NULL,
        checksum_self     TEXT NOT NULL,
        checksum_prev     TEXT,
        CHECK (checksum_self IS NOT NULL)
    );
    ALTER TABLE audit_trail_entries ENABLE ROW LEVEL SECURITY;
    CREATE POLICY audit_tenant_scope ON audit_trail_entries
      USING (tenant_id = current_setting('app.tenant_id', true));
    CREATE INDEX IF NOT EXISTS idx_audit_tenant_runid_occurred
      ON audit_trail_entries (tenant_id, run_id, occurred_at);
  02-append-only-trigger.sql: |
    -- Storage-engine enforcement of append-only (Persona-F: "Sandbox is honor-system").
    CREATE OR REPLACE FUNCTION refuse_audit_mutation() RETURNS TRIGGER AS $$
    BEGIN
        RAISE EXCEPTION 'audit_trail_entries is append-only; UPDATE/DELETE forbidden';
    END;
    $$ LANGUAGE plpgsql;
    DROP TRIGGER IF EXISTS audit_no_update ON audit_trail_entries;
    CREATE TRIGGER audit_no_update
      BEFORE UPDATE OR DELETE ON audit_trail_entries
      FOR EACH ROW EXECUTE FUNCTION refuse_audit_mutation();
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-audit-trail-postgres
  labels:
    app.kubernetes.io/name: audit-trail-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: audit-store
  annotations:
    product_claim: PC-002
    authority: ADR-0156
    contract_ref: "docs/contracts/audit-trail.v1.yaml"
    target_persona: Persona-F
spec:
  serviceName: {{ .Release.Name }}-audit-trail-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-trail-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-trail-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: audit-trail-postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-audit-trail-postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-audit-trail-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-audit-trail-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: APP_POSTURE
              value: "prod"
            - name: LLM_PROVIDER
              value: "n/a"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: audit-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.auditTrail.resources.requests.cpu | quote }}
              memory: {{ .Values.auditTrail.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.auditTrail.resources.limits.cpu | quote }}
              memory: {{ .Values.auditTrail.resources.limits.memory | quote }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "audit_writer"]
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "audit_writer"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: init-scripts
          configMap:
            name: {{ .Release.Name }}-audit-trail-init
  volumeClaimTemplates:
    - metadata:
        name: audit-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.auditTrail.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.auditTrail.persistentVolumeSize | quote }}
---
# Daily checksum-chain verifier — recomputes the chain hash and alerts if
# any entry has been tampered with post-write. Persona-F gate for
# audit-trail integrity.
{{- if .Values.auditTrail.checksumChainVerifier }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-audit-chain-verifier
  labels:
    app.kubernetes.io/name: audit-chain-verifier
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: audit-store-verifier
  annotations:
    product_claim: PC-002
    target_persona: Persona-F
spec:
  schedule: {{ .Values.auditTrail.checksumChainVerifier.schedule | quote }}
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 30
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            {{- range .Values.global.imagePullSecrets }}
            - name: {{ .name }}
            {{- end }}
          nodeSelector:
            {{- toYaml .Values.nodeSelector | nindent 12 }}
          tolerations:
            {{- toYaml .Values.tolerations | nindent 12 }}
          containers:
            - name: chain-verifier
              image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.agentService.repository }}:{{ .Values.images.agentService.tag }}"
              command: ["/bin/sh", "-c"]
              args:
                - "java -cp /app/agent-service.jar com.huawei.ascend.audit.tools.ChainVerifier --since=24h"
              env:
                - name: APP_POSTURE
                  value: "prod"
                - name: LLM_PROVIDER
                  value: "n/a"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-audit-trail-postgres-secret
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
{{- end }}
