# product_claim: PC-002
# 中台-mode observability stack — OTel Collector + Prometheus + Grafana
# wiring. Realises PC-005 sub-dimension three_axis_observability_business_platform_model
# at the platform-axis layer (the OTel + Prometheus surface; business + model
# axes wire through application-tier exporters via the
# `springai_ascend_*` counter/timer surface declared in docs/contracts/contract-catalog.md §5).
{{- if .Values.observability.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      resource:
        attributes:
          - key: deployment.shape
            value: middle-office-reference
            action: upsert
          - key: product_claim
            value: PC-002
            action: upsert
    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        send_timestamps: true
      logging:
        loglevel: info
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [logging]
        metrics:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [prometheus, logging]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observability
  annotations:
    product_claim: PC-002
    authority: ADR-0156
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: otel-collector
          image: "{{ .Values.images.otelCollector.repository }}:{{ .Values.images.otelCollector.tag }}"
          imagePullPolicy: {{ .Values.images.otelCollector.pullPolicy }}
          args:
            - "--config=/conf/otel-collector-config.yaml"
          env:
            - name: APP_POSTURE
              value: "prod"
            - name: LLM_PROVIDER
              value: "n/a"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prom-export
              containerPort: 8889
          resources:
            requests:
              cpu: {{ .Values.observability.otelCollector.resources.requests.cpu | quote }}
              memory: {{ .Values.observability.otelCollector.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.observability.otelCollector.resources.limits.cpu | quote }}
              memory: {{ .Values.observability.otelCollector.resources.limits.memory | quote }}
          volumeMounts:
            - name: config
              mountPath: /conf
          livenessProbe:
            tcpSocket:
              port: otlp-grpc
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: otlp-grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
spec:
  type: ClusterIP
  ports:
    - port: 4317
      targetPort: otlp-grpc
      name: otlp-grpc
    - port: 4318
      targetPort: otlp-http
      name: otlp-http
    - port: 8889
      targetPort: prom-export
      name: prom-export
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if .Values.observability.prometheus.enabled }}
---
# Prometheus scrape config — uses pod annotations
# (`prometheus.io/scrape`, `prometheus.io/port`, `prometheus.io/path`)
# emitted by every agent-* deployment template above.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.observability.prometheus.scrapeInterval }}
      external_labels:
        deployment_shape: middle-office-reference
        product_claim: PC-002
    scrape_configs:
      - job_name: 'spring-ai-ascend'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
{{- end }}
{{- if .Values.observability.grafana.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.observability.grafana.adminPasswordSecret }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
type: Opaque
stringData:
  GRAFANA_ADMIN_PASSWORD: "REPLACE_AT_DEPLOY_TIME_VIA_SEALED_SECRET"
{{- end }}
{{- end }}
