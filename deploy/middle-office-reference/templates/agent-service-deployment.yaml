# product_claim: PC-002
# 中台-mode agent-service runtime — the front-door HTTP API + Run state machine.
# Sized per docs/perf/v1.0-baselines.yaml#reference_hardware (Kunpeng 920 ARM64
# 4-core / 8GiB; supports 100 concurrent Runs per pod per v1.0-baselines#throughput).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent-service
  labels:
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: spring-ai-ascend
  annotations:
    product_claim: PC-002
    authority: ADR-0156
spec:
  replicas: {{ .Values.agentService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-service
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: runtime
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: {{ .Values.agentService.serviceAccountName }}
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: agent-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.agentService.repository }}:{{ .Values.images.agentService.tag }}"
          imagePullPolicy: {{ .Values.images.agentService.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_POSTURE
              value: {{ .Values.agentService.env.APP_POSTURE | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.agentService.env.LLM_PROVIDER | quote }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.agentService.env.SPRING_PROFILES_ACTIVE | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-secret
                  key: DATABASE_URL
            - name: IAM_BRIDGE_JWKS_URI
              value: {{ .Values.iamBridge.jwksUri | quote }}
            - name: IAM_BRIDGE_TENANT_CLAIM
              value: {{ .Values.iamBridge.tenantClaim | quote }}
            - name: SANDBOX_POLICY
              value: {{ .Values.sandboxRuntime.policyRef | quote }}
            - name: COST_GOVERNANCE_DEFAULT_BUDGET_REF
              value: {{ .Values.costGovernance.defaultBudgetRef | quote }}
            - name: BUS_ENDPOINT
              value: "{{ .Release.Name }}-agent-bus:9091"
            - name: MODEL_GATEWAY_ENDPOINT
              value: "{{ .Release.Name }}-model-gateway:8080"
            - name: AUDIT_TRAIL_ENDPOINT
              value: "{{ .Release.Name }}-audit-trail-postgres:5432"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:4318"
          resources:
            requests:
              cpu: {{ .Values.agentService.resources.requests.cpu | quote }}
              memory: {{ .Values.agentService.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.agentService.resources.limits.cpu | quote }}
              memory: {{ .Values.agentService.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.agentService.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.agentService.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.agentService.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.agentService.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.agentService.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.agentService.readinessProbe.periodSeconds }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-agent-service
  labels:
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
spec:
  type: {{ .Values.agentService.service.type }}
  ports:
    - port: {{ .Values.agentService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agentService.serviceAccountName }}
  labels:
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/instance: {{ .Release.Name }}
