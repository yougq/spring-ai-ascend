# product_claim: PC-002
# 中台-mode model-gateway sidecar — Persona-A's tiered model routing point
# (PC-003 sub-dimension multi_model_gateway). Binds the BEFORE_LLM /
# AFTER_LLM HookPoints (Rule R-M.c) — entry point for cost-governance
# and audit-trail capture per docs/contracts/cost-governance.v1.yaml +
# docs/contracts/audit-trail.v1.yaml.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-model-gateway
  labels:
    app.kubernetes.io/name: model-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: model-router
  annotations:
    product_claim: PC-002
    authority: ADR-0156
    rule_ref: "Rule R-M.c (HookPoint binding)"
spec:
  replicas: {{ .Values.modelGateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: model-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: model-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: model-gateway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.modelGateway.repository }}:{{ .Values.images.modelGateway.tag }}"
          imagePullPolicy: {{ .Values.images.modelGateway.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_POSTURE
              value: {{ .Values.modelGateway.env.APP_POSTURE | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.modelGateway.env.LLM_PROVIDER | quote }}
            - name: GATEWAY_DEFAULT_TIMEOUT_MS
              value: {{ .Values.modelGateway.env.GATEWAY_DEFAULT_TIMEOUT_MS | quote }}
            - name: COST_GOVERNANCE_ENABLED
              value: {{ .Values.costGovernance.enabled | quote }}
            - name: COST_GOVERNANCE_ENFORCEMENT_MODE
              value: {{ .Values.costGovernance.enforcementMode | quote }}
            - name: COST_GOVERNANCE_CONTRACT_REF
              value: {{ .Values.costGovernance.contractRef | quote }}
            - name: AUDIT_TRAIL_ENDPOINT
              value: "{{ .Release.Name }}-audit-trail-postgres:5432"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:4318"
          resources:
            requests:
              cpu: {{ .Values.modelGateway.resources.requests.cpu | quote }}
              memory: {{ .Values.modelGateway.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.modelGateway.resources.limits.cpu | quote }}
              memory: {{ .Values.modelGateway.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-model-gateway
  labels:
    app.kubernetes.io/name: model-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    product_claim: PC-002
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: model-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
