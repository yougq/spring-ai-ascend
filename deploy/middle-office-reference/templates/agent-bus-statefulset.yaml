# product_claim: PC-002
# 中台-mode agent-bus — StatefulSet hosting the three-track channel hub
# (control / data / rhythm per Rule R-E Three-Track Channel Isolation).
# Sized per docs/perf/v1.0-baselines.yaml (2-core / 4GiB per replica).
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-agent-bus
  labels:
    app.kubernetes.io/name: agent-bus
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: bus
  annotations:
    product_claim: PC-002
spec:
  clusterIP: None                                    # headless for StatefulSet peer discovery
  ports:
    - port: 9091
      name: control
      protocol: TCP
    - port: 9092
      name: data
      protocol: TCP
    - port: 9093
      name: rhythm
      protocol: TCP
  selector:
    app.kubernetes.io/name: agent-bus
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-agent-bus
  labels:
    app.kubernetes.io/name: agent-bus
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: bus
  annotations:
    product_claim: PC-002
    authority: ADR-0156
    rule_ref: "Rule R-E (Three-Track Channel Isolation)"
spec:
  serviceName: {{ .Release.Name }}-agent-bus
  replicas: {{ .Values.agentBus.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-bus
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-bus
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: bus
    spec:
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: agent-bus
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.agentBus.repository }}:{{ .Values.images.agentBus.tag }}"
          imagePullPolicy: {{ .Values.images.agentBus.pullPolicy }}
          ports:
            - name: control
              containerPort: 9091
            - name: data
              containerPort: 9092
            - name: rhythm
              containerPort: 9093
          env:
            - name: APP_POSTURE
              value: {{ .Values.agentBus.env.APP_POSTURE | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.agentBus.env.LLM_PROVIDER | quote }}
            - name: BUS_CHANNELS_CONTROL_PORT
              value: {{ .Values.agentBus.env.BUS_CHANNELS_CONTROL_PORT | quote }}
            - name: BUS_CHANNELS_DATA_PORT
              value: {{ .Values.agentBus.env.BUS_CHANNELS_DATA_PORT | quote }}
            - name: BUS_CHANNELS_RHYTHM_PORT
              value: {{ .Values.agentBus.env.BUS_CHANNELS_RHYTHM_PORT | quote }}
          resources:
            requests:
              cpu: {{ .Values.agentBus.resources.requests.cpu | quote }}
              memory: {{ .Values.agentBus.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.agentBus.resources.limits.cpu | quote }}
              memory: {{ .Values.agentBus.resources.limits.memory | quote }}
          livenessProbe:
            tcpSocket:
              port: control
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: control
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: bus-data
              mountPath: /var/agent-bus/data
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
  volumeClaimTemplates:
    - metadata:
        name: bus-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.agentBus.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.agentBus.persistentVolumeSize | quote }}
