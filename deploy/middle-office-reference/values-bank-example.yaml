# Concrete example values overrides for a hypothetical 民生银行 (China Minsheng Bank)
# deployment of the 中台-mode reference chart. ILLUSTRATIVE ONLY — not a real
# deployment; product_claim: PC-002.
#
# Persona-A (Platform Team Lead) authors this override file in the bank's
# internal GitOps repo, deploys via Argo CD or Flux CD against the bank's
# Kunpeng ARM64 + Ascend 310 cluster.

global:
  posture: prod
  productClaim: PC-002
  cluster:
    architecture: arm64
    arch_label: "kubernetes.io/arch"
  imageRegistry: "harbor.bank-example.intra"
  imagePullSecrets:
    - name: spring-ai-ascend-pull-secret

images:
  agentService:
    repository: spring-ai-ascend/agent-service
    tag: v1.0.0-finance
  agentBus:
    repository: spring-ai-ascend/agent-bus
    tag: v1.0.0-finance
  modelGateway:
    repository: spring-ai-ascend/model-gateway
    tag: v1.0.0-finance
  sandboxRuntime:
    repository: spring-ai-ascend/sandbox-runtime
    tag: v1.0.0-finance

agentService:
  replicaCount: 8                                    # 8 pods × 100 concurrent Runs/pod = 800 Run capacity
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "pangu_ascend_cloud"               # bank-example opts for Pangu (sovereign cloud) over local Llama
    SPRING_PROFILES_ACTIVE: "prod,middle-office,kunpeng,bank-example"

agentBus:
  replicaCount: 5                                    # bank-example scales the bus for cross-business-center traffic

modelGateway:
  replicaCount: 4
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "pangu_ascend_cloud"
    GATEWAY_DEFAULT_TIMEOUT_MS: "60000"

sandboxRuntime:
  replicaCount: 6
  policyRef: "financial_default"
  env:
    APP_POSTURE: "prod"
    LLM_PROVIDER: "n/a"
    SANDBOX_POLICY: "financial_default"

postgres:
  persistentVolumeSize: "1Ti"                        # bank-example holds 12-month audit retention online
  rlsEnabled: true

auditTrail:
  persistentVolumeSize: "5Ti"                        # bank-example retains 7-year audit per JR/T 0223-2021

observability:
  enabled: true
  prometheus:
    retention: "90d"
  grafana:
    enabled: true

iamBridge:
  enabled: true
  provider: "custom-oidc"                            # bank-example runs internal OIDC, not Keycloak
  jwksUri: "https://iam.bank-example.intra/oidc/v1/jwks"
  tenantClaim: "bank_business_center_id"             # bank-example renames the claim per its IAM conventions
  userContextTokenPropagation: true

costGovernance:
  enabled: true
  enforcementMode: "block"
  tenantOverrides:
    # Per-business-center budget overrides authored by Persona-A.
    - tenant_id: "retail-credit"
      daily_input_tokens: 5_000_000
      daily_output_tokens: 1_000_000
      enforcement_mode: "block"
    - tenant_id: "corporate-banking"
      daily_input_tokens: 2_000_000
      daily_output_tokens: 400_000
      enforcement_mode: "degrade"
      degrade_fallback_model_id: "ascend-local/qwen2-7b-instruct"
    - tenant_id: "wealth-management"
      daily_input_tokens: 500_000
      daily_output_tokens: 100_000
      enforcement_mode: "block"

nodeSelector:
  kubernetes.io/arch: arm64
  kunpeng.huawei.com/sku: "920-32core"               # bank-example pins to a specific Kunpeng SKU

tolerations:
  - key: "arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"
  - key: "kunpeng.huawei.com/dedicated"
    operator: "Equal"
    value: "agent-platform"
    effect: "NoSchedule"

networkPolicies:
  enabled: true
  isolateSandbox: true
  isolateAuditTrail: true
  allowedEgressCidrs:
    - "10.10.0.0/16"                                 # bank-example VPC
    - "10.20.0.0/16"                                 # bank-example Ascend Cloud peered VPC
