# product_claim: PC-002
# Calico / Cilium-compatible NetworkPolicies isolating the sandbox runtime
# and the audit-trail storage from the rest of the cluster. Realises
# Rule R-L (Sandbox Permission Subsumption) at the network layer + Persona-F
# audit-trail-integrity mandate at the audit-store boundary.
#
# Apply with:
#   kubectl -n <namespace> apply -f deploy/middle-office-reference/NETWORK-POLICY.yaml
#
# Banks layering Calico GlobalNetworkPolicy on top of this base set add their
# perimeter rules in a separate file consumed by their internal GitOps repo.

---
# Default deny-all egress + ingress in the namespace. Subsequent policies
# explicitly allow what each pod role needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: middle-office-default-deny
  labels:
    app.kubernetes.io/instance: middle-office-reference
  annotations:
    product_claim: PC-002
    authority: ADR-0156
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Agent service — accepts ingress on 8080 from cluster + bank ingress
# gateway; egresses to Postgres (5432), audit-trail (5432), agent-bus
# (9091-9093), model-gateway (8080), OTel collector (4317/4318), and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-service-netpol
  labels:
    app.kubernetes.io/instance: middle-office-reference
  annotations:
    product_claim: PC-002
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: audit-trail-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-bus
      ports:
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: model-gateway
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - ports:
        - protocol: UDP
          port: 53                                  # DNS

---
# Sandbox runtime — STRICT EGRESS: no internet, no cross-namespace reach.
# Realises Rule R-L Sandbox Permission Subsumption at the network layer:
# even if the logical policy widens, the network policy cannot.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-runtime-netpol
  labels:
    app.kubernetes.io/instance: middle-office-reference
  annotations:
    product_claim: PC-002
    rule_ref: "Rule R-L (Sandbox Permission Subsumption)"
    sandbox_policy_ref: "docs/governance/sandbox-policies.yaml#financial_default"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sandbox-runtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-service
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # ONLY DNS + OTel collector. No outbound internet, no Postgres, no
    # cross-pod-reach. Matches financial_default.outbound_network: deny.
    - ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318

---
# Audit-trail Postgres — accepts ingress ONLY from agent-service +
# model-gateway (the two emission sites for AuditTrailEntry). No other
# pod may write to or read from the audit store. Persona-F mandate.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: audit-trail-postgres-netpol
  labels:
    app.kubernetes.io/instance: middle-office-reference
  annotations:
    product_claim: PC-002
    target_persona: Persona-F
    contract_ref: "docs/contracts/audit-trail.v1.yaml"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: audit-trail-postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: model-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: audit-chain-verifier
      ports:
        - protocol: TCP
          port: 5432
  egress:
    - ports:
        - protocol: UDP
          port: 53

---
# Model gateway — egresses to the configured upstream model providers
# (ascend-local / pangu / openai), plus internal Postgres + audit-trail
# + OTel collector. Bank operators tune the allowedEgressCidrs at
# values-bank-example.yaml.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: model-gateway-netpol
  labels:
    app.kubernetes.io/instance: middle-office-reference
  annotations:
    product_claim: PC-002
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: model-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-service
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: audit-trail-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - ports:
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 53

---
# Agent-bus — accepts ingress from agent-service on the three channel
# ports (Rule R-E control / data / rhythm separation enforced at
# port-level, not co-mingled on one port).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-bus-netpol
  labels:
    app.kubernetes.io/instance: middle-office-reference
  annotations:
    product_claim: PC-002
    rule_ref: "Rule R-E (Three-Track Channel Isolation)"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-bus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-service
      ports:
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
  egress:
    - ports:
        - protocol: UDP
          port: 53
