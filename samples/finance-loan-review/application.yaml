# v1.0 reference financial agent — loan-review-assistant.
#
# Authority: PC-003 (financial-vertical mandate) + Persona-F checklist.
# Sandbox baseline: docs/governance/sandbox-policies.yaml#financial_default.
#
# IMPORTANT: this file ships with stub credentials only. No real LLM
# API keys, no real CIF/core/bureau endpoints. A production deployment
# overrides the env-var placeholders below AND runs the Persona-F
# 7-point compliance checklist before promotion to APP_POSTURE=prod.

spring:
  application:
    name: finance-loan-review-sample
  main:
    web-application-type: servlet

server:
  port: 8085

# Posture-aware defaults (Rule D-6). Local dev defaults to "dev"; CI
# pipelines should set APP_POSTURE=research; production promotion to
# APP_POSTURE=prod requires Persona-F sign-off + posture log entry.
app:
  posture: ${APP_POSTURE:dev}

ascend:
  agents:
    loan-review-assistant:
      model: ${LLM_PROVIDER:openai-gpt-4o-mini}
      sandbox-policy: financial_default
      skills:
        - cifSkill
        - transactionHistorySkill
        - creditBureauSkill
      prompt: |
        You are a credit-risk assistant supporting a credit officer at a
        regulated commercial bank. For every loan application:

        1. Call cifSkill to retrieve the applicant's KYC + demographic
           profile. Verify the applicant exists and is in good standing.
        2. Call transactionHistorySkill to retrieve the last 90 days of
           debits/credits + balance series for the applicant's primary
           account. Compute (silently) cash-flow stability and recent
           overdraft incidents.
        3. Call creditBureauSkill to retrieve the bureau score and any
           adverse-event flags.

        Then produce a LoanRiskSummary with:
          - risk band: LOW | MEDIUM | HIGH | DECLINE_RECOMMENDED
          - top three contributing factors with signed weights
          - one-paragraph rationale, in the credit-officer's language,
            with NO direct PII (no full name, no national ID, no full
            account number — use the applicant_ref token instead).

        You are an advisory tool. The credit officer makes the final
        decision. If any skill returns an error or partial data, set
        risk band to HIGH and explain the data gap; never fabricate
        missing inputs.

  # Per-deployment sandbox override knobs (financial_default baseline
  # MUST NOT be widened without an ADR; see Rule R-L and Persona-F
  # checklist item #4).
  sandbox:
    policy-ref: financial_default
    overrides: { }                       # empty by default

  # Audit trail emission (Persona-F checklist item #3).
  audit:
    contract: docs/contracts/audit-trail.v1.yaml
    sink: ${AUDIT_SINK:file:./logs/audit-trail-sample.jsonl}

# Stub external endpoints — no real business systems.
finance:
  cif:
    base-url: ${CIF_BASE_URL:stub://cif.local}
  transaction-history:
    base-url: ${TXN_BASE_URL:stub://txn.local}
  credit-bureau:
    base-url: ${BUREAU_BASE_URL:stub://bureau.local}

logging:
  level:
    com.example.finance.loanreview: INFO
    com.huawei.ascend: INFO
