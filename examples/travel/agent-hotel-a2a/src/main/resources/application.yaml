# agent-hotel-a2a — Spring Boot wrapper hosting agent-hotel under agent-runtime.
# 真实 LLM 凭据从环境变量读，本地默认仅用于启动占位（必须由部署方覆盖）。
server:
  port: 8081

hotel-agent:
  llm:
    provider:   ${LLM_PROVIDER:OpenAI}
    api-key:    ${LLM_API_KEY:sk-local-placeholder}
    api-base:   ${LLM_API_BASE:http://localhost:4000/v1}
    model-name: ${LLM_MODEL:gpt-4o-mini}
    ssl-verify: ${LLM_SSL_VERIFY:true}
  # Long-term memory is partitioned by tenantId:userId so a booking made in one
  # A2A call can be recalled from a later call by the same user. Default is the
  # process-local in-memory provider; set hotel-agent.memory.provider=mem0 to
  # switch to the Mem0 REST backend.
  memory:
    provider: ${HOTEL_MEMORY_PROVIDER:in-memory}
    mem0:
      base-url:      ${MEM0_BASE_URL:http://localhost:8000}
      api-key:       ${MEM0_API_KEY:}
      infer-on-save: ${MEM0_INFER_ON_SAVE:false}

logging:
  level:
    com.huawei.ascend.examples.hotel: INFO
    com.huawei.ascend.runtime: INFO
