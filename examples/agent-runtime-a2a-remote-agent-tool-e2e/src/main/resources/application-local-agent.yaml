# Local OpenJiuwen agent. It discovers the remote A2A agent and calls it as a tool.
# Activate with: --spring.profiles.active=local-agent

agent-runtime:
  access:
    a2a:
      default-tenant-id: sample-tenant
      default-agent-id: local-openjiuwen
  # The local agent discovers the remote agent via its A2A Agent Card.
  # Override with --agent-runtime.remote-agents[0].url=<url> if it is elsewhere.
  remote-agents:
    - url: http://localhost:18082

sample:
  remote-agent-tool:
    role: local
    local-agent:
      llm:
        model-provider: ${SAA_SAMPLE_OPENJIUWEN_MODEL_PROVIDER:openai}
        api-key: ${SAA_SAMPLE_LLM_API_KEY:sk-your-api-key-here}
        api-base: ${SAA_SAMPLE_OPENJIUWEN_API_BASE:http://localhost:4000/v1}
        model-name: ${SAA_SAMPLE_LLM_MODEL:gpt-5.4-mini}
        ssl-verify: ${SAA_SAMPLE_OPENJIUWEN_SSL_VERIFY:true}
