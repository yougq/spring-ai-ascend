id: ADR-0104
title: "rc22 — Package-root migration (decision; rc22.5 executes)"
status: accepted
governance_infra: true
date: 2026-05-22
level: L0
view: development
affects_level: L0, L1
affects_view: development
authors:
  - chao
relates_to:
  - ADR-0100
# rc27 corrective (rc22-1): the ORIGINAL from-side namespace was
# `<a><s><c><e><n><d>.<s><p><r><i><n><g><a><i>` (concatenate the bracketed
# letters; spelled with separators to defeat re-substitution by any
# future bulk-rewrite script). The to-side namespace is
# `com.huawei.ascend.*`. The original ADR-0104 text was self-corrupted by
# the rc22.5 rename script (which replaced the from-side literal in this
# very ADR, leaving "X → X" as the title — see commit dde2c27
# discussion). rc22.5 was executed and merged as PR #42 / squash-merge
# commit 2c650db; that commit message preserves the original
# from-side namespace as a non-substitutable string and is the canonical
# authority for the rename direction.
context: |
  The 2026-05-21 proposal `docs/logs/reviews/2026-05-21-agent-service-l1-expansion-proposal.en.md`
  §3 declared Java packages under `com.huawei.ascend.agent.service…`.
  At rc21 the canonical corpus root was a different two-segment prefix
  starting with `a-s-c-e-n-d` and `s-p-r-i-n-g-a-i` (concatenated; see
  the rc27-corrective frontmatter note above for the canonical literal).
  Every active `module-metadata.yaml#spi_packages`, every ArchUnit
  `@AnalyzeClasses`, every contract-catalog row, and every gate exemption
  list used that pre-migration root.

  The user authorized a project-wide migration to `com.huawei.ascend.*`
  as a SEPARATE cross-cutting wave — the package-rename impact was too
  large to bundle into rc22's L1-grounding work (~200+ files touched).

  This ADR records the decision. Execution shipped as rc22.5
  (PR #42, merge commit 2c650db on 2026-05-21).
decision: |
  Migrate the Java package root project-wide to `com.huawei.ascend.*`.
  Maven `<groupId>` migrates to `com.huawei.ascend` for consistency.
  See PR #42 commit 2c650db message for the canonical FROM-side literal
  (preserved in the commit subject line where this ADR's bulk-rewrite
  script could not reach).

  Migration scope (rc22.5):

  - Every `.java` file under `agent-*/src/{main,test}/java/`.
  - Every `module-metadata.yaml#spi_packages` entry.
  - Every `docs/governance/enforcers.yaml#asserts` text referencing the
    pre-migration root.
  - Every `docs/contracts/contract-catalog.md` row package reference.
  - Every `docs/dfx/*.yaml#spi_packages` block.
  - Every ArchUnit test's `@AnalyzeClasses(packages = ...)`.
  - Every `gate/` script asserting the pre-migration root substring.
  - `pom.xml` `<groupId>` (every module).
  - Every `gate/active-corpus-name-exemption-paths.txt` etc.
  - Every `<!-- root-migration-target: com.huawei.ascend -->` HTML
    marker dropped from rc22's ARCHITECTURE.md files.

  rc22 itself used the pre-migration root for grounding. Every
  documented package path in rc22's `ARCHITECTURE.md` rewrites carried
  the forward-compatibility marker. rc22.5 stripped them as part of
  the rename.

  Mechanical execution path (rc22.5):
    1. Tagged `pre-package-root-migration` immediately before the
       rename to preserve clean git-history boundary.
    2. Ran `gate/lib/migrate_package_root.py` (rc22.5) — opened every
       target file with `'rb'`, performed the replacement, wrote with
       `'wb'` after CRLF normalization.
    3. `./mvnw clean compile` on Linux/WSL.
    4. `./mvnw test -Dtest=*ArchTest` — all ArchUnit tests pass under
       new root.
    5. `bash gate/check_parallel.sh` — no residual pre-migration root
       in active corpus.

  Historical surfaces (`docs/logs/**`, `docs/v6-rationale/**`, frozen
  release notes, `scripts/rc13_*.py`) RETAIN the old root references
  — these are historical-marker surfaces exempt from the migration.

non_goals: |
  - Renaming the GitHub org / repo URL.
  - Maven `<artifactId>` rename (stays as-is — agent-client,
    agent-bus, etc.).
  - Re-issuing pre-rc22 release tags (existing tags stay frozen).
  - Semantic changes (this is a pure rename; zero behavior change).

verification_protocol: |
  rc22 (this wave, decision only):
    1. This ADR exists; ADR-0100 cross-references it.
    2. Every rc22 ARCHITECTURE.md rewrite carries the
       `<!-- root-migration-target: com.huawei.ascend -->` marker on
       every documented package path.

  rc22.5 (execution; shipped as PR #42 / commit 2c650db):
    3. `git tag pre-package-root-migration` created.
    4. `./mvnw clean verify` on Linux/WSL passes under new root.
    5. `bash gate/check_parallel.sh` PASS.
    6. Recurring-defect-families.yaml updated (Rule G-9 freshness
       signal: new ADR added in rc22).

  rc27 (this ADR's corrective update):
    7. Re-encoded the original from-side namespace using letter-by-letter
       bracketed form in the frontmatter note so future bulk-rewrite
       scripts cannot self-corrupt this ADR again.
    8. Added explicit pointer to PR #42 commit 2c650db as the canonical
       FROM-side authority.

