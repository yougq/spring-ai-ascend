id: ADR-0128
title: "Agent first-class SPI: `Agent` binds (identity, modelBinding, toolBindings, memoryBindings, systemPrompt, safetyPolicy); `AgentDefinition` + `AgentRegistry` complete the entry-point surface"
status: accepted
product_claim: "PC-001"
date: 2026-05-25
level: L0
view: development
affects_level: L0, L1
affects_view: development, logical
authors:
  - chao
relates_to:
  - ADR-0120    # Wave A1 brand & Audience B alignment (KEEP)
  - ADR-0121    # Wave B1 ModelGateway SPI (modelBinding target)
  - ADR-0127    # Wave B2 Skill SPI (toolBindings target — SkillRef)
  - ADR-0123    # Wave B3 Memory unified SPI (memoryBindings target — MemoryRef)
  - ADR-0124    # Wave B4 Vector/Retriever/Embedding SPI (knowledgeBindings via MemoryRef)
  - ADR-0126    # Wave B6 Planner SPI (plannerBinding)
  - ADR-0100    # Agent-to-Agent (a2a) protocol foundation
context: |
  The L0 review's primary finding: no `Agent` first-class entity.
  Run / RunContext / ExecutorDefinition exist (they describe one
  execution and its config), but no SPI describes what an Agent
  IS (persistent identity + bindings to model + tools + memories
  + system prompt + safety policy).

  Without this primitive, every Audience B integrator invents
  their own Agent class with different fields; the
  F-cross-authority-agreement family predicts four mutually
  inconsistent definitions by W3.

decision: |
  Land the `Agent` SPI under
  `com.huawei.ascend.service.agent.spi` (agent-service module —
  HTTP-edge-adjacent customer registration surface; Agent is the
  entry-point entity customers expose via `@Bean` and invoke via
  HTTP / `Orchestrator.run(...)`). Status: design_only at rc44.
  **This is the LAST Phase B wave because Agent references types
  from B1 (ModelGateway, middleware.model.spi), B2 (Skill,
  middleware.skill.spi), B3 (Memory, middleware.memory.spi),
  B4 (Vector via Memory M5, middleware.vector.spi), and B6
  (Planner, engine.planner.spi).**

  Public surface:

  - **`Agent`** interface:
      - `String agentId()` — stable identity per tenant.
      - `String tenantId()` (Rule R-C.c).
      - `AgentDefinition definition()` — declarative shape.
      - `Mono<AgentResponse> invoke(AgentInvocation inv)` —
        synchronous request/response; LONG-RUNNING agent work
        goes through `Orchestrator.run(...)` with the agent's
        `ExecutorDefinition`.
      - `default ModelRef modelBinding() {
              return definition().modelBinding(); }`
      - `default Set<SkillRef> toolBindings() {
              return definition().toolBindings(); }`
      - `default Map<MemoryCategory, MemoryRef> memoryBindings() {
              return definition().memoryBindings(); }`
      - `default Optional<PlannerRef> plannerBinding() {
              return definition().plannerBinding(); }`
      - `default String systemPrompt() {
              return definition().systemPrompt(); }`
      - `default SafetyPolicy safetyPolicy() {
              return definition().safetyPolicy(); }`

  - **`AgentDefinition`** record — declarative shape customers
    attach via `@Bean` + `@ConfigurationProperties`:
      - `String agentId`
      - `String tenantId`
      - `String displayName`
      - `String description`
      - `ModelRef modelBinding` — references a `ModelGateway`
        instance by id.
      - `Set<SkillRef> toolBindings` — references `Skill`s.
      - `Map<MemoryCategory, MemoryRef> memoryBindings` — per
        category, optional `MemoryStore` binding.
      - `Optional<PlannerRef> plannerBinding` — optional planner.
      - `List<AdvisorBinding> advisorBindings` — optional ordered
        advisor bindings resolved by stable `advisorName` at registration
        time. `AdvisorBinding` lives in `service.agent.spi` and carries
        `advisorName`, `mode` (`SYNC`, `STREAMING`, `BOTH`), optional
        `orderOverride`, and metadata so the agent SPI does not import
        middleware advisor SPI types.
      - `String systemPrompt`
      - `SafetyPolicy safetyPolicy`
      - `Map<String, Object> metadata`

  - **`AgentRegistry`** interface:
      - `Mono<Void> register(Agent agent)`
      - `Mono<Void> unregister(String tenantId, String agentId)`
      - `Mono<Optional<Agent>> find(String tenantId, String
                                     agentId)`
      - `Flux<Agent> list(String tenantId)`

  - **`AgentInvocation`** record: tenantId, agentId, userMessage,
    optional conversationId, optional context map.
  - **`AgentResponse`** record: assistantMessage, optional
    toolCalls list, usage (delegated from ModelResponse), trace
    span ids.
  - **`AgentRef`** record: tenantId, agentId. Used by
    `SkillKind.AGENT_AS_TOOL` for agent-to-agent composition.

  - **`SafetyPolicy`** record (extensible):
      - `PlaceholderPreservationPolicy placeholderPolicy`
        (per ADR-0051 — `PRESERVE` | `WARN` | `REWRITE`).
      - `Set<String> deniedSkillKeys` (block list).
      - `Set<String> deniedMemoryRefs` (block list).
      - `OutputContentPolicy outputPolicy` (PII redaction
        defaults, etc.).

  - **`ModelRef`** record: `modelGatewayId` (resolved via DI
    by id).
  - **`PlannerRef`** record: `plannerId`.

  Contract schema lives at
  `docs/contracts/agent-definition.v1.yaml` (status:
  design_only).

  **Integration with existing orchestration surface**:
  `Orchestrator.run(runId, tenantId, executorDefinition, payload)`
  remains the runtime entry point; an `Agent` is invoked either
  synchronously via `Agent.invoke(...)` (short request/response)
  or by composing its bindings into an `ExecutorDefinition`
  (long-running). A reference helper `AgentExecutorDefinitionFactory`
  ships in Wave C1 alongside Spring AI adapters.

consequences: |
  Positive:
  - Audience B has ONE primitive to learn: define an
    `AgentDefinition`, register, invoke. The five other SPIs
    (Model / Skill / Memory / Vector / Planner) are referenced
    via Ref records — customers extend at one seam.
  - Rule R-A (Business/Platform Decoupling) becomes
    non-vacuously satisfied: `@Bean` of `AgentDefinition` IS
    the extension point.
  - Agent-to-Agent (ADR-0100 a2a) lands as
    `SkillKind.AGENT_AS_TOOL` referencing an `AgentRef` —
    composition by construction.
  - `SafetyPolicy` ships as a first-class field, integrating
    ADR-0051's `PlaceholderPreservationPolicy` and content
    policies; no prose-only safety guarantees.

  Negative / residual:
  - `Agent` is design_only at rc44; W3 SDK GA ships the first
    real `AgentRegistry` impl and the Spring AI adapter chain
    that makes an end-to-end agent invocation real.
  - `AgentRef` indirection (Ref records that resolve via DI
    by id) adds one lookup vs direct interface reference.
    Acceptable trade-off for serialization across plane
    boundaries (per ADR-0089 Edge / Compute split).

alternatives_considered: |
  - (A) `Agent` is just a typedef of `ExecutorAdapter`.
    Rejected: ExecutorAdapter is engine-routing; Agent is the
    thing that performs runs (has identity, configuration,
    bindings). Different abstraction levels.
  - (B) `Agent` is a tagged `Skill` (SkillKind.AGENT). Rejected:
    Agent owns Skills (toolBindings); making Agent a Skill
    inverts the relationship.
  - (C) Defer Agent to Wave C (after adapters land). Rejected:
    Adapters need the Agent shape as target; ordering must put
    SPI first.
