    decision: |
      `architecture-status.yaml#baseline_metrics` bumped:
        - active_engineering_rules: 31 â†’ 31 (unchanged; G-8.e is sub-clause)
        - active_gate_checks: 118 â†’ 118 (unchanged; Rule 106 + Rule 99 widened
          with new sub-checks, no new top-level rule)
        - gate_executable_test_cases: 190 â†’ 194 (+4: 2 fixtures Ã— 2 widenings)
        - enforcer_rows: 148 â†’ 150 (+2: E150 + E151)
        - adr_count: 89 â†’ 90 (+1: ADR-0091)
        - architecture_graph_nodes: 382 â†’ 384 (+2: ADR-0091 + E150/E151 nodes)
        - architecture_graph_edges: 573 â†’ 577 (+4: rc15 supersedes/extends + enforcer edges)
        - maven_tests_green: 374 â†’ 374 (unchanged; Track C renames one method, no count change)
    impact: positive â€” baseline reconciled to live state per Rule G-8.a.

