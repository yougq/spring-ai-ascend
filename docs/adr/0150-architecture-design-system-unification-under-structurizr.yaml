id: ADR-0150
title: "Architecture design system unified under architecture/ — L1 corpus + module ARCHITECTURE.md consolidated; docs/ is work directory"
status: accepted
governance_infra: true
date: 2026-05-27
level: L0
view: scenarios
affects_level: L0, L1
affects_view: scenarios, logical, development
authors:
  - chao
extends:
  - ADR-0147    # Structurizr Workspace Authority
  - ADR-0149    # W0-W5 shipped record
supersedes:
  - ADR-0143    # Review-log demotion + L1 canonical move (rc55 placed L1 at docs/L1/agent-service/; ADR-0150 moves it again to architecture/docs/L1/agent-service/)
relates_to:
  - ADR-0068    # Layered 4+1 + Architecture Graph
  - ADR-0119    # Single-Source Rendering Coherence
context: |
  After ADR-0147 (Structurizr Workspace Authority) declared
  architecture/workspace.dsl as the machine-readable architecture
  authority, the physical L1 design corpus stayed where ADR-0143
  put it: under docs/L1/<module>/. Module-root agent-*/ARCHITECTURE.md
  also remained at the Maven module roots. The result was three
  parallel L1 narrative sources for agent-service (the rc55 4+1
  per-view directory, the module-root spec, and the W2 5-line stub
  at architecture/docs/L1/agent-service.md) and a split between
  authority direction (workspace closure) and authority location
  (still under docs/).

  The user directive 2026-05-27 (issued after PR #81 merge):

    > "L1 文档设计都应该在 architecture/docs/L1/ 的目录下，包含 4+1 视图，
    > 特性清单，功能点等以及基于 Structurizr 的输出。要围绕 Structurizr
    > 为主入口和主权威搭建整个架构设计体系。docs/ 里面的内容可以认为是
    > 工作目录，不是发布目录。不要有什么索引之类的内容和信息。"

  Translation: L1 design content all belongs under architecture/docs/L1/.
  Build the entire architecture-design system around Structurizr as the
  primary entry and authority. docs/ is the work directory, not the
  publish/canonical directory. No pointer/redirect/index files — unify
  truly.

  Wave 8 of the migration plan addresses this in a single PR
  (wave8/structurizr-first-docs-consolidation, opened 2026-05-27).

decision: |
  1. **architecture/ is the publish/canonical root for the architecture
     design system.** The user-facing surface is the 4-item layout:
       - architecture/workspace.dsl    -- THE sole main entry (唯一主入口)
       - architecture/docs/            -- L1 narrative + L2 designs (human-readable)
       - architecture/decisions/       -- ADR markdown imports (workspace !adrs)
       - architecture/features/        -- optional Feature/FP DSL or Markdown
     Internal machinery (profile/, views/, generated/) ships in W1-W3 and
     stays in place under architecture/.

  2. **docs/ is the work directory for OPERATIONAL authorities**,
     not for architecture design content:
       - docs/governance/ (rules, principles, status, enforcers, templates) STAYS
       - docs/adr/ (ADR yaml + md corpus) STAYS — architecture/decisions/
         mirrors a subset
       - docs/logs/ (releases + reviews) STAYS
       - docs/contracts/ (API/SPI contracts) STAYS
       - docs/dfx/ (DFX yamls) STAYS
       - docs/runbooks/ STAYS
       - docs/cross-cutting/ STAYS
       - docs/quickstart.md, docs/overview.md STAY
     These are operational/governance surfaces, not architecture design.

  3. **L1 design corpus moves**:
       docs/L1/agent-service/{README, 5 per-view files, spi-appendix,
                              features/, *.JPG}
                              -> architecture/docs/L1/agent-service/...
       docs/L2/README.md      -> architecture/docs/L2/README.md
       docs/L1/, docs/L2/     -> DELETED (empty after move).

  4. **Module-root ARCHITECTURE.md moves** into the L1 design corpus:
       agent-service/ARCHITECTURE.md  -> architecture/docs/L1/agent-service/ARCHITECTURE.md
                                         (peer of rc55 4+1 per-view files;
                                         shipped-state grounding companion)
       agent-bus/ARCHITECTURE.md      -> architecture/docs/L1/agent-bus.md
       agent-client/ARCHITECTURE.md   -> architecture/docs/L1/agent-client.md
       agent-evolve/ARCHITECTURE.md   -> architecture/docs/L1/agent-evolve.md
       agent-execution-engine/ARCHITECTURE.md
                                      -> architecture/docs/L1/agent-execution-engine.md
       agent-middleware/ARCHITECTURE.md
                                      -> architecture/docs/L1/agent-middleware.md

  5. **No pointer/redirect/index files left at old locations.** Every
     consumer that referenced an old location updates its citation:
       - module-metadata.yaml#architecture_doc fields repointed
       - Rule G-1.a kernel + card updated (this ADR + Wave 8 commit)
       - gate/check_architecture_sync.sh path globs updated
       - gate/build_architecture_graph.py L1 discovery updated
       - docs/governance/templates/surface-classification.yaml
         output paths updated
       - docs/governance/templates/*.md.j2 output paths updated
       - 7 always-loaded / top-level docs (README, ARCHITECTURE,
         CLAUDE, AGENTS, CONTRIBUTING, SESSION-START-CONTEXT,
         gate/README) refreshed per Step 10 of the plan

  6. **Per-module entry convention** (under architecture/docs/L1/):
       - Single .md file per module — modules with narrative-only L1.
         5 modules + graphmemory-starter use this shape today.
       - Per-view directory <module>/ — modules with full 4+1 design.
         Only agent-service today (rc55 W3-W5 materialization).
         Contents: README.md (index) + 5 per-view files
         (logical/process/physical/development/scenarios) +
         spi-appendix.md + ARCHITECTURE.md (shipped-state) +
         optional features/ subdir.
     A module is free to expand from single .md to directory shape
     when its L1 design matures; the expansion is its own commit
     and repoints module-metadata.yaml#architecture_doc.

  7. **workspace.dsl carries** (per user spec):
       - System / Container / Component   -> L1 architecture structure
       - Custom Element + Tags + Properties -> Feature / Capability / FunctionPoint
       - Relationship + saa.rel            -> dependencies / implements / verifies / constrains
       - Documentation (!docs)             -> human-reviewable Markdown (imports architecture/docs/)
       - ADR (!adrs)                       -> decision-source Markdown (imports architecture/decisions/)
       - Views {}                          -> 4+1 organisation form (logical/development/process/physical/scenarios)
     The `!docs docs` + `!adrs decisions` directives are added to
     workspace.dsl in this wave.

  8. **Reading path / rule structure / contract structure** refresh
     (the user's "unbiased understanding" requirement):
       - README.md adds a `## Reading path` section with 5 ordered steps.
       - ARCHITECTURE.md adds §0.6 (Rhetorical stance) + §0.7
         (Constraint <-> Rule cross-reference).
       - CLAUDE.md adds `## Rhetorical stance` block +
         `## Constraint <-> Rule mapping` table.
       - AGENTS.md adds `## For AI assistants -- load this set`
         machine-parseable list + rhetorical-stance table.
       - docs/contracts/README.md (or refreshed contract-catalog.md)
         becomes the contract corpus index with authority-ADR +
         enforcer + workspace-element columns.
       - gate/lib/check_doc_coherence.py (new, advisory at W8)
         cross-checks the 6 entry surfaces for stance + reading-path
         + constraint <-> rule consistency.

consequences: |
  Positive:
  - Architecture design system has a single, named, AI-and-human-readable
    entry point: architecture/workspace.dsl.
  - Triple-authority overlap on agent-service is closed.
  - module-metadata.yaml#architecture_doc fields point to a uniform L1
    location pattern.
  - Newcomers (human or AI) loading the README#Reading-path entries
    reach the same architecture picture; SESSION-START-CONTEXT.md
    reading-order table aligns with this path step-for-step.
  - Rhetorical-stance blocks on each entry surface prevent the common
    bias of reading "ARCHITECTURE.md" or "CLAUDE.md" as "the
    architecture"; both are explicit slices.

  Negative / residual:
  - This is the second canonical-location move for agent-service's L1
    4+1 (ADR-0143 moved it from review log to docs/L1/agent-service/
    in rc55; ADR-0150 moves it again to architecture/docs/L1/agent-service/).
    Reviewers reading rc55 closure docs need to know about the W8 move.
  - architecture/decisions/ initially holds only 6 anchor ADR markdowns
    (mirrored by AdrMirrorCli). Full mirror of 75+ ADRs is a follow-up
    sub-wave (deferred).
  - gate/lib/check_doc_coherence.py is advisory at W8; promotion to
    blocking is a future wave decision.

alternatives_considered: |
  - (A) Keep L1 corpus under docs/L1/ and add a pointer file at
    architecture/docs/L1/agent-service.md saying "see docs/L1/agent-service/
    for the canonical 4+1". REJECTED by the user 2026-05-27
    ("不要有什么索引之类的内容和信息").

  - (B) Move L1 corpus into architecture/docs/L1/ but keep module-root
    agent-*/ARCHITECTURE.md as a thin "shipped-state grounding" file.
    REJECTED — same pointer-file objection; the module-root file
    becomes redundant once architecture/docs/L1/<module>{.md or
    /ARCHITECTURE.md} carries the L1 design.

  - (C) Reverse direction: move governance authorities (enforcers.yaml
    etc.) under architecture/ too. REJECTED — these are operational
    authorities, not architecture design content; they have their own
    governance lifecycle (Rule G-9 freshness, Rule G-13 templating,
    surface-classification.yaml registry) that is orthogonal to the
    architecture-design system.

  - (D) Defer Wave 8 until W5/W6/W7 soak completes. REJECTED — Wave 8
    does NOT change authority direction (W5 already did that); it only
    relocates files into the layout that direction already implies.
    Wave 8 lands during the W5 14-day soak window without resetting
    the soak clock.
