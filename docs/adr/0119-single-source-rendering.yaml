id: ADR-0119
title: "Single-Source Rendering for derived architecture documents (release notes, READMEs, contract catalog, recurring-families.md, L1 ARCHITECTURE.md): Rule G-13 + Falcon 11-wave roadmap"
status: accepted
governance_infra: true
date: 2026-05-25
level: L0
view: scenarios
affects_level: L0, L1
affects_view: scenarios, development
authors:
  - chao
relates_to:
  - ADR-0068    # Layered 4+1 + architecture-graph as twin sources of truth
  - ADR-0094    # rc17 recurring-defect-family truth + rule consolidation
  - ADR-0097    # rc20 D-9 metadata scrub + Rule G-9 monitoring enum
  - ADR-0098    # rc21 scenario-loaded phase contracts
  - ADR-0099    # rc22 L1 architecture depth & grounding
  - ADR-0116    # rc36 kernel-truth + cancel-CAS
  - ADR-0117    # rc37 Ascend/Kunpeng repositioning + README readability vector
  - ADR-0118    # rc38 audit-corrective + F-nonatomic-run-status-write registration
context: |
  Across rc4 → rc41 the same META defect class has recurred 14+ times under
  F-numeric-drift, F-deleted-module-name-leakage, F-recurring-family-yaml-md-drift,
  and the cross-authority disagreement family. The mechanism is structurally
  identical every time: a human author types a count, a path, a module name, an
  SPI FQN, an ADR id, a family id, or a baseline metric INTO PROSE in a
  derivative artefact (release note, README, root ARCHITECTURE.md, an L1
  agent-*/ARCHITECTURE.md, docs/contracts/contract-catalog.md,
  docs/governance/recurring-defect-families.md), and that hand-typed value
  drifts from the authority surface it was meant to reflect. Today's gates catch
  this drift AFTER the human has already drafted the artefact — which forces
  1–2 corrective waves per release (rc35→rc35-second-pass; rc36 first half →
  rc36 audit corrective; rc37 README readability reflow → rc37 corrective; rc38
  audit-corrective; rc39 formal-release-transaction; rc40 corrective).

  Codex (a separate-session reviewer) authored a release-readiness pipeline in
  rc39 (.claude/skills/formal-release-transaction.md, the
  release-readiness.schema.yaml, formal-release-note-template.en.md, and three
  Python tools under gate/lib/) that validates a release note AFTER a human has
  drafted it: it checks scaffold existence, schema completeness, evidence-bundle
  parity against architecture-status.yaml, and frontmatter shape. It catches
  drift between the evidence bundle and architecture-status.yaml. But it does
  not catch the drift between the prose of the release note (or any of the
  other six derivative artefact classes named above) and the evidence bundle —
  because the human still hand-types those prose cells. It is a single-stage
  post-author validator; not a render pipeline.

  The repo already has the proof-of-concept of the correct pattern:
  `docs/governance/architecture-graph.yaml` is machine-rendered by
  `gate/build_architecture_graph.py` from `principle-coverage.yaml` +
  `enforcers.yaml` + `architecture-status.yaml` + `module-metadata.yaml` + the
  ADR folder, and Rule G-1.b enforces byte-identical idempotency. The
  architecture-graph file has had zero drift defects since rc14. Every other
  derived artefact is hand-authored and has had drift defects every wave.

  The asymmetry says the fix is to flip every derived artefact onto the same
  pattern: a `.md.j2` template (Jinja2) consumes a render context assembled
  from authority surfaces, emits the `.md`, and a gate enforces byte-identical
  regeneration. Drift becomes impossible by construction, not detected after.

  Codex's tools are reused — `build_release_evidence.py` becomes the
  release-note context-loader plugin, `release-readiness.schema.yaml` becomes
  the variable contract, `check_formal_release_transaction.py` becomes the
  byte-identical render-check gate (generalised). Codex's
  `formal-release-note-template.en.md` (advisory markdown comments) seeds the
  first real `release-note.md.j2`.

decision: |
  Land **Rule G-13 — Single-Source Rendering Coherence** as a new L0
  architectural-enforcement rule, kernel:

      Every dynamic claim in the active corpus (count, path, module name,
      SPI FQN, ADR id, family id, version tag, baseline metric, generated
      table row) lives in exactly one of: (a) an authority YAML
      (source-of-truth), (b) a deterministically-generated YAML (e.g.
      architecture-graph.yaml), or (c) a rendered slot in a `*.md.j2`
      template under `docs/governance/templates/`. No dynamic claim is
      allowed to exist as free-typed prose anywhere. The corresponding
      rendered `.md` artefact MUST be byte-identical to
      `render(template, data)` — gate fails on any drift, including
      whitespace.

  Execute as an 11-wave roadmap (W0–W10), staged across multiple rc cycles:

  - **W0** (this ADR + Rule G-13 card + CLAUDE.md kernel + governance index
    updates) — policy only, no tooling, no surface migrated.
  - **W1** — generalised render engine + render-context loader +
    byte-identical idempotency gate (`gate/lib/render_template.py`,
    `gate/lib/load_render_context.py`,
    `gate/lib/check_template_render_idempotency.py`,
    `gate/check_template_render_idempotency.sh`). Reuses Codex's evidence
    builder by absorbing its metric-extraction logic. Extends the existing
    schema in-place. Empty surface-classification registry.
  - **W2** — `/refresh-architecture-doc` orchestrator skill that drives the
    refresh-order discipline (ADR → graph → status → rules/cards →
    deferred → families → templated artefacts) and re-points
    `/formal-release-transaction` at it. Phase-contract `system-commit.md`
    + `architecture-design.md` updated.
  - **W3** — first surface migration: release notes
    (`docs/governance/templates/release-note.md.j2` + per-rc
    `<rc>-render-context.yaml`). Existing rc1–rc41 release notes are
    historically grandfathered in `gate/historical-release-grandfathered.txt`.
  - **W4** — `docs/governance/recurring-defect-families.md` rendered from
    the `.yaml`. Subsumes Rule G-9.c (yaml↔md parity by construction).
  - **W5** — `docs/contracts/contract-catalog.md` rendered from a Java SPI
    source scan + `module-metadata.yaml#spi_packages` + two new authority
    surfaces (`docs/contracts/structural-carriers.yaml`,
    `docs/contracts/http-routes.yaml`). Subsumes Rule G-8.b/e.
  - **W6** — root `ARCHITECTURE.md` becomes a hybrid `.md.j2` (prose
    author-owned, count/module-list/SPI-count rows rendered). Subsumes
    Rule G-2.d.
  - **W7** — every active `agent-*/ARCHITECTURE.md` becomes a hybrid
    `.md.j2`; Development View tree (Rule G-1.1.a) and SPI Appendix
    (Rule G-1.1.b) sections rendered from a module-tree scan +
    `spi_packages` + SPI source scan.
  - **W8** — `README.md` + `gate/README.md` numeric claims hybrid-templated.
    Subsumes Rule G-2.b.
  - **W9** — safety-net hooks (pre-commit blocks editing the rendered `.md`
    without editing the `.md.j2`; post-edit warns when an authority surface
    listed by any context_loader is touched). `CLAUDE.md` rule-index table
    rendered from rule-card frontmatter (kernel paragraphs stay
    author-edited). Phase contracts get hybrid `.md.j2` siblings whose
    Active Rules tables render from rule-card frontmatter. Subsumes the
    rule-allocation drift facet of Rule G-11.
  - **W10** — `gate/lib/audit_inline_dynamic_claims.py` produces a punch
    list of residual inline counts/paths/module-names outside templates;
    each is either moved into a template slot or grandfathered. Retired
    rules (downgraded to advisory, `superseded_by: Rule G-13` annotation
    on the cards): G-2.b, G-2.d (root part), G-2.1 (rendered render in
    §6/§7), G-8.a, G-8.c, G-8.e, G-9.c. Final ADR closes the W0–W10 wave
    family; `baseline_metrics.active_engineering_rules` count drops and
    self-renders into root ARCHITECTURE.md.

  Render engine: **Jinja2** (Python ecosystem already drives the gate; no
  new language dependency). Templates: `*.md.j2`. Render mode: deterministic
  (sorted dict iteration, `LC_ALL=C` sort, no `datetime.now()`, no
  randomness, fixed-precision floats).

  Surface classification: every active `.md`/`.yaml` falls into one of
  three buckets, registered in
  `docs/governance/templates/surface-classification.yaml`:

  - **TEMPLATED** — fully rendered, "DO NOT EDIT" header, byte-identical
    regen enforced. (Release notes, recurring-families.md,
    contract-catalog.md, L1 ARCHITECTURE.md Dev-View + SPI Appendix
    sections, README numeric blocks.)
  - **HYBRID** — file IS `.md.j2`; prose author-owned, `{{ ... }}` slots
    interleave for dynamic cells. (Root ARCHITECTURE.md, CLAUDE.md
    rule-index table, phase contracts Active Rules tables.)
  - **INLINE** — authored source-of-truth, never rendered, never derived.
    (ADRs, rule cards, principle cards, `architecture-status.yaml`'s
    `allowed_claim` prose, `recurring-defect-families.yaml`,
    `module-metadata.yaml`, `principle-coverage.yaml`, `enforcers.yaml`.)

  Enforcer registration: E174 (`template_render_idempotency`) — gate-script
  level L0 scenarios. Initially `status: pending_w1`; promoted to `active`
  when `gate/check_template_render_idempotency.sh` lands in W1.

consequences: |
  Positive:
  - The largest single META defect class — drift between hand-typed prose
    and the authority surface it reflects — becomes impossible by
    construction for every surface migrated in W3..W8.
  - The current 117+ gate-rule corpus shrinks in W10 by retirement of
    rules whose policing job is replaced by render idempotency. The W10
    `baseline_metrics.active_engineering_rules` count will be strictly
    lower than the pre-W0 baseline.
  - The recurring-defect-families ledger gains a closure entry for
    families F-1, F-2, F-4, F-5, F-7, F-8, F-14 with cleanup_status
    `closed_by_construction` after W10.
  - Reviewers see DRIFT diffs as "template + data → rendered cells
    changed" instead of "human typed a different number". The semantic
    intent of every diff is clearer.

  Negative / residual:
  - Diff readability: PRs touching authority surfaces produce large
    rendered-`.md` diffs. Mitigation: CODEOWNERS requires reviewing the
    `.md.j2` first; the rendered file is visibly marked
    "DO NOT EDIT — generated from <template>".
  - Round-tripping risk: a contributor edits the rendered file directly,
    not realising it is derived; the W9 pre-commit hook blocks the
    pattern, but pre-W9 the gate is the backstop.
  - Defect families F-3 (kernel ↔ card ↔ deferred coherence), F-10
    (terminal-verb overclaim), F-11 (regex-scrub orphan punctuation),
    F-12 (non-atomic runtime-state writes), F-13 (project-tool pin drift)
    are EXPLICITLY out of scope for this roadmap — they need orthogonal
    disciplines (semantic verb checks, AST-aware tooling, concurrency
    tests, MCP pinning gates). Surfacing them here so the W10 closure
    does not over-claim.
  - Historical release notes (rc1–rc41) are NOT back-filled into the
    template; they stay frozen historical artefacts per system-commit
    discipline. They are explicitly grandfathered in
    `gate/historical-release-grandfathered.txt`.

  Forward / staging boundaries:
  - W0 ships THIS ADR + the rule card + CLAUDE.md kernel + governance
    index pointers ONLY. No tooling, no surface migrated, no other rule
    retired. `baseline_metrics.active_engineering_rules` rises by +1.
  - Each subsequent wave is self-contained: lands on its own branch,
    ships its own ADR, can be paused or reordered between W3 and W10
    without invalidating earlier work.

alternatives_considered: |
  Rejected:

  - (A) Keep Codex's post-author validator as-is and add more checks at
    write time. Doesn't eliminate the drift class — it just makes
    detection earlier in the same reactive paradigm. The proof-of-concept
    (architecture-graph.yaml at zero defects via render idempotency) shows
    the correct shift is generative, not validative.

  - (B) A minimal custom Python string-substitution renderer (no
    conditionals, no loops). Hits its expressivity limit immediately at
    W7 (per-module L1 ARCHITECTURE dev-view trees need iteration over
    src/ tree + per-package summary). Jinja2 is mature, deterministic
    when sorted-iteration + fixed-precision is enforced, and adds no new
    language to the gate stack.

  - (C) Handlebars / Mustache. Logic-less templating is attractive for
    audit but introduces Node.js or a Go binary as a gate dependency.
    Worse fit for a Python-dominant gate stack.

  - (D) Render everything to HTML and publish on a doc site. Out of
    scope; the contract here is .md → .md so that grep, git diff, and
    the existing review workflow continue to work unchanged.

  - (E) Big-bang migrate all surfaces in one rc. Operationally too risky
    given the historical defect rate of large refactors; the wave
    structure guarantees each migration can be paused and validated
    independently.

  - (F) Back-fill historical release notes (rc1–rc41) into the template.
    Violates the system-commit "frozen historical artefact" discipline;
    introduces unbounded migration work; no defect-prevention payoff
    (those notes are read-only).
