id: ADR-0151
title: "L1 Feature Registry canonical schema — SAA Feature tag + AI Execution Boundary + 9-state lifecycle"
status: accepted
governance_infra: true
date: 2026-05-27
level: L0
view: scenarios
affects_level: L1
affects_view: scenarios, logical, process
authors:
  - chao
extends:
  - ADR-0147    # Structurizr Workspace Authority
  - ADR-0149    # W0-W5 shipped record
  - ADR-0150    # Architecture docs consolidation under architecture/
relates_to:
  - ADR-0064    # Layer-0 governing principles (capability seed)
context: |
  After ADR-0150 unified the architecture-design surface under
  architecture/workspace.dsl + architecture/docs/L1/, the workspace
  carried 152 capabilities (SAA Capability) and 15 function points
  (SAA FunctionPoint) but had no first-class Feature layer between
  them. The "feature" concept lived implicitly in agent-service's
  rc55 features/ subdirectory (6 markdown files) and in scattered
  ADR-internal references; it was not AI-readable as a single
  registry.

  Three concrete consequences:

    1. AI sessions querying "what features exist in agent-service"
       had to grep markdown files instead of traversing a typed
       graph. No structured AI Execution Boundary meant agents
       could not tell which features were safe to auto-modify.
    2. Features had no lifecycle state machine — they evolved from
       proposal to deprecation without a rule constraining valid
       transitions.
    3. Cross-module feature inventories were impossible to enumerate
       because the L1 module shape was asymmetric (agent-service had
       per-view directory + features/; the other 6 modules had only
       single-narrative .md).

  The user directive 2026-05-27:

    > "AgentService 只是架构设计中的一个模块，这里面多个模块之间要有一套
    > 统一的长效机制，不是为 AgentService 现状去定制；AgentService 的
    > 现状就是其他模块的未来。"

  And on the template:

    > "特性模板：L1 Feature Catalog (1) Feature Metadata (2)
    > Architecture Binding (3) Functional Decomposition (4) Contract
    > Surface (5) Runtime Behavior (6) DFX Requirements (7) AI
    > Execution Boundary (8) Verification Matrix (9) Lifecycle /
    > Governance. 功能点模板：feature_id + name + level +
    > owning_module + capability_domain + status + architecture_binding
    > + scope + function_points + verification. 特性状态机：proposed
    > -> accepted -> design_only -> ready_for_impl ->
    > implemented_unverified -> test_verified -> shipped -> deprecated
    > -> removed."

  And on the Structurizr workspace as carrier:

    > "请你反思下这个模板是否能够达成 L1 的特性清单和功能点对于 AI 来说
    > 足够清晰，并可以基于 Structurizr 的 workspace 来承载所有的要求？"

  The reflection identified four AI-readability gaps in the user's
  base template (AI Execution Boundary needed a concrete schema;
  feature-capability link should be a typed relationship not a string;
  verification matrix needed FQN-level rigor; no RAG-friendly synopsis)
  and confirmed Structurizr workspace could carry everything with
  three extensions (DSL as single structured source, profile extensions
  for the new properties, lifecycle gate rule).
decision: |
  Adopt the L1 Feature Registry as a first-class workspace surface
  with the user-supplied 9-section catalog template + YAML schema +
  9-state state machine, extended with the AI-readability fixes from
  the reflection.

    1. NEW DSL fragment: architecture/features/features.dsl is the
       AUTHORED single source for FEAT- elements. Each FEAT- element
       carries the canonical schema: feature_id (saa.id), name,
       owning_module (saa.owner), capability_domain
       (saa.capabilityDomain), status (saa.status — one of the
       9-state machine), source ADR (saa.sourceAdr), synopsis
       (saa.synopsis — 100-200 word RAG-friendly description), and
       five AI Execution Boundary sub-properties:

           saa.aiBoundary.canModifyCode
           saa.aiBoundary.canModifyContracts
           saa.aiBoundary.allowedStatusTransitions
           saa.aiBoundary.requiresHumanReviewAt
           saa.aiBoundary.sandboxPolicyRef

       Pipe (|) is the list separator for properties that encode
       multiple values (allowed transitions, required review states,
       devPaths, goals, nonGoals, verification FQNs, verification
       commands).

    2. Profile extension: architecture/profile/required-properties.yaml
       extends SAA Feature with the 7 new required tag-specific
       properties (capabilityDomain + synopsis + 5 aiBoundary keys).
       The Java ProfileValidator mirror is updated to match; the
       parity is asserted by ProfileYamlParityTest.

    3. New saa.rel relationship types: decided_by (FEAT-/FP-/CAP-/Contract
       -> ADR; inverse of `decides`) and contained_by (FEAT- ->
       CAP-; inverse of capability `contains` feature). Both make
       AI traversal from a feature to its decision authority or
       containing capability one-hop instead of string-matching.

    4. 9-state feature lifecycle:

         proposed -> accepted -> design_only -> ready_for_impl
                  -> implemented_unverified -> test_verified
                  -> shipped -> deprecated -> removed

       Forward-only by default; backward transitions require an ADR
       (extends: or relates_to: the original feature ADR).

    5. NEW Rule G-14 (Feature Lifecycle Validity) — advisory at
       Wave 1 (this ADR), promoted to blocking at Wave 5 after
       14-day soak. Sub-clauses:

         .a  Every FEAT- declares saa.status in the 9-state set.
         .b  Git-history per-feature status transitions follow the
             forward chain OR are paired with an ADR.
         .c  Status `shipped` MUST have non-empty
             saa.verificationTestFqns; FQNs MUST resolve.
         .d  Status `deprecated` MUST carry saa.sunsetDate + a
             relates_to: ADR.

    6. Rendering direction: architecture/docs/L1/<module>/features/README.md
       (the human-readable 9-section L1 Feature Catalog) is a
       RENDERED output from DSL via a new Jinja2 template
       docs/governance/templates/l1-features-catalog.md.j2 — landed
       in Wave 3 of this plan. The DSL is the structured source;
       Markdown is the prose surface; render-idempotency (Rule G-13)
       enforces zero drift.

    7. Workspace !include order in workspace.dsl: features.dsl is
       included AFTER capabilities.dsl + function-points.dsl so
       feature -> capability (`contained_by`) and feature -> function-point
       (`contains`) relationships resolve their target identifiers.

  Wave 1 (this ADR) lands the foundation: profile extensions, the
  new features.dsl with 9 seed FEAT- entries, the Rule G-14 advisory
  card, and the ProfileValidator + parity-test updates. Waves 2-5
  (governed by ADR-0152 + ADR-0153) build the uniform L1 directory
  mechanism, render the 9-section catalog, migrate agent-service's
  existing features, and promote Rule G-14 to blocking.
consequences: |
  Positive
  --------
    * AI sessions get a typed, queryable Feature registry in
      workspace.dsl. The 7 canonical AI query types (list features by
      owner, fetch AI boundary, traverse to deciding ADR, fetch
      verification FQNs, fetch synopsis for RAG embedding, filter by
      status, validate auto-transition) all resolve in ONE workspace
      traversal.
    * The AI Execution Boundary is machine-readable, not prose.
      Agents see explicit canModifyCode / canModifyContracts /
      allowedStatusTransitions / requiresHumanReviewAt /
      sandboxPolicyRef per feature and can enforce these constraints
      before acting.
    * Feature lifecycle is rule-enforced (Rule G-14), so status
      drift surfaces in the gate rather than at code review.
    * Capabilities, features, and function points form a three-level
      typed inventory: CAP- contains FEAT- contains FP-. Every level
      has typed relationships into ADRs, contracts, modules, and
      tests.

  Negative
  --------
    * SAA Feature now has 9 required tag-specific properties (was 2).
      Every FEAT- author writes more metadata; this is the cost of
      AI-readability. Optional properties (devPaths, goals, nonGoals,
      verification FQN/commands) are encouraged but not required.
    * The DSL `properties` block is scalar key -> scalar value;
      multi-value lists are pipe-encoded ("A|B|C"). This is a known
      limitation of Structurizr DSL 6.2.1 — there is no list literal.
      The pipe convention is explicit and machine-parseable.
    * Authoring the per-feature synopsis (100-200 words) is more
      work than a 1-line description. The RAG-friendly synopsis is
      the price of search-by-meaning.
    * Two new saa.rel types (decided_by + contained_by) are inverse
      relationships of existing edges (decides, contains). The
      authoring discipline asks engineers to declare both directions
      when relevant; a future emitter could derive one from the
      other to avoid duplication.

  Mitigation
  ----------
    * Feature template README at architecture/features/README.md
      (Wave 3 deliverable) documents the schema + recipes.
    * The Jinja2 catalog render (Wave 3) gives engineers a visible
      Markdown surface so DSL editing isn't the only authoring path.
    * AI Execution Boundary defaults are conservative: new features
      author requiresHumanReviewAt to include test_verified + shipped
      + deprecated unless an explicit ADR widens the auto-action
      surface.

  Forward-looking
  ---------------
    * Wave 2 (ADR-0152) makes the L1 module directory shape uniform
      across all 7 modules so the Feature Catalog README is present
      and renderable for every module, regardless of maturity.
    * Wave 5 (ADR-0153) promotes Rule G-14 from advisory to blocking
      after the 14-day soak.
    * Future sub-waves may add per-feature sunset workflow, FEAT- to
      FEAT- depends_on edges (already supported by relationship-types
      .yaml), and a feature-graph projection to docs/governance/.
