  - E2   # rule_21_tenant_propagation_purity — ArchUnit pattern retargeted to ..service.runtime.. ↛ ..service.platform..
  - E27  # module_count_invariant — repository_counts.reactor_modules: 9 → 8
  - E37  # rule_37_no_blocking_io_in_runtime_main — scan path repointed to agent-service/src/main/java/com/huawei/ascend/service/runtime
  - E38  # rule_38_no_thread_sleep_in_business_code — scan path repointed to agent-service/src/main/java/com/huawei/ascend/service/{platform,runtime}
  - E40  # rule_40_storage_engine_tenant_isolation — RLS baseline path repointed to agent-service/src/main/resources/db/migration
  - E48  # rule_29_business_platform_decoupling — SPI-purity package-set updated to com.huawei.ascend.service.*
