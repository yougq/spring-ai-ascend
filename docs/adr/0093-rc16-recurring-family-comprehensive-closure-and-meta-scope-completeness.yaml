      N/M captured in rc16 release note baseline table.
  - command: "wsl bash gate/check_parallel.sh"
    expected: "executed 122 rules; all PASS; GATE: PASS"
    verified: 2026-05-20 (rc16 wave).
  - command: "wsl bash gate/test_architecture_sync_gate.sh"
    expected: "Tests passed: 202/202 (rc15 baseline 194 + rc16 +8 from Rules 107-110 fixtures)"
    verified: 2026-05-20 (rc16 wave).
  - command: "./mvnw.cmd clean verify"
    expected: "BUILD SUCCESS; 374 tests green across 8 reactor modules."
    verified: 2026-05-20 (rc16 wave; no Java code deltas).

