id: ADR-0098
title: "rc21 — 6-phase scenario-loaded contracts + Rule G-10 (parallel-Linux-scripts) + Rule G-11 (phase-contract allocation coherence)"
status: accepted
governance_infra: true
date: 2026-05-21
level: L0
view: process
affects_level: L0
affects_view: process
authors:
  - chao
relates_to:
  - ADR-0097
  - ADR-0096
  - ADR-0094
  - ADR-0068
extends:
  - ADR-0097
context: |
  Post-rc20 (ADR-0097) the user observed: progressive on-demand rule loading
  in CLAUDE.md leaves many constraints "ghosting" during work — rule kernels
  are auto-loaded but the FULL bodies are only fetched if Claude actively
  reads the rule card, and in practice that doesn't happen often enough.
  rc14-rc18 META gates (Rule G-3 kernel-card byte-match, Rule 110 META
  scope_surfaces, Rule G-9 family ledger) are GATE-TIME defences; they
  don't fix the WORK-TIME enforcement problem.

  rc21 replaces progressive loading with scenario-loaded contracts:
  6 phases (always-on / architecture design / engineering implementation /
  integration verification / system commit / review response), each with
  its own contract document and a triggering skill.

  Two new discipline rules emerge from the same wave:
  - Rule G-10 (Parallel-Linux-Scripts Mandate): every new gate script under
    gate/**/*.sh MUST be parallel-execution-compatible on Linux/WSL. Extends
    Rule G-5.a (serial↔parallel slug parity) discipline to authoring-time.
  - Rule G-11 (Phase-Contract Rule-Allocation Coherence): the coherence
    invariant between phase contracts and rule cards — every cited rule
    has a card, every active card is cited.

decision: |
  Adopt the 6-phase scenario-loaded contract model. Six work phases:

    1. Always-on    — CLAUDE.md kernel (loaded by harness, every session)
    2. Architecture design  — contract: docs/governance/contracts/architecture-design.md         | skill: /design-mode
    3. Engineering impl     — contract: docs/governance/contracts/engineering-implementation.md  | skill: /impl-mode
    4. Integration verify   — contract: docs/governance/contracts/integration-verification.md    | skill: /verify-mode
    5. System commit        — contract: docs/governance/contracts/system-commit.md               | skill: /commit-mode
    6. Review response      — contract: docs/governance/contracts/review-response.md             | skill: /review-mode

  Dual-track loading mechanism (Track 1 + Track 2 both active):
  - Track 1: Skills under .claude/skills/<phase>-mode.md — explicit slash-
    command trigger reads the matching contract into context.
  - Track 2: CLAUDE.md Phase Entry directive table — MUST-invoke prose
    pointer that operates even if user/agent skips the skill invocation.

  Contract documents declare per-phase Active Rules tables with P (primary)
  / X (cross-reference) markers, plus phase-specific Forbidden Patterns
  and Exit Criteria. The full rule body lives in the rule card; the table
  ONLY declares allocation (no kernel duplication).

  Add 2 new engineering rules:
  - Rule G-10 (Parallel-Linux-Scripts Mandate) — gate Rule 116, enforcer E164.
  - Rule G-11 (Phase-Contract Rule-Allocation Coherence) — gate Rule 117,
    enforcer E165.

  Rule G-9 (Recurring-Defect Family Truth) carries DUAL-P (primary in both
  commit and review phases). This is the SOLE dual-P exception sanctioned
  by this ADR; future dual-P exceptions require explicit ADR amendment.

