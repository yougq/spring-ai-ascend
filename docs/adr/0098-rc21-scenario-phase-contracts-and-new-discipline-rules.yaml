  Principles P-A through P-M are loaded by `/design-mode` only (all
  marked **P** in `architecture-design.md`).

  * G-9 dual-P: explicitly sanctioned by this ADR. Justification: family-
    ledger refresh is BOTH a commit-phase responsibility (the wave-closing
    commit MUST update the ledger if any refresh signal landed) AND a
    review-phase responsibility (a reviewer-flagged defect that matches
    an existing family triggers a ledger update).

new_rules: |
  Rule G-10 — Parallel-Linux-Scripts Mandate
    - Card: docs/governance/rules/rule-G-10.md
    - Gate Rule 116 in gate/check_architecture_sync.sh
    - Enforcer E164 (gate-script kind)
    - Scope: gate/*.sh (top-level), excluding the parallel orchestrator
      and canonical source themselves.
    - Exemption list: gate/serial-only-paths.txt (helpers, generators,
      diagnostics, one-shot bootstrap scripts).

  Rule G-11 — Phase-Contract Rule-Allocation Coherence
    - Card: docs/governance/rules/rule-G-11.md
    - Gate Rule 117 in gate/check_architecture_sync.sh
    - Enforcer E165 (gate-script kind)
    - Scope: docs/governance/contracts/*.md ↔ docs/governance/rules/*.md
      + docs/governance/principles/P-*.md
    - Invariants: forward (citation resolves to card), reverse (card cited
      in ≥1 contract), dual-P only G-9.

consequences: |
  Positive:
  - Phase-scoped rule loading: relevant rules are surfaced into context
    at phase entry instead of relying on Claude noticing a kernel
    paragraph in CLAUDE.md.
  - Skill-based explicit trigger + CLAUDE.md text-based directive form a
    dual-track defence against single-mode failure.
  - dist/skills/ distribution layer (Wave 5, separately landed) lets
    downstream platform consumers adopt the pattern with template + manifest
    (per Principle P-A "developer self-service").
  - G-10 prevents serial-only legacy from entering gate corpus.
  - G-11 makes the contract layer self-policing.

  Negative:
  - 5 new contract documents + 5 new skills + 2 new rule cards = ~30 KB
    new corpus surface. Mitigated by skills not counting toward always-
    loaded budget (only CLAUDE.md does).
  - Phase boundaries can be fuzzy on cross-cutting tasks; mitigation is
    skill chaining (`/design-mode` → `/impl-mode` → `/verify-mode` etc.).
  - Rule 68 / G-3.b kernel-card byte-match still requires CLAUDE.md to
    carry the full kernel for every active rule — the "shrink CLAUDE.md
    by removing phase-scoped rule kernels" path is NOT taken in this
    wave because it would require Rule 68 extension to recognise contract-
    hosted kernels. Deferred to a follow-up wave.

deferred_work: |
  - Deep CLAUDE.md kernel shrink (move phase-scoped rule kernels into
    phase contracts, extend Rule 68 to validate contract-hosted kernels
    as alternative to CLAUDE.md-hosted kernels). Deferred to rc22+.
  - dist/skills/ template files (per-skill .template.md with
    {{PLACEHOLDER}} customisation points + per-contract template).
    Wave 5 lands MANIFEST + README minimum; templates may be added in
    rc22+.
  - Rule 110 META fixtures for G-10 and G-11 (≥2 fixture cases per rule)
    may be added in follow-up if not present after Wave 4 closeout.
  - Marketplace plugin packaging (ce-skills-spring-ai-ascend) — explicit
    out-of-scope per the plan.

waves: |
  rc21 ships as 6 waves (sub-streams of this single ADR):

  - Wave 1: CLAUDE.md Phase Contracts pointer + 5 contract skeletons
    (additive only; no rule kernel removal yet).
  - Wave 2: Populate Active Rules tables in 5 contracts; add scope_phase
    frontmatter to 39 rule cards + 13 principle cards via
    gate/lib/inject_scope_phase.sh + gate/lib/emit_contract_tables.sh.
  - Wave 3: Create 5 skills under .claude/skills/{design,impl,verify,
    commit,review}-mode.md (modeled on refresh-defect-archive.md);
    finalise CLAUDE.md Phase Entry directive table.
  - Wave 4: Rule G-10 (card + gate Rule 116 + E164 + serial-only-paths.txt
    exemption list); Rule G-11 (card + gate Rule 117 + E165). D-9 was
    already done in rc20 — no work needed.
  - Wave 5: dist/skills/ minimal distribution layer (manifest.yaml +
    README.md + first templates).
  - Wave 6: This ADR + release note + baseline lockstep + family ledger
    refresh + freeze rc20 release note with merge SHA marker (per Rule 28
    release-note convention).

verification: |
  - gate/check_parallel.sh exits 0 on Linux/WSL (per Rule G-7).
  - gate/measure_always_loaded_tokens.sh: CLAUDE.md ≤ 45,000 bytes
    (current ceiling). Aggressive shrink to 12,000 deferred to rc22+.
  - gate/test_architecture_sync_gate.sh: all fixtures pass; new fixtures
    for Rules 116/117 added in Wave 4.
  - /refresh-defect-archive PASSES Rule G-9 after Wave 6 family update.
  - 5 phase skills load their matching contract in a fresh session.
  - Live `/design-mode` invocation in a new architecture-design task
    proves the work-time loading actually happens.
