id: ADR-0154
title: "Fact-Layer Authority — generated structured facts as the AI's primary L1 input"
status: accepted
governance_infra: true
date: 2026-05-27
level: L0
view: development
affects_level: L1
affects_view: development
authors:
  - chao
extends:
  - ADR-0119    # Single-source rendering coherence (Rule G-13) — the pattern this generalises
  - ADR-0151    # L1 Feature Registry canonical schema
  - ADR-0152    # Uniform L1 mechanism + L0 mounting
  - ADR-0153    # L1 Feature Registry closure (Rule G-14 blocking)
relates_to:
  - ADR-0064    # Layer-0 governing principles (P-C: Code-as-Everything)
  - ADR-0147    # Structurizr Workspace Authority
context: |
  On 2026-05-27 an expert review filed at
  docs/reviews/2026-05-27-l1-structured-facts-for-ai-unbiased-understanding.en.md
  argued that AI agents using the L1 Feature Registry currently must infer
  factual claims (code paths, SPI signatures, test FQNs, contract operations,
  module dependencies, runtime configuration) from hand-authored DSL and
  rendered Markdown. Local-evidence verification against `main` at commit
  c1b2c86 confirmed that:

    * features.dsl, function-points.dsl, capabilities.dsl, and
      verification.dsl all carry "AUTHORED ZONE" banners and rely on
      hand-authored fact-bearing fields (saa.devPaths,
      saa.verificationTestFqns, saa.verificationCommands).
    * No generated fact layer exists; architecture/generated/ holds DSL
      fragments, not facts.
    * function-points.dsl carries only thin metadata (no
      actor/trigger/input/output/error-modes/code-entrypoints).
    * The relationships `contained_by` and `decided_by` exist in the
      schema but have zero edges in features.dsl.
    * No Java parser or OpenAPI parser exists in the gate toolchain; all
      cross-checks today are regex-over-text and have produced repeated
      drift defects (F-numeric-drift, F-deleted-module-name-leakage,
      F-recurring-family-yaml-md-drift recurred 14+ times rc5..rc40).

  The expert proposed ten SFRs and a five-wave roadmap. The engineering
  response under
  docs/reviews/2026-05-27-l1-structured-facts-response.en.md accepts all
  ten SFRs (four with modifications) and lays out a six-wave PR train.
decision: |
  Adopt the hard rule:

      L1 structured facts used for AI implementation guidance MUST be
      generated by deterministic scripts from authoritative source
      surfaces (code, contracts, tests, build metadata, runtime
      configuration, ADRs). Human-authored docs may explain intent and
      rationale, but they MUST NOT be the sole source of factual claims
      about code, contracts, tests, dependencies, runtime behaviour, or
      verification.

  Operationalise via:

    1. New directory architecture/facts/{README.md, schema/, generated/}.
    2. New Rule G-15 (Fact-Layer Integrity) — kernel paragraph in
       CLAUDE.md, card at docs/governance/rules/rule-G-15.md, enforcer
       E179, gate Rule 131.
    3. New profile classification at
       architecture/profile/saa-property-authority.yaml.
    4. Six-wave PR train (W1 schema + ADR + advisory rule; W2 build /
       ADR / runtime-config extractors blocking provenance; W3 contract
       extractor + rendered contract catalog; W4 code-symbol + test
       inventory extractors via ASM + JavaParser hybrid; W5 thicker
       FunctionPoint full 14-field schema + seed mount; W6 AI
       consumption contract + sunset of grandfathered fields).

  Push-backs recorded vs the expert's wording:

    * SFR-3 — recommended ASM-on-bytecode for shipped facts, with
      JavaParser only for source-only information (Javadoc, spans).
      Reason: JavaParser parses source and misses annotation-processed
      types; bytecode is the runtime authority.
    * SFR-2 — `generated_at_utc` OMITTED from generated payloads.
      Live timestamps would break Rule G-13's byte-identical regen
      contract. `repo_commit` is the provenance anchor (SLSA-style).
    * SFR-8 — drift gates EXTEND Rule G-13; new Rule G-15 covers only
      the fact-layer–specific contract (provenance + LLM-no-author).
      Avoids the kernel-card-coherence defect family (Rule G-3).
    * SFR-9 — codified as a sub-clause of Rule G-15 rather than as a
      fresh top-level rule. Rule G-3 would block near-duplicate kernel
      paragraphs.
    * SFR-10 — the "L1 docs must cite fact IDs" gate ships advisory in
      Wave 5 and blocking in Wave 6 after corpus sweep. Hard-gating
      every L1 prose sentence in one step would explode false positives.

  Counter-decision recorded:

    * SFR-5 FunctionPoint schema — proposed 9-field v1 + 5-field v2
      split. User decision 2026-05-27 overruled this proposal and
      accepted the expert's full 14-field schema in v1. Mitigation:
      Rule G-15 blocks on only 3 hard-evidence fields
      (code_entrypoint_refs, test_refs, contract_op_refs); the other
      11 are advisory and accept null until a source authority exists.

  Baselines fixed at W1 ship:

    * 139 ADRs (W1 +1 ADR-0154 on the W5 baseline of 138).
    * 145 active gate rules (W1 +1 Rule 131 fact_layer_integrity on the
      W5 baseline of 144).
    * 45 active engineering rules (W1 +1 Rule G-15 on the W5 baseline of
      44).
    * 178 enforcer rows (W1 +1 E179 on the W5 baseline of 177).
    * 35 recurring defect families (W1 +1 new family
      F-hand-authored-factual-drift on the W5 baseline of 34).
consequences: |
  Positive
  --------
    * AI agents acquire a deterministic, provenance-bearing factual
      ground-truth to consult before reading prose.
    * Several recurring defect families (F-numeric-drift,
      F-deleted-module-name-leakage, F-contract-spi-count-drift,
      F-recurring-family-yaml-md-drift) collapse to a single root
      cause and a single prevention — the fact layer.
    * The hand-authored layer is freed to carry intent / rationale /
      trade-offs (its competitive advantage) rather than racing with
      code on factual claims (its competitive disadvantage).
    * The L1 Feature Registry's FunctionPoint surface grows from 7
      thin properties to the expert's full 14-field shape with
      generated cross-fact resolution (Waves 4-5).

  Negative
  --------
    * Six-wave PR train spans weeks. Each wave's gate state must stay
      green; the train is stoppable only by explicit user intervention.
    * The 14-field FunctionPoint schema in v1 means 15 FPs × 14 fields
      = 210 cells, many of which start null. Mitigation: Rule G-15
      blocks only 3 hard-evidence fields; the rest accept null until
      a source authority exists.
    * Two new Java extractor binaries (ASM + JavaParser hybrid)
      require Java 21 + Maven, adding to the Maven build dependency
      surface. Mitigation: extractors live in tools/architecture-
      workspace (already part of the build).
    * Rule G-15.c (LLM-no-author) constrains future AI-assisted
      authoring; an agent that tries to write a generated fact file
      directly is rejected by the gate. Mitigation: documented in
      AGENTS.md (Wave 6) + the fact directory README banner.

  Forward-looking
  ---------------
    * Wave 6's AI consumption contract update points future Claude /
      Codex / agent sessions at architecture/facts/generated/ as the
      first read for code/contract/test claims.
    * Sunset roadmap: 2026-07-31 sunset of saa.devPaths,
      saa.verificationTestFqns, saa.verificationCommands hand-author —
      these fields become generated derivations from
      FunctionPoint.code_entrypoint_refs[] / test_refs[].
    * Rule G-13 subsumes ad-hoc gate rules (G-2.b, G-2.d, G-2.1,
      G-8.a, G-8.c, G-8.e, G-9.c) on rendered surfaces. Rule G-15
      extends the subsumption to extracted-fact surfaces. The
      reactive prevention rules can sunset in W10 once Wave 5-6 of
      THIS plan demonstrate one full release cycle of zero drift.
