id: ADR-0087
title: "L0 rc12 authority ratchet + deploy-truth + contract truth + terminal-verb scope"
status: accepted
governance_infra: true
date: 2026-05-19
level: L0
view: scenarios

context: |
  rc11 corrective wave (ADR-0085) closed 4 cited findings + Rule 94 widening +
  v2.0.0-rc10 retraction. The 2026-05-19 Codex post-rc11 review surfaced 11
  remaining findings (6 P1 + 5 P2) concentrated in contract / authority /
  constraint surfaces — NOT in agent architecture (the reviewer explicitly
  rated the core engine/hook/S2C/memory/dynamic-planning design as directionally
  sound, not overdesigned).

  Layer-0 was about to ship a no-findings completion release note while several
  gates passed with their own authority claims no longer true:
    * The D/R/G/M rule namespace ratchet (ADR-0086) was authoritatively complete
      in CLAUDE.md (30 kernels) but partially complete in rule cards (15 numeric
      rule_id frontmatter), enforcers.yaml (60+ `Rule 28[a-i]` refs), and
      architecture-status.yaml (`active_engineering_rules: 67` vs CLAUDE 30).
    * `find docs/logs/releases | sort | tail -1` placed `rc9-corrective.en.md`
      after `rc11-corrective.en.md` because character "9" > character "1"
      lexicographically — Rules 33 / 97 / G-2 had been validating stale rc9
      prose as canonical.
    * `architecture-status.yaml#baseline_metrics.architecture_graph_nodes: 394`
      disagreed with live `python gate/build_architecture_graph.py --check`
      output of 364; same for edges (533 vs 525).
    * Root `Dockerfile` actively built deleted modules `agent-platform` and
      `agent-runtime`; `gate/run_operator_shape_smoke.sh` probed the same;
      `docs/architecture-views/plantuml/l0/l0-development.puml` declared the
      deleted modules as current source-of-truth containers.
    * `docs/contracts/http-api-contracts.md` + `contract-catalog.md` marked
      three shipped W1 run-lifecycle routes (POST /v1/runs, GET /v1/runs/{id},
      POST /v1/runs/{id}/cancel) as `(planned; W1)` despite live OpenAPI +
      RunController.java implementing them.
    * `docs/governance/skill-capacity.yaml` plus 7 Java SPI Javadocs carried
      legacy `Rule 41` and overclaim wording `CHRONOS_HYDRATED, not rejected`
      / `park the agent process` — the exact semantic overclaim rc11 closed
      at the CLAUDE.md kernel level, leaking outside the kernel.

decision: |
  Adopt a categorize→sweep→batch-fix→prevention discipline (per rc8/rc9/rc10/rc11
  memory) and bind 11 findings into seven families K-α..K-η:

    * K-α — Authority-surface namespace ratchet incompleteness (closes P1-1)
    * K-β — Latest-release recency resolver correctness (closes P1-2)
    * K-γ — Baseline metric drift vs generated reality (closes P1-3 + P2-4)
    * K-δ — Active operational artefact carrying deleted module names + stale paths
              (closes P1-4 + P1-5 + P2-3)
    * K-ε — `docs/logs` dual semantics ambiguity (closes P1-6)
    * K-ζ — Contract-catalog vs runtime/OpenAPI truth split (closes P2-1 + P2-5)
    * K-η — Terminal-verb / Rule 41 overclaim outside CLAUDE kernel (closes P2-2)

  K-α scope choice (user decision 2026-05-19 via AskUserQuestion): authority
  surfaces only. The D/R/G/M namespace is canonical for CLAUDE kernels,
  rule cards, enforcers, status baseline, migration map, and architecture
  graph rule-node ids. Gate implementation-layer identifiers (gate section
  headers, `gate/rules/rule-NNN.sh` filenames, `test_rule_<N>_*` function
  names, per-rule ndjson `rule_id: N` integer keys) retain numeric form
  by design. Bi-directional addressability via `docs/logs/rule-migration-map.yaml`
  is preserved; gate parser accepts both forms. ADR-0086 amended with
  `gate_layer_boundary:` section.

  P1-5 PlantUML scope choice (user decision): rewrite `l0-development.puml`
  to the current 9-module reactor (agent-service / agent-runtime-core /
  agent-execution-engine / agent-middleware / agent-bus / agent-client /
  agent-evolve / spring-ai-ascend-dependencies BoM / spring-ai-ascend-graphmemory-starter).

  Release id: v2.0.0-rc12.

  Methodology (load-bearing): categorize cited findings into families →
  per-family corpus-wide hidden-defect sweep → batch-fix cited + hidden in
  ONE wave → write or widen one prevention rule per family → verify all
  family-audits return zero residual hits before publishing. Hidden defects
  go into the SAME wave; we do not ship until each category audit is clean.

prevention_rules_added:
  - "Rule 101 — rule_namespace_authority_completeness (E143): three sub-checks (a) every CLAUDE kernel `#### Rule <ns>` has a matching `docs/governance/rules/rule-<ns>.md` with `rule_id: <ns>`; (b) baseline_metrics.active_engineering_rules equals live CLAUDE kernel header count; (c) every enforcers.yaml constraint_ref is namespaced or carries `legacy` marker."
  - "Rule 102 — release_recency_resolver_correctness (E144): no production gate rule may use lex-sort `find docs/logs/releases | sort | tail -1`; must call gate/lib/latest_release.sh::latest_release_path which numeric-sorts by parsed rc-number."
  - "Rule 103 — deploy_entrypoint_deleted_module_truth (E145): root Dockerfile + ops/Dockerfile* + ops/compose*.yml + .github/workflows/*.yml + gate/run_operator_shape_smoke.sh + docs/architecture-views/**/*.puml MUST NOT reference deleted modules `agent-platform` or `agent-runtime` (excluding `agent-runtime-core`) outside historical-marker ±3-line windows."
  - "Rule 104 — openapi_implemented_route_catalog_truth (E146): for every live RunController @-Mapping handler (POST /v1/runs, GET /v1/runs/{id}, POST /v1/runs/{id}/cancel), the catalog rows in http-api-contracts.md + contract-catalog.md MUST NOT carry stability marker `planned`."

prevention_rules_widened:
  - "Rule 82.b (baseline_metrics_single_source): unchanged scope at rc12; K-γ enforced via Rule 101.b (active_engineering_rules) and Rule 97 (latest release-note numeric truth) which now resolves rc12 release note correctly post-K-β. Future widening: gate architecture_graph_nodes/edges against live graph header (deferred to W2 follow-up if needed)."
  - "Rule 99 (kernel_terminal_verb_vs_shipped_decision_check): K-η scope widening deferred to a follow-up — the rc12 batch fixes all current leaks across skill-capacity.yaml + 7 Java SPI Javadocs; the future widening would scan docs/governance/*.yaml comments + **/spi/**/*.java Javadoc for the same terminal-verb tokens."

new_helpers:
  - "gate/lib/latest_release.sh — `latest_release_path <dir> [suffix]` function. Extracts `rc(\\d+)` from each basename, two-key numeric+lex sort, tails the maximum. Sourced by check_architecture_sync.sh + gate/lib/run_rule.sh so per-rule subshells have access."

