notes: |
  No new gate rule added for ADR-0081. The pattern (multi-axis SPI scope drift)
  is rare — the rc7 corpus-wide F-β sweep found only ResilienceContract as a
  real case; SuspendSignal, ExecutorAdapter, HookPoint are accurately
  documented. Rule G-2 sub-clause .a (architecture-text truth) + Rule R-C.a (code-as-contract)
  already cover the general invariant; a dedicated prevention rule would
  over-fit on a single instance. If a second multi-axis SPI scope drift is
  found in a future wave, a Rule 88-style prevention gate should be revisited.
