id: ADR-0068
title: "Layered 4+1 and Architecture Graph as Twin Sources of Truth"
status: accepted
governance_infra: true
date: 2026-05-14
level: L0
view: scenarios

supersedes: []
extends:
  - ADR-0025
  - ADR-0026
  - ADR-0027
  - ADR-0059
relates_to:
  - ADR-0060
  - ADR-0064
  - ADR-0065
  - ADR-0066
  - ADR-0067

decision_one_liner: |
  Architecture truth lives in two coupled forms — a human-facing corpus
  organised by Layered 4+1 (L0/L1/L2 × Logical/Development/Process/Physical/Scenarios),
  and a machine-readable docs/governance/architecture-graph.yaml generated
  from that corpus.

triggering_inputs:
  external_reviews:
    - path: docs/logs/reviews/2026-05-14-architecture-governance-in-vibe-coding-era.en.md
      authors: ["Chief Architect Zhengqiu", "LucioIT"]
      thesis: |
        Treating flat ADR enumerations as architectural design fails under
        Vibe Coding because LLM agents exhibit "tubular vision and context
        collapse" — they remember constraint A but forget constraint B.
        Prescribes re-introducing 4+1 Views at L0/L1/L2 layers, freezing
        documents on phase release, and requiring every change proposal
        to declare "which view of which level" it touches.
    - path: docs/logs/reviews/2026-05-14-L0Architecture-LucioIT-wave-1-request.en.md
      authors: ["LucioIT"]
      thesis: |
        W1 L0 draft written natively in the new 4+1 idiom — §4 Logical,
        §5 Development, §6 Process, §7 Physical, §8 Layered governance
        and 5 merge gates. Acceptance for L1 is conditional on adoption
        of the layered model.
  internal_signal:
    historical_defect_rounds: 9
    historical_defects_closed: 158
    dominant_root_cause_family_count: 79
    dominant_root_cause_family_share: 0.50
    dominant_root_cause_family: |
      Text-form drift: the same architectural truth exists in multiple
      prose forms; one copy silently drifts; a regex-based gate is asked
      to police the divergence; the regex misses a verb tense. Composed of
      governance-text drift (37), peripheral entry-point lag (28), and
      gate-promise gap (14).

context: |
  At W1 entry the repo carries 67 ADRs, 32 active engineering rules,
  47 gate-script rules, and 54 enforcer rows. Structured side-files exist
  (enforcers.yaml, architecture-status.yaml, competitive-baselines.yaml,
  per-module module-metadata.yaml, docs/dfx/*.yaml, principle-coverage.md,
  posture-coverage.md, rule-history.md, whitepaper-alignment-matrix.md)
  but there is no JOIN between them. ADR-to-ADR relationships (supersedes,
  extends, relates-to) live only in prose body text. No machine-readable
  graph exists that an LLM could load to traverse
  "principle → rule → enforcer → test → artefact"
  without reading every ADR.

  Continuing to add substring gate rules has reached diminishing returns:
  we already maintain 24 self-tests whose only purpose is to police the
  gate rules themselves. The slope is asymptotic. The empirical case for
  a structural answer is stronger than the doctrinal one — the doctrine
  predicts the failure mode the defect taxonomy already exhibits.

decision: |
  Adopt two coupled L0 sources of truth:

  1. Layered 4+1 corpus (human-facing).
     Every architectural artefact declares `level` and `view` front-matter.
     Root ARCHITECTURE.md is L0; agent-*/ARCHITECTURE.md is L1; deep
     technical designs in docs/L2/ are L2. Each level organises content
     under the 4+1 view headings (L2 may omit irrelevant views). All
     proposals in docs/logs/reviews/ declare `affects_level` + `affects_view`.
     Phase-released L0/L1 artefacts are frozen — further edits flow
     through docs/logs/reviews/.

  2. Architecture knowledge graph (machine-facing).
     docs/governance/architecture-graph.yaml is the single machine-readable
     join of all architectural relationships. The file is GENERATED by
     gate/build_architecture_graph.sh from authoritative inputs
     (enforcers.yaml, architecture-status.yaml, principle-coverage.yaml,
     module-metadata.yaml, docs/adr/*.yaml). It is NOT hand-edited. Edge
     classes: principle → rule, rule → enforcer, enforcer → test,
     enforcer → artefact, capability → test, module → module
     (allowed/forbidden), adr → adr (supersedes / extends / relates_to),
     (level, view) → artefact. The supersedes/extends sub-graph is a DAG.
     Every endpoint resolves to a real graph node or file path. The
     build script is idempotent.

  3. ADR corpus migrates from .md to .yaml.
     Each ADR becomes a YAML file with structured metadata + relations as
     keys, and free-form prose (context, decision, consequences, rationale)
     as YAML block scalars (`|`). The shape is fully machine-parseable
     while preserving paragraph-level rationale — no institutional memory
     lost. Migration is mechanical (script + manual rationale capture for
     ~20–25 ADRs whose prose carries non-derivable context). ADR-0068
     (this file) is the first native YAML ADR and the canonical example.

  4. Code-as-Contract preserved (Rule R-C.a).
     This ADR's enforcers (Rule G-1 sub-clause .a, Rule G-1 sub-clause .b, Gate Rules 37–40,
     ArchitectureLayeringTest, gate/build_architecture_graph.sh) ship
     in the same PR as this ADR. The migration of the 67 prior .md ADRs
     to .yaml is also part of the same PR — at landing time there is
     exactly one ADR file shape in the repo.

consequences: |
  - CLAUDE.md gains Rule G-1 sub-clause .a (Layered 4+1 Discipline) and Rule G-1 sub-clause .b
    (Architecture-Graph Truth). Engineering-rule lifecycle after this wave:
    18 active (Rules 1–6, 9–10, 20–21, 25, 28–34), 15 deferred (Rules 7, 8,
    11, 13–19, 22–24, 26, 27), 1 retired (Rule 12) — 34 total introduced.
    Layer-0 governing principles: 4 (P-A, P-B, P-C, P-D).

  - "Post-impl note (2026-05-17 six-module materialization PR):
    docs/governance/architecture-graph.yaml was regenerated by
    bash gate/build_architecture_graph.sh after the 5 new modules
    (agent-client, agent-bus, agent-middleware, agent-execution-engine,
    agent-evolve) landed. New count: 269 nodes / 377 edges. Rule R-L
    (architecture_graph_idempotent) reconfirmed; the build script remains
    byte-deterministic over the same inputs. This ADR's commitment to a
    machine-readable graph index survived the first significant module
    decomposition without manual edits."

  - gate/check_architecture_sync.sh gains Gate Rules 37–40
    (front-matter completeness, graph well-formedness, review-template
    front-matter, enforcer reachability from a principle).

  - Every existing docs/adr/NNNN-*.md is replaced by docs/adr/NNNN-*.yaml.
    External links to .md ADRs (release notes, ADR README, prose citations)
    are updated mechanically. docs/adr/README.md regenerates from the YAML
    corpus.

  - Root ARCHITECTURE.md is reorganised under the 4+1 view headings at L0
    scope. agent-service/ARCHITECTURE.md and agent-service/ARCHITECTURE.md
    are reorganised at L1 scope. A docs/L2/ directory is introduced
    (initially with placeholder README and at least one seed L2 doc).

  - docs/logs/reviews/_TEMPLATE.md is introduced. Every new review proposal
    declares affects_level / affects_view.

  - docs/governance/principle-coverage.md is replaced by .yaml form (with a
    generated .md view) so the graph generator can consume it directly.

  - The 4-shape defect model (REF-DRIFT, HISTORY-PARADOX, PERIPHERAL-DRIFT,
    GATE-PROMISE-GAP) gains a structural answer for the dominant family:
    text-drift defects are caught by graph-edge integrity, not by regex.

  - Onboarding for new contributors and new AI sessions becomes "read the
    graph summary" first, then drill into prose at the chosen (level, view)
    — replacing the current "scan 67 ADRs and hope to notice the relevant
    ones."

  - Cost: ~7 working days for the initial wave (mechanical migration +
    generator + gates + drift-defect regression demo). Recurring cost is
    near zero — the graph regenerates from inputs that already exist.

rationale: |
  The decision rests on three convergent threads, none of which is
  sufficient alone but which together pin the design.

  Empirical. The defect taxonomy is the proof. Across nine review rounds,
  half the defects closed have been variations of the same failure: prose
  is canonical, drifts in one place, gets policed by regex, regex misses
  a verb form. We have responded by adding more gate rules (now 47) and
  more self-tests on those gate rules (now 24). The slope is asymptotic.
  Structural decomposition (Rule G-1 sub-clause .a) reduces the surface area of any
  given fragment; an explicit graph index (Rule G-1 sub-clause .b) eliminates the
  multi-copy problem at source for relational truth. Drift remains
  possible for free-text rationale but is contained to leaves of the
  graph, not the spine.

  Theoretical. An LLM planning a change loads "as much context as fits."
  In our repo that means partial ADRs and partial ARCHITECTURE.md
  sections. The model literally cannot see the full constraint set, so
  it misses cross-constraint interactions — exactly the "Frankenstein"
  assembly the chief-architect doctrine predicts. View × level
  decomposition makes each fragment small enough to load completely; the
  graph supplies the cross-fragment joins the LLM would otherwise have
  to infer from prose citations. This is the same reason the Linux
  kernel uses MAINTAINERS plus a cscope-able tree and not a single
  100 MB design document.

  Operational. The W1 reviewer (LucioIT) is the gatekeeper for the L1
  acceptance milestone. Their doctrine document explicitly ties
  acceptance to adoption of the 4+1 layered model with five view-aware
  merge gates. Adoption of Rule G-1 sub-clause .a is not optional if W1 is to land.
  Rule G-1 sub-clause .b (the graph layer) goes beyond the reviewer's literal request
  and addresses the separate concern that an LLM-first codebase needs a
  machine-readable spine, not just better human discipline.

  Why not stop at Rule G-1 sub-clause .a. Pure structural decomposition without the
  graph still leaves the 50% text-drift defect family in place — it
  merely cuts the documents into smaller pieces, each of which can still
  drift relative to the others. The graph closes the loop by making the
  relationships first-class and gate-validated.

  Why not stop at Rule G-1 sub-clause .b. Without view × level decomposition, the graph
  still has to ingest a single global 60+-node prose corpus, and the
  human discipline question (which view does this affect?) remains
  unanswered. Rule G-1 sub-clause .b alone would not earn the reviewer's acceptance
  for L1.

  Why YAML, not JSON-LD. YAML matches the existing tooling chain
  (yq, bash, existing gate scripts), is grep-able, and reads as prose-ish
  to a human inspecting a diff. JSON-LD would buy semantic-web
  compatibility we have no consumer for today; the cost is introducing
  a new validator toolchain. If a JSON-LD consumer emerges in W2/W3,
  an emitter is straightforward.

  Why structure ADRs fully (not just front-matter). The institutional
  memory risk (rationale evaporates into bullet points) is real but is
  mitigated by YAML block scalars (`rationale: |`) for free-form prose
  — every word a prose ADR can carry today, a YAML ADR can carry
  tomorrow. The win is that supersedes / extends / relates_to become
  structured edges rather than prose citations, which lets the graph
  generator close the join automatically without any NLP step.

alternatives_considered:
  - id: ALT-A
    label: "Front-matter only, ADRs stay .md"
    rejected_because: |
      Cheaper today but leaves the dominant text-drift family in place:
      prose ADR bodies still carry supersedes/extends/relates_to as
      sentence fragments, and the graph generator has to scrape with
      regex — re-introducing the gate-promise-gap defect class one layer
      down.
  - id: ALT-B
    label: "Stage A first (W1), B later (W2)"
    rejected_because: |
      The 50% text-drift defect family is the dominant problem TODAY.
      Splitting the wave leaves the dominant problem unsolved through
      W1's entire duration, during which more text-drift defects accrete.
  - id: ALT-C
    label: "Replace prose ADRs with pure graph (no rationale prose)"
    rejected_because: |
      Loses institutional memory. Bullet-point reductionism erases the
      "why" that future maintainers (human and AI) need to judge edge
      cases. The block-scalar mitigation preserves prose without
      sacrificing machine-readability.
  - id: ALT-D
    label: "JSON-LD as the canonical graph format"
    rejected_because: |
      No current consumer requires JSON-LD. Adopting it now imposes a
      new validator toolchain on every contributor and gate run. An
      emitter can be added if a consumer materialises.

