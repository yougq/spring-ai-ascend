  - "bash gate/build_architecture_graph.sh is idempotent — re-running produces no diff."
  - "yq '.nodes[] | select(.type == \"principle\" and .id == \"P-B\") | .reachable_tests' docs/governance/architecture-graph.yaml returns a non-empty list including known telemetry-vertical test classes."
  - "Every docs/adr/*.yaml round-trips through a YAML loader. Every relates_to / supersedes / extends value resolves to an existing ADR id (Gate Rule R-H)."
