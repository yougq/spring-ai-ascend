id: ADR-0080
title: "ResilienceContract .spi package alignment + Rule R-D sub-clause .f prevention"
status: accepted
governance_infra: true
date: 2026-05-18
level: L1
view: development
freeze_id: null

supersedes: []
extends:
  - ADR-0030
  - ADR-0070
relates_to:
  - ADR-0072
  - ADR-0079

decision_one_liner: |
  Move ResilienceContract and the value types it exposes (ResiliencePolicy,
  SkillResolution, SuspendReason, SkillCapacityRegistry) from
  com.huawei.ascend.service.runtime.resilience to
  com.huawei.ascend.service.runtime.resilience.spi, leaving implementations
  (DefaultSkillResilienceContract, YamlResilienceContract,
  YamlSkillCapacityRegistry) in the parent package. Closes rc5 review P1-2
  and adds Rule R-D sub-clause .f so future catalog SPI rows cannot drift away from
  module-metadata + DFX spi_packages declarations.

context: |
  ADR-0030 (Skill-Dimensional Resource Arbitration) named ResilienceContract
  as the architectural boundary for skill capacity arbitration. ADR-0070
  (Cursor Flow + Skill Capacity Runtime) added the two-arg
  resolve(tenant, skill) overload and Rule R-K.b runtime enforcement.
  ResilienceContract was treated as the published SPI surface for that
  boundary and listed in docs/contracts/contract-catalog.md §2 as 1 of 11
  active SPIs at agent-service.

  But its source code lived at
  com.huawei.ascend.service.runtime.resilience — a package with no .spi
  token. agent-service/module-metadata.yaml#spi_packages declared only
  com.huawei.ascend.service.runtime.memory.spi. The DFX file at
  docs/dfx/agent-service.yaml mirrored that single entry. Rule R-D sub-clause .d (dot-spi
  convention) and Rule R-D sub-clause .e (DFX set-match) both passed vacuously — there
  was no resilience SPI package declared to test.

  The rc4 cross-constraint review response (2026-05-18, hidden-defects
  item 6) flagged this as the one shipped SPI not under a .spi package
  and explicitly deferred remediation "if a future wave promotes
  ResilienceContract to a published SPI". The rc5 post-response review
  (P1-2 in docs/logs/reviews/2026-05-18-l0-rc5-post-response-architecture-review.en.md)
  escalated the finding: the contract catalog already promoted it; the
  package home must match. Both reviewer-preferred and reviewer-alternative
  closure paths were offered; this ADR records the preferred path
  (treat as governed SPI) because (a) the catalog already labels it that
  way, (b) ADR-0030 publishes the contract as an architectural boundary,
  (c) SuspendReason has cross-module Javadoc references from
  agent-runtime-core, and (d) W2 tenant-aware variants per ADR-0070 will
  introduce real cross-module imports — locking the package home now
  prevents a second move.

decision: |
  - SPI surface (moved to `.spi` sub-package, semantics identical):
      agent-service/src/main/java/com/huawei/ascend/service/runtime/resilience/spi/
        - ResilienceContract.java          (interface)
        - ResiliencePolicy.java            (value record)
        - SkillResolution.java             (outcome record)
        - SuspendReason.java               (sealed taxonomy)
        - SkillCapacityRegistry.java       (registry SPI)
  - Implementations remain in the parent package
    agent-service/src/main/java/com/huawei/ascend/service/runtime/resilience/:
        - DefaultSkillResilienceContract.java
        - YamlResilienceContract.java
        - YamlSkillCapacityRegistry.java
    This mirrors the split pattern ADR-0079 used for agent-execution-engine
    (SPI at com.huawei.ascend.engine.spi.*, registry/envelope impls at
    com.huawei.ascend.service.runtime.engine.*).
  - agent-service/module-metadata.yaml#spi_packages adds
    com.huawei.ascend.service.runtime.resilience.spi alongside the existing
    memory.spi entry; docs/dfx/agent-service.yaml mirrors the same
    addition under its top-level spi_packages: block (Rule R-D sub-clause .e set-match).
  - docs/contracts/contract-catalog.md §2 row for ResilienceContract has
    its Package column updated to the new .spi path; the (11 total)
    header count is unchanged (still 11 — no rows added or removed).
  - Add Rule R-D sub-clause .f (catalog_spi_row_matches_module_spi_metadata) to prevent
    a future catalog SPI row from drifting away from metadata + DFX
    declarations. Enforcer E118. Self-tests: positive (catalog row
    matches metadata), negative (catalog row missing from metadata),
    negative (internal-marker exempts row from metadata requirement and
    from the header count).
  - No public method signatures change. No removed methods. Callers
    update only their `import` lines (mechanical FQN refresh).

consequences:
  positive:
    - "Closes rc5 review P1-2: ResilienceContract has a single, coherent classification — governed SPI — across catalog, metadata, DFX, and prose."
    - "Locks in the W2 tenant-aware variant's package home — ADR-0070's planned cross-module surface lands at .spi without a second relocation."
    - "Rule R-D sub-clause .f prevents the dual-classification defect from recurring: any future catalog SPI row must be declared in metadata + DFX or explicitly marked (internal)."
    - "Brings ResilienceContract under Rule R-D sub-clause .d (.spi convention) and Rule R-D sub-clause .e (DFX set-match) enforcement — Rule R-D sub-clause .d + Rule R-D sub-clause .e are no longer vacuously passing for this surface."
  negative:
    - "Mechanical caller updates required across ~10 files (3 impls, 1 autoconfig, 5 tests, 1 Javadoc FQN in agent-runtime-core). Trivial — no signature change."
    - "Class-file paths shift; downstream consumers (none today) would need import refresh on upgrade. Acceptable at 0.x semver."

alternatives_considered:
  - alternative: "Demote ResilienceContract — remove the row from contract-catalog.md SPI table, drop SPI language from architecture-status.yaml and agent-service/ARCHITECTURE.md, document that a tenant-aware SPI will be introduced at W2 if needed."
    why_rejected: "ResilienceContract is already a published architectural contract — ADR-0030 names it as the boundary for skill capacity arbitration, ADR-0070 publishes the resolve(tenant, skill) signature, and SuspendReason has cross-module Javadoc references from agent-runtime-core. Demotion would erase a real boundary just to satisfy a metadata gap; promotion brings the metadata up to where the contract already sits. Rule R-D sub-clause .f self-test exempts (internal) rows so the alternative remains available for future contracts that should genuinely be internal-only."

