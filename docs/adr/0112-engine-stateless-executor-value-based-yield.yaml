id: ADR-0112
title: "Engine stateless executor ‚Äî value-based yield (no checked exception); A2A InterruptType ‚Üî SuspendReason mapping"
status: accepted
product_claim: "PC-004"
date: 2026-05-23
level: L0
view: logical
affects_level: L0, L1
affects_view: logical, development, process
authors:
  - chao
relates_to:
  - ADR-0019
  - ADR-0020
  - ADR-0021
  - ADR-0044
  - ADR-0074
  - ADR-0100
  - ADR-0104
supersedes_partial:
  - ADR-0019  # checked-suspension doctrine ‚Äî partially superseded
extends:
  - ADR-0100
context: |
  R1 feasibility Œ¥.1 + the 2026-05-22 engine-friction-resolution L1
  proposal both point at the same root cause: `SuspendSignal extends
  Exception` is a checked exception that cannot cross Reactor /
  CompletableFuture / Temporal-workflow boundaries cleanly.

  Failure modes:
  1. Reactor `.flatMap(...)` lambdas cannot declare `throws
     SuspendSignal`; must wrap in `Mono.error(...)` ‚Äî pollutes
     onError channel intended for failures.
  2. `CompletableFuture.supplyAsync` Supplier cannot declare checked
     exception; same wrap-in-error pollution.
  3. W4 Temporal workflows MUST be deterministic; checked exceptions
     serialized as workflow history are non-deterministic across SDK
     versions.

  We accept engine-friction proposal ¬ß4.2 (abolish SuspendSignal in
  favor of `Mono<StateDelta(InterruptSignal)>`) with three corrections:
  (a) package root stays `com.huawei.ascend.engine.*` per ADR-0104;
  (b) A2A InterruptType is wire-protocol vocab, SuspendReason is
  internal-DFA vocab ‚Äî both kept with mapping;
  (c) migration is phased W0.5 ‚Üí W1 ‚Üí W2.

decision: |
  ## Part A ‚Äî Value-based yield primitive (W0.5+ FORWARD direction)

  > **Current shipped state (rc34)**: live
  > `agent-service/src/main/java/com/huawei/ascend/service/engine/spi/StatelessEngine.java`
  > returns `StateDelta` synchronously and takes a single
  > `AgentInvokeRequest` parameter; the shipped `StateDelta` record
  > has no `interruptSignal` field. The Mono+InterruptSignal shape
  > declared below is the W0.5+ FORWARD direction; Part C governs
  > the phased migration. Until Part C lands, `SuspendSignal` (checked
  > exception, in `com.huawei.ascend.engine.orchestration.spi`)
  > remains the current canonical suspension mechanism ‚Äî that javadoc
  > wording on `StatelessEngine.java` is correct for W0‚Äìrc34 reality
  > and stays accurate until the W0.5 parallel API lands per Part C.

  At W0.5+, `StatelessEngine.execute(...)` returns `Mono<StateDelta>`
  where `StateDelta` carries a nullable `InterruptSignal`. No checked
  exception in SPI signature.

      package com.huawei.ascend.engine.spi;
      public interface StatelessEngine {
          Mono<StateDelta> execute(TaskSpec task, InjectedContext ctx);
      }

      public record StateDelta(
          List<Message> newMessages,
          Map<String,Object> updatedVars,
          InterruptSignal interruptSignal      // null = completion
      ) { }

  Reactive error channel returns to its purpose: failures only.

  ## Part B ‚Äî A2A InterruptType ‚Üî SuspendReason mapping

  A2A `InterruptType` is wire-protocol vocab (5 values per A2A spec):
  `INPUT_REQUIRED` / `SUB_TASK_AWAIT` / `TOOL_EXECUTION` /
  `DELAY_AWAIT` / `POLICY_APPROVAL`.

  Internal `SuspendReason` is DFA vocab. The canonical L1 set is 6 cases
  (per ADR-0146 codifying the 2026-05-22 expansion-proposal-response doc
  line 141; supersedes the original ADR-0019 names):

  | SuspendReason | ‚Üí A2A InterruptType | source ADR |
  |---|---|---|
  | AwaitClientCallback | INPUT_REQUIRED | ADR-0074 (canonical) |
  | AwaitChildRun | SUB_TASK_AWAIT | ADR-0146 (renamed from ADR-0019 ChildRun) |
  | AwaitToolResult | TOOL_EXECUTION | ADR-0146 (renamed from ADR-0019 AwaitExternal / earlier ADR-0044 AwaitTool) |
  | AwaitTimer | DELAY_AWAIT | ADR-0019 |
  | RequiresApproval | INPUT_REQUIRED | ADR-0146 (renamed from ADR-0019 AwaitApproval) |
  | RateLimited | POLICY_APPROVAL | ADR-0070 |

  Fan-out variant `AwaitChildren(JoinPolicy)` is deferred to a follow-up
  ADR (not part of canonical L1 set); when it lands it will be a 7th
  variant. ADR-0146 ¬ß1 is the authority for this table; this ADR's Part B
  is aligned to it post-2026-05-27.

  Direction: internal ‚Üí wire is many-to-one (lossy by design).
  Wire ‚Üí internal on inbound A2A peer message requires payload
  context enrichment by the receiving runtime.

      public sealed interface InterruptSignal {
          InterruptType type();          // A2A wire
          SuspendReason internalReason(); // internal DFA
          String runId();
          Map<String,Object> payload();
      }

  ## Part C ‚Äî Migration W-wave plan

  - W0.5: parallel API ship. New `InterruptSignal` sealed +
    `InterruptType` enum + `SuspendReason` enum at
    `com.huawei.ascend.engine.spi.*`. Existing
    `SuspendSignal extends Exception` at
    `com.huawei.ascend.engine.orchestration.spi.SuspendSignal`
    marked `@Deprecated(forRemoval=true)`. Both paths coexist.
  - W1: ~9 call-sites migrate to returning `Mono<StateDelta>`:
    - `agent-service/.../engine/spi/StatelessEngine.java`
    - `agent-service/.../runtime/orchestration/inmemory/*` (5 files)
    - 3 test files
  - W2: `SuspendSignal.java` deleted; ArchUnit
    `NoCheckedExceptionInSpiTest` added.

  ## Part D ‚Äî Coexistence with HookPoint.ON_YIELD (rc22)

  Engine returns `Mono<StateDelta>` ‚Üí if `interruptSignal != null`,
  dispatcher emits `ON_YIELD` ‚Üí middleware may enrich ‚Üí orchestrator
  dispatches per `internalReason()`. No behavioral change to
  ON_YIELD; only the "engine signals yield" mechanism shifts from
  exception-throw to value-return.

consequences: |
  Positive:
  - Closes Œ¥.1 + Œ∏.1 + Œ∏.2 (engine friction-resolution proposal
    acceptance).
  - Reactor/CompletableFuture/Temporal compatibility restored.
  - A2A protocol mapping explicit; future A2A peers consume our
    suspension envelope without learning internal taxonomy.
  - `Mono.error(...)` channel reclaimed for failures.

  Negative:
  - W1 touches 9 production files + 3 test files; mechanical refactor.
  - Lossy internal‚Üíwire mapping (A2A peers see coarser detail);
    acceptable ‚Äî protocol surface is portable across implementations.
  - `SuspendSignal` removal at W2 is breaking for any external
    importer; mitigated by W0.5-W1 deprecation window + documented
    drop-in.

  Compounding: strongly positive ‚Äî every new orchestration SPI
  inherits value-based pattern; no future SPI re-introduces checked
  exceptions in reactive boundaries.

alternatives_considered: |
  - (A) Keep SuspendSignal checked ‚Äî rejected per Œ¥.1 reactive
    incompatibility.
  - (B) A2A InterruptType as SOLE vocab (drop SuspendReason) ‚Äî
    rejected; our DFA benefits from finer reasons.
  - (C) Parallel paths forever ‚Äî rejected; two SPIs for same purpose
    is a maintenance tax.
  - (D) Immediate W0.5 removal ‚Äî rejected; phased migration lower-risk.
  - (E) Unchecked exception subclass ‚Äî rejected; same Mono.error
    pollution + Temporal determinism issue.

