    - "./mvnw -pl agent-runtime test -Dtest=EngineRegistryResolveTest → positive resolve + mismatch + duplicate-registration tests GREEN"
    - "./mvnw -pl agent-runtime test -Dtest=EngineEnvelopeValidationTest → required-field + nullable-default tests GREEN"
    - "./mvnw -pl agent-runtime test -Dtest=EngineMatchingStrictnessIT → SyncOrchestrator with envelope mismatch raises EngineMatchingException; Run transitions to FAILED with engine_mismatch"
    - "./mvnw -pl agent-runtime test -Dtest=EnginePayloadDispatchOnlyViaRegistryTest → ArchUnit forbids instanceof on ExecutorDefinition outside the registry"
  gate:
    - "bash gate/check_architecture_sync.sh → GATE: PASS with 62 active rules (60 prior + Rules 55 + 56)"
    - "bash gate/test_architecture_sync_gate.sh → all self-tests GREEN with 4 new (positive + negative for each of 55, 56)"
  manual:
    - "grep -r 'instanceof ExecutorDefinition' agent-service/src/main → matches only inside engine.EngineRegistry"
    - "docs/contracts/engine-envelope.v1.yaml present + parses + known_engines list non-empty"

