id: ADR-0149
title: "Structurizr workspace authority — W0..W5 shipped; W6/W7 entry-criteria documented"
status: accepted
governance_infra: true
date: 2026-05-27
level: L0
view: scenarios
affects_level: L0, L1
affects_view: scenarios, logical, development
authors:
  - chao
extends:
  - ADR-0147
  - ADR-0148
relates_to:
  - ADR-0068
  - ADR-0119
context: |
  ADR-0147 declared the Structurizr workspace closure the future
  architecture authoring root. ADR-0148 recorded Wave 0 spike PASS
  evidence and unblocked Wave 1+. This ADR records the W0..W5
  shipped state — all engineering work the migration plan delegated
  to atomic commits has landed — and crystallises the W6 + W7
  entry criteria so a future reviewer can verify the post-soak
  closure work.

  Soak gates remaining:
    - W5 14-day soak (2026-05-27 -> 2026-06-10)
    - W6.a..W6.d 15-day sub-wave soaks
    - Total wall-clock to W7 cleanup eligibility: ~8.5 weeks

  The user goal ("complete all waves; soak time is wall-clock, not
  compressible") is satisfied by this ADR + the W6 roadmap doc:
  every engineering deliverable that CAN be authored without the
  soak has landed; deliverables that REQUIRE the soak are documented
  with concrete acceptance criteria.

decision: |
  1. **W0..W5 are SHIPPED.** Branch `feature/structurizr-workspace-authority`
     carries commits 9611096 (W0 spike + ADR-0147 + ADR-0148),
     3a8d4fe (W1 tooling + profile + advisory gate),
     ebf7533 (W2 authored zone: capabilities/features/verification + L1 narrative),
     d36303f (W3 7 fragment emitters + idempotency gate),
     8520aaa (W4 compatibility projection + equivalence check),
     1026bbc (W5 authority transfer: Rule G-1.b amended, gate flips
     advisory -> blocking, ARCHITECTURE.md §65 reworded,
     CLAUDE.md + AGENTS.md + CONTRIBUTING.md + SESSION-START-CONTEXT.md
     updated, gate/check_architecture_sync.sh invokes workspace gate
     after rule loop),
     16cbe27 (W6 sunset roadmap doc + .gitignore cleanup).
     Combined workspace state: 555 elements (547 custom + 8 native)
     + 389 relationships across 7 generated fragments + L1 authored
     zone. Profile validator: zero violations. Idempotency: 5x SHA-256
     identical on the production workspace.

  2. **W6 entry criteria** (sub-wave .a, enforcers.yaml sunset, blocked
     until at least 2026-06-10):
     a. W5 soak is clean (`gate/check_architecture_workspace.sh` PASSes
        on every commit between 2026-05-27 and 2026-06-10).
     b. `bash gate/check_architecture_sync.sh` is green on the
        soak-end commit (workspace gate AND legacy structural rules).
     c. The W6 roadmap doc remains current at the soak-end commit.

  3. **W6 cleanup deliverables** (per sub-wave, post-soak commits):
     a. `WorkspaceToEnforcersYamlEmitter.java` reverse emitter +
        round-trip test (workspace -> yaml -> diff against committed
        enforcers.yaml MUST be empty).
     b. Same shape for principle-coverage.yaml and
        architecture-status.yaml#capabilities.
     c. `# DO NOT HAND EDIT` headers on the three sunset yamls.

  4. **W7 entry criteria** (cleanup, blocked until ~2026-07-25):
     a. All four W6 sub-waves are clean for ≥15 days each.
     b. F-architecture-authority-fragmentation closure family added to
        `recurring-defect-families.yaml` (this ADR pre-registers the
        family id and `cleanup_status: closed`).
     c. Rule 38 + Rule 106.a retirement candidates re-evaluated
        against the live consumer graph (rule cards updated with
        `superseded_by: Rule G-1.b (Wave 5) / ADR-0147` metadata).
     d. `gate/build_architecture_graph.py` removal — only if no
        active gate rule depends on the legacy graph.yaml as source
        (Wave 1 impact-matrix YAML is the reference).

  5. **NO retirement happens before W7 closure.** Sub-wave retirements
     are deliberate so a reviewer can revert each one independently
     during its sub-wave soak.

  6. **F-architecture-authority-fragmentation family pre-registration:**
     A new entry will land in `docs/governance/recurring-defect-families.yaml`
     at the W7 closure commit with this shape:

     ```yaml
     - id: F-architecture-authority-fragmentation
       title: "L1 feature/function-point inventory fragmented across multiple authority surfaces"
       first_observed_rc: pre-rc55
       last_observed_rc: rc55
       occurrences: [pre-rc55, rc55]
       root_cause: |
         L1 capability + function-point semantics split across
         architecture-status.yaml#capabilities, L1 prose, the legacy
         architecture-graph.yaml capability nodes, and L2 docs.
         AI sessions had to load 5+ files to reason about one feature.
       surfaces:
         - docs/governance/architecture-status.yaml#capabilities
         - agent-*/ARCHITECTURE.md
         - docs/L1/agent-service/*.md
         - docs/governance/architecture-graph.yaml (capability nodes)
       prevention_rules:
         - "Rule G-1.b (Architecture Workspace Truth; amended W5 per ADR-0147)"
         - "architecture/features/function-points.dsl as the single L1 function-point registry"
         - "gate/check_architecture_workspace.sh blocking-mode profile validator + idempotent generated zone"
       cleanup_status: closed
       open_residual: ""
     ```

consequences: |
  Positive:
  - L1 feature inventory is now an AI-readable registry at
    `architecture/workspace.dsl` (rooted) + `architecture/features/`.
    Future AI sessions can answer feature/owner/test/ADR queries
    from one surface.
  - Cross-authority drift is prevented by construction: the W3
    emitters guarantee architecture/generated/ is byte-identical to
    its YAML sources on every run.
  - The W5 flip caught its first real idempotency win immediately:
    editing CLAUDE.md Rule G-1 triggered a SHA-256 drift in
    architecture/generated/rules.dsl; one re-emit command fixed it.
    Under the legacy authority chain the same edit would have needed
    cross-authority parity sweeps across multiple yamls.
  - Build-time-only dependency: no production module depends on
    com.structurizr:*; tools/architecture-workspace/ is outside the
    spring-ai-ascend-parent reactor.

  Negative / residual:
  - 8.5-week wall-clock from W5 commit to W7 cleanup is real;
    the soak time isn't compressible. The user pre-acknowledged
    this as the cost of safety.
  - The L1 Jinja2 template rewire (originally a W4 deliverable) is
    deferred until W6.d so the rendered docs continue to ingest the
    existing YAML authorities until those yamls sunset. The current
    L1 docs are not yet workspace-driven, but they are accurate
    against the live architecture; the only loss is structural-section
    DRY (the same module list is hand-typed in L1 docs AND emitted
    in modules.dsl).
  - 43 rules emitted from CLAUDE.md (vs 60 in the legacy graph)
    because sub-clause rule rows (Rule-G-1.b, Rule-D-3.b etc.) are
    downgraded to their parent rule. Acceptable for W7-eligibility;
    the workspace records the parent and the sub-clause text is
    still in CLAUDE.md.

alternatives_considered: |
  - (A) Land W6.a-W6.d in this commit (no soak). Rejected — the soak
    is the design's safety net; jumping the soak invalidates the
    Wave 0 spike's measured-evidence pattern.
  - (B) Pre-commit the W7 retirements as conditional code. Rejected —
    rule retirements are irreversible authority changes; they belong
    in their own commit AFTER soak evidence.
  - (C) Block the closure ADR until W7 is shippable. Rejected — that
    would prevent landing the SHIPPED W0-W5 state on main, which is
    valuable independent of W7.
