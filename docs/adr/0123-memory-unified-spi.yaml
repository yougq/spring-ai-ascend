id: ADR-0123
title: "Memory unified SPI: `MemoryStore<K, V>` parameterized by `MemoryCategory` (M1-M6); CQRS split (MemoryReader / MemoryWriter); M3 SemanticMemoryStore + M5 KnowledgeMemoryStore marker interfaces land alongside existing M2/M4"
status: accepted
product_claim: "PC-001|PC-005"
date: 2026-05-25
level: L0
view: development
affects_level: L0, L1
affects_view: development, logical
authors:
  - chao
relates_to:
  - ADR-0120    # Wave A1 brand & Audience B alignment (KEEP)
  - ADR-0034    # Memory & Knowledge Taxonomy at L0 (M1-M6 categories)
  - ADR-0051    # Memory & Knowledge Ownership Boundary (C-side vs S-side)
  - ADR-0100    # rc22 agent-service L1 runtime-role decomposition (Run ≤ Task ≤ Session ≤ Memory)
context: |
  ADR-0034 declared a 6-category memory taxonomy (M1-M6) but the
  current code ships three unrelated SPIs at fragmented locations:
  `TaskStateStore` (M2-ish), `GraphMemoryRepository` (M4 stub),
  `ContextProjector` (session). The taxonomy's common
  `MemoryMetadata` envelope is prose-only. M3 (semantic long-term)
  and M5 (knowledge index) categories have no Java surface.

  ADR-0051 placed C-side vs S-side ownership decisions at the
  platform contract, but the placeholder-preservation rule and
  the BusinessFactEvent type have no SPI to attach to.

decision: |
  Land a unified `MemoryStore` SPI under
  `com.huawei.ascend.service.runtime.memory.spi` (extends the
  existing package that already hosts `GraphMemoryRepository`).
  Status: design_only at rc44.

  Public surface:

  - **`MemoryStore<K, V>`** interface — superset of
    `MemoryReader<K, V>` + `MemoryWriter<K, V>` (CQRS-split for
    customers who only need one side).
      - `MemoryCategory category()`
      - `MemoryReader<K, V>` and `MemoryWriter<K, V>` extend this
        as one-sided views.

  - **`MemoryReader<K, V>`** interface:
      - `Mono<Optional<V>> read(String tenantId, K key)`
      - `Flux<MemoryEntry<K, V>> scan(String tenantId,
                                       MemoryQuery query)`

  - **`MemoryWriter<K, V>`** interface:
      - `Mono<Void> write(String tenantId, K key, V value,
                          MemoryMetadata metadata)`
      - `Mono<Void> delete(String tenantId, K key)`

  - **`MemoryCategory`** enum (closed):
      - `M1_SHORT_TERM` — Run-scoped working memory; ephemeral.
      - `M2_EPISODIC` — Session memory; TTL-bounded.
      - `M3_SEMANTIC` — Long-term semantic facts; persistent.
      - `M4_GRAPH` — Graph relationship memory (Graphiti, mem0).
      - `M5_KNOWLEDGE` — Knowledge index (RAG corpus).
      - `M6_RETRIEVED` — Ephemeral retrieved context for one
        reasoning step; lives in `RunContext`, not a backing store.

  - **`MemoryMetadata`** record matching ADR-0034 prose:
      - `String memoryId`
      - `Instant createdAt`
      - `Instant updatedAt`
      - `String createdBy` (actor)
      - `String sourceTraceId`
      - `String embeddingModelVersion` (for M3/M5)
      - `MemoryOwnership ownership` (C_SIDE | S_SIDE | DELEGATED)
      - `Map<String, String> tags`

  - **`MemoryEntry<K, V>`** record: key, value, metadata.
  - **`MemoryQuery`** record: category, optional tag filters,
    optional `since` instant, paging cursor.
  - **`MemoryRef`** record: opaque reference used in
    `Agent.memoryBindings` (Wave B5) — carries `memoryId` +
    `category`.

  - **Marker interfaces for the previously-unmodelled categories**:
      - `SemanticMemoryStore extends MemoryStore<String,
                                                  SemanticFact>`
        (M3; declares `embeddingModelVersion` non-null on writes).
      - `KnowledgeMemoryStore extends MemoryStore<String,
                                                  KnowledgeDocument>`
        (M5; declares `chunkingPolicy` field on definition).

  - **Pre-existing SPIs cross-reference**:
      - `TaskStateStore` is the M2-ish session-control surface;
        documented as a structural sibling, not a `MemoryStore`
        (it carries control state, not memory content).
      - `GraphMemoryRepository` is the M4 reference SPI; declares
        `default MemoryCategory category() { return M4_GRAPH; }`
        in a follow-up patch.
      - `ContextProjector` is M1+M6 plumbing; documented as a
        structural sibling.

  Contract schema lives at `docs/contracts/memory-store.v1.yaml`
  (status: design_only).

consequences: |
  Positive:
  - M3 (semantic) and M5 (knowledge) — previously prose-only —
    gain Java surface customers can implement.
  - ADR-0051's `MemoryOwnership` decision (C_SIDE / S_SIDE /
    DELEGATED) becomes runtime-checkable per write through the
    `MemoryMetadata.ownership` field.
  - CQRS split (`MemoryReader` / `MemoryWriter`) lets customers
    implement read-only adapters (e.g., a shared knowledge corpus)
    without exposing write paths.

  Negative / residual:
  - Cross-package relationship between existing
    `GraphMemoryRepository` and new `MemoryStore` requires a
    default method bridge — documented in `package-info.java`.
  - `MemoryStore<K, V>` generic parameters force adapters to
    declare concrete K/V types. Acceptable for type safety.
  - `BusinessFactEvent` and `PlaceholderPreservationPolicy` from
    ADR-0051 require their own typed surface; deferred to Wave B5
    `SafetyPolicy` integration (the Agent's safety policy attests
    to placeholder preservation discipline).

alternatives_considered: |
  - (A) Keep three fragmented SPIs, document M3/M5 only as prose.
    Rejected: leaves the L0 contract gap open.
  - (B) Single `MemoryStore<Object, Object>` without generics.
    Rejected: defeats type safety; forces casts everywhere.
  - (C) One concrete `MemoryStore` interface per category (M1-M6
    each a distinct interface). Rejected: 6× the surface area
    without 6× the conceptual distinction; categories ARE the
    discriminator.
