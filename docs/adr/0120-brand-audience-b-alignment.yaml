id: ADR-0120
title: "Brand & Audience B alignment: KEEP `spring-ai-ascend` identity and Audience B promise; close the L0 agentic-primitive contract gap"
status: accepted
governance_infra: true
date: 2026-05-25
level: L0
view: scenarios
affects_level: L0, L1
affects_view: scenarios, logical
authors:
  - chao
relates_to:
  - ADR-0117    # rc37 strategic repositioning: Ascend/Kunpeng hardware-synergy, drop FSI as lead vertical
  - ADR-0099    # rc22 L1 architecture depth & grounding
  - ADR-0094    # rc17 recurring-defect-family truth + rule consolidation
context: |
  The senior-architect L0 review memo at
  `docs/logs/reviews/2026-05-25-l0-senior-architect-reopen-recommendation.en.md`
  identified seven L0-level contract-shape gaps in the rc41 "L0 final
  release-ready" decision: missing SPI shapes for Agent, ModelGateway,
  Tool, Memory, Vector, Planner, plus an undeclared Spring AI integration
  boundary. The memo argues these are L0 contract-layer defects, not W1+
  implementation deferrals, because they prevent Audience B (external
  Spring developers integrating into their own Spring Boot 4 + Java 21
  applications) from extending the platform at the seams ARCHITECTURE.md
  §1.1 promises.

  Before the seven SPI shapes can be designed, one prerequisite founder
  decision must close: does the team KEEP the `spring-ai-ascend` brand
  and the ARCHITECTURE.md §1.1 Audience B promise, or RESCOPE to a
  kernel-only product (e.g., rename to `ascend-agent-runtime`)?

  The two paths produce very different downstream work:

  - KEEP -> execute ADR-0121 through ADR-0128 as the Phase B contract
    surface (~10-12 working days), then Phase C integration + Phase D
    governance lockstep, re-tag as rc48 "L0 Agentic Contract Surface".
  - RESCOPE -> rename project, edit ARCHITECTURE.md §1.1 to drop
    Audience B, ship rc41 as-is with documentation cleanup (~2-3 days),
    leave the seven primitives as legitimate future-product concerns.

  This ADR closes the prerequisite decision so the downstream waves can
  execute without ambiguity.

decision: |
  Adopt **Path KEEP**:

  1. **Brand retained.** The project name `spring-ai-ascend` is preserved.
     It is part of the contract surface — external readers reasonably
     expect Spring AI integration, and the team is committing to deliver
     that integration as the canonical Model / Tool / Vector abstraction
     (decision ratified in ADR-0125).

  2. **Audience B promise retained.** ARCHITECTURE.md §1.1 Audience B
     ("external Spring developers integrating into their own Spring Boot
     4 + Java 21 applications") stays. The platform commits to providing
     non-vacuous extension seams (Agent, ModelGateway, Skill, MemoryStore,
     VectorStore, Planner SPIs) before broad Audience B onboarding.

  3. **Re-scope rc41's release-state framing.** The rc41 release note
     gets a historical re-scope marker added in Wave D3:
     - Originally tagged `formal_release: true` at rc41 commit `d20d1e3`.
     - Re-scoped to "Runtime Kernel + Governance Skeleton GA" — a real
       deliverable, but NOT yet "L0 Agentic Contract Surface GA".
     - True L0 Final Release-Ready is achieved at rc48 after Phases A-D
       complete.

  4. **Authorize the rc43->rc48 wave plan.** The plan at
     `D:\.claude\plans\d-chao-workspace-spring-ai-ascend-docs-eager-harp.md`
     is the canonical execution roadmap:
       Phase A — Strategic Foundation (rc43): this ADR + ADR-0122 +
                                              ADR-0125 (Waves A1/A3/A2).
       Phase B — Contract Surface SPIs (rc44-rc46): 6 SPI waves
                                              (ADR-0121/0123/0124/0126/
                                              0127/0128, Waves B1-B6).
       Phase C — Integration & Discoverability (rc47): Spring AI
                                              adapters + quickstart
                                              worked example + doc
                                              refresh (Waves C1-C3).
       Phase D — Governance Lockstep & Re-Close (rc48): gate rules +
                                              baseline lockstep + rc48
                                              release transaction
                                              (Waves D1-D3).

  5. **Record a new strategic decision row** in
     `architecture-status.yaml#strategic_decisions` named
     `audience_b_brand_commitment` with `decision_status: resolved`,
     `resolved_by: ADR-0120`, `resolution: KEEP`.

consequences: |
  Positive:
  - The platform brand and the Audience B promise are honest after rc48:
    an external Spring developer reading the L0 contract catalog can
    answer "how does this platform represent an Agent / Model / Tool /
    Memory / Vector / Planner?" by pointing at concrete SPI interfaces
    and contract YAMLs.
  - The seven gaps identified by the senior-architect memo become a
    forward-tracked work plan rather than a latent debt.
  - Rule R-A (Business/Platform Decoupling) becomes non-vacuously
    satisfied: there are real extension seams to extend, not just an
    empty surface.
  - The rc41 release stays as a historical record of "what shipped at
    that moment"; v2.0.0 GA is re-issued at rc48 with the broader
    contract surface.

  Negative / residual:
  - The rc41 release note's `formal_release: true` claim is retracted
    in framing (the file gets a re-scope marker in Wave D3); the
    release-readiness evidence bundle at
    `gate/release-ci-evidence/2026-05-25-l0-rc41-final-release-readiness.evidence.yaml`
    stays frozen as historical evidence of what was claimed at that
    commit.
  - ~16-22 additional working days of architecture-team effort lands
    before the v2.0.0 GA tag is durable.
  - Implementations of the seven SPIs stay deferred to W1-W4 per the
    existing roadmap; rc48 ships contract shapes only, not real
    LLM gateway / vector store / planner runtime. The shipped/deferred
    boundary remains honest.

  Forward / staging boundaries:
  - This ADR ships as Wave A1 alone (the gating decision); ADR-0122 and
    ADR-0125 land in Waves A3 / A2 of the same rc43 wave.
  - The wave plan can be paused between any two phases; each phase
    completes its own PR + baseline lockstep before the next begins.

alternatives_considered: |
  Rejected:

  - (A) **Path RESCOPE — rename project to `ascend-agent-runtime`, drop
    Audience B from ARCHITECTURE.md §1.1, ship rc41 as-is.** Rejected
    because the project investment in `spring-ai-ascend` as a brand
    (BoM imports `spring-ai-bom 2.0.0-M5`, `OssApiProbe` checks the
    Spring AI classpath, the quickstart references Spring AI integration
    as forward work) is substantial; flipping to a kernel-only product
    discards the differentiating positioning that ADR-0117 already
    locked in (Ascend/Kunpeng hardware-synergy + OSS-first + Spring AI
    integration as the Java-side enabler).

  - (B) **Defer the decision and ship rc41 as-is with a "to be decided"
    note in ARCHITECTURE.md.** Rejected because every downstream
    contract-shape wave (B1-B6) depends on this decision; deferring it
    blocks 10+ working days of architecture work and re-creates the
    F-shadow-corpus-prose-staleness drift class the team has already
    catalogued (ARCHITECTURE.md §1.1 saying one thing, shipped code
    saying another).

  - (C) **Split: keep brand but defer Audience B promise to W3+ when SDK
    GA.** Rejected because the brand `spring-ai-ascend` already conveys
    "Spring developer-friendly"; deferring the SDK seams to W3 keeps
    Audience B in suspense for a year while Audience A (framework
    contributors) accumulates inconsistent informal extension patterns
    that W3 SDK has to reconcile.
