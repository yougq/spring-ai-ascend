rationale: |
  The first-pass W1 wave proved the structural answer (Rule G-1 sub-clause .a+34, graph,
  gate rules 37-44) was correct but exposed a complementary gap: the
  graph encoded governance machinery but not domain ontology. An LLM
  reasoning about "how do I add admission control to a Workflow
  Intermediary?" still had to read prose for the L0 domain side, then
  hop to the graph for the rule side. That hop is exactly where drift
  re-appears.

  Promoting the eight ironclad rules to Layer-0 closes the gap by
  making the L0 process / physical concepts first-class graph nodes,
  with typed edges to the Layer-1 rules and concrete gate enforcers.

  Why "8 principles, not 4 deeper categories." Each ironclad rule has
  distinct enforcer character (yaml schema vs source scan vs migration
  scan) and distinct violation locus (bus vs runtime vs migration vs
  metadata). Collapsing them into 4 principles would require composite
  enforcers that mix unrelated checks, hurting readability and
  per-violation reporting.

  Why Layer-0, not Layer-1. The eight rules describe system-wide
  invariants that hold across modules and across waves — exactly the
  Layer-0 / governing-principle level. Layer-1 rules express those
  invariants in mechanical form for one specific shape of violation.
  Conflating the two would re-introduce the prose-vs-machine drift
  ADR-0068 was designed to eliminate.

  Why ship enforcers today (no deferred sub-clauses except documented
  ones). Rule R-C.a forbids deferred enforcers. Each new gate rule has an
  honest enforcer that detects new violations TODAY. Where existing
  code violates a new rule (V2 migration without RLS) the violation is
  documented in a baseline/grandfather file (gate/rls-baseline-
  grandfathered.txt), and the deferred re-mediation is logged in
  CLAUDE-deferred.md with a wave-specific re-introduction trigger.

alternatives_considered:
  - id: ALT-A
    label: "Stage 8 ironclad rules as Layer-1 only (no new Layer-0 principles)"
    rejected_because: |
      Layer-1 rules describe one mechanical violation shape; Layer-0
      principles describe a system-wide invariant. The 8 rules ARE
      system-wide invariants, not just mechanical patterns. Demoting
      them to Layer-1 would lose the L0 framing and force every Layer-1
      rule to re-derive context from prose — exactly the drift Rule G-1 sub-clause .a+34
      were designed to prevent.

  - id: ALT-B
    label: "Defer L0 fill to a separate post-W1.x wave"
    rejected_because: |
      The user's 2026-05-15 scoping decision explicitly chose comprehensive
      scope. Splitting the wave leaves the graph empty of L0 domain
      content for an unspecified additional duration, during which more
      domain-drift defects can accrete. The comprehensive scope is also
      cheaper because all 8 principles share the same review context.

  - id: ALT-C
    label: "Group 8 ironclad rules into 2-3 super-principles (Bus, Compute, Storage)"
    rejected_because: |
      Same problem as ALT-A: composite enforcers mix unrelated checks
      and hurt per-violation reporting. The 1:1 principle-to-rule shape
      keeps the graph simple to traverse.

