id: ADR-0069
title: "Layer-0 Ironclad Rules — promotion of LucioIT W1 §6/§7 to governing principles"
status: accepted
governance_infra: true
date: 2026-05-15
level: L0
view: scenarios
freeze_id: null

supersedes: []
extends:
  - ADR-0064
  - ADR-0068
relates_to:
  - ADR-0067

decision_one_liner: |
  The eight ironclad rules embedded in LucioIT's W1 L0 draft (§6 Process View
  and §7 Physical View) are promoted from prose claims to first-class Layer-0
  governing principles P-E through P-L in CLAUDE.md, each operationalised by a
  Layer-1 rule (Rules 35-42) with a shipped enforcer (gate rules 45-52).

triggering_inputs:
  external_reviews:
    - path: docs/logs/reviews/2026-05-14-L0Architecture-LucioIT-wave-1-request.en.md
      authors: ["LucioIT"]
      thesis: |
        The L0 draft §3 ("Architectural Principles") is intentionally blank,
        reserved for domain architects to supplement system-level core
        ironclad rules in subsequent reviews. §6 (Process View) and §7
        (Physical View) embed eight ironclad constraints that read as
        principles-by-prose: Absolute Non-Blocking I/O, Cursor Flow,
        Three-Track Channel Isolation, Five-Plane Topology, Chronos
        Hydration, Storage-Engine RLS, Skill-Dimensional Arbitration, and
        Sandbox Permission Subsumption.
  internal_signal:
    historical_defect_rounds: 9
    historical_defects_closed: 158
    related_defect_categories: 3
    related_defect_categories_detail: |
      - "Resource governance & skill" (~20 findings) — addressed by P-K (Rule R-K).
      - "Data plane & payload" (~25 findings) — partially addressed by P-G (Rule R-G) + P-J (Rule R-J.a).
      - "Trust, authz, audit" (~22 findings) — addressed by P-J (Rule R-J.a) + P-L (Rule R-L).
    governance_gap: |
      Without these principles the eight constraints lived only in the L0
      draft prose; an LLM agent reasoning about a new feature could not
      see them as graph nodes, and a reviewer could not gate on them
      mechanically. The W1 wave shipped substrate (Rule G-1 sub-clause .a+34, graph,
      gate rules 37-44) but left the substrate empty with respect to L0
      domain content; this ADR fills that gap for the eight ironclad
      rules.

context: |
  The W1 wave (ADR-0068) established Rule G-1 sub-clause .a (Layered 4+1 Discipline) and
  Rule G-1 sub-clause .b (Architecture-Graph Truth) as the structural answer to the
  governance-text-drift defect family (~50% of historical findings). The
  graph schema accepts principle/rule/enforcer/test/module nodes but at
  W1 entry contained only four principles (P-A..P-D from ADR-0064). The
  LucioIT L0 draft introduces eight L0-scope ironclad rules in prose.
  Without explicit promotion they remain prose-only and cannot be
  enforced under Rule R-C.a (Code-as-Contract).

  The user's 2026-05-15 scoping decision authorises:
    1. Comprehensive W1.x wave (all 5 defect groups closed in one wave).
    2. Module-name reconciliation to LucioIT L0 names (sibling ADR-0070).
    3. L0 §3 fill — promote 8 ironclad rules to Layer-0 principles now.

decision: |
  Eight new Layer-0 principles enter CLAUDE.md alongside P-A..P-D:

    P-E — Multi-Track Bus Physical Channel Isolation
          (control / data / rhythm tracks physically separated;
           single-track congestion cannot cause global paralysis)
    P-F — Cursor Flow & Asynchronous Client Boundary
          (Client → Runtime is non-blocking; Task Cursor returned
           immediately; SSE for process state, Webhook for blocking
           checkpoints)
    P-G — Absolute Non-Blocking I/O
          (external API calls MUST use Reactive or Virtual Threads;
           OS-level threads MUST be released during I/O wait)
    P-H — Chronos Hydration
          (no Thread.sleep in business code; long-horizon waits are
           declarative suspension + bus-driven re-hydration; sleeping
           process self-destructs and re-hydrates on bus pulse)
    P-I — Five-Plane Distributed Topology
          (Edge / Compute&Control / Bus&State / Sandbox / Evolution;
           workloads with different characteristics physically separated)
    P-J — Storage-Engine Tenant Isolation
          (Row-Level Security at storage engine; app-code isolation
           insufficient; even runtime vulnerability cannot leak across
           tenants at the DB layer)
    P-K — Skill-Dimensional Resource Arbitration
          (2D defence net: Tenant Quota × Global Skill Capacity;
           full-pool skill suspends only that skill's callers, not whole
           Agent processes)
    P-L — Sandbox Permission Subsumption
          (logical authz scope MUST 1:1 map to physical sandbox limits;
           a logical grant cannot exceed what the physical sandbox enforces)

  Each principle is operationalised by a Layer-1 Rule (35-42) shipping in
  the same PR. Each Layer-1 Rule has a working enforcer per Rule R-C.a
  (Code-as-Contract) — gate rules 45-52 that fail on detected violations.

  Supporting authoritative inputs land at the same time:
    - docs/governance/bus-channels.yaml      (Rule R-E / P-E)
    - docs/governance/skill-capacity.yaml    (Rule R-K / P-K)
    - docs/governance/sandbox-policies.yaml  (Rule R-L / P-L)
    - gate/rls-baseline-grandfathered.txt    (Rule R-J.a / P-J — V1/V2 grandfathered)
    - deployment_plane: field on every module-metadata.yaml (Rule R-I / P-I)

