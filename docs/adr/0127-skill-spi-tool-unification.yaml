id: ADR-0127
title: "Skill SPI: unified lifecycle interface with `SkillKind` discriminator; Spring AI ToolCallback adapts via Wave C1; reuses existing SkillCapacityRegistry + ResilienceContract"
status: accepted
product_claim: "PC-001|PC-004"
date: 2026-05-25
level: L0
view: development
affects_level: L0, L1
affects_view: development, logical
authors:
  - chao
relates_to:
  - ADR-0122    # Wave A3 Tool-Skill semantic resolution (Path b chosen)
  - ADR-0125    # Wave A2 Spring AI canonical integration boundary
  - ADR-0030    # Original Skill SPI design (this ADR consolidates and supersedes prose)
  - ADR-0052    # Skill topology scheduler + capability bidding
  - ADR-0070    # Cursor Flow + Skill Capacity two-axis
  - ADR-0080    # ResilienceContract dual-surface
  - ADR-0018    # SandboxExecutor SPI (untrusted skill kinds route through it)
context: |
  Per ADR-0122 the platform unifies Tool and Skill into a single
  `Skill` SPI discriminated by a `SkillKind` enum. This ADR
  specifies the Java surface so Wave B2 lands deterministically.

  The pre-existing `SkillCapacityRegistry` + `ResilienceContract`
  apparatus (W0-shipped, runtime-enforced) keys arbitration on
  `(tenantId, skillKey)` and remains unchanged; this wave fills
  the missing `Skill` definition surface that the capacity rules
  already presume exists.

decision: |
  Land the `Skill` SPI under `com.huawei.ascend.service.skill.spi`
  (agent-service module). Status: design_only at rc44;
  runtime_enforced when the W2 Skill registry implementation ships.

  Public surface:

  - **`Skill`** interface with lifecycle methods:
      - `String skillKey()` — `(tenant, skillKey)` indexes
        `SkillRegistry` and `SkillCapacityRegistry`.
      - `SkillKind kind()` — closed enum (see below).
      - `void init(SkillContext ctx)` — called once on registration.
      - `Mono<SkillResult> execute(SkillInvocation inv)` —
        Reactive per Rule R-G; carries `tenantId` per Rule R-C.c.
      - `void suspend(SkillSuspensionState state)` — long-running
        skills only; throws `UnsupportedOperationException` for
        `TOOL` kind by adapter default.
      - `void teardown()` — called on deregistration.

  - **`SkillKind`** enum (closed set):
      - `TOOL` — LLM-callable function (Spring AI ToolCallback
        adapter is one).
      - `BUILTIN` — platform-owned utility (memory read, vector
        query, MCP server call).
      - `AGENT_AS_TOOL` — another Agent invoked as a Skill
        (Agent-to-Agent per ADR-0100).
      - `MCP_SERVER` — remote MCP server tool exposure.
      - `UNTRUSTED_TOOL` — TOOL kind requiring sandbox (Rule R-L).
      - `UNTRUSTED_CODE` — code-interpreter etc. (sandbox
        mandatory; Rule R-L).
      New kinds require ADR amendment; open enums defeat type-safe
      sandbox routing.

  - **`SkillRegistry`** interface — indexes by
    `(tenantId, skillKey)`; supports `register`, `unregister`,
    `find`, `list(tenantId, kind)`.
  - **`SkillDefinition`** record — declarative skill metadata
    customers attach via `@Bean` + `@ConfigurationProperties`:
    `skillKey`, `kind`, `displayName`, `description`,
    `inputSchema` (JSON schema string), `outputSchema`,
    `capacityKey` (defaults to `skillKey`). Constructor-level
    invariants reject blank `skillKey` and `displayName`; JSON-schema
    semantic validation remains a registry/TCK obligation before W2
    runtime promotion.
  - **`SkillRef`** record — opaque reference type used in
    `Agent.toolBindings` (Wave B5) and elsewhere; carries
    `skillKey` only.
  - **`SkillContext`** record — passed to `init`; carries
    `tenantId`, `traceContext`, capacity arbiter handle.
  - **`SkillInvocation`** record — passed to `execute`; carries
    `tenantId`, `inputs (Map<String, Object>)`, `runContext`,
    `hookContext`.
  - **`SkillResult`** sealed — `SkillSuccess(outputs)` |
    `SkillError(reason, detail)` | `SkillSuspended(state)`.
  - **`SkillSuspensionState`** record — opaque state for
    long-running suspend/resume; consumed by W2 async orchestrator
    per existing `SuspendSignal` machinery.

  Contract schema lives at `docs/contracts/skill-definition.v1.yaml`
  (status: design_only). Capacity arbitration continues through
  existing `SkillCapacityRegistry.tryAcquire(tenantId,
  capacityKey)` per ADR-0070.

consequences: |
  Positive:
  - Single SPI customers learn for tools, builtins, MCP servers,
    and agent-as-tool — cognitive surface stays small.
  - Sandbox routing (Rule R-L) gets a clear discriminator via
    `SkillKind.UNTRUSTED_*` — replaces the ADR-0030 `SkillTrustTier`
    proposal.
  - Existing `SkillCapacityRegistry` + `ResilienceContract` reuse
    by construction; no new arbitration surface.

  Negative / residual:
  - Lifecycle (`init`/`suspend`/`teardown`) is over-rich for the
    Spring AI `ToolCallback` use case where only `execute` is
    meaningful. Adapter implements `init`/`teardown` as no-ops
    and `suspend` as `throw new UnsupportedOperationException`;
    documented in `package-info.java`.
  - `SkillKind` is closed — new kinds require ADR; intentional
    constraint for type-safe sandbox routing.

alternatives_considered: |
  - Path (a) — Tool IS Skill verbatim. Rejected by ADR-0122
    (Spring AI ToolCallback semantic too narrow).
  - Path (c) — Tool and Skill are separate SPIs. Rejected by
    ADR-0122 (cognitive surface doubled).
  - Open-typed `kind` field (String). Rejected: defeats sandbox
    routing type safety; permits typo drift.
