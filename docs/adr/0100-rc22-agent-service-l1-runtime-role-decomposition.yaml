id: ADR-0100
title: "rc22 ‚ÄĒ agent-service L1 runtime-role decomposition (5-component model + Run‚Č§Task‚Č§Session lifecycle + 3 new SPIs + Yield/SuspendSignal coexistence)"
status: accepted
governance_infra: true
date: 2026-05-22
level: L1
view: scenarios
affects_level: L1
affects_view: logical, process, development, scenarios
