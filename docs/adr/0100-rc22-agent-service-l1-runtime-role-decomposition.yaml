# Post-2026-05-27 audit clarification: this ADR's "Yield/SuspendSignal
# coexistence" non_goal is reaffirmed by ADR-0137 (SuspendSignal
# canonical at the L1 vocabulary surface; InterruptSignal is a
# glossary synonym only). Per the 2026-05-22 expansion-proposal-response
# doc R9 and 29 active call-sites, SuspendSignal remains canonical;
# ADR-0112 Part A's proposed `Mono<StateDelta(InterruptSignal)>`
# direction is a runtime composition variant, not a vocabulary
# replacement.
context: |
  The 2026-05-21 proposal `docs/logs/reviews/2026-05-21-agent-service-l1-expansion-proposal.en.md`
  addresses agent-service concentration risk: today's module owns HTTP
  edge + tenant/idempotency filters + Run state machine + reference
  adapters + S2C reference impl + resilience + memory SPI + observability +
  controller autoconfiguration. The financial-readiness review's
  L1-P0-1 finding flagged the same concentration.

  The proposal decomposes agent-service into 5 logical components plus
  an engine sub-namespace, and introduces a new Run ‚Č§ Task ‚Č§ Session ‚Č§
  Memory lifecycle model. Three new SPIs (`StatelessEngine`,
  `ContextProjector`, `TaskStateStore`) extract concerns currently
  tangled in the runtime sub-package.

  Two proposal framings are explicitly rejected by this ADR:

  1. ¬ß5.1 "fully embed `a2a-java` SDK" ‚ÄĒ rejected because tight SDK
     coupling violates Rule R-D SPI purity and Rule R-A platform/
     business decoupling. A2A protocol alignment proceeds at the
     contract layer (`docs/contracts/`) without an SDK runtime
     dependency. A separate future ADR ratifies A2A contract envelope
     adoption.

  2. ¬ß2.3 / ¬ß5.3 "abandon exception-based suspension, switch to
     explicit Yield event" ‚ÄĒ rejected because `SuspendSignal` (checked
     exception) is a Tier-A competitive differentiator: (a) the Java
     compiler enforces caller-side handling, (b) Rule R-G ArchUnit
     tests rest on the checked-exception shape, (c) rc8/rc9
     cancellation paths use exception-flow semantics for cross-thread
     propagation. Counter-decision: coexistence ‚ÄĒ `Yield` becomes a
     new `HookPoint.ON_YIELD` cooperative-scheduling hint (engine asks
     to be rescheduled WITHOUT a state-machine transition), while
     `SuspendSignal` remains canonical for state-machine suspension.

  The proposal ¬ß3 development view declared Java packages under
  `com.huawei.ascend.agent.service‚Ä¶`. The current canonical corpus
  root is `com.huawei.ascend.service‚Ä¶`. This ADR documents the package-
  root migration decision (ADR-0104, executed in rc22.5) and uses the
  current root for rc22 itself, with forward-compatibility HTML
  comments (`<!-- root-migration-target: com.huawei.ascend -->`) on
  every documented package path.

decision: |
  Adopt the 5-component logical decomposition of agent-service:

    1. Polymorphic Dispatcher (sub-package `dispatcher/`) ‚ÄĒ unified
       entry point for both local function-call and remote bus-call
       invocations.
    2. Reactive Orchestrator (sub-package `orchestrator/`) ‚ÄĒ task tempo
       control, backpressure request handling, A2A protocol envelope
       packaging.
    3. Task Center (sub-package `task/`) ‚ÄĒ TaskControlState persistence
       (`Task` entity + `TaskRepository` SPI).
    4. Session Manager (sub-package `session/`) ‚ÄĒ middle/long-context
       data management; "context projection" toward compute nodes
       (`Session` entity + `ContextProjector` SPI).
    5. Execution Engine Adapter (sub-package `engine/adapter/`) ‚ÄĒ masks
       Workflow vs ReAct engine differences; pure-function compute
       injection. SPIs live in `engine/spi/`.

  Lifecycle hierarchy (W2 implementation, ADR-level ratification only
  in rc22):

    Run     ‚ÄĒ transient compute snapshot (compute pointer + delta).
    Task    ‚ÄĒ control state (done-or-not, why-stopped).
    Session ‚ÄĒ data context (what was discussed, variables).
    Memory  ‚ÄĒ knowledge state (who am I, rules) ‚ÄĒ consumed via
              `GraphMemoryRepository` SPI per ADR-0082.

  TaskID and SessionID are logically decoupled: one Session may
  concurrently execute multiple Tasks; one Task may drift across
  multiple Sessions (e.g., group-chat collaboration).

  Three new SPIs added to `module-metadata.yaml#spi_packages`:

    - `com.huawei.ascend.service.engine.spi.StatelessEngine` ‚ÄĒ
      pure-function `Execute(TaskMetadata, InjectedContext) ‚Üí
      StateDelta`. Engine holds no state; returns only state increment.
    - `com.huawei.ascend.service.session.spi.ContextProjector` ‚ÄĒ
      projects a `SessionContext` view from full Session history
      (truncation or summarization policy).
    - `com.huawei.ascend.service.task.spi.TaskStateStore` ‚ÄĒ
      TaskControlState persistence interface.

  AgentInvokeRequest contract: `Service` is the Read-Modify-Write
  closure boundary; Engine is the Pure-Function compute boundary.
  Wire shape: `docs/contracts/agent-invoke-request.v1.yaml` (status
  `design_only` at rc22; W2 implementation in rc24).

  Yield + SuspendSignal coexistence:

    - `SuspendSignal` (checked exception) remains canonical for
      state-machine suspension. Rule R-G + ArchUnit + cancellation
      flow intact.
    - `Yield` becomes a new `HookPoint.ON_YIELD` cooperative-
      scheduling hint. Engine asks orchestrator to be rescheduled
      without persistence transition. Added to
      `docs/contracts/engine-hooks.v1.yaml` in rc22.

  Implementation timeline:

    - rc22 (this ADR): ratification + ARCHITECTURE.md rewrite + SPI
      registration + 2 new contract YAMLs (agent-invoke-request,
      reflection-envelope) + engine-hooks ON_YIELD addition. No Java
      refactor.
    - rc22.5: package-root migration per ADR-0104.
    - rc23: Java sub-package split (move-only commit + ArchUnit
      boundary tests).
    - rc24: StatelessEngine / ContextProjector / TaskStateStore
      reference impls + AgentInvokeRequest runtime path.
    - rc25: Run‚Č§Task‚Č§Session Java entity types + Flyway migrations
      with RLS per Rule R-J.a.

non_goals: |
  - A2A SDK embedding (rejected at contract layer; separate ADR if
    ever reconsidered).
  - Replacement of SuspendSignal by Yield (rejected; coexistence
    locked).
  - Knowledge capability service implementation (deferred to W3+ per
    ADR-0103).
  - Re-introduction of `agent-runtime-core` (dissolved per ADR-0088;
    decomposition stays inside `agent-service`).

