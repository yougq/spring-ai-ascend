id: ADR-0084
title: "rc10 corpus truth + prevention widening: category-sweep follow-up to rc8 post-corrective review closing I-α + I-ε hidden defects (enforcer_rows + release-note graph counts + Helm/OpenAPI/BoM deleted-name leaks); Rule 91 strengthened + Rules 97 + 98 added"
status: accepted
date: 2026-05-19
level: L0
view: process
freeze_id: null

supersedes: []
extends:
  - ADR-0078
  - ADR-0082
  - ADR-0083
relates_to:
  - ADR-0066
  - ADR-0079

decision_one_liner: |
  Accept all 9 hidden defects surfaced by the category-driven re-audit of the
  rc8 post-corrective review's 8 cited findings (after rc9 closed them at
  the cited surfaces): strengthen Rule 91 to additionally enforce
  `baseline_metrics.enforcer_rows` against the live `^- id: E[0-9]+` count;
  add Rule 97 (`release_note_numeric_truth`) to enforce that the LATEST
  release note's absolute `<N> nodes` / `<M> edges` claims match the live
  `architecture-graph.yaml` header; add Rule 98
  (`broad_corpus_deleted_module_name_truth`) as a sibling to Rule 94 with
  widened file-discovery scope (ops/**/*.{yaml,yml,tpl},
  docs/contracts/*.yaml, **/module-metadata.yaml) to close the
  kernel-vs-implementation drift in Rule 94 (kernel said "every active
  `.md`, `.yaml`, `*.java` file"; implementation scanned only
  ARCHITECTURE.md + rule cards + test Javadocs).

context: |
  After rc9 (SHA 3ab9c0e, pushed to origin/main, green CI run 26055792484,
  branch protection live on main) closed all 8 findings of the rc8
  post-corrective architecture review (Codex, 2026-05-18;
  docs/reviews/2026-05-18-l0-rc8-post-corrective-architecture-review.en.md),
  the user requested a CATEGORY-DRIVEN re-audit: group the 8 findings into
  mechanistic defect families, then sweep each family across the current
  post-rc9 corpus for hidden defects rc9's prevention rules missed.

  The 8 cited findings group into 7 defect families by mechanism:

    I-alpha  Numeric-claim drift (declared prose != live source).
             rc9 closure: Rule 91 narrow to active_gate_checks only.
    I-beta   Orphan authority survives structural deletion.
             rc9 closure: Rule 93 + STATE.md archive + dfx/agent-platform.yaml delete.
    I-gamma  Active kernel overclaims behavior CLAUDE-deferred.md defers.
             rc9 closure: Rule 96 + Rule 42/46 kernel narrowing.
    I-delta  One-direction contract completeness gap.
             rc9 closure: Rule 95 + SkillCapacityRegistry catalogued.
    I-epsilon Deleted-module-name leakage.
             rc9 closure: Rule 94 (narrow scope).
    I-zeta   Multiple authorities disagree on the same contract scope.
             rc9 closure: Rule 89 narrowed across 4 surfaces.
    I-eta    Shadow generated corpus described as durable.
             rc9 closure: Rule 92 + orchestrator.sh comment fix.

  The category sweep across 7 parallel surfaces found two families with
  HIDDEN defects rc9's prevention missed:

    I-alpha-1  docs/governance/architecture-status.yaml:102 declared
               enforcer_rows: 116 ("rc8 baseline 104 + rc9 wave +12: E123-
               E134"). Live count of `^- id: E[0-9]+` in enforcers.yaml
               was 134 - an undeclared +18 had accreted across rc7/rc8/rc9
               CI defect closure waves. Rule 91 only checked active_gate_checks,
               so the drift was invisible.

    I-alpha-2  docs/releases/2026-05-19-l0-rc9-corrective.en.md:33 and :87
               declared "360 nodes / 510 edges" with delta "+12 nodes /
               +24 edges". Live architecture-graph.yaml header was 369 /
               520 with delta from rc8 baseline (348 / 486) of +21 / +34.
               Both absolute and delta arithmetic were wrong at rc9 write
               time. Rule 82 (baseline_metric_matches_executable_manifest)
               doesn't enumerate "nodes" or "edges" in its canonical-key
               list, so no rule caught the drift.

    I-epsilon-1  spring-ai-ascend-dependencies/module-metadata.yaml:9
                 BoM description: "pins agent-platform, agent-runtime, ..."
                 (current-tense, no historical marker).

    I-epsilon-2  ops/helm/spring-ai-ascend/values.yaml:7
                 `repository: springaiascend/agent-platform`.

    I-epsilon-3  ops/helm/spring-ai-ascend/templates/deployment.yaml:18
                 container `- name: agent-platform`.

    I-epsilon-4  ops/helm/spring-ai-ascend/Chart.yaml:3 and :9
                 description and keyword reference agent-platform.

    I-epsilon-5  docs/contracts/openapi-v1.yaml:287
                 `x-contract-owner: agent-platform`.

    I-epsilon-6  docs/contracts/openapi-v1.yaml:294 W1 note: "Integration
                 test: agent-platform RunCursorFlowIT...".

    I-epsilon-7  agent-service/src/test/resources/contracts/openapi-v1-
                 pinned.yaml:265 mirrored the live x-contract-owner field.

    I-epsilon-8  ops/compose.yml:1 + :26 service name agent-platform
                 (surfaced by Rule 98 self-validation during gate run).

  Rule 94's IMPLEMENTATION (gate/check_architecture_sync.sh:4527-4534) only
  scanned three surfaces: root ARCHITECTURE.md, docs/governance/rules/*.md
  (one level), and agent-*/src/test/java/**/*{Test,IT}.java. The rule body
  CLAIMED "every active `.md`, `.yaml`, and `*.java` file" but explicitly
  exempted docs/contracts/openapi-v1.yaml (with the inline comment "separate
  update plan; carries x-contract-owner metadata"), */src/test/resources/*,
  all docs/adr/* (legitimate), and several docs/ subtrees. The `ops/`
  directory was NEITHER in the exemption list NOR in the file-discovery
  scope - Rule 94 silently never scanned it. This kernel-vs-implementation
  drift was itself an undiscovered defect.

decision: |
  1. Strengthen Rule 91 in-place: add an `enforcer_rows` sub-check
     alongside the existing active_gate_checks check. Same enforcer pair
     (E123 + E124) covers both. The widening rationale is captured inline
     in the gate-script comment and in this ADR.

  2. Add Rule 97 (release_note_numeric_truth): scans the LATEST release
     note (lex-sort `find docs/releases -maxdepth 1 -name '*.md' | sort
     | tail -1`) for absolute `<N> nodes` and `<M> edges` claims; fails
     if they disagree with the live architecture-graph.yaml header values.
     Delta-formatted claims (`+N nodes / +M edges`) are exempt by syntax
     (the `+` prefix is the discriminator). Older release notes are
     auto-exempt as historical snapshots (each captured the count at its
     wave time). Lines containing the markers `historical`,
     `rc[N] snapshot`, `rc[N] correction`, `rc[N] first cut`,
     `rc[N] baseline`, `superseded`, `previous`, or `pre-rc[N]` within
     plus or minus 3 lines are exempt. Enforcer pair: E135 + E136.

  3. Add Rule 98 (broad_corpus_deleted_module_name_truth): sibling to
     Rule 94 with widened file-discovery scope - `ops/**/*.{yaml,yml,tpl}`,
     `docs/contracts/*.yaml`, `**/module-metadata.yaml` (excluding
     `target/`, `.git/`, `docs/archive/`). Same word-boundary regex
     `(^|[^a-zA-Z0-9_-])agent-platform([^a-zA-Z0-9_-]|$)` (and the
     parallel pattern for `agent-runtime` excluding `agent-runtime-core`).
     Same exemption-marker set as Rule 94 (`historical`,
     `pre-ADR-[0-9]+`, `pre-Phase-C`, `consolidated into`, ...,
     `forbidden_dependencies`). Enforcer pair: E137 + E138.

  4. Baseline metric updates in docs/governance/architecture-status.yaml:
     - active_engineering_rules_post_rc10: 53 (rc9 baseline 51 + Rules 97-98).
     - active_gate_checks: 110 (rc9 baseline 108 + 2 new sections).
     - gate_executable_test_cases: 165 (rc9 baseline 161 + 4 new fixtures).
     - enforcer_rows: 138 (live count 134 + 4 new rows E135-E138).
     - adr_count: 84 (rc9 baseline 83 + ADR-0084).
     - architecture_graph_nodes / _edges: remeasured at verification.

alternatives_considered: |
  Option A (rejected): widen Rule 94's file-discovery scope in-place
  instead of adding sibling Rule 98. Rejected because (a) it would lose
  the rc10 audit trail (no new enforcer pair to attribute the new
  coverage to a specific wave + ADR); (b) Rule 94's reviewer scope was
  deliberately narrow per the rc8 post-corrective review P1-3 reviewer
  language; widening silently would change what the rc8 reviewer
  originally signed off on. Sibling rule preserves the original Rule 94
  contract.

  Option B (rejected): merge Rule 97 + Rule 98 into a single
  "rc10 broad-corpus prevention" rule. Rejected because the two
  mechanisms (numeric drift vs deleted-name leakage) are unrelated and
  one rule one mechanism is the project convention. Two separate rules
  also allow independent self-test fixtures and independent enforcer
  attribution.

  Option C (rejected): Reframe the rc9 release note's "360 nodes /
  510 edges" claim as a frozen historical snapshot (add an `rc9
  snapshot` marker without correcting the number). Rejected because the
  release note is the most-recently-published authority and readers act
  on it; readers should see the correct numbers, with an inline
  `rc10 correction` marker for the historical context. This is the
  same pattern Rule 82 uses for "rc[N] baseline" markers.

consequences: |
  Positive:
    - The "release-note prose vs live source" axis is mechanically
      enforced for the most likely drift surface (graph node/edge counts).
    - The "deleted-module-name leakage" axis now covers operational
      infra (Helm, compose), live API contracts, and per-module
      metadata - the three surfaces rc9's Rule 94 silently didn't scan.
    - The kernel-vs-implementation drift in Rule 94 is documented and
      addressed via Rule 98 (sibling rule with the broader scope the
      kernel implied).
    - The single-source baseline-metrics enforcement is bidirectional
      for two more keys (enforcer_rows and graph node/edge counts).

  Negative:
    - Two more rules to maintain (Rules 97 + 98 cards, enforcer rows
      E135-E138, four new self-test fixtures). Total rule count moves
      from 51 to 53 active engineering rules and 108 to 110 gate
      sections.
    - Rule 98 partially duplicates Rule 94's regex + marker logic. A
      future consolidation (post-W2) could merge them into one rule
      with a config-driven file-discovery scope.
    - The rc9 release note now carries an inline `rc10 correction`
      marker. Future readers must read through to the marker to know
      the rc9 numbers were re-stated. The marker pattern is precedented
      by Rule 82's `rc[N] baseline` exemption used for similar
      prose-corrections in rc6 through rc8 waves.

  Neutral:
    - Older release notes (rc4 through rc8) keep their wave-time
      snapshot numbers; Rule 97 does NOT retrofit markers because each
      was correct at write time. This is the same design Rule 94 uses
      for docs/adr/* (frozen artifacts).

verification: |
  Standard verification set (per Rule 74, run on Linux/WSL preferred):

    python gate/build_architecture_graph.py  # byte-identical re-run
    bash gate/test_architecture_sync_gate.sh  # Tests passed: 165/165
    bash gate/check_architecture_sync.sh      # GATE: PASS
    bash gate/check_parallel.sh                # parallel_summary: executed 110 rules
    ./mvnw verify                              # 371 tests GREEN
    gh.exe run view <rc10-run-id>              # conclusion: success

