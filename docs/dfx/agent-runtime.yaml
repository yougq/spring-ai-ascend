# DFX (Design-for-X) declaration for the agent-runtime module.
#
# Required by CLAUDE.md Rule 32 — every module declared `kind: domain` MUST
# publish a DFX yaml covering all five dimensions.

module: agent-runtime
kind: domain
version: 1
generated_at: 2026-05-18

spi_packages:
  - com.huawei.ascend.runtime.engine.spi
  - com.huawei.ascend.runtime.engine.planner.spi          # rc43: Planner SPI per ADR-0126 (engine-side plan generator; Plan DAG feeds plan-projection.v1.yaml scheduler INPUT)

releasability:
  artifact_coords: "io.github.springai-ascend:agent-runtime"
  semver_policy: "0.x — engine SPI contract-frozen at L1 under .spi.*; envelope schema versioned via docs/contracts/engine-envelope.v1.yaml"
  deprecation_window: "two minor versions on SPI; one on non-SPI"
  packaging: "library jar consumed by agent-service (post-Phase-C consolidation of pre-Phase-C agent-runtime + agent-platform per ADR-0078)"

resilience:
  fallback_paths: []   # Rule 44 forbids fallback — engine mismatch fails closed
  posture_aware_defaults: "boot self-validation against engine-envelope.v1.yaml fails closed in research/prod; dev tolerates missing adapters with WARN"
  cancellation_contract: "EngineMatchingException → Run.FAILED with reason engine_mismatch (Rule 44)"
  reference_rule: "Rule 43 (Engine Envelope Single Authority) + Rule 44 (Strict Engine Matching)"

availability:
  health_endpoints:
    - "actuator health via boot.AgentRuntimeHealthIndicator — UP / OUT_OF_SERVICE (readiness gate closed) / DOWN (started handler reports unhealthy), one detail per agentId (Authority: ADR-0161)"
  readiness_signal: "boot.RuntimeReadiness gate owned by boot.AgentRuntimeLifecycle (SmartLifecycle phase 0): open only between AgentRuntimeHandler.start() of every registered handler and their reverse-order stop(); A2aAgentExecutor rejects executions retryable (RUNTIME_NOT_READY) while closed"
  startup_failure_modes:
    - "AgentRuntimeHandler.start() throws — context refresh aborts after rolling back already-started handlers (fail-fast; no serving-but-unready zombie)"

vulnerability:
  scan_tooling: "manual review at L1; automated CVE/SCA deferred per CLAUDE-deferred.md 32.d"
  tenant_isolation: "EngineEnvelope carries no tenant — tenant scope is enforced upstream by the orchestrator before dispatch"
  payload_integrity: "ExecutorDefinition is a sealed type per engine; pattern-matching restricted to EngineRegistry (Rule 43)"
  spi_purity: "com.huawei.ascend.runtime.engine.spi.* imports java.* + own spi siblings + agent-middleware SPI (HookPoint) + the neutral orchestration/engine SPI from agent-bus (bus.spi.engine for RunContext/ExecutorDefinition/SuspendSignal, re-homed there per ADR-0158). Spring / platform / impl / micrometer imports forbidden — enforced by E48 SpiPurityGeneralizedArchTest (the strict same-package-only test applies only to s2c.spi)"

observability:
  metric_namespace: "springai_ascend_engine_*"
  trace_carrier: "engine adapters propagate traceId from RunContext into HookContext"
  hook_emission_path: "every engine adapter MUST fire BEFORE_/AFTER_ hooks via HookDispatcher; W2 telemetry middleware listens (E80 RuntimeMiddlewareInterceptsHooksIT)"
  audit_trail: "engine_dispatched / engine_mismatch span events emitted at registry resolve"
  spi_packages:
    - "com.huawei.ascend.runtime.engine.spi"
    - "com.huawei.ascend.runtime.engine.planner.spi"
