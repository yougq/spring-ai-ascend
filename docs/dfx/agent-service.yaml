# DFX (Design-for-X) declaration for the agent-service module.
#
# Required by CLAUDE.md Rule 32 — every module declared `kind: domain` MUST
# publish a DFX yaml covering all five dimensions.
#
# Authority: ADR-0078 (agent-platform + agent-runtime merged into agent-service).
# Enforced by gate rule dfx_yaml_present_and_wellformed.

module: agent-service
kind: domain
version: 1
generated_at: 2026-05-18

spi_packages:
  - com.huawei.ascend.service.runtime.memory.spi
  - com.huawei.ascend.service.runtime.resilience.spi   # promoted per ADR-0080 (rc5 review P1-2 closure, 2026-05-18)
  - com.huawei.ascend.service.runtime.runs.spi          # rc13: RunRepository ownership consolidated here per ADR-0088

releasability:
  artifact_coords: "io.github.springai-ascend:agent-service"
  semver_policy: "0.x — SPI under com.huawei.ascend.service.runtime.*.spi.* is contract-frozen at L1; non-SPI (incl. service.platform.*) may change without major bump"
  deprecation_window: "two minor versions on SPI; one on non-SPI"
  packaging: "spring-boot-starter compatible jar; consumes BoM spring-ai-ascend-dependencies; subsumes prior agent-platform + agent-runtime artifacts"

resilience:
  fallback_paths: []
  posture_aware_defaults: "dev permissive; research/prod fail-closed at startup via PostureBootGuard (HTTP edge) AND in-memory reference impls (SyncOrchestrator/SequentialGraphExecutor/IterativeAgentLoopExecutor/InMemoryRunRegistry/InMemoryCheckpointer) call AppPostureGate.requireDevForInMemoryComponent — research/prod fail-closed via IllegalStateException"
  cancellation_contract: "POST /v1/runs/{id}/cancel; idempotent terminal->terminal returns 200; illegal transitions return 409 (E24). RunStateMachine DFA (Rule 20) — PENDING/RUNNING/SUSPENDED -> CANCELLED legal; terminal -> 409"
  reference_rule: "Rule 20 (Run state transitions) — active; CLAUDE.md Rule 7 (Resilience Must Not Mask Signals) — deferred to W2 alongside first soft-fallback; Rule 23 (suspension atomicity) — deferred to W2"

availability:
  health_endpoints:
    - "GET /v1/health — liveness; JSON {status, sha, db_ping_ns, ts}"
  readiness_signal: "deferred to W2 (depends on durable IdempotencyStore + Postgres readiness); library-internal readiness is the union of dependent beans (Orchestrator + RunRepository + Checkpointer)"
  startup_failure_modes:
    - "research/prod posture with @RequiredConfig field missing -> IllegalStateException (E21)"
    - "research/prod posture with idempotency in-memory bean -> IllegalStateException (E22)"
    - "research/prod posture instantiating an in-memory reference impl -> IllegalStateException (Gate Rule 12 inmemory_orchestrator_posture_guard_present)"
    - "Run.withStatus illegal transition -> IllegalStateException (Rule 20, E23)"

vulnerability:
  scan_tooling: "manual review at L1; automated CVE/SCA scanner deferred per CLAUDE-deferred.md 32.d"
  auth_surface: "JWT RS256 with iss/aud/exp/nbf/clock-skew validation (E9)"
  tenant_isolation: "X-Tenant-Id header + JWT tenant_id claim cross-check at filter chain (E10); MDC tenant_id populated; RunContext.tenantId() is the sole tenant carrier inside runtime code; cross-package import forbidden by ArchUnit Rule 21 (E2) — retargeted to com.huawei.ascend.service.runtime.* MUST NOT import com.huawei.ascend.service.platform.*"
  secret_handling: "no AKIA/sk-/BEGIN PRIVATE KEY patterns in tracked files (E20 gate-rule no_secret_patterns)"
  payload_integrity: "InMemoryCheckpointer enforces §4 #13 16-KiB inline cap (E11); PayloadCodec discipline (Rule 22) deferred to W2"
  spi_purity: "com.huawei.ascend.service.runtime.*.spi.* packages import only java.* (E3, generalized by E48 SpiPurityGeneralizedArchTest) — retargeted from prior com.huawei.ascend.runtime.*.spi.* base"

observability:
  metric_namespace: "springai_ascend_* (E18 gate-enforced)"
  high_cardinality_protection: "TenantTagMeterFilter strips tenant_id from raw meter tags (E19 high_cardinality_tag_guard) — Wave 4 Track D ships the merged-module wiring"
  trace_propagation: "TraceExtractFilter at filter-order 10 extracts/originates W3C traceparent; emits traceresponse on outbound (E41)"
  log_field_shape: "MDC carries tenant_id + trace_id + span_id during request scope (E42)"
  trace_carrier: "TraceContext SPI in com.huawei.ascend.service.runtime.orchestration.spi (default NoopTraceContext); RunContext exposes traceId()/spanId()/sessionId()/traceContext() (E39 RunContextIdentityAccessorsTest)"
  hook_emission_path: "every LLM call, tool call, lifecycle boundary MUST flow through HookChain (Rule 19, deferred W2; ArchUnit LlmGatewayHookChainOnlyTest active and vacuous today per E43)"
  audit_trail: "run_state_change audit row deferred to W2 (Rule 24); Rule 24.c log-only at W1 — Wave 4 Track C will ship the logging path"
  api_contract_surface: "OpenAPI snapshot pinned at docs/contracts/openapi-v1.yaml (E25); live-vs-snapshot drift detected by E36"
