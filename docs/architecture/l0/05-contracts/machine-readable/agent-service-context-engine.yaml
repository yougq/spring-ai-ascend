contract: AgentService-ContextEngine
status: draft
provider: ContextEngineCapability
consumer: AgentService
operation: buildContextPackage
description: "根据 Session、Memory、Retriever、Vector 和 prompt variables 构建上下文包。"
request:
  required:
    - tenantId
    - taskId
    - sessionId
    - contextNeed
    - traceContext
  optional:
    - runId
    - memoryCategories
    - retrievalQueryRef
    - promptTemplateRef
response:
  oneOf:
    - ContextPackageBuilt
    - ContextUnavailable
    - ContextDenied
state:
  session_owner: AgentService
  memory_owner: AgentMiddleware
  context_package_owner: ContextEngineCapability
idempotency:
  key: tenantId + sessionId + contextNeed + contextVersion
retry:
  owner: AgentService
errors:
  retryable:
    - RETRIEVAL_TIMEOUT
    - MEMORY_TEMPORARY_UNAVAILABLE
  non_retryable:
    - SESSION_NOT_FOUND
    - MEMORY_CATEGORY_FORBIDDEN
observability:
  required_fields:
    - tenantId
    - traceId
    - taskId
    - sessionId
    - contextVersion
  compatibility_fields:
    - runId
security:
  required_context:
    - tenantId
compatibility:
  additive_sources_allowed: true
  breaking_schema_change_requires_adr: true
contract_tests:
  - context_package_has_tenant_scope
  - same_input_same_projection_metadata
  - forbidden_memory_category_rejected
