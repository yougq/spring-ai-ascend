contract: Workflow-Observability
status: draft
provider: ObservabilityCapability
consumer: Workflow
operation: emitRuntimeEvidence
description: "记录 Task、tool、suspend/resume 和 audit 的可验证事件；Run 只作为兼容关联字段。"
request:
  required:
    - tenantId
    - traceId
    - taskId
    - eventType
    - occurredAt
  optional:
    - runId
    - spanId
    - actorId
    - fromStatus
    - toStatus
    - reason
response:
  oneOf:
    - EmissionAccepted
    - EmissionRejected
state:
  observability_owner: ObservabilityCapability
  may_mutate_task_state: false
idempotency:
  key: tenantId + traceId + taskId + eventType + occurredAt
retry:
  owner: ObservabilityCapability
errors:
  retryable:
    - SINK_TEMPORARY_UNAVAILABLE
  non_retryable:
    - SCHEMA_INVALID
observability:
  required_fields:
    - tenantId
    - traceId
    - taskId
    - eventType
  compatibility_fields:
    - runId
security:
  replay_requires_tenant_match: true
compatibility:
  additive_event_fields_allowed: true
  event_variant_removal_requires_adr: true
contract_tests:
  - task_created_trace_present
  - suspend_resume_trace_sequence
  - tool_denied_audit_present
