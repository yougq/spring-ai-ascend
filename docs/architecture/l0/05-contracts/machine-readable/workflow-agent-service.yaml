contract: Workflow-AgentService
status: draft
provider: AgentService
consumer: Workflow
operation: executeTaskTransition
description: "Workflow 发起执行和状态转换意图，AgentService TaskStateStore / controlled lifecycle entry 作为唯一 Task State writer；RunRepository 仅为实现兼容名。"
request:
  required:
    - tenantId
    - taskId
    - transitionIntent
    - traceContext
  optional:
    - runId
    - checkpointRef
    - resumePayloadRef
response:
  oneOf:
    - TransitionCommitted
    - TransitionRejected
    - Suspended
    - Terminal
state:
  only_writer: TaskStateStore
  workflow_may_write_task_state: false
  run_repository_is_compatibility_alias: true
idempotency:
  key: tenantId + taskId + transitionIntent + commandId
retry:
  owner: Workflow
  invalid_transition_retryable: false
errors:
  retryable:
    - CHECKPOINT_TEMPORARY_UNAVAILABLE
  non_retryable:
    - ILLEGAL_STATE_TRANSITION
    - ENGINE_MISMATCH
observability:
  required_fields:
    - tenantId
    - traceId
    - taskId
    - fromStatus
    - toStatus
  compatibility_fields:
    - runId
security:
  tenant_source: TaskContext_or_RunContext_compatibility
compatibility:
  state_machine_change_requires_adr: true
contract_tests:
  - valid_transition_commits_once
  - invalid_transition_rejected
  - suspend_persists_checkpoint_first
