# AgentDefinition schema, version 1.
#
# Authority: ADR-0128 (Agent first-class entity SPI).
# Wave: rc43 Wave B5.
#
# Java record com.huawei.ascend.service.agent.spi.AgentDefinition
# mirrors this schema and validates required fields on construction.

product_claim: "PC-001"

schema: agent-definition/v1
status: design_only
runtime_enforced: false
authority: ADR-0128
promotion_trigger: "First production AgentRegistry implementation (W3 SDK GA)"

agent_definition:
  required_fields:
    - agentId            # stable per-tenant identity
    - tenantId           # Rule R-C.c
    - displayName
    - description
    - modelBinding       # ModelRef { modelGatewayId }
    - toolBindings       # Set<SkillRef { skillKey }>
    - memoryBindings     # Map<MemoryCategory, MemoryRef { memoryId, category }>
    - systemPrompt
    - safetyPolicy       # SafetyPolicy
    - metadata           # map<string, any>
  optional_fields:
    - plannerBinding     # Optional<PlannerRef { plannerId }>
    - advisorBindings    # list<AdvisorBinding>; default empty; resolved by advisorName

advisor_binding:
  required_fields:
    - advisorName        # string, non-blank; resolves ChatAdvisor / StreamingChatAdvisor bean or registry entry
    - mode               # SYNC | STREAMING | BOTH
    - orderOverride      # Optional<int>; per-agent ordering override when present
    - metadata           # map<string, any>
  spi_purity: "same-package carrier under service.agent.spi; no dependency on middleware.advisor.spi"

safety_policy:
  required_fields:
    - placeholderPolicy  # PRESERVE | WARN | REWRITE per ADR-0051
    - deniedSkillKeys    # set<string>
    - deniedMemoryRefs   # set<string>
    - outputPolicy       # OutputContentPolicy

output_content_policy:
  required_fields:
    - redactPiiCategories # set<string> (EMAIL | PHONE | SSN | CREDIT_CARD | ...)
    - maxOutputChars      # -1 = unbounded

agent_invocation:
  required_fields:
    - tenantId
    - agentId
    - userMessage
    - conversationId     # Optional<string> for episodic memory grouping
    - context            # map<string, any>

agent_response:
  required_fields:
    - assistantMessage
    - toolCalls          # list<ToolCall> (from model-invocation.v1.yaml)
    - traceId
    - runId              # Optional<string> when escalated to Orchestrator
  optional_fields:
    - usage              # aggregate ModelUsage

agent_to_agent:
  composition: "Agent invoked as a Skill via SkillKind.AGENT_AS_TOOL referencing AgentRef { tenantId, agentId }"
  authority: ADR-0100

execution_routing:
  short_lived: "Agent.invoke(AgentInvocation) — synchronous request/response"
  long_lived:  "Orchestrator.run(runId, tenantId, ExecutorDefinition, payload) where ExecutorDefinition is derived from AgentDefinition via AgentExecutorDefinitionFactory (Wave C1)"
