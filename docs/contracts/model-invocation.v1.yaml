# ModelInvocation / ModelResponse schema, version 1.
#
# Authority: ADR-0121 (ModelGateway SPI).
# Wave: rc43 Wave B1.
#
# This file is the single source of truth for the shape of a
# ModelInvocation request and a ModelResponse reply. The Java
# records com.huawei.ascend.middleware.model.spi.ModelInvocation
# and ModelResponse mirror this schema and validate required
# fields on construction.
#
# Hook binding per ADR-0073: HookPoint.BEFORE_LLM fires with
# ModelInvocation; HookPoint.AFTER_LLM fires with ModelResponse.
# Hooks may short-circuit per the existing HookOutcome contract.

schema: model-invocation/v1
status: design_only
runtime_enforced: false
authority: ADR-0121
promotion_trigger: "First production ModelGateway implementation (W2 LLM gateway)"

model_invocation:
  required_fields:
    - tenantId           # string, non-blank, Rule R-C.c
    - modelId            # string, non-blank, e.g. "openai/gpt-4o-mini"
    - messages           # list<Message>, non-empty
    - tools              # list<string>, may be empty (SkillRef.skillKey references per Wave B2)
    - parameters         # map<string, any>, provider-orthogonal hints
    - hookContext        # map<string, any>, may be empty
  message_kinds:
    - SystemMessage
    - UserMessage
    - AssistantMessage   # also carries toolCalls list
    - ToolResultMessage  # carries callId + content

model_response:
  required_fields:
    - content            # string, may be empty when only toolCalls emitted
    - toolCalls          # list<ToolCall>, may be empty
    - finishReason       # enum: stop | length | tool_calls | content_filter | other
    - metadata           # map<string, any>
  optional_fields:
    - usage              # ModelUsage record (promptTokens, completionTokens, totalTokens)

tool_call:
  required_fields:
    - callId             # unique within response
    - skillKey           # references SkillRef.skillKey
    - arguments          # JSON-encoded argument blob

# Reference adapter target: SpringAiChatModelGateway (Wave C1),
# wrapping org.springframework.ai.chat.model.ChatModel per ADR-0125.
