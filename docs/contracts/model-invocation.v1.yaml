# ModelInvocation / ModelResponse schema, version 1.
#
# Authority: ADR-0121 (ModelGateway SPI).
# Wave: rc43 Wave B1.
#
# This file is the single source of truth for the shape of a
# ModelInvocation request and a ModelResponse reply. The Java
# records com.huawei.ascend.middleware.model.spi.ModelInvocation
# and ModelResponse mirror this schema and validate required
# fields on construction.
#
# Hook binding per ADR-0073: HookPoint.BEFORE_LLM fires with
# ModelInvocation; HookPoint.AFTER_LLM fires with ModelResponse.
# Hooks may short-circuit per the existing HookOutcome contract.

product_claim: "PC-003|PC-004"

schema: model-invocation/v1
status: design_only
runtime_enforced: false
authority: ADR-0121
promotion_trigger: "First production ModelGateway implementation (W2 LLM gateway)"

model_invocation:
  required_fields:
    - tenantId           # string, non-blank, Rule R-C.c
    - modelId            # string, non-blank, e.g. "openai/gpt-4o-mini"
    - messages           # list<Message>, non-empty
    - tools              # list<string>, may be empty (SkillRef.skillKey references per Wave B2)
    - parameters         # map<string, any>, provider-orthogonal hints
    - hookContext        # map<string, any>, may be empty
  message_kinds:
    - SystemMessage
    - UserMessage
    - AssistantMessage   # also carries toolCalls list
    - ToolResultMessage  # carries callId + content

model_response:
  required_fields:
    - content            # string, may be empty when only toolCalls emitted
    - toolCalls          # list<ToolCall>, may be empty
    - finishReason       # ModelFinishReason enum: stop | length | tool_calls | content_filter | other
    - metadata           # map<string, any>
  optional_fields:
    - usage              # ModelUsage record (promptTokens, completionTokens, totalTokens)

tool_call:
  required_fields:
    - callId             # unique within response
    - skillKey           # references SkillRef.skillKey
    - arguments          # JSON-encoded argument blob

# Reference adapter target: SpringAiChatModelGateway (Wave C1),
# wrapping org.springframework.ai.chat.model.ChatModel per ADR-0125.

# ---------------------------------------------------------------------
# Tool-call iteration loop (ADR-0134)
#
# Two supported execution modes for the LLM <-> tool <-> LLM iteration:
#
#   agent_driven_loop:
#     The platform re-invokes the ModelGateway with growing message
#     history. Each iteration:
#       1. ModelGateway.invoke(invocation) returns ModelResponse with
#          finishReason ModelFinishReason.TOOL_CALLS and a non-empty toolCalls list.
#       2. Platform dispatches each ToolCall to Skill.execute(...).
#       3. Each SkillResult becomes a ToolResultMessage appended to
#          the next invocation's messages.
#       4. Loop terminates when finishReason is one of {STOP, LENGTH,
#          CONTENT_FILTER, OTHER} OR a configured max-iteration cap
#          fires (default: 10). Provider-native strings MUST be parsed
#          into ModelFinishReason before entering the SPI surface.
#
#   planner_driven_dispatch:
#     The platform invokes Planner.plan(...) to obtain a Plan DAG,
#     then dispatches plan.steps individually through Skill.execute
#     and Plan-projection scheduling. ModelGateway is NOT re-invoked
#     in a loop; the Plan owns iteration shape.
#
# AgentDefinition picks one mode per agent. Default: agent_driven_loop.
# Authority: ADR-0134. Status: design_only.

tool_call_loop:
  status: design_only
  authority: ADR-0134
  promotion_trigger: "First production AgentDefinition that dispatches tool calls (W2 tool-loop wave)"
  modes:
    - id: agent_driven_loop
      iteration_owner: ModelGateway
      termination_signals:
        - "finishReason in {STOP, LENGTH, CONTENT_FILTER, OTHER}"
        - "configured max-iteration cap (default 10)"
      message_accumulation: "append ToolResultMessage for each ToolCall before next invoke"
    - id: planner_driven_dispatch
      iteration_owner: Planner
      termination_signals:
        - "Plan has no further dependencies"
        - "PlanStep returns SkillError or budget exhaustion"
      message_accumulation: "Plan steps; ModelGateway not re-invoked in loop"
  default_mode: agent_driven_loop
  per_agent_override: "AgentDefinition.metadata key 'tool-call-loop-mode'"
