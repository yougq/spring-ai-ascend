# ChatAdvisor / AdvisedRequest / AdvisedResponse schema, version 1.
#
# Authority: ADR-0132 (Chat Advisor SPI).
#
# This file is the single source of truth for the shape of an
# advised model-call envelope. The Java types
# com.huawei.ascend.middleware.advisor.spi.ChatAdvisor,
# StreamingChatAdvisor, AdvisedRequest, AdvisedResponse,
# AdvisedStreamChunk, AdvisorChain, and StreamingAdvisorChain mirror
# this schema and validate required fields on construction.
#
# Hook binding per ADR-0073 / ADR-0121 / ADR-0129: sequence
# advisor-model-hook-order/v1 is the single source for advisor
# placement relative to BEFORE_LLM and AFTER_LLM:
#   1. AgentDefinition.advisorBindings resolve ordered advisors.
#   2. ModelInvocation translates to AdvisedRequest.modelRequest.
#   3. BEFORE_LLM fires with the canonical ModelInvocation payload.
#   4. ChatAdvisor / StreamingChatAdvisor chain wraps the provider call.
#   5. Terminal chain step invokes ModelGateway.invoke/stream.
#   6. Outbound advisors produce AdvisedResponse.modelResponse.
#   7. AFTER_LLM fires with the final translated ModelResponse.
# HookDispatcher is platform-internal — Audience B composes
# advisors at AgentDefinition time but never imports
# HookDispatcher directly.

schema: chat-advisor/v1
status: design_only
runtime_enforced: false
authority: ADR-0132
promotion_trigger: "First production ChatAdvisor binding (W2 LLM gateway wave + Telemetry Vertical per ADR-0061 §7)"

chat_advisor:
  required_methods:
    - advisorName       # non-blank string
    - order             # int; Integer.MAX_VALUE is lowest precedence
    - aroundCall        # AdvisedRequest, AdvisorChain -> AdvisedResponse
streaming_chat_advisor:
  required_methods:
    - advisorName       # non-blank string
    - order             # int; same ordering semantics as ChatAdvisor
    - aroundStream      # AdvisedRequest, StreamingAdvisorChain -> Stream<AdvisedStreamChunk>
advised_request:
  required_fields:
    - tenantId          # non-blank (Rule R-C.c)
    - modelRequest      # AdvisedModelRequest; typed same-package request payload
    - advisorContext    # map<string, any>; mutable across chain but immutable per envelope
advised_response:
  required_fields:
    - tenantId
    - modelResponse     # AdvisedModelResponse; typed same-package response payload
    - advisorContext
advised_model_request:
  required_fields:
    - modelId           # non-blank model gateway id
    - messages          # non-empty list<AdvisedMessage>
    - tools             # list<skillKey>
    - parameters        # map<string, any>
    - hookContext       # map<string, any>
advised_message:
  role_values: [system, user, assistant, tool]
  required_fields:
    - role              # AdvisedMessageRole
    - content           # string, non-null
    - toolCalls         # list<AdvisedToolCall>; assistant only
    - toolCallId        # Optional<string>; tool role only
advised_model_response:
  required_fields:
    - content           # assistant text, non-null
    - toolCalls         # list<AdvisedToolCall>
    - finishReason      # STOP | LENGTH | TOOL_CALLS | CONTENT_FILTER | OTHER
    - usage             # Optional<AdvisedUsage>
    - metadata          # map<string, any>
advised_tool_call:
  required_fields: [callId, skillKey, arguments]
advised_usage:
  required_fields: [promptTokens, completionTokens, totalTokens]
advisor_chain:
  required_methods:
    - next              # AdvisedRequest -> AdvisedResponse; each call advances exactly one chain step
streaming_advisor_chain:
  required_methods:
    - proceed           # AdvisedRequest -> Stream<AdvisedStreamChunk>
advised_stream_chunk:
  variants:
    - ContentDelta      # deltaText
    - ToolCallDelta     # callId, skillKey, argumentsDelta
    - Complete          # finalResponse: AdvisedResponse
  ordering: "successful streams emit exactly one Complete and it is last; cancellation may omit Complete; provider errors surface as exceptions"

binding:
  sequence_id: advisor-model-hook-order/v1
  agent_definition_field: advisorBindings
  adapter: com.huawei.ascend.middleware.advisor.adapter.AdvisedModelEnvelopeAdapter
  order: "bindings resolve advisors by name; smaller effective order runs first inbound and last outbound"
  hook_dispatcher_visibility: "platform-internal; not exposed to Audience B"
