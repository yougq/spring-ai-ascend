# Engine Lifecycle Hooks schema, version 1.
#
# Authority: ADR-0073 (Engine Hooks + Runtime Middleware).
# Wave: W2.x Phase 2.
# Driver review: docs/logs/reviews/2026-05-15-l0architecture-lucio It-wave-1-supplement-runtime-engine-contract.en.md (proposal §5).
#
# This file is the SINGLE SOURCE OF TRUTH for the canonical hook surface.
# The Java enum com.huawei.ascend.middleware.spi.HookPoint mirrors the `hooks:`
# list (one enum constant per ordered entry). Gate Rule 57 cross-checks the
# two sides at build time so the schema and code never drift.
#
# NOTE (2026-05-17 six-module materialization PR): the enum was moved from
# com.huawei.ascend.runtime.orchestration.spi.HookPoint to
# com.huawei.ascend.middleware.spi.HookPoint along with the entire middleware
# SPI surface. The schema (this file) is unchanged; only the Java location
# moved. Gate Rule 57 implementation already follows the new path.
#
# Self-enforced by gate Rule 57 (engine_hooks_yaml_present_and_wellformed).

product_claim: "PC-004"

schema: engine-hooks/v1
authority: ADR-0073
# Post-review status label (plan G / §5 overdesign labels). Phase 2 ships
# hook DELIVERY runtime-enforced; outcome consumption (Fail -> Run.FAILED,
# ShortCircuit -> engine bypass) is design_only at W2.x and deferred to W2
# Telemetry Vertical per CLAUDE-deferred.md 45.b.
status: runtime_enforced  # delivery
outcome_consumption_status: design_only  # deferred to W2 per 45.b

# Canonical hook list. Order is significant — registered middlewares fire in
# the order declared here for `before_*` hooks; `after_*` hooks fire in
# reverse registration order so an outermost middleware can clean up after an
# innermost one (LIFO unwind). HookDispatcher enforces this.
hooks:
  - before_llm_invocation
  - after_llm_invocation
  - before_tool_invocation
  - after_tool_invocation
  - before_memory_read
  - after_memory_write
  - before_suspension
  - before_resume
  - on_error
  # rc22 / ADR-0100: cooperative-scheduling hint for Yield/SuspendSignal
  # coexistence. Engine asks orchestrator to be rescheduled WITHOUT a
  # state-machine transition (distinct from SuspendSignal which remains
  # canonical for state-machine suspension).
  - on_yield

ordering: declared

# ---------------------------------------------------------------------------
# failure_propagation: TARGET semantics (deferred outcome consumption).
#
# IMPORTANT (rc2 truth alignment, P0-2):
#   The block below describes the TARGET behavior that activates when
#   HookOutcome consumption lands in W2 Telemetry Vertical per Rule R-M.c.b (formerly Rule 45.b).
#   At W2.x Phase 2 / v2.0.0-rc2 the dispatcher fires hooks and returns
#   outcomes, BUT the SyncOrchestrator DISCARDS the returned HookOutcome at
#   every call-site (see SyncOrchestrator class Javadoc). Run-state effects
#   described here (Fail -> Run.FAILED, ShortCircuit -> engine bypass) do
#   NOT happen today.
#
#   The "fail_fast" semantics today apply only INSIDE the dispatcher chain
#   (a non-Proceed outcome stops subsequent middlewares from firing for the
#   same HookPoint in the same fire() call). The Run lifecycle is unaffected.
# ---------------------------------------------------------------------------
failure_propagation:
  # TARGET (Rule R-M.c.b, formerly Rule 45.b; W2 Telemetry Vertical): a middleware that returns
  # HookOutcome.Fail aborts the dispatch chain; subsequent hooks at the same
  # point are not fired; the Run transitions to FAILED with the middleware-
  # declared reason. TODAY: only the chain-abort half is wired;
  # Run.FAILED transition is deferred.
  default: fail_fast
  # TARGET (Rule R-M.c.b, formerly Rule 45.b): on_error never fail-fasts (failing inside an error
  # handler would mask the original error). It always fires the full chain
  # and aggregates outcomes via "first non-Proceed wins". TODAY: outcomes
  # from on_error are likewise discarded by the orchestrator.
  per_hook:
    on_error: best_effort

# Phase 2 wiring scope (ADR-0073):
#   At W2.x the SyncOrchestrator fires only the three "structural" hooks —
#   on_error, before_suspension, before_resume — because those are the
#   points the current code already has natural call-sites for. The
#   remaining six (LLM × 2, tool × 2, memory × 2) require engine-side
#   firing and land in W2 Telemetry Vertical alongside the first consumer
#   middlewares (TokenCounterHook, PiiRedactionHook, CostAttributionHook,
#   LlmSpanEmitterHook).
phase_2_mandatory_hooks_fired_by_orchestrator:
  - on_error
  - before_suspension
  - before_resume

# Strict-surface boundary (proposal §5.4):
#   Engines MUST NOT depend on concrete middleware implementations. The
#   only dependency direction is engine → HookPoint (the enum) and
#   engine → HookDispatcher.fire(...). Middlewares depend on HookPoint +
#   HookContext + HookOutcome. The bridge is EngineRegistry's accessor to
#   HookDispatcher; engines never reach for middleware classes directly.

# Hook ownership map (Phase 7 audit clarification — Rule R-M.c (formerly Rule 45) / L-5 in
# `D:/.claude/plans/spi-atomic-willow.md`).
#
# The nine canonical HookPoints split into two ownership classes:
#
#   runtime_fired — fired by the Orchestrator regardless of which engine
#     executes. These are present on every engine implicitly and engines
#     NEED NOT declare them in their EngineHookSurface.supportedHooks().
#     SyncOrchestrator.executeLoop() fires these at call-sites every engine
#     path passes through (suspend/resume/error).
#
#   engine_fired — fired by the engine's own execute() at its internal
#     LLM/tool/memory call-sites. The engine MUST declare these in
#     EngineHookSurface.supportedHooks(). Reference executors at W2.x return
#     empty() because they delegate to user lambdas without introspecting
#     these events; W2 production engines fire them explicitly.
#
# Gate Rule 57 continues to validate the `hooks:` list ↔ HookPoint enum;
# this `hook_ownership:` block is supplementary metadata.
hook_ownership:
  runtime_fired:
    - on_error
    - before_suspension
    - before_resume
  engine_fired:
    - before_llm_invocation
    - after_llm_invocation
    - before_tool_invocation
    - after_tool_invocation
    - before_memory_read
    - after_memory_write
