# VectorStore / Retriever / EmbeddingModel schema, version 1.
#
# Authority: ADR-0124 (Vector/Retrieval/Embedding SPI) + ADR-0125
# (Spring AI canonical boundary).
# Wave: rc43 Wave B4.
#
# This file covers all three RAG primitives because their shapes
# are interlinked at the contract level.

schema: vector-store/v1
status: design_only
runtime_enforced: false
authority: ADR-0124
promotion_trigger: "First production VectorStore implementation (W3 RAG vertical)"

vector_store:
  surface: com.huawei.ascend.middleware.vector.spi.VectorStore
  required_methods:
    - "add(tenantId, List<Document>)"
    - "delete(tenantId, List<String> documentIds)"
    - "similaritySearch(tenantId, VectorQuery) -> List<VectorMatch>"

document:
  required_fields:
    - documentId
    - content
    - metadata           # map<string, any>
  optional_fields:
    - embedding          # float[]; null = store embeds via configured EmbeddingModel

vector_query:
  required_fields:
    - topK               # > 0
    - similarityThreshold # [0.0, 1.0]
    - providerHints      # map<string, any>
  one_of:
    - queryText          # provider re-embeds with configured EmbeddingModel
    - queryEmbedding     # pre-computed float[]
  optional_fields:
    - filter             # provider-interpreted metadata filter expression
    - embeddingModelVersion  # hint; mismatch returns empty per ADR-0124

retriever:
  surface: com.huawei.ascend.middleware.retrieval.spi.Retriever
  required_methods:
    - "retrieve(tenantId, query, RetrievalOptions) -> List<Document>"
  composition: "Composes one or more VectorStore(s) + optional keyword / reranker layers"
  retrieval_options:
    required_fields:
      - topK
      - scoreThreshold
      - providerHints
    optional_fields:
      - filter

embedding_model:
  surface: com.huawei.ascend.middleware.embedding.spi.EmbeddingModel
  required_methods:
    - "embed(tenantId, text) -> Embedding"
    - "embedAll(tenantId, List<String>) -> List<Embedding>"
    - "modelVersion() -> String"
    - "dimensionality() -> int"
  metadata_link: "modelVersion() feeds MemoryMetadata.embeddingModelVersion per ADR-0123"

# Reference adapters (Wave C1) decorate Spring AI types per ADR-0125:
#   SpringAiVectorStore       wraps org.springframework.ai.vectorstore.VectorStore
#   SpringAiDocumentRetriever wraps Spring AI's document retriever
#   SpringAiEmbeddingModel    wraps org.springframework.ai.embedding.EmbeddingModel
