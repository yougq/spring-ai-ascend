# Federation Envelope schema, version 1.
#
# Authority: ADR-0101 (rc22) + future ADR-0106 (rc26 — Federation Hub broker choice).
# Wave: design_only at rc26; runtime impl follows broker technology choice.
#
# Purpose: cross-network wire shape for Mode B Business-Centric
# federation. Wraps the existing ingress-envelope.v1.yaml shape with
# federation routing metadata.

product_claim: "PC-002"

schema: federation-envelope/v1
authority: ADR-0101
status: design_only
runtime_enforced: false
promotion_trigger: Federation Hub broker choice ADR ratified (deferred per ADR-0101 §non_goals).

# Routing semantics
routing:
  source_plane: bus_state          # business-side bus shim
  carrier: network                  # actual broker protocol (Kafka / NATS / HTTP — deferred)
  destination_plane: bus_state      # platform Federation Hub
  delivery_track: data              # standard ingress; control-track for federation control messages

# Field definitions
fields:
  federation_request_id:
    type: string
    format: uuid
    required: true
    description: Unique identifier for this federated request.
  business_region_id:
    type: string
    required: true
    description: Identifier of the business-side deployment region emitting this request.
  ingress_envelope:
    type: object
    required: true
    schema: docs/contracts/ingress-envelope.v1.yaml
    description: The wrapped ingress envelope; unchanged shape across the federation boundary.
  trust_anchor_signature:
    type: string
    required: true
    description: Signature over the envelope using the business region's trust anchor key.
  emitted_at:
    type: string
    format: iso_datetime
    required: true
  deadline:
    type: string
    format: iso_datetime
    required: false

# Backward / forward compatibility
schema_evolution:
  policy: additive_only
  version_in_envelope: false  # version in schema name

# Cross-references
cross_references:
  - docs/contracts/ingress-envelope.v1.yaml  # wrapped envelope
  - docs/governance/deployment-loci.yaml      # business_centric locus defines federation requirement
  - docs/governance/bus-channels.yaml         # delivery track assignment

# Non-goals
non_goals: |
  - Specifying broker technology (Kafka, NATS, in-house) — deferred to ADR-0106.
  - Cross-business-region routing (federation is one-direction edge → platform; peer-to-peer federation deferred).
  - Identity federation (uses static trust anchor signatures; OIDC / SPIFFE federation deferred).
