# EnginePort wire contract — the transport-agnostic Service-to-Engine boundary, v1.
#
# Authority: ADR-0158 (Engine Boundary / EnginePort). Wave: design_only.

product_claim: "PC-004"

schema: engine-port/v1
authority: ADR-0158
status: design_only
runtime_enforced: false

# The Service drives an engine through EnginePort. In-process (co-deployed service+engine,
# or SDK-embedded) the Java interface com.huawei.ascend.bus.spi.engine.EnginePort IS the
# contract (direct call). Networked the operations below are carried over internal RPC
# (engines you own) or A2A (external / federated agents); this schema is the neutral wire
# shape both transports mirror. The Java interface and this YAML are kept in lockstep.

operations:
  execute:
    description: "Start or resume an execution leg of a run."
    request:
      runId: string                # required — correlation id
      engineType: string           # required — resolved from the definition; strict matching, no fallback
      definitionRef: string        # required — serializable capability/definition reference (named, not an inline lambda)
      input: opaque                # optional — starting payload, or resume payload when startCheckpointRef is set
      startCheckpointRef: string   # optional — if set, resume from this checkpoint instead of cold-starting
      traceparent: string          # required — W3C traceparent; MUST equal the suspending leg's value on resume
      identityRef: string          # optional — opaque delegated-identity handle (e.g. Vault URI); never a raw token
    response:
      events: stream               # Flow.Publisher<AgentEvent>-shaped; exactly one terminal element, last
      terminal_kinds: [FINISHED, FAILED, INTERRUPT_REQUEST]
      # FAILED carries an error-class code (error-class.v1); errors are terminal events,
      # never thrown across the boundary. INTERRUPT_REQUEST carries a checkpoint token
      # + suspend reason (see suspend_resume below).
  describe:
    description: "Report the engine's capability descriptor (engine types served, health)."

suspend_resume:
  model: checkpoint-token
  description: >
    Suspension is a RETURNED terminal INTERRUPT_REQUEST event carrying an opaque checkpoint
    token (checkpoint-record.v1#engineStateRef) + the suspend reason + a correlation handle
    (correlation-record.v1: LocalChildHandle | RemoteAgentHandle). Resume is a fresh execute
    with startCheckpointRef set — a durable continuation, not a parked thread. The in-process
    realization maps this onto the existing SuspendSignal exception caught by the Orchestrator;
    the networked realization generalizes the runtime_enforced s2c-callback.v1 protocol (the
    proven suspend-over-a-boundary mechanism).
  checkpoint_store_ownership: >
    The Service owns the durable Run row + checkpoint-token index; the engine owns the opaque
    checkpoint bytes via Checkpointer. In-process / co-deployed: shared store (same-transaction
    atomicity). Separate microservices: transactional-outbox for cross-store atomicity.

deployment_forms:
  - in_process     # co-deployed service+engine, or SDK-embedded — Java EnginePort direct call
  - internal_rpc   # separate microservices you own — gRPC/REST
  - a2a            # federation to external / third-party agents — via bus.spi.federation

boundary_statement: >
  EnginePort carries NO tenant/session semantics (those stay Service-owned); the engine
  receives only opaque correlation (runId / traceId / spanId) + checkpointer + the suspend
  capability. This keeps the contract neutral across transports and across heterogeneous
  engines, and is why agent-runtime never depends on agent-service.
