# MemoryStore schema, version 1.
#
# Authority: ADR-0123 (Memory unified SPI) + ADR-0034 (Memory &
# Knowledge Taxonomy) + ADR-0051 (Ownership Boundary).
# Wave: rc43 Wave B3.

schema: memory-store/v1
status: design_only
runtime_enforced: false
authority: ADR-0123
promotion_trigger: "First production MemoryStore implementation (W2 memory adapters)"

memory_store:
  surface: "MemoryStore<K, V> = MemoryReader<K, V> + MemoryWriter<K, V>"
  required_methods:
    reader:
      - "read(tenantId, key) -> Optional<V>"
      - "scan(tenantId, MemoryQuery) -> List<MemoryEntry<K, V>>"
    writer:
      - "write(tenantId, key, value, MemoryMetadata)"
      - "delete(tenantId, key)"
    common:
      - "category() -> MemoryCategory"

memory_categories:
  - M1_SHORT_TERM      # Run-scoped working memory; ephemeral
  - M2_EPISODIC        # Session memory; TTL-bounded
  - M3_SEMANTIC        # Long-term semantic facts (vector-backed)
  - M4_GRAPH           # Graph relationship memory (Graphiti, mem0)
  - M5_KNOWLEDGE       # Knowledge index (RAG corpus)
  - M6_RETRIEVED       # Ephemeral retrieved context (lives in RunContext)

memory_metadata:
  required_fields:
    - memoryId           # stable id within (tenantId, category)
    - createdAt          # Instant
    - updatedAt          # Instant
    - ownership          # C_SIDE | S_SIDE | DELEGATED per ADR-0051
    - tags               # map<string, string>
  optional_fields:
    - createdBy          # actor (Agent id or user id)
    - sourceTraceId      # correlation trace id
    - embeddingModelVersion  # REQUIRED for M3/M5; null for non-vector categories

memory_query:
  required_fields:
    - category           # MemoryCategory
    - tagFilters         # map<string, string>; may be empty
    - pageSize           # > 0
  optional_fields:
    - since              # Instant; null = no time filter
    - cursor             # opaque paging cursor

marker_interfaces:
  - "SemanticMemoryStore extends MemoryStore<String, SemanticFact> — M3; requires embeddingModelVersion on writes"
  - "KnowledgeMemoryStore extends MemoryStore<String, KnowledgeDocument> — M5; composes VectorStore + Retriever + EmbeddingModel per ADR-0124"

structural_siblings:
  - "TaskStateStore (agent-service.task.spi) — M2-adjacent control state; carries Task control state, not memory content"
  - "GraphMemoryRepository (agent-service.runtime.memory.spi) — M4 reference; pre-existing; migration to middleware deferred"
  - "ContextProjector (agent-service.session.spi) — M1+M6 plumbing"
