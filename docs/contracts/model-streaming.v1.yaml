# ModelResponseChunk / streaming-aware ModelGateway schema, version 1.
#
# Authority: ADR-0129 (Streaming-aware ModelGateway).
# Wave: rc51 Wave E1.
#
# This file is the single source of truth for the shape of a
# streaming model response chunk and the streaming SPI signature.
# The Java sealed interface
# com.huawei.ascend.middleware.model.spi.ModelResponseChunk and the
# default method ModelGateway.stream(...) mirror this schema.
#
# Hook binding per ADR-0073: HookPoint.BEFORE_LLM fires ONCE with
# ModelInvocation before stream open; HookPoint.AFTER_LLM fires
# ONCE with the terminal Complete.finalResponse(). Per-chunk hooks
# are deliberately not declared at this contract version.

schema: model-streaming/v1
status: design_only
runtime_enforced: false
authority: ADR-0129
promotion_trigger: "First production streaming ModelGateway override (W2 LLM gateway)"

streaming_signature:
  method: "default Stream<ModelResponseChunk> stream(ModelInvocation invocation)"
  return_type: "java.util.stream.Stream<ModelResponseChunk>"
  default_behavior: "throws UnsupportedOperationException with design-only message"
  spi_purity: "java.* imports only (Rule R-D); no Reactor Flux in the SPI surface"
  ordering: "finite ordered stream; at most one Complete element which MUST be last"
  cancellation: "consumers close the Stream to cancel; adapters MUST release provider resources on close"

model_response_chunk:
  kind: sealed_interface
  permits:
    - ContentDelta
    - ToolCallDelta
    - Complete

  variants:
    ContentDelta:
      description: "Incremental assistant content; emitted zero or more times"
      required_fields:
        - deltaText            # string, non-null (may be empty between providers)

    ToolCallDelta:
      description: "Incremental tool-call argument stream; emitted zero or more times per call"
      required_fields:
        - callId               # string, non-null; unique within the response
        - skillKey             # string, non-null; references SkillRef.skillKey
        - argumentsDelta       # string, non-null; partial JSON fragment

    Complete:
      description: "Terminal chunk carrying the fully assembled ModelResponse; emitted exactly once at end-of-stream"
      required_fields:
        - finalResponse        # ModelResponse, non-null (see model-invocation.v1.yaml)

hook_binding:
  before_llm:
    fires: "once"
    timing: "before stream open"
    payload: "ModelInvocation"
  after_llm:
    fires: "once"
    timing: "on terminal Complete chunk"
    payload: "Complete.finalResponse()"
  per_chunk:
    declared: false
    rationale: "Reserved for a follow-on ADR; current envelope keeps hook surface stable"

# Reference adapter target: SpringAiChatModelGateway (W2 override),
# bridging org.springframework.ai.chat.model.ChatModel.stream(...)
# (Flux<ChatResponse>) into Stream<ModelResponseChunk> behind a
# virtual-thread-friendly iterator per Rule R-G.
