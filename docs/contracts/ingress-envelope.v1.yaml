# Ingress Envelope schema, version 1.
#
# Authority: ADR-0089 (Edge-Plane Ingress Gateway Mandate).
# Wave: W1.x rc13 (2026-05-20).
# Driver: 2026-05-20 plan-mode dialogue — the user mandated that all client →
#   server traffic flow through agent-bus; this schema locks the wire shape
#   before the W3+ agent-client SDK lands.
#
# This file is the SINGLE SOURCE OF TRUTH for the client → bus → server
# ingress envelope. The Java records under com.huawei.ascend.bus.spi.ingress
# (IngressEnvelope, IngressResponse, IngressGateway) mirror this schema and
# validate required fields on construction. The negative dependency invariant
# (agent-client MUST NOT import compute_control plane production code) is
# enforced separately by ArchUnit (E143) + gate Rule 105.
#
# Symmetry note: this is the C2S (client → server) cross-plane envelope.
# The S2C (server → client) counterpart is docs/contracts/s2c-callback.v1.yaml,
# whose Java surface lives at com.huawei.ascend.bus.spi.s2c (relocated from
# agent-runtime-core per ADR-0088). After both ADRs land, agent-bus owns the
# entirety of cross-plane traffic in both directions.
#
# Self-enforced by gate Rule 105 (edge_no_direct_compute_link) — scans
# agent-client/src/main/java for forbidden imports + WebClient/RestTemplate
# construction against non-bus hosts.

product_claim: "PC-002"

schema: ingress-envelope/v1
# Status: design_only at W1 — no runtime binding ships yet. The IngressGateway
# SPI interface ships under agent-bus/src/main/java/com/huawei/ascend/bus/spi/ingress/
# but there is no implementation; the agent-service /v1/runs HTTP routes
# continue to serve traffic directly until the W3+ SDK lands. Promotion to
# `runtime_enforced` is triggered by the first agent-client SDK release per
# ADR-0089 / ADR-0049.
status: design_only
runtime_enforced: false
authority: ADR-0089

# REQUEST envelope — client to bus, forwarded to server.
# Six mandatory fields per ADR-0089 + Rule R-C sub-clause .c (tenant_id) +
# Rule R-F (cursor flow — the response carries a cursor for RUN_CREATE).
request:
  required_fields:
    - request_id            # UUID — primary correlation key; appears in every log line
    - tenant_id             # string — Rule R-C.c contract spine (non-null, non-blank)
    - idempotency_key       # UUID — bus dedupes within window
    - request_type          # enum: see #request_types below
    - payload               # opaque — validated by the request_type-specific subschema
    - trace_id              # W3C 32-char lowercase hex (ADR-0061) — MUST equal the wrapping client trace_id
  optional_fields:
    - deadline_millis_epoch # long — absolute deadline; null = no client-imposed deadline
    - request_attributes    # map<string, opaque> — capability-specific extras

# Closed enum mirrored by IngressEnvelope.IngressRequestType.
request_types:
  - id: RUN_CREATE
    payload_schema_hint: "Run creation request — fields TBD W3+; today the agent-service /v1/runs POST body. Response MUST carry a Task Cursor per Rule R-F."
  - id: RUN_GET
    payload_schema_hint: "Run state poll — payload carries a runId. Returns Run status snapshot."
  - id: RUN_CANCEL
    payload_schema_hint: "Run cancel — payload carries a runId. Re-validated by tenant scope per Rule R-J sub-clause .b."
  - id: RUN_RESUME
    payload_schema_hint: "Run resume — payload carries a runId + resumePayload. W2 async-orchestrator surface per Rule R-J.b.d."

# RESPONSE envelope — bus acknowledgement returned synchronously to the client.
# Four mandatory fields + closed status enum. Cursor populated only for
# RUN_CREATE responses with status=ACCEPTED (Rule R-F shape).
response:
  required_fields:
    - request_id            # UUID — mirrors request.request_id
    - status                # enum: see #response_statuses
    - cursor                # string|null — present iff (status=ACCEPTED && request_type=RUN_CREATE)
    - rejection_reason      # string|null — present iff status=REJECTED, non-blank

# Closed enum mirrored by IngressResponse.IngressStatus.
response_statuses:
  - id: ACCEPTED
    semantics: "Bus admitted the request and forwarded to the compute_control plane. For RUN_CREATE, cursor MUST be non-null."
  - id: REJECTED
    semantics: "Bus or runtime refused the request. rejection_reason MUST be non-null and non-blank. Surface this verbatim to clients."
  - id: DEFERRED
    semantics: "Bus deferred admission (e.g., backpressure hold). Clients SHOULD retry with backoff. See Rule R-I sub-clause .e (deferred to W2)."

# Internal routing — how the bus implementation MUST forward an accepted
# envelope onto the data channel (bus-channels.yaml#channels[id=data]).
# Implementation details are W2+; this block is documentation only at W1.
internal_routing:
  ingress_gateway_spi: com.huawei.ascend.bus.spi.ingress.IngressGateway
  forwarded_channel: data           # per Rule R-E
  authority: ADR-0089

# Promotion trigger — when this contract transitions from design_only to
# runtime_enforced. Mirror of ADR-0089's deferred_runtime_binding.trigger.
deferred_runtime_binding:
  trigger: "First agent-client SDK release lands production java sources under agent-client/src/main/java/ (W3+ per ADR-0049). Promotion in the same wave: set status to `runtime_enforced` + runtime_enforced to `true` + ship the bus-side IngressGateway implementation."
