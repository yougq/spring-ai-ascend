# SkillDefinition schema, version 1.
#
# Authority: ADR-0127 (Skill SPI unified) + ADR-0122 (Tool-Skill
# semantic resolution). Wave: rc43 Wave B2.
#
# Java records:
#   com.huawei.ascend.middleware.skill.spi.SkillDefinition
#   com.huawei.ascend.middleware.skill.spi.SkillKind
#   com.huawei.ascend.middleware.skill.spi.SkillRef
# mirror this schema.

product_claim: "PC-001|PC-004"

schema: skill-definition/v1
status: design_only
runtime_enforced: false
authority: ADR-0127
promotion_trigger: "First production SkillRegistry implementation (W2 skill registry)"

skill_definition:
  required_fields:
    - skillKey           # string, non-blank; (tenantId, skillKey) indexes registry + capacity
    - kind               # SkillKind enum value
    - displayName        # string, non-blank
    - description        # one-line purpose summary
    - inputSchema        # JSON schema string (may be "{}")
    - outputSchema       # JSON schema string
  optional_fields:
    - capacityKey        # defaults to skillKey when omitted
  constructor_validated:
    - skillKey non-blank
    - kind non-null
    - displayName non-blank
    - description non-null
    - inputSchema non-null
    - outputSchema non-null

skill_kinds:
  - TOOL                 # LLM-callable function (Spring AI ToolCallback adapter is one)
  - BUILTIN              # platform-owned utility
  - AGENT_AS_TOOL        # another Agent invoked as a Skill (per ADR-0100)
  - MCP_SERVER           # remote MCP server tool exposure
  - UNTRUSTED_TOOL       # TOOL kind requiring sandbox (Rule R-L)
  - UNTRUSTED_CODE       # code-interpreter etc.; sandbox mandatory

lifecycle:
  required_methods:
    - skillKey()         # String
    - kind()             # SkillKind
    - execute(SkillInvocation)  # returns SkillResult (Success | Error | Suspended)
  optional_methods:
    - init(SkillContext)       # default no-op
    - suspend(SkillSuspensionState)  # default throws UnsupportedOperationException
    - teardown()               # default no-op

capacity_arbitration:
  registry: SkillCapacityRegistry      # pre-existing; unchanged per ADR-0070/0080
  resolution: "ResilienceContract.resolve(tenantId, effectiveCapacityKey)"

sandbox_routing:
  trigger_kinds: [UNTRUSTED_TOOL, UNTRUSTED_CODE]
  enforcer: "SandboxExecutor SPI (ADR-0018; runtime enforcement deferred to W3 per Rule R-L)"

# Reference adapter target: SpringAiToolCallbackSkill (Wave C1),
# adapts org.springframework.ai.tool.ToolCallback to Skill with
# SkillKind.TOOL; init/teardown no-ops; suspend throws.
