# Engine Envelope schema, version 1.
#
# Authority: ADR-0072 (Engine Envelope + Strict Matching).
# Wave: W2.x Phase 1.
# Driver review: docs/logs/reviews/2026-05-15-l0architecture-lucio It-wave-1-supplement-runtime-engine-contract.en.md (proposal §3 + §4).
#
# This file is the SINGLE SOURCE OF TRUTH for what an EngineEnvelope is. The
# Java record com.huawei.ascend.engine.runtime.EngineEnvelope (owned by
# agent-execution-engine; relocated from com.huawei.ascend.service.runtime.engine
# in rc14 per ADR-0090 — retires the ADR-0079 source-compat exception)
# mirrors this schema and validates REQUIRED FIELDS (nullability, blanks) on
# construction.
# `known_engines` membership is enforced by EngineRegistry.resolve(...) and
# registry boot validation (Phase 5 R2 pilot — runtime self-validation;
# enforcer E84). Constructor-level membership validation is deferred to
# Rule M-2.a.c (formerly Rule 48.c; see docs/CLAUDE-deferred.md — re-introduction trigger: first
# envelope built outside the Spring-boot test harness). The runtime
# EngineRegistry loads this file at boot and asserts:
#   (a) every known_engines[].id has a registered ExecutorAdapter
#   (b) every registered ExecutorAdapter's engineType() value is in known_engines
#
# The envelope is intentionally SHALLOW (proposal §3.2): it provides metadata
# for routing / governance / observability, NOT a universal DSL. The
# `payload` field is opaque to the envelope and validated by the matched
# engine.
#
# Self-enforced by gate Rule 55 (engine_envelope_yaml_present_and_wellformed)
# and gate Rule 56 (engine_registry_covers_all_known_engines).

product_claim: "PC-004"

schema: engine-envelope/v1
# Post-review status label (plan G / §5 overdesign labels): the envelope
# contract is runtime_enforced -- EngineRegistry validates known_engines
# at boot (ADR-0076 R2 pilot, enforcer E84) and every dispatch goes through
# EngineRegistry.resolve(envelope) (Rule R-M.a, formerly Rule 43; enforcer E74).
status: runtime_enforced
authority: ADR-0072

required_fields:
  - name              # string, kebab-case stable name
  - engineType        # string, MUST match a known_engines[].id
  - payload           # opaque ExecutorDefinition (W2.x); future schema_ref per engine

optional_fields:
  - identifier        # uri or stable id, e.g. urn:agent:capability:foo
  - version           # semver of THIS envelope instance (not the engine)
  - owner             # string — team/owner responsible for the envelope
  - engineVersion     # semver of the targeted engine
  - compatibility     # semver-range string, e.g. ">=1.0,<2.0"
  - runtimeHints      # map<string, any> — engine-orthogonal hints (timeouts, retries)
  - observabilityHints # map<string, any> — extra metric/log/trace tags

known_engines:
  - id: graph
    payload_class: ExecutorDefinition.GraphDefinition
    payload_schema_ref: docs/contracts/engine-graph-payload.v1.yaml  # placeholder; W2
    description: |
      Deterministic graph: named nodes connected by named edges. The reference
      ExecutorAdapter is wrapped around any GraphExecutor implementation; the
      W0 reference impl is SequentialGraphExecutor.

  - id: agent-loop
    payload_class: ExecutorDefinition.AgentLoopDefinition
    payload_schema_ref: docs/contracts/engine-agent-loop-payload.v1.yaml  # placeholder; W2
    description: |
      ReAct-style agent loop: a Reasoner drives tool-action iterations until
      a terminal action. The reference ExecutorAdapter is wrapped around any
      AgentLoopExecutor implementation; the W0 reference impl is
      IterativeAgentLoopExecutor.

# Boundary statement — proposal §3.2 / §4.3 reproduced verbatim:
#   "The envelope is not a universal semantic DSL. It may standardize
#    metadata and management fields, but it must not attempt to translate
#    one engine's execution semantics into another engine's execution
#    semantics."
#
# Strict matching mandate — proposal §4.1 / §4.2:
#   "If the required engine is unavailable, incompatible, or disabled by
#    policy, the Runtime should reject the execution request or follow an
#    explicit fallback policy. The Runtime should not silently reinterpret
#    the payload as another engine's configuration."
#
# In this codebase the strongest reading is taken: NO fallback. EngineRegistry
# raises EngineMatchingException; the calling Run transitions to FAILED with
# reason `engine_mismatch`. An external caller MAY retry with a corrected
# envelope.
