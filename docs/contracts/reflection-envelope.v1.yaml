# ReflectionEnvelope schema, version 1.
#
# Authority: ADR-0102 (rc22 — Evolution Plane Online/Offline Duality).
# Wave: design_only at rc22; runtime impl in rc26 (per ADR-0102
# implementation timeline).
#
# Purpose: S2C envelope shape for online-evolution updates flowing
# from the cloud Slow Track (LLM-as-Judge) to the active agent's
# session/memory state. Carried over the existing agent-bus S2C
# transport (per ADR-0074).
#
# This contract is part of the Heaven-Earth Coordination cell in the
# Mode × Modality matrix (Mode B + Online).

product_claim: "PC-001|PC-005"

schema: reflection-envelope/v1
authority: ADR-0102
status: design_only
runtime_enforced: false
promotion_trigger: First ReflectionEnvelopeRouter implementation lands in agent-bus (rc26 per ADR-0102 timeline).
relates_to:
  - docs/contracts/s2c-callback.v1.yaml  # transport substrate
  - docs/contracts/engine-hooks.v1.yaml  # AFTER_LLM_INVOCATION is the SlowTrackJudge fire site

# Field definitions
fields:
  reflection_id:
    type: string
    format: uuid
    required: true
    description: Unique ID for this reflection event; used for dedup + audit correlation.

  source_run_id:
    type: string
    format: uuid
    required: true
    description: The Run whose trajectory triggered this reflection (the FAST-TRACK Run on the edge).

  target_session_id:
    type: string
    format: uuid
    required: true
    description: The Session whose context should receive the hot-patch.

  tenant_id:
    type: string
    format: uuid
    required: true
    description: Mandatory per Rule R-C sub-clause .c (tenant propagation purity).

  judgment_source:
    type: enum
    values: [llm_judge, rule_engine, hybrid]
    required: true
    description: Provenance of the reflection; LLM-as-Judge is the canonical Slow Track source.

  patch_type:
    type: enum
    values: [memory_append, memory_replace, prompt_adjust, routing_override]
    required: true
    description: How the patch should be applied to the Session/Memory state.

  patch_payload:
    type: object
    required: true
    description: Patch contents. Shape depends on patch_type; ReflectionPatchHandler dispatches by type.
    max_size_bytes: 16384  # mirrors Rule R-E data-channel 16 KiB inline cap

  confidence:
    type: number
    range: [0.0, 1.0]
    required: false
    description: Slow Track judge's confidence in the reflection. Below threshold (e.g., 0.7), patch is queued for human review rather than auto-applied.

  ttl_seconds:
    type: integer
    minimum: 1
    maximum: 86400
    required: true
    description: How long the patch remains applicable. Expired reflections are discarded.

  causation_chain:
    type: array
    items: { type: string, format: uuid }
    required: false
    description: Prior reflection_ids this reflection extends or supersedes.

  trace_id:
    type: string
    format: hex_32
    required: true
    description: W3C trace-id for end-to-end observability (Rule §4 #54 / §4 #57).

# Routing semantics
routing:
  source_plane: evolution  # SlowTrackJudge fires from agent-evolve
  carrier_plane: bus_state  # bus.spi.s2c transport
  destination_plane: compute_control  # agent-service Session Manager applies patch
  delivery_track: rhythm  # online-evolution updates are low-priority compared to control/data

# Authorization
authorization:
  required_capability: evolution.reflect.write
  tenant_isolation: strict  # patches cross tenant boundary → reject
  audit: required  # every applied patch emits an immutable audit event (Audit Vertical, W2+)

# Failure modes
failure_modes:
  - reflection_id_collision: dedup; drop new (idempotent re-delivery acceptable)
  - tenant_mismatch: 403 + audit
  - target_session_terminated: drop silently + observability counter
  - patch_oversize: 413 + audit
  - ttl_expired_before_delivery: drop silently + counter

# Backward / forward compatibility
schema_evolution:
  policy: additive_only  # never remove or rename a field; new optional fields fine
  version_in_envelope: false  # version is in the schema name (v1)
