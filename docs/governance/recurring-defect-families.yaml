  - id: F-hand-authored-factual-drift
    title: "Hand-authored factual fields (devPaths, test FQNs, verification commands, SPI counts) drift from code/contracts/tests"
    first_observed_rc: rc5
    last_observed_rc: agent-runtime-outside-in-hardening
    occurrences: [rc5, rc7, rc12, rc14, rc15, rc17, rc18, rc19, rc35, rc40, rc48, rc54, rc55, post-W5-L1-feature-registry, pr-172-176-177-postmerge-closure, agent-runtime-outside-in-hardening]
      # agent-runtime-outside-in-hardening (2026-06-12): the outside-in review's adversarial
      # verification confirmed README documented config keys (default-agent-id/public-base-url)
      # with no @ConfigurationProperties binding, README/pom/module-metadata still carrying the
      # retired run-owning narrative, quickstart/L1 referencing deleted classes and an agent-bus
      # dependency the pom does not declare, contract-catalog placing AgentCardProvider in the
      # wrong package, and the runtime library jar shipping the previous module generation's
      # application.yml/logback-spring.xml/Flyway migrations with dead config keys. Closed by
      # implementing the documented keys, stripping the service-era artifacts, and truthing up
      # README/quickstart/L1/catalog/module-metadata in one wave.
    root_cause: |
      Factual claims about code shape (saa.devPaths, saa.verificationTestFqns,
      saa.verificationCommands, saa.sourceFile, contract-catalog SPI counts,
      ModelGateway authority text, root ARCHITECTURE.md module counts) are
      hand-authored as prose or DSL string properties. The code that owns
      these facts (Java SPI interfaces, OpenAPI operations, test classes,
      pom.xml module list) moves on its own cadence. Without a
      deterministic extractor binding the two, the hand-authored layer
      drifts on every refactor — F-numeric-drift recurred 14+ times rc5
      through rc40; F-deleted-module-name-leakage required two waves of
      sweeping; the 2026-05-27 expert review for L1 Feature Registry
      identified the same pattern at the function-point / FEAT- level
