  - id: F-kernel-vs-implementation-drift
    title: Prevention Rule Kernel vs Implementation Drift
    first_observed_rc: rc6
    last_observed_rc: rc36
    occurrences: [rc6, rc7, rc11, rc15, rc35-second-pass, rc36]
    root_cause: |
      A prevention rule's kernel paragraph documents intent X while its
      gate-script implementation checks only Y (Y ⊂ X). This is the
      worst class of Code-as-Contract drift because the rule whose JOB is
      preventing drift itself drifts. rc11 P1-3 documented "kernel-narrow
      impl-broad" (Rule 96 said "kernel only" but checked "either
      surface"). rc15 found analogous drift in Rule G-8 sub-checks.
    surfaces:
      - gate/check_architecture_sync.sh
      - docs/governance/rules/*.md kernel scalars
      - CLAUDE.md kernel paragraphs
    prevention_rules:
      - Rule 82
      - Rule 99
      - Rule 100
      - Rule 106
      - Rule 107
    cleanup_status: partial
    open_residual: |
      Every newly-added rule carries the same risk. Rule G-9 (rc17)
      requires every new rule declare `scope_surfaces:` frontmatter so
      kernel-vs-impl drift becomes detectable at gate time.
      rc36 recurrence (worst observed instance): Rules 96 + 99 — the two
      enforcers whose JOB is detecting kernel-vs-impl drift — were
      themselves silent-passes for ~20 waves because their heading-discovery
      regexes stayed numeric (`^#### Rule [0-9]+`) after the rc16 D-/R-/G-/M-
      namespace migration, so they matched 0 of 42 live kernels. Closed by
      namespace-aware longest-prefix parent resolution + a NON-VACUITY GUARD
      (each rule now FAILS if it resolves 0 sub-clauses/parents, so a future
      heading-format change can never re-silence them). The non-vacuity guard
      is the structural generalisation: a drift-detector that detects nothing
      must fail loudly, not pass quietly.

