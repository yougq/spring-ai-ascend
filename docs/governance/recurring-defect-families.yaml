      Appendix points reviewers at the wrong file; a future contributor
      importing by IDE-completion picks the wrong one. Distinct from
      F-deleted-module-name-leakage (cross-module) and from
      F-authority-surface-path-drift (correct module, wrong path) — here
      the module is right but the basename is doubly resolved within the
      module. Surfaced 2026-05-27 by two IdempotencyRecord types in
      agent-service: service.platform.idempotency.IdempotencyStore.IdempotencyRecord
      (live; 8 fields including status / responseStatus / responseBodyRef
      / expiresAt) and service.runtime.idempotency.IdempotencyRecord
      (dead; 2 fields runId / claimedAt; zero importers). spi-appendix.md
      :59 cites the second as contract-spine per ADR-0057, but ADR-0057
      §2 only declares the platform-package record.
    surfaces:
      - agent-*/src/main/java/com/huawei/ascend/**/*.java
      - architecture/docs/L1/**/spi-appendix.md
      - docs/contracts/contract-catalog.md
    prevention_rules:
      - "candidate gate-rule W5+ — for each Maven module, glob src/main/java/**/*.java → extract basenames → FAIL on any duplicate basename; allowlist file for legitimate cases (e.g. package-info.java)"
    cleanup_status: incomplete
    open_residual: |
      AUD-IDEM-8 (two IdempotencyRecord types in agent-service). Closure
      requires deleting the dead service/runtime/idempotency/IdempotencyRecord.java
      OR moving the live platform record into runtime/idempotency/ per
      whichever package the audit decides is canonical (ADR-0057 §2 names
