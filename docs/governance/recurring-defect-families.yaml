# Recurring Defect Families — machine-readable SSOT
#
# This file is the canonical ledger of defect FAMILIES (root-cause classes)
# that have recurred across multiple rc cycles. It is NOT a release log
# (those live under `docs/logs/releases/`). It is a DERIVED view: a family
# is added here only after the same root-cause class has been observed in
# ≥2 rc cycles and a prevention rule has been authored (or recognised as
# insufficient and rewritten).
#
# Purpose:
#   1. Make recurring-family knowledge first-class so a fresh reviewer can
#      ask "has this class been seen before?" without re-reading 16 release
#      notes.
#   2. Drive the rc17 Rule G-9 / Gate Rule 111 freshness gate — any
#      architecture refresh (new ADR, baseline change, release note) MUST
#      sync this file within 24h of the refresh-signal commit.
#   3. Surface OPEN RESIDUALS — families whose cleanup_status is `partial`
#      or `incomplete` so the next prevention wave can target them.
#
# Schema:
#   schema_version           - integer, bumped when fields are added
#   last_updated             - ISO date of the most recent family-row edit
#   families[]
#     id                     - kebab-case unique slug, prefix F-
#     title                  - one-line human title
#     first_observed_rc      - rcN string, oldest observation
#     last_observed_rc       - rcN string, newest observation
#     occurrences            - list of rcN strings where the family was hit
#     root_cause             - one-paragraph mechanism
#     surfaces               - list of paths/globs where the family manifests
#     prevention_rules       - list of Rule IDs (D-/R-/G-/M-/Rule-N) authored
#                              as prevention; in order of introduction
#     cleanup_status         - enum: closed | structurally_addressed | partial | incomplete | monitoring
#     open_residual          - one-paragraph remaining risk (empty if closed)
#
# Authority: ADR-0094 (rc17 recurring-defect-family-truth + rule-consolidation).
# Self-enforced by Gate Rule 111 (E156 yaml well-formed + E157 mtime
# freshness + E158 yaml/md family-id parity).

schema_version: 1
last_updated: 2026-05-23  # rc35-second-pass wave (same PR follow-up commits, after rc35-correctness-batch): a second round of 4 parallel adversarial reviewers (correctness + adversarial + gate-script-consistency + doc-coherence) ran against the rc35-correctness-batch tip and found that several of the rc35 first-pass closures were incomplete in scope. (a) The cancel-vs-complete race guard in SyncOrchestrator (rc35 first pass) was applied ONLY at the three terminal SUCCEEDED/FAILED save sites; five sibling non-terminal save sites (PENDING→RUNNING at run() entry; RUNNING→SUSPENDED at S2C suspend + child suspend; SUSPENDED→RUNNING at S2C resume + child resume) remained blind puts that silently overwrote a parallel CANCELLED with RUNNING/SUSPENDED — same family pattern, sibling surfaces. (b) ADR-0108's "common base shared with Rule R-J .b" wording claimed cross-authority parity that didn't hold — Rule R-J .b's pre-existing cancel-state-transition MDC `{ runId, fromStatus, toStatus, actor, occurredAt }` shares only `occurredAt` with the new tenant-mismatch base `{ surface, reason, occurredAt }`. (c) S2C envelope deadline was honoured unconditionally in resolveCallTimeoutMillis with no clamp against the orchestrator's configured s2cCallTimeout ceiling — a client-supplied 1h deadline defeated the 30s default. (d) check_parallel.sh + extract_rules.sh + check_architecture_sync.sh + 8 sibling rule files used the regex `^# Rule [0-9]+[a-z]? (—|--) ` which silently skipped dotted sub-clause headers `# Rule 24.c` / `# Rule 29.c`; both rule bodies were absorbed into Rule 11's chunk and attributed there in NDJSON timing + Rule 72 regression detection — and the "132 == 132" serial/parallel parity check at Rule G-5.a was vacuously true because BOTH sides used the same broken regex. Headers were always there since rc1; only attribution moved. (e) check_architecture_sync.sh used 10 bare `python3 - <<PYEOF` invocations (Rules 23/25/28j/28k/37/63/68/78/80/94) that silently fell through to vacuous PASS with `python3: not found` on Windows hosts where only `python` exists; CI on Ubuntu was green because python3 exists there. Same fail-open pattern, different surface. (f) check_recurring_families.sh inverted the corpus-wide python preference (python before python3) so on Python-2-as-`python` systems the rc19 validator would crash with SyntaxError. (g) R-038 + R-042 both rewrote docs/governance/architecture-graph.yaml under xargs -P concurrently with R-040/041/097/106 readers — read-during-write race; closed by atomic temp-file + os.replace in build_architecture_graph.py. (h) emit_contract_tables.sh wrote 6 hardcoded /tmp/contract-tables-<phase>.md paths with no PID + check_architecture_sync.sh + rule-099.sh used /tmp/_r99_hits.$$ — concurrent gate runs would clobber. All eight closed across Commits A/B/C of this same PR. Pattern reinforcement (BOTH passes): rc35's first-pass discipline ("found 8 bugs in parallel, fixed all") still leaves the cited bugs's SIBLINGS unfound; the second-pass adversarial review systematically constructed sibling scenarios and found 8 more. Lesson: a wave is not complete when the cited bugs are fixed — it's complete when the sibling-scenario sweep returns empty.

families:
  - id: F-numeric-drift
    title: Numeric Drift Across Authority Surfaces
    first_observed_rc: rc5
    last_observed_rc: pr57
    occurrences: [rc5, rc6, rc7, rc8, rc9, rc10, rc12, rc14, rc15, pr57]
    root_cause: |
      Numeric claims (rule counts, gate counts, enforcer counts, graph
      nodes/edges, self-tests) are estimated when a release note is written
      and then never re-aligned against live state. The first estimate
      becomes a de-facto baseline; subsequent drift compounds until a
      reviewer catches it. The structural fix landed in rc6 (Rule 82 single
      source) and was widened in rc9 (Rule 91 baseline-match-manifest),
      rc10 (Rule 97 release-note numeric truth), rc12 (Rule 101 namespace
      authority parity), and rc14 (Rule G-8.a graph baseline parity). A
      re-baseline ritual at release time would close the family. pr57
      surfaced a NEW vector: a contributor PR forked from a stale main
      and recomputed baselines against the fork's base, claiming 133 gate
      rules / 238 self-tests when live-on-merge-target was 135 / 226. The
      prevention rules catch doc-vs-baseline disagreement but NOT
      baseline-computed-against-the-wrong-tree — that requires recomputing
      every count against the merge target (current main), not the fork's
      branch point.
    surfaces:
      - docs/governance/architecture-status.yaml#baseline_metrics
      - README.md
      - gate/README.md
      - docs/logs/releases/*.md (latest only)
      - CLAUDE.md kernel numeric claims
      - docs/governance/architecture-graph.yaml header
    prevention_rules:
      - Rule 82
      - Rule 91
      - Rule 97
      - Rule 101
      - Rule G-8.a
    cleanup_status: partial
    open_residual: |
      rc16 P2-1 surfaced lingering drift. First-cut estimates still happen
      without a structured re-baseline ritual; the next missed surface
      will appear in the first authority doc not yet covered by Rules
      82/91/97/101/G-8.a.

