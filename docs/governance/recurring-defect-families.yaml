      Family is adjacent to F-deleted-module-name-leakage — both spring
      from "refactor first, authority second" but this family covers path
      truth (correct module but wrong path) while the other covers name
      truth (deleted module mentioned at all).
    surfaces:
      - docs/contracts/contract-catalog.md
      - docs/contracts/*.v1.yaml
      - agent-*/ARCHITECTURE.md
      - "**/module-metadata.yaml"
    prevention_rules:
      - Rule 84
      - Rule 94
      - Rule 98
      - Rule 103
      - Rule G-8.b
      - Rule G-8.d
    cleanup_status: partial
    open_residual: |
      Crosses with F-deleted-module-name-leakage; closed surfaces in one
      family often re-emerge in the other when scope is narrowly
      reviewer-driven. Rule G-8.e (rc15 structural-carrier parity)
      addresses the most recent occurrence.

  - id: F-kernel-vs-implementation-drift
    title: Prevention Rule Kernel vs Implementation Drift
    first_observed_rc: rc6
    last_observed_rc: rc35-second-pass
    occurrences: [rc6, rc7, rc11, rc15, rc35-second-pass]
    root_cause: |
      A prevention rule's kernel paragraph documents intent X while its
      gate-script implementation checks only Y (Y ⊂ X). This is the
      worst class of Code-as-Contract drift because the rule whose JOB is
      preventing drift itself drifts. rc11 P1-3 documented "kernel-narrow
      impl-broad" (Rule 96 said "kernel only" but checked "either
      surface"). rc15 found analogous drift in Rule G-8 sub-checks.
    surfaces:
      - gate/check_architecture_sync.sh
      - docs/governance/rules/*.md kernel scalars
      - CLAUDE.md kernel paragraphs
    prevention_rules:
      - Rule 82
      - Rule 99
      - Rule 100
      - Rule 106
      - Rule 107
    cleanup_status: partial
    open_residual: |
      Every newly-added rule carries the same risk. Rule G-9 (rc17)
      requires every new rule declare `scope_surfaces:` frontmatter so
      kernel-vs-impl drift becomes detectable at gate time.

  - id: F-cross-authority-agreement
    title: Cross-Authority Surface Disagreement
    first_observed_rc: rc14
    last_observed_rc: rc35-second-pass-ci-corrective
    occurrences: [rc14, rc15, rc16, rc33, rc34, rc34-follow-up, rc34-merge-train, rc35-correctness-batch, rc35-second-pass, rc35-second-pass-ci-corrective]
    root_cause: |
      117+ single-surface prevention rules can all pass while the
      surfaces themselves contradict each other — e.g.
      architecture-status.yaml#baseline_metrics.architecture_graph_nodes
      ≠ architecture-graph.yaml#node_count. rc14 identified this as a
      structurally-new defect family (L-δ META): per-surface
      self-consistency is necessary but not sufficient. Closed
      structurally by Rule G-8 (rc14 mega-rule, 4 sub-checks) +
      Rule G-8.e (rc15 widening) + Rule 107/108/109 (rc16 namespace
      parity).

      **rc33+rc34 forward-pointing-reference recurrence (2026-05-23).**
      rc33 committed 23 `l0_decision: docs/adr/01{08..15}-*.yaml`
      references in `architecture-status.yaml` BEFORE the referenced
      ADR files existed on disk; rc34 ships the 8 referenced ADRs to
      resolve. The Rule G-2.a path-truth gate does NOT fire on these
      rows because they are `shipped: false` (only shipped:true rows
      require existing path resolution). Rule G-8.a fired on the
      graph node/edge baseline drift (rc33 didn't bump baseline for
      the rc34-shipped ADRs because the ADR files arrived in the
      follow-up commit). This is the same family pattern — multiple
      authority surfaces (status yaml capability rows, ADR files on
      disk, graph yaml node/edge counts, baseline_metrics) drifting
      relative to each other across a wave-pair. Closure: rc34 fixes
      baseline_metrics 448→464 / 756→826 / adr_count 92→100 in
      lockstep with the 8 new ADR file additions.

      **rc34-follow-up wave recurrence (2026-05-23, commit 6d730521).**
      Adversarial review of rc34 branch found 5 additional forms of
      cross-authority drift, all closed in the follow-up commit:
      (1) ADR-0112 Part A declares `Mono<StateDelta>` value-based-yield
      SPI but shipped `StatelessEngine.java` returns synchronous
      `StateDelta` and its javadoc declared the opposite direction —
      closed by ADR prose "Current shipped state" callout + javadoc
      forward-direction reference.
      (2) ADR-0108 declares 403 `tenant_mismatch` + WARN audit on
      GET/cancel but live `RunController` returns 404 silently with
      no audit emission — closed by ADR prose W1 widening direction
      clarification.
      (3) ADR-0114 / ADR-0115 / ADR-0111 / ADR-0109 reference 7
      not-yet-authored cross-cutting + governance files
      (`virtual-thread-pinning-hazards.md`,
      `agent-runtime-core-dissolution-migration.md`,
      `agent-client-wire-contract-compatibility.md`,
      `otlp-tenant-routing.yaml`, `secret-lifecycle.yaml`,
      `key-distribution.yaml`, `dual-track-routing-policy.yaml`) as
      "Ships with this ADR wave" / "(W2 NEW)" / "(W0 NEW)" prose —
      closed by revising to "(W2 follow-up — not yet authored)" /
      "(W3 follow-up — not yet authored)" prose.
      (4) `gate/build_architecture_graph.py` silently dropped
      ADR-0112's `supersedes_partial: [ADR-0019]` edge — closed by
      adding `supersedes_partial` branch at line 286; surfaces 2 nodes
      + 3 edges previously invisible; baseline_metrics lockstep bump
      464/826 → 466/829.
      (5) Rule R-C.2.a `scope_surfaces:` excluded
      `service/task/**` + `service/session/**` even though `Task.java`
      voluntarily self-validates `tenantId`; E105 enforcer `asserts:`
      text cited dissolved `agent-runtime-core` path — closed by
      scope widening + path retargeting.

      The rc34-follow-up wave demonstrates the family's recurrence
      pattern operates at TWO scales: cross-wave (rc33→rc34 ADR-shipped
      after status-yaml row references it) AND in-wave (rc34 ADR text
      asserts present-tense delivery for documents that don't exist
      in the same commit). Strengthens the case for a W2 ADR
      frontmatter-schema validation pass (rejects unknown top-level
      keys like `supersedes_partial:` until graph builder adds branch;
      asserts every `references:` path resolves on disk).

      **rc34-merge-train wave (2026-05-23, commits 769712f→993deb4→c87381b).**
      THIRD scale of the family pattern surfaced: merge-train freshness
      drift. PRs #54 + #35 + #34 squash-merged to main in sequence over
      ~2 minutes. PR #54 carried families.yaml content-diff for G-9.b
      compliance, but the squash collapsed it into commit 769712f. The
      subsequent squash-merges (993deb4 = docs-only PR #35; c87381b =
      run-dispatch Executor PR #34) did NOT carry their own families.yaml
      diff because their head branches predated PR #54's family-yaml
      edit. Rule G-9.b's first-parent comparison at c87381b sees
      families.yaml unchanged from 993deb4 (its parent) — even though
      it IS changed from 4e7c31b (pre-PR-#54 main). Result: c87381b's
      post-merge CI run on main fired G-9.b and turned main red.
      Corrective: this branch + PR bumps families.yaml content-diff
      satisfying G-9.b at its tip; restores main green. Underlying
      root cause: G-9.b first-parent semantics interact poorly with
      merge-train patterns where multiple PRs squash-merge in rapid
      succession. W2 remediation candidates: (a) treat signal-commit
      detection as cumulative-since-last-families.yaml-bump rather
      than nearest-signal-walking; (b) add merge-train-pattern
      detection to relax the per-commit requirement when the squash
      payload itself bumped families.yaml; (c) require contributors
      to rebase their PR head against latest main before merge so
      the second PR in a train inherits the first's family-yaml diff.
    surfaces:
      - docs/governance/architecture-status.yaml
      - docs/governance/architecture-graph.yaml
      - CLAUDE.md
      - docs/governance/rules/*.md
      - "**/module-metadata.yaml"
      - docs/contracts/contract-catalog.md
      - pom.xml
    prevention_rules:
      - Rule 106
      - Rule G-8
      - Rule G-8.e
      - Rule 107
      - Rule 108
      - Rule 109
    cleanup_status: structurally_addressed
    open_residual: |
      Every new rule MUST explicitly enumerate its authority surfaces
      (Rule G-8.b/.c/.e + Rule 109 + Rule G-9 frontmatter). Drift will
      reappear only if a rule introduces a new surface without declaring
      it.

      rc35-second-pass CI corrective (this commit, 2026-05-23): a sibling
      micro-recurrence at the squash-merge-pattern scale documented in
      rc34-merge-train. The rc35-second-pass CI run on commit 79a5dfc6
      (which touched check_parallel.sh's printf-%d-on-dotted-IDs bug +
      added the historical freeze marker to docs/logs/releases/2026-05-22-l0-rc32-*.md)
      fired Rule G-9.b first-parent freshness even though Commits A/B/C
      already bumped families.yaml in 64364cb/7343ee0/d1fa381, because
      G-9.b compares the LATEST signal-touching commit (79a5dfc6) against
      its first parent (d1fa381) and saw families.yaml unchanged between
      those two. This is the rc34-merge-train pattern at finer
      granularity — within a single PR, every signal-touching commit
      must carry a families.yaml content-diff, OR the helper must
      recognise cumulative-since-last-bump semantics. Closed by this
      paragraph (extending the per-commit content-diff discipline to
      intra-PR corrective commits). W2 remediation candidate (same as
      rc34-merge-train): teach check_recurring_families.sh's
      derive_signal_paths to skip commits whose own ancestry includes a
      families.yaml bump within the same PR.

  - id: F-deferred-clause-orphan
