      **rc34-merge-train wave (2026-05-23, commits 769712f→993deb4→c87381b).**
      THIRD scale of the family pattern surfaced: merge-train freshness
      drift. PRs #54 + #35 + #34 squash-merged to main in sequence over
      ~2 minutes. PR #54 carried families.yaml content-diff for G-9.b
      compliance, but the squash collapsed it into commit 769712f. The
      subsequent squash-merges (993deb4 = docs-only PR #35; c87381b =
      run-dispatch Executor PR #34) did NOT carry their own families.yaml
      diff because their head branches predated PR #54's family-yaml
      edit. Rule G-9.b's first-parent comparison at c87381b sees
      families.yaml unchanged from 993deb4 (its parent) — even though
      it IS changed from 4e7c31b (pre-PR-#54 main). Result: c87381b's
      post-merge CI run on main fired G-9.b and turned main red.
      Corrective: this branch + PR bumps families.yaml content-diff
      satisfying G-9.b at its tip; restores main green. Underlying
      root cause: G-9.b first-parent semantics interact poorly with
      merge-train patterns where multiple PRs squash-merge in rapid
      succession. W2 remediation candidates: (a) treat signal-commit
      detection as cumulative-since-last-families.yaml-bump rather
      than nearest-signal-walking; (b) add merge-train-pattern
      detection to relax the per-commit requirement when the squash
      payload itself bumped families.yaml; (c) require contributors
      to rebase their PR head against latest main before merge so
      the second PR in a train inherits the first's family-yaml diff.

      **rc39 formal-release-transaction recurrence (2026-05-25).**
      rc38 post-audit review found that HTTP cancel tenant semantics,
      idempotency replay wording, agent-engine promotion status, pinned
      OpenAPI fixtures, deferred clauses, and architecture-status claims
      could all be individually plausible while mutually inconsistent.
      Closure: rc39 aligns the authority surfaces to W1 current behavior
      and W2 forward triggers, then publishes a formal release note backed
      by generated evidence.

      **rc40 agent-execution-engine proposal recurrence (2026-05-25).**
      The L1 proposal document claimed immediate W0/W1 scope while still
      carrying pending boundary contracts, referenced non-current package names
      (`com.huawei.ascend.agent.engine`) and a non-current executor
      (`StatelessEngineExecutor`), and presented future dynamic compiler/APG/
      sandbox capabilities as if they were deployable current work. Closure:
      the proposal now separates current L0/L1 behavior, accepted-forward
      ADR-0112 direction, and W2+ exploratory items; Rule 122/123/124 reject
      the same contradiction class in future proposal documents.
    surfaces:
      - docs/governance/architecture-status.yaml
      - docs/governance/architecture-graph.yaml
      - CLAUDE.md
      - docs/governance/rules/*.md
      - "**/module-metadata.yaml"
      - docs/contracts/contract-catalog.md
      - pom.xml
      - docs/logs/reviews/*proposal*.md
      - agent-service/ARCHITECTURE.md
    prevention_rules:
      - Rule 106
      - Rule G-8
      - Rule G-8.e
      - Rule 107
      - Rule 108
      - Rule 109
      - Rule 122
      - Rule 123
      - Rule 124
      - Rule G-13 (rc42 W0 / ADR-0119) — forward-prevention link; single render context per surface guarantees agreement across release notes (W3), contract-catalog.md (W5), root ARCHITECTURE.md (W6), L1 ARCHITECTURE.md (W7), and CLAUDE.md rule index (W9); subsumes G-8.a/c/e in W10 cleanup.
    cleanup_status: structurally_addressed
    open_residual: |
      Every new rule MUST explicitly enumerate its authority surfaces
      (Rule G-8.b/.c/.e + Rule 109 + Rule G-9 frontmatter). Drift will
      reappear only if a rule introduces a new surface without declaring
      it.

      rc35-second-pass CI corrective (this commit, 2026-05-23): a sibling
      micro-recurrence at the squash-merge-pattern scale documented in
      rc34-merge-train. The rc35-second-pass CI run on commit 79a5dfc6
      (which touched check_parallel.sh's printf-%d-on-dotted-IDs bug +
      added the historical freeze marker to docs/logs/releases/2026-05-22-l0-rc32-*.md)
      fired Rule G-9.b first-parent freshness even though Commits A/B/C
      already bumped families.yaml in 64364cb/7343ee0/d1fa381, because
      G-9.b compares the LATEST signal-touching commit (79a5dfc6) against
      its first parent (d1fa381) and saw families.yaml unchanged between
      those two. This is the rc34-merge-train pattern at finer
      granularity — within a single PR, every signal-touching commit
      must carry a families.yaml content-diff, OR the helper must
      recognise cumulative-since-last-bump semantics. Closed by this
      paragraph (extending the per-commit content-diff discipline to
      intra-PR corrective commits). W2 remediation candidate (same as
      rc34-merge-train): teach check_recurring_families.sh's
      derive_signal_paths to skip commits whose own ancestry includes a
      families.yaml bump within the same PR.

