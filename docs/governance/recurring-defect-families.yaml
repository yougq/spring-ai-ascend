  - id: F-llm-fabricated-factual-claim
    title: "Hand-authored references to code paths / FQNs / test classes / contract operations that do not exist on disk"
    first_observed_rc: Fact-Layer-Round-1-W5
    last_observed_rc: Fact-Layer-Round-3-sweep
    occurrences:
      - Fact-Layer-Round-1-W5 (4 fabricated FP refs to RunsController.{createRun,cancelRun,getRun,listRuns} + RunControllerCreateIT/CancelIT/GetIT/ListIT)
      - Fact-Layer-Round-3-sweep (11 sibling fabrications in verification.dsl + features.dsl — RunControllerCreateIT.java, RunControllerCancelIT.java, EngineRegistryTest.java, PostureBootGuardTest.java, RunsControllerIT, S2cCallbackIT, SuspendResumeIT, ChildRunSpawnIT, CancelRunCrossTenantIT, TenantClaimFilterTest, GraphMemoryStoreTest)
    root_cause: |
      Hand-authored prose / DSL / YAML references to code paths, method
      names, FQNs, test classes, ADR ids, contract operation ids, or
      schema fields that do not exist on disk. The author (human or
      LLM) writes "plausible-sounding" references without cross-
      checking against the generated fact layer. Distinct from
      F-numeric-drift (which is about stale counts) because here the
      reference is structurally invalid, not merely outdated.
      Distinct from F-kernel-vs-implementation-drift (which is about
      kernel paragraphs lagging implementation) because here the
      direction is reversed: the docs claim behaviour the code never
      had.
    surfaces:
      - architecture/features/features.dsl (saa.verificationTestFqns, saa.verificationCommands)
      - architecture/features/function-points.dsl (saa.code_entrypoint_refs, saa.test_refs, saa.contract_op_refs)
      - architecture/features/verification.dsl (saa.sourceFile)
      - architecture/docs/L1/<module>/**.md (prose tables claiming Java FQNs / OSS refs)
      - docs/governance/rules/*.md (sub-clause enforcer citations)
      - docs/adr/*.yaml (consequences blocks referencing future-shipped code)
    prevention_rules:
      - "Rule G-15.d (Fact-Layer Integrity sub-clause d) FunctionPoint resolver — implemented Round-2 Wave A, extended Round-3 Wave Beta to also resolve features.dsl#saa.verificationTestFqns and verification.dsl#saa.sourceFile against generated facts"
      - "Round-3 Wave Beta truth-up: 15 hand-authored fabricated refs replaced with real FQNs / paths from tests.json + code-symbols.json + contract-surfaces.json"
      - "Round-3 Wave Alpha negative-fixture pattern (test_rule_131_c_extract_facts_drift_neg) — proves the resolver fails closed under mutation"
    cleanup_status: structurally_addressed
    open_residual: |
      The structural prevention (G-15.d resolver + Round-3 Wave Beta
      sweep + truth-up) closes every known fabricated ref. Family
      stays at `structurally_addressed` rather than `closed` until
      one full release cycle passes with zero new occurrences AND
      until the resolver is extended to cover non-shipped/non-http
      FunctionPoints if those grow `code_entrypoint_refs` / `test_refs`
      / `contract_op_refs` fields in future waves.

  - id: F-gate-machinery-fail-open-pattern
    title: "Gate machinery (shell scripts, Python checkers, Java gate-side code) that looks like it enforces a rule but cannot actually fail closed"
    first_observed_rc: Fact-Layer-Round-1-W1
    last_observed_rc: Fact-Layer-Round-3-sweep
    occurrences:
      - Fact-Layer-Round-1-W1 (declared gate green via `bash gate/check_parallel.sh` which silently skipped the workspace-gate tail)
      - Fact-Layer-Round-2-P1-1 (Rule G-15.c claimed byte-identical but only inspected a "DO NOT EDIT" banner)
      - Fact-Layer-Round-2-P1-2 (check_subclause_d returned [] unconditionally — empty stub)
      - Fact-Layer-Round-2-P1-3 (ContractFactExtractor swallowed parse failures as `parse_failed: true` facts)
      - Fact-Layer-Round-2-P2-3 (CodeSymbolFactExtractor + TestInventoryFactExtractor silent `continue;` on missing target/classes)
      - Fact-Layer-Round-3-R1 (Rule 131 ExtractFactsCli block `... 2>&1 || true)` masking $? — gate fail-open)
      - Fact-Layer-Round-3-sweep-defect-12 (check_architecture_workspace.sh:114 legacy-graph comparison `|| true` silently lost non-zero exit)
    root_cause: |
      Gate machinery declared as enforcing a rule but unable to fail
      closed because of one of these silent-pass mechanisms: empty
      function stub returning empty-finding default; silent `continue;`
      on missing prerequisite without distinguishing "no work" from
      "broken state"; `|| true` masking command exit code that's then
      checked downstream; check defined but not invoked from the
      canonical gate driver; exception caught and converted into a
      "parse_failed" stub fact rather than re-raised.
    surfaces:
      - gate/check_architecture_sync.sh
      - gate/check_architecture_workspace.sh
      - gate/check_parallel.sh
      - gate/rules/rule-*.sh
      - gate/lib/check_*.py
      - tools/architecture-workspace/.../facts/*Extractor.java
    prevention_rules:
      - "gate/fail-open-allowlist.txt (Round-3 Wave Alpha) — explicit allowlist for legitimate fail-open patterns; empty by design"
      - "test_rule_131_meta_no_fail_open_pipelines (Round-3 Wave Alpha) — meta self-test greps gate scripts for `|| true` + `$?` capture; fails closed on any non-allowlisted occurrence"
      - "test_rule_131_c_extract_facts_drift_neg (Round-3 Wave Alpha) — negative-fixture pattern that mutates a generated fact file and proves the gate fails on drift"
      - "Round-3 Wave Alpha: replaced `|| true` + `$?` capture with `if ! cmd; then fail; fi` form across the Rule 131 ExtractFactsCli block and check_architecture_workspace.sh:114"
      - "Round-3 Wave Alpha workspace baseline parity gate (gate/lib/check_workspace_baseline_parity.py) — fails closed on workspace_elements / workspace_relationships drift"
    cleanup_status: structurally_addressed
    open_residual: |
      The meta self-test + allowlist + negative fixture together
      prevent recurrence of the known fail-open sub-patterns. Promotion
      to `closed` requires (a) one full release cycle with zero new
      occurrences AND (b) widening the meta-test to also scan Python
      checkers for `return []` stubs and Java extractors for swallow-
      with-stub patterns (deferred to a future enhancement; currently
      relies on human review for those surfaces).

  - id: F-acceptance-evidence-misses-target-branch
    title: "Acceptance-evidence claim (test fixture / response-file verification log) exercises a different code path than the rule it claims to validate"
    first_observed_rc: Fact-Layer-Round-3-W3
    last_observed_rc: Fact-Layer-Round-4-R4
    occurrences:
      - Fact-Layer-Round-3-W3-negative-drift-proof (mutation appended a comment line to code-symbols.json — broke JSON validity, so the gate failure was caught at G-15.b not the cited G-15.c)
      - Fact-Layer-Round-3-W3-response-overclaim (line 155-156 claimed "all 7 catalogs OK" when agent-bus was actually drifted; the cited command would have shown DRIFT had it been run honestly)
      - Fact-Layer-Round-3-W3-test_rule_131_c_extract_facts_drift_neg (fixture invoked ExtractFactsCli directly rather than the canonical gate, so couldn't prove shell propagation)
    root_cause: |
      A test fixture, response-file verification log, or release-evidence
      claim asserts that a particular rule branch (or rule path) is
      validated, but the cited command actually exercises a different,
      upstream rule branch that catches the mutation first; OR the
      cited command invokes a sub-helper instead of the canonical gate
      driver, hiding propagation defects. The test passes vacuously
      with respect to the claimed rule. Distinct from
      F-half-built-state-machine (where tests don't exist at all)
      because here tests DO exist but exercise the wrong surface.
      Distinct from F-gate-machinery-fail-open-pattern because the
      gate machinery itself may be correct; the defect is in the
      EVIDENCE that the gate works.
    surfaces:
      - gate/test_architecture_sync_gate.sh `test_rule_NNN_*_neg` fixtures
      - docs/reviews/*-response.en.md verification logs
      - docs/logs/releases/*.md release-evidence sections
      - ADR consequences blocks claiming "X is enforced by Y" where Y exercises an upstream check
      - recurring-defect-family prevention_rules entries citing test fixtures that bypass canonical-gate propagation
    prevention_rules:
      - "Round-4 Wave Alpha R3 redesign: Rule G-15.c split into .c.structural (bash gate) + .c.bytes (Maven Surefire FactLayerByteIdentityIT) so the test infrastructure for byte-identity lives where the precondition is guaranteed by lifecycle (Maven compile phase), eliminating the silent-skip surface"
      - "Round-4 Wave Beta Rule 132 (feature_catalog_render_idempotency) wires render_features_catalog.py --check into the canonical gate AND adds test_rule_132_feature_catalog_drift_neg fixture that mutates the catalog + invokes the same detector the gate invokes — fixture exercises the exact same code path the canonical gate exercises"
      - "Future enhancement (Round-5+): meta self-test that for every blocking `_neg` fixture, audits whether the fixture invokes `bash gate/check_architecture_sync.sh` (the canonical gate) OR is documented as a sub-rule unit test"
    cleanup_status: structurally_addressed
    open_residual: |
      The R3 redesign moves byte-identity validation to Maven where
      lifecycle guarantees apply, sidestepping the precondition-skip
      class entirely. Future tests are required to invoke the canonical
      gate directly (Rule 132 fixture pattern) when proving rule
      propagation. Promotion to `closed` requires one full release
      cycle with zero new occurrences AND the future meta-test that
      automates fixture-method auditing.
  - id: F-agent-service-internal-boundary-drift
