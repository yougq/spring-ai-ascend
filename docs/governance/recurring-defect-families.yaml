    prevention_rules:
      - Rule G-1.1 (rc22 / ADR-0099) — 3 sub-clauses + 3 enforcers + 6 fixtures
      - rc27 corrective — real helpers shipped (gate/lib/check_l1_dev_view_tree.sh + check_l1_spi_appendix.sh); placeholder pass_rule stubs replaced
      - rc28 corrective — module-prefix bug fix (hyphenated names), tree-block basename-equality, fail-closed on helper-missing
      - rc29 corrective — LCP-based module-prefix derivation, full-relative-path dev-view match, Rule 44 fixed-string grep (regex-injection safe), IdempotencyStore prose 3-place cleanup
      - rc30 CI-corrective — sed delimiter collision fix in check_l1_dev_view_tree.sh + tree-block dir cleanup (agent-middleware src/main/resources/, agent-service bootstrap/)
      - rc32 CI-corrective — replace `find | xargs -I{} basename {}` with `find -printf '%f\n'` in check_l1_dev_view_tree.sh; the xargs form silently dropped entries on GitHub Actions runners (CI failed `missing-dir:orchestration/` despite the directory existing); -printf is ~50-100x faster + race-free.
      - Rule G-13 (rc42 W0 / ADR-0119) — forward-prevention link; W7 makes the Development View tree (G-1.1.a) and SPI Appendix (G-1.1.b) RENDERED sections fed by a module-tree scan + spi_packages + Java SPI source scan; grounding gaps become impossible by construction because the rendered tree IS the source-tree scan output.
      - rc55 OSS comparison review follow-up — keep the full comparison source as a review record and require generated review summaries to preserve project-by-project evidence, not only conclusions.
      - rc55 capability-feature review follow-up — require derived L1 feature lists to be grouped by full module ownership and anchored in business scenarios, data flow, control flow, normal/exception paths, and OSS-average capability checks before claiming decompositional clarity.
      - rc55 capability-feature scenario follow-up — require Agent Service capability reviews to expand canonical scenarios into concrete enterprise Agent access, recovery, delegation, third-party Agent, client-hosted skill, and configuration-ownership cases before deriving module features.
    cleanup_status: monitoring
    open_residual: |
      Rule G-1.1 ratifies the depth/grounding discipline. rc22 rewrote
      all 6 agent-* ARCHITECTURE.md files. rc27 shipped the real gate
      helpers (gate/lib/check_l1_dev_view_tree.sh + check_l1_spi_appendix.sh
      + 6 fixtures test_rule_118/119/120). Sub-clause .c (L2 Constraint
      Linkage) is vacuously green because no L2 documents exist yet; the
      rule arms for W3+ when L2 docs land.
      rc32 reopen rationale: the family was prematurely marked closed at
      rc29, but rc30 surfaced a NEW occurrence — the rc29 sed-delimiter
      fix in check_l1_dev_view_tree.sh introduced a regression where
      Rule 118 silently passed every input. Status reset to `monitoring`
      pending 3-rc cool-down (rc32 + rc33 + rc34) with no recurrence
      before re-promotion to closed. The cool-down convention introduced
      in rc20 Wave 1 / ADR-0097 applies here too.
      rc40 resets the cool-down because the service architecture document
      again drifted from code reality; the appendix now separates the 7 active
      Java SPI interfaces from SPI-adjacent structural carriers. rc55 OSS
      comparison review follow-up resets the review-artefact side of the same
      family: summaries must keep enough comparison evidence for reviewers to
      audit why each OSS pattern is accepted, modified, or rejected. rc55
