  - id: F-non-english-in-tier1-authority
    title: Non-English Text in Tier-1 Auto-Loaded Authority
    first_observed_rc: engineport-frame-authority-convergence-2026-05-29
    last_observed_rc: engineport-frame-authority-convergence-2026-05-29
    occurrences: [engineport-frame-authority-convergence-2026-05-29]
    root_cause: |
      The kernel mandate "translate all instructions into English before any
      model call" applies to the Tier-1 auto-loaded authority set
      (product/PRODUCT.md, claims.yaml, personas.yaml, journey.md and the
      other files with a non-zero ceiling in gate/always-loaded-budget.txt).
      Source inputs and product authority were authored in Chinese first and
      the Chinese text persisted in the auto-loaded surfaces, so every model
      call silently ingested non-English authority — defeating the
      English-only contract precisely where it matters most (the always-loaded
      tier seen by every agent on every turn). This wave translated the
      product/* surfaces to English and archived the Chinese originals under
      product/source-inputs/. The defect is structural: any future Tier-1
      surface authored or imported in another language re-introduces the
      class unless a gate fails closed on it.
    surfaces:
      - product/PRODUCT.md
      - product/claims.yaml
      - product/personas.yaml
      - product/journey.md
      - gate/always-loaded-budget.txt
    prevention_rules:
      - Rule G-25 (Tier-1 Non-English / Mojibake Lint) — RETIRED 2026-06-03.
        Its Rule 142 gate check + check_tier1_non_english.py checker were
        already retired from the active gate during the governance rebalancing;
        the dead card + checker were deleted in the gate-residue cleanup. The
        Tier-1 English-only invariant is now convention-only (unenforced).
    cleanup_status: monitoring
    open_residual: |
      The Tier-1 English-only invariant is no longer gate-enforced — Rule 142 /
      G-25 + check_tier1_non_english.py were retired and deleted (the team now
      works in Chinese while keeping governed always-loaded FILES English by
      convention). Re-introduce a Tier-1 CJK/mojibake gate if file-fidelity
      regressions appear; until then this family is convention-monitored only.

  - id: F-local-plan-path-in-active-authority
    title: Local Plan-Path Reference in Active Authority
    first_observed_rc: engineport-frame-authority-convergence-2026-05-29
    last_observed_rc: engineport-frame-authority-convergence-2026-05-29
    occurrences: [engineport-frame-authority-convergence-2026-05-29]
    root_cause: |
      Active authority surfaces (product/*, docs/adr, docs/governance,
      architecture/*, CLAUDE.md, rule cards, the gate/lib/extract_rules.sh
      emitter and gate/config.yaml) carried hard references to a
      machine-local plan file path under a developer home directory
      (a drive-prefixed `.claude/plans/...` path). The path is unresolvable on any other
      machine and in CI, so an authority surface pointed at content no
      reviewer or build agent can read — an authority dangling-pointer. The
      extract_rules.sh emitter then propagated the local path into all 150
      gate/rules/*.sh mirrors. This wave stripped or demoted the plan-path
      references across the corpus and fixed the emitter so regenerated
      mirrors carry only the stable structural citation.
    surfaces:
      - product
      - docs/adr
      - docs/governance
      - architecture
      - CLAUDE.md
      - gate/lib/extract_rules.sh
      - gate/config.yaml
      - gate/local-plan-path-exemptions.txt
    prevention_rules:
      - Rule G-26 (Local Plan-Path Ban, enforcer E191) — fails closed when an
        active authority surface references a machine-local plan path outside
        the explicit allowlist in gate/local-plan-path-exemptions.txt.
    cleanup_status: monitoring
    open_residual: |
      Rule G-26 scans the named authority surfaces against an explicit
      exemption allowlist. Plan-path references in non-authority working
      notes (e.g. interaction logs under docs/logs/) remain out of scope.
      Promotion to `closed` requires one full release cycle with zero new
      occurrences after G-26 went blocking.
