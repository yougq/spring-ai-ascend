  - id: F-bulk-scrub-orphan-syntax
    title: Bulk Regex Scrub Leaves Orphan Punctuation in Code Comments
    first_observed_rc: rc27
    last_observed_rc: rc32
    occurrences: [rc27, rc28, rc31, rc32]
    root_cause: |
      Rule D-9 (no version/log metadata in code) is enforced by a bulk
      per-line regex scrub across .java/.py/.sh files. The scrub deletes
      tokens like "per ADR-NNNN", "rcN", "(legacy Rule NN)", "Wave N",
      etc. — but the surrounding punctuation that bound those tokens
      (open parens, leading commas, sentence-final periods, trailing
      "+" connectors, "(`)" pointers) is preserved by the regex. The
      result is orphan punctuation: ".b)" after stripping "legacy 41.b",
      ", the relationship" after stripping a leading clause, "* ." on a
      line by itself, "()" empty parens after stripping the ref. The
      pattern recurred at rc27 D-9 scrub, rc28 ADV-9 (6 files patched),
      rc31 ADV4-1..3 + 2 follow-ups (5 files), and again at rc32 (8
      residuals in 6 package-info files). The structural fix is to
      ALSO scrub the punctuation that bounded the deleted token, or
      to forbid bulk regex scrubs entirely in favour of per-file
      semantic review.
    surfaces:
      - "**/*.java javadoc and inline comments"
      - "**/*.py docstrings and comments"
      - "gate/**/*.sh comment headers"
    prevention_rules:
      - Rule D-9 (rc20 — the scrub being enforced)
      - rc27 grandfather list (54 pre-existing files, sunset 2026-11-21)
      - rc32 corrective — register family; future D-9 scrub passes MUST also strip bounding punctuation OR use AST-aware tooling
    cleanup_status: partial
    open_residual: |
      The bulk-regex scrub pattern is structurally fragile. Future
      Rule D-9 enforcement waves should switch to AST-aware tooling
      (JavaParser, libCST for python, shfmt for shell) so the deleted
      token's neighbours can be properly re-bound. Until then this
      family will recur on every new metadata-scrub pass. Considered
      registering this in rc31 (commit 5597ed8 message acknowledged
      the pattern as a candidate family) but not formally landed
      until rc32.

  - id: F-nonatomic-run-status-write
    title: Non-Atomic Runtime State Write Loses Tenant or Terminal-State Invariants
    first_observed_rc: rc35
    last_observed_rc: rc39-formal-release-transaction
    occurrences: [rc35-correctness-batch, rc35-second-pass, rc36, rc38, rc39-formal-release-transaction]
    root_cause: |
      A Run status transition done as a separate re-read (`findById`) then
      blind write (`save`) is not atomic relative to a parallel terminal
      write. A `RunController.cancel` (or any surface) that writes CANCELLED
      between the re-read and the save is silently overwritten: the mutator
      validates its transition against the STALE snapshot (e.g. RUNNING →
      SUCCEEDED passes) and blind-puts over the just-written CANCELLED, so the
      user's cancel is lost. The class recurred across four passes, each
      closing one set of call-sites while a sibling set survived:
      rc35-correctness-batch closed the three terminal SUCCEEDED/FAILED sites;
      rc35-second-pass closed the five non-terminal sites (PENDING→RUNNING,
      RUNNING→SUSPENDED ×2, SUSPENDED→RUNNING ×2); rc36 closed the
      `RunController.cancel` half via the new atomic
      `RunRepository.updateIfNotTerminal` compare-and-set; rc38 found that the
      `SyncOrchestrator`'s OWN private `mutateIfNotTerminal` helper — the very
      indirection the earlier waves routed writes through — was STILL a
      non-atomic `findById`-then-`save`, so a cancel interleaving between its
      re-read and write was still lost. Closure: the helper now delegates to
      `RunRepository.updateIfNotTerminal` (re-read + terminal-check + mutate +
      write as one `computeIfPresent` step), and a deterministic single-threaded
      regression test injects a cancel into the exact read-modify-write window
      the prior latch-based tests skipped. rc39 broadened the same family to
      tenant-owned runtime state after `InMemoryTaskStateStore.save` was found
      doing `get` → tenant-check → `put`; it now uses
      `ConcurrentHashMap.compute` and has a two-tenant race regression test.
      The class was never registered as a family before rc38, so the ledger
      could not flag the recurrence.
    surfaces:
      - "agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/SyncOrchestrator.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/platform/web/runs/RunController.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/runtime/runs/spi/RunRepository.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/InMemoryRunRegistry.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/task/InMemoryTaskStateStore.java"
    prevention_rules:
      - Rule R-C.2.b (rc13 — every Run.withStatus validates via RunStateMachine; the state-machine layer)
      - rc36 — atomic RunRepository.updateIfNotTerminal CAS established as the single sanctioned status-transition path (ADR-0116)
      - rc38 — SyncOrchestrator routed through the CAS + deterministic read-modify-write-window regression test; family registered (ADR-0118)
      - rc39 — RunRepository.updateIfNotTerminal made abstract; production RunRepository.save calls source-guarded to create-only sites; InMemoryTaskStateStore tenant writes made atomic with compute + concurrency test
    cleanup_status: monitoring
    open_residual: |
      The known RunRepository and TaskStateStore surfaces now have focused
      source or concurrency guards. Keep the family under monitoring until
      three subsequent release waves pass without another read-check-write
      sibling. Any new tenant-owned or status-owned repository reference
      implementation must use compute/compare-and-set/conditional UPDATE for
      invariants that span read + validation + write.

  - id: F-project-tool-pin-drift
    title: Project-Local Dev-Tool Pin Drift and Manifest Inconsistency
    first_observed_rc: rc40-preventive
    last_observed_rc: rc50-nodegraph-evidence
    occurrences: [rc40-codegraph-mcp-onboarding, rc50-nodegraph-evidence]
    root_cause: |
      Project-local development tools wired into the Claude Code MCP layer
      (or any equivalent contributor surface) keep three independent surfaces
      in lockstep: a package.json that pins versions, a package-lock.json
      that pins the integrity-hashed dependency tree, and a .mcp.json (or
      equivalent) that names where the binary lives. Each surface is easy to
      edit in isolation: a contributor relaxes the version to a caret range
      ("^0.9.4") thinking npm will handle minor drift; another regenerates
      the lockfile against a registry that does not mirror per-platform
      optionalDependencies; a third changes the shim path in .mcp.json
      thinking PATH lookup will find the binary. Each change passes the
      shape-only review the file gets. None of them announce themselves at
      runtime — Claude Code simply fails to start the MCP server with an
      obscure error pointing nowhere — and the next contributor's `npm ci`
      silently installs a different binary than the previous contributor
      used, breaking the onboarding flow that Rule R-A's "first-agent
      execution without platform-team intervention" clause depends on.
      Registered preventively at the codegraph integration so the family is
      gateable before any incident, rather than after the third one.
    surfaces:
      - "tools/codegraph/package.json"
      - "tools/codegraph/package-lock.json"
      - ".mcp.json"
      - "gate/lib/build_codegraph_nodegraph_evidence.py"
    prevention_rules:
      - Rule R-A (rc1 — Business/Platform Decoupling + Developer Self-Service kernel)
      - Rule 125 / E173 (rc40 — codegraph_install_truth gate: exact-pin + lockfileVersion>=3 + .mcp.json relative-shim ref; pinning-truth gate, not install-state)
    cleanup_status: structurally_addressed
    open_residual: |
      Rule 125 remains codegraph-specific for install-truth (it hard-codes
      the @colbymchenry/codegraph package name + the tools/codegraph/ path),
      but rc50 adds a separate local nodegraph evidence builder so the
      regenerated `.codegraph/codegraph.db` artifact is included in release
      evidence without committing the SQLite database. The builder also
      distinguishes a clean git worktree (`repository.dirty: false`) from
      a non-git or unreadable worktree (`repository.dirty: null`) so release
      evidence does not conflate unknown status with clean status. A future
      second project-local MCP tool either re-uses the same structural
      template (a sibling rule with its own package name + path pair plus
      local artifact evidence) or the rule is generalized to walk all
      entries of `.mcp.json#mcpServers` and verify a `tools/<name>/`
      manifest exists per entry. Generalization is deferred until a second
      tool actually lands; current state is a single concrete enforcer plus
      a concrete nodegraph evidence builder matching the single concrete
      tool the platform ships. The local `.codegraph/codegraph.db` and
      generated `gate/release-ci-evidence/*codegraph-nodegraph*.evidence.yaml`
      bundles are intentionally not G-9.b signal surfaces: the former is
      git-ignored local state, and the latter is release output.

  - id: F-l0-agentic-primitive-gap
    title: L0 Agentic-Primitive Contract Surface Gap
    first_observed_rc: rc41
    last_observed_rc: rc51-agentic-completeness
    occurrences: [rc41-final-release-readiness, rc50-post-closure-senior-architect-review, rc51-agentic-completeness]
    root_cause: |
      At rc41 final-release-readiness, an independent senior-architect
      review (Java microservices + agent-architecture reviewer) flagged
      that seven L0-level contract shapes for the core agentic primitives
      were missing from the platform SPI surface — Agent, ModelGateway,
      Tool (vs Skill semantic), unified MemoryStore, VectorStore /
      Retriever / EmbeddingModel, Planner — plus the Spring AI integration
      boundary was undeclared (the BoM was imported but zero production
      Java referenced any Spring AI type). The project name
      `spring-ai-ascend` and ARCHITECTURE.md §1.1 Audience B promise
      ("external Spring developers integrating into their own Spring Boot
      4 + Java 21 applications") advertised extension seams that did not
      exist as Java SPI interfaces or `docs/contracts/*.yaml` shapes.
      Root mechanism: SCOPE CONFLATION — the rc41 closure framed "L0 =
      structural skeleton + governance" as equivalent to "L0 = agent-
      platform contract layer". For a generic job runtime that framing
      would have held; for a brand-promising agent platform it left an
      L0-level credibility gap. Rule R-A "Business/Platform Decoupling"
      was VACUOUSLY satisfied (no extension surface meant no possibility
      of failure), masking the gap from existing parity gates. Discovered
      via docs/logs/reviews/2026-05-25-l0-senior-architect-reopen-recommendation.en.md.
    surfaces:
      - "agent-middleware/src/main/java/com/huawei/ascend/middleware/{model,skill,memory,vector,retrieval,embedding}/spi/"
      - "agent-execution-engine/src/main/java/com/huawei/ascend/engine/planner/spi/"
      - "agent-service/src/main/java/com/huawei/ascend/service/agent/spi/"
      - "agent-service/src/main/java/com/huawei/ascend/service/integration/springai/"
      - "docs/contracts/{agent-definition,model-invocation,skill-definition,memory-store,vector-store,planning-request,plan}.v1.yaml"
      - "docs/adr/01{20,21,22,23,24,25,26,27,28}-*.yaml"
    prevention_rules:
      - Rule R-A (rc1 — Business/Platform Decoupling + Developer Self-Service; rc43 re-armed non-vacuously via Agent/ModelGateway/Skill/Memory/Vector extension seams; rc51 widened to cover prompt-template + chat-advisor + structured-output + streaming surfaces so Audience B never needs to import org.springframework.ai.chat.{prompt,model.advisor,converter}.* directly)
      - Rule R-D (rc1 — SPI + DFX + TCK co-design + catalog integrity; iterating logic auto-validates the 12 new rc43 SPIs + 5 new rc51 SPIs across catalog ↔ metadata ↔ DFX)
      - Rule G-1.1.b (rc22 — L1 SPI Appendix 4-way parity; rc49 correction makes the rc43 appendix explicit for all 14 new SPI rows; rc51 widens the agent-middleware §SPI Appendix from 7 to 9 spi_packages, +5 SPI rows, +6 structural-carrier catalog entries)
      - ADR-0120 / ADR-0121 / ADR-0122 / ADR-0123 / ADR-0124 / ADR-0125 / ADR-0126 / ADR-0127 / ADR-0128 (rc43 — the 9 ADRs that land the contract shapes as design_only with explicit W2-W4 promotion triggers)
      - ADR-0129 / ADR-0130 / ADR-0131 / ADR-0132 / ADR-0133 / ADR-0134 / ADR-0135 (rc51 — streaming-aware ModelGateway, StructuredOutputConverter<T>, PromptTemplate, ChatAdvisor + AdvisorChain, ConversationMemory variant, Tool-Call Iteration Loop semantics supplement, AgentSession-as-Run-projection deliberate-non-SPI capture)
    cleanup_status: closed
    open_residual: |
      Implementation of the 19 new SPI interfaces (14 rc43 + 5 rc51) is
      W2-W4 staged per the ADRs:
        - W2 LLM gateway       → wires SpringAiChatModelGateway functional + ModelGateway.stream + StructuredOutputConverter
        - W2 skill registry    → wires SpringAiToolCallbackSkillAdapter functional
        - W2 prompt-rendering  → wires SpringAiPromptTemplateAdapter functional
        - W2 advisor binding   → wires ChatAdvisor chain into HookDispatcher (Telemetry Vertical co-arrival per ADR-0061 §7)
        - W2 chat memory       → first real ConversationMemory impl
        - W2 memory adapters   → first real MemoryStore impl
        - W3 RAG vertical      → SpringAiVectorStoreAdapter + Retriever + EmbeddingModel functional; RetrievalOptions gains cacheStrategy field per ADR-0135
        - W3 SDK GA            → AgentRegistry runtime + AgentExecutorDefinitionFactory wired
        - W4 planner           → first real Planner impl
      The contract surface gap is closed at rc51 by construction (all 19
      SPI interfaces compile, contract YAMLs registered design_only, 4-way
      parity (catalog ↔ metadata ↔ DFX ↔ L1 SPI Appendix) holds). The rc43
      closure-by-construction at one layer of agentic primitives left
      developer-ergonomics primitives (PromptTemplate, ChatAdvisor,
      StructuredOutputConverter) and the streaming output shape unmodelled;
      the rc50 post-closure senior-architect review surfaced this gap as
      a same-family second occurrence and rc51 closes it. Future addition
      of new L0-level primitives (e.g., Observability SPI, Audit SPI,
      Workflow SPI) MUST follow the same "land contract shape at L0 even
      when implementation defers" pattern this family establishes;
      scope-conflation between "structural skeleton" and "agent contract
      layer" (historical pre-Phase-C `agent-platform` Maven module was
      merged into agent-service via ADR-0078; this paragraph uses the
      generic noun phrase in the modern Audience-B narrative sense) must
      be flagged at each L0 final-release-readiness review, and the
      META-lesson from rc51 is: closure-by-construction at one primitive
      tier (rc43: Agent/Skill/Memory/Vector/Planner) can mask gaps at the
      adjacent ergonomics tier (rc51: Prompt/Advisor/StructuredOutput/
      Streaming) — every L0 closure review MUST also scan the developer-
      ergonomics surface.
