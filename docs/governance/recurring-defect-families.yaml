      deletes the dead duplicate).

  - id: F-cross-authority-tenant-scope-claim-without-field
    title: Authority Surface Claims a Tenant-Scope Field That Does Not Exist on the Carrier Java Type
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      docs/contracts/contract-catalog.md (or agent-*/ARCHITECTURE.md §SPI
      Appendix) declares a structural carrier as tenant-scoped via tenant
      resolved by <Carrier>.tenantId field (Rule R-C.c) — but the named
      field does NOT exist on the carrier record. The honest Java javadoc
      admits tenant resolution is out-of-band (e.g. via a Transport
      registry binding at the wrapping Run boundary), creating a direct
      lie between the catalog row and the type. Rule G-8.e enforces
      structural-carrier package-and-class existence but not field-level
      claims. Sibling of F-design-artifact-omits-tenant-spine (which is
      about diagrams ELIDING tenantId); here the diagram / catalog
      ASSERTS a tenantId that isn't there. Surfaced 2026-05-27 by
      contract-catalog.md:90 claiming S2cCallbackEnvelope.tenantId field
      while the Java record at
      agent-bus/src/main/java/com/huawei/ascend/bus/spi/s2c/S2cCallbackEnvelope.java:26-35
      has 8 components and NONE is tenantId.
    surfaces:
      - docs/contracts/contract-catalog.md
      - architecture/docs/L1/*/ARCHITECTURE.md
      - architecture/docs/L1/**/spi-appendix.md
    prevention_rules:
      - "candidate gate-rule W5+ — parse contract-catalog.md rows matching tenant-scoped.*<Carrier>.tenantId → resolve <Carrier> via codegraph_node → FAIL if the type has no tenantId record component / field"
    cleanup_status: incomplete
    open_residual: |
      AUD-EVT-6 (contract-catalog.md:90 claims S2cCallbackEnvelope.tenantId
      field that does not exist; preferred fix is to ADD the field to the
      Java record per Rule R-C.c, alternative is to rewrite the catalog
      row to tenant resolved out-of-band via S2cCallbackTransport registry
      binding at wrapping Run boundary, per ADR-0074 §Consequences).
      Closure also requires re-sweep of every other tenant-scoped row in
      contract-catalog.md to verify field existence.

