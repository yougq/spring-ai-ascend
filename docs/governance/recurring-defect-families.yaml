  - id: F-bulk-scrub-orphan-syntax
    title: Bulk Regex Scrub Leaves Orphan Punctuation in Code Comments
    first_observed_rc: rc27
    last_observed_rc: rc32
    occurrences: [rc27, rc28, rc31, rc32]
    root_cause: |
      Rule D-9 (no version/log metadata in code) is enforced by a bulk
      per-line regex scrub across .java/.py/.sh files. The scrub deletes
      tokens like "per ADR-NNNN", "rcN", "(legacy Rule NN)", "Wave N",
      etc. — but the surrounding punctuation that bound those tokens
      (open parens, leading commas, sentence-final periods, trailing
      "+" connectors, "(`)" pointers) is preserved by the regex. The
      result is orphan punctuation: ".b)" after stripping "legacy 41.b",
      ", the relationship" after stripping a leading clause, "* ." on a
      line by itself, "()" empty parens after stripping the ref. The
      pattern recurred at rc27 D-9 scrub, rc28 ADV-9 (6 files patched),
      rc31 ADV4-1..3 + 2 follow-ups (5 files), and again at rc32 (8
      residuals in 6 package-info files). The structural fix is to
      ALSO scrub the punctuation that bounded the deleted token, or
      to forbid bulk regex scrubs entirely in favour of per-file
      semantic review.
    surfaces:
      - "**/*.java javadoc and inline comments"
      - "**/*.py docstrings and comments"
      - "gate/**/*.sh comment headers"
    prevention_rules:
      - Rule D-9 (rc20 — the scrub being enforced)
      - rc27 grandfather list (54 pre-existing files, sunset 2026-11-21)
      - rc32 corrective — register family; future D-9 scrub passes MUST also strip bounding punctuation OR use AST-aware tooling
    cleanup_status: partial
    open_residual: |
      The bulk-regex scrub pattern is structurally fragile. Future
      Rule D-9 enforcement waves should switch to AST-aware tooling
      (JavaParser, libCST for python, shfmt for shell) so the deleted
      token's neighbours can be properly re-bound. Until then this
      family will recur on every new metadata-scrub pass. Considered
      registering this in rc31 (commit 5597ed8 message acknowledged
      the pattern as a candidate family) but not formally landed
      until rc32.

  - id: F-nonatomic-run-status-write
    title: Non-Atomic Runtime State Write Loses Tenant or Terminal-State Invariants
    first_observed_rc: rc35
    last_observed_rc: rc55-pr76-agent-service-interface-drift-review
    occurrences: [rc35-correctness-batch, rc35-second-pass, rc36, rc38, rc39-formal-release-transaction, rc55-pr76-agent-service-interface-drift-review]
    root_cause: |
      A Run status transition done as a separate re-read (`findById`) then
      blind write (`save`) is not atomic relative to a parallel terminal
      write. A `RunController.cancel` (or any surface) that writes CANCELLED
      between the re-read and the save is silently overwritten: the mutator
      validates its transition against the STALE snapshot (e.g. RUNNING →
      SUCCEEDED passes) and blind-puts over the just-written CANCELLED, so the
      user's cancel is lost. The class recurred across four passes, each
      closing one set of call-sites while a sibling set survived:
      rc35-correctness-batch closed the three terminal SUCCEEDED/FAILED sites;
      rc35-second-pass closed the five non-terminal sites (PENDING→RUNNING,
      RUNNING→SUSPENDED ×2, SUSPENDED→RUNNING ×2); rc36 closed the
      `RunController.cancel` half via the new atomic
      `RunRepository.updateIfNotTerminal` compare-and-set; rc38 found that the
      `SyncOrchestrator`'s OWN private `mutateIfNotTerminal` helper — the very
      indirection the earlier waves routed writes through — was STILL a
      non-atomic `findById`-then-`save`, so a cancel interleaving between its
      re-read and write was still lost. Closure: the helper now delegates to
      `RunRepository.updateIfNotTerminal` (re-read + terminal-check + mutate +
      write as one `computeIfPresent` step), and a deterministic single-threaded
      regression test injects a cancel into the exact read-modify-write window
      the prior latch-based tests skipped. rc39 broadened the same family to
      tenant-owned runtime state after `InMemoryTaskStateStore.save` was found
      doing `get` → tenant-check → `put`; it now uses
      `ConcurrentHashMap.compute` and has a two-tenant race regression test.
      The class was never registered as a family before rc38, so the ledger
      could not flag the recurrence.
    surfaces:
      - "agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/SyncOrchestrator.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/platform/web/runs/RunController.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/runtime/runs/spi/RunRepository.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/InMemoryRunRegistry.java"
      - "agent-service/src/main/java/com/huawei/ascend/service/task/InMemoryTaskStateStore.java"
    prevention_rules:
      - Rule R-C.2.b (rc13 — every Run.withStatus validates via RunStateMachine; the state-machine layer)
      - rc36 — atomic RunRepository.updateIfNotTerminal CAS established as the single sanctioned status-transition path (ADR-0116)
      - rc38 — SyncOrchestrator routed through the CAS + deterministic read-modify-write-window regression test; family registered (ADR-0118)
      - rc39 — RunRepository.updateIfNotTerminal made abstract; production RunRepository.save calls source-guarded to create-only sites; InMemoryTaskStateStore tenant writes made atomic with compute + concurrency test
    cleanup_status: monitoring
    open_residual: |
      The known RunRepository and TaskStateStore surfaces now have focused
      source or concurrency guards. Keep the family under monitoring until
      three subsequent release waves pass without another read-check-write
      sibling. Any new tenant-owned or status-owned repository reference
      implementation must use compute/compare-and-set/conditional UPDATE for
      invariants that span read + validation + write.
      rc55 PR #76 interface-drift review keeps this family open for design/API
      surface monitoring: the current Java SPI has atomic terminal-state CAS,
      but `RunRepository.updateIfNotTerminal(UUID runId, UnaryOperator<Run>)`
      still lacks the tenant-scoped signature used by L1/W2 prose
      (`updateIfNotTerminal(tid, runId, ...)`). W1 HTTP code pre-checks the
      tenant before invoking the SPI, so this is not a new runtime regression;
      the residual is that the tenant invariant is still split across caller
      and repository contract until the W2 durable/RLS repository promotes the
      tenant-aware CAS signature.

  - id: F-project-tool-pin-drift
    title: Project-Local Dev-Tool Pin Drift and Manifest Inconsistency
    first_observed_rc: rc40-preventive
    last_observed_rc: rc50-nodegraph-evidence
    occurrences: [rc40-codegraph-mcp-onboarding, rc50-nodegraph-evidence]
    root_cause: |
      Project-local development tools wired into the Claude Code MCP layer
      (or any equivalent contributor surface) keep three independent surfaces
      in lockstep: a package.json that pins versions, a package-lock.json
      that pins the integrity-hashed dependency tree, and a .mcp.json (or
      equivalent) that names where the binary lives. Each surface is easy to
      edit in isolation: a contributor relaxes the version to a caret range
      ("^0.9.4") thinking npm will handle minor drift; another regenerates
      the lockfile against a registry that does not mirror per-platform
      optionalDependencies; a third changes the shim path in .mcp.json
      thinking PATH lookup will find the binary. Each change passes the
      shape-only review the file gets. None of them announce themselves at
      runtime — Claude Code simply fails to start the MCP server with an
      obscure error pointing nowhere — and the next contributor's `npm ci`
      silently installs a different binary than the previous contributor
      used, breaking the onboarding flow that Rule R-A's "first-agent
      execution without platform-team intervention" clause depends on.
      Registered preventively at the codegraph integration so the family is
      gateable before any incident, rather than after the third one.
    surfaces:
      - "tools/codegraph/package.json"
      - "tools/codegraph/package-lock.json"
      - ".mcp.json"
      - "gate/lib/build_codegraph_nodegraph_evidence.py"
    prevention_rules:
      - Rule R-A (rc1 — Business/Platform Decoupling + Developer Self-Service kernel)
      - Rule 125 / E173 (rc40 — codegraph_install_truth gate: exact-pin + lockfileVersion>=3 + .mcp.json relative-shim ref; pinning-truth gate, not install-state)
    cleanup_status: structurally_addressed
    open_residual: |
      Rule 125 remains codegraph-specific for install-truth (it hard-codes
      the @colbymchenry/codegraph package name + the tools/codegraph/ path),
      but rc50 adds a separate local nodegraph evidence builder so the
      regenerated `.codegraph/codegraph.db` artifact is included in release
      evidence without committing the SQLite database. The builder also
      distinguishes a clean git worktree (`repository.dirty: false`) from
      a non-git or unreadable worktree (`repository.dirty: null`) so release
      evidence does not conflate unknown status with clean status. A future
      second project-local MCP tool either re-uses the same structural
      template (a sibling rule with its own package name + path pair plus
      local artifact evidence) or the rule is generalized to walk all
      entries of `.mcp.json#mcpServers` and verify a `tools/<name>/`
      manifest exists per entry. Generalization is deferred until a second
      tool actually lands; current state is a single concrete enforcer plus
      a concrete nodegraph evidence builder matching the single concrete
      tool the platform ships. The local `.codegraph/codegraph.db` and
      generated `gate/release-ci-evidence/*codegraph-nodegraph*.evidence.yaml`
      bundles are intentionally not G-9.b signal surfaces: the former is
      git-ignored local state, and the latter is release output.

  - id: F-l0-agentic-primitive-gap
    title: L0 Agentic-Primitive Contract Surface Gap
    first_observed_rc: rc41
    last_observed_rc: rc51-agentic-completeness
    occurrences: [rc41-final-release-readiness, rc50-post-closure-senior-architect-review, rc51-agentic-completeness]
    root_cause: |
      At rc41 final-release-readiness, an independent senior-architect
      review (Java microservices + agent-architecture reviewer) flagged
      that seven L0-level contract shapes for the core agentic primitives
      were missing from the platform SPI surface — Agent, ModelGateway,
      Tool (vs Skill semantic), unified MemoryStore, VectorStore /
      Retriever / EmbeddingModel, Planner — plus the Spring AI integration
      boundary was undeclared (the BoM was imported but zero production
      Java referenced any Spring AI type). The project name
      `spring-ai-ascend` and ARCHITECTURE.md §1.1 Audience B promise
      ("external Spring developers integrating into their own Spring Boot
      4 + Java 21 applications") advertised extension seams that did not
      exist as Java SPI interfaces or `docs/contracts/*.yaml` shapes.
      Root mechanism: SCOPE CONFLATION — the rc41 closure framed "L0 =
      structural skeleton + governance" as equivalent to "L0 = agent-
      platform contract layer". For a generic job runtime that framing
      would have held; for a brand-promising agent platform it left an
      L0-level credibility gap. Rule R-A "Business/Platform Decoupling"
      was VACUOUSLY satisfied (no extension surface meant no possibility
      of failure), masking the gap from existing parity gates. Discovered
      via docs/logs/reviews/2026-05-25-l0-senior-architect-reopen-recommendation.en.md.
    surfaces:
      - "agent-middleware/src/main/java/com/huawei/ascend/middleware/{model,skill,memory,vector,retrieval,embedding}/spi/"
      - "agent-execution-engine/src/main/java/com/huawei/ascend/engine/planner/spi/"
      - "agent-service/src/main/java/com/huawei/ascend/service/agent/spi/"
      - "agent-service/src/main/java/com/huawei/ascend/service/integration/springai/"
      - "docs/contracts/{agent-definition,model-invocation,skill-definition,memory-store,vector-store,planning-request,plan}.v1.yaml"
      - "docs/adr/01{20,21,22,23,24,25,26,27,28}-*.yaml"
    prevention_rules:
      - Rule R-A (rc1 — Business/Platform Decoupling + Developer Self-Service; rc43 re-armed non-vacuously via Agent/ModelGateway/Skill/Memory/Vector extension seams; rc51 widened to cover prompt-template + chat-advisor + structured-output + streaming surfaces so Audience B never needs to import org.springframework.ai.chat.{prompt,model.advisor,converter}.* directly)
      - Rule R-D (rc1 — SPI + DFX + TCK co-design + catalog integrity; iterating logic auto-validates the 12 new rc43 SPIs + 5 new rc51 SPIs across catalog ↔ metadata ↔ DFX)
      - Rule G-1.1.b (rc22 — L1 SPI Appendix 4-way parity; rc49 correction makes the rc43 appendix explicit for all 14 new SPI rows; rc51 widens the agent-middleware §SPI Appendix from 7 to 9 spi_packages, +5 SPI rows, +6 structural-carrier catalog entries)
      - ADR-0120 / ADR-0121 / ADR-0122 / ADR-0123 / ADR-0124 / ADR-0125 / ADR-0126 / ADR-0127 / ADR-0128 (rc43 — the 9 ADRs that land the contract shapes as design_only with explicit W2-W4 promotion triggers)
      - ADR-0129 / ADR-0130 / ADR-0131 / ADR-0132 / ADR-0133 / ADR-0134 / ADR-0135 (rc51 — streaming-aware ModelGateway, StructuredOutputConverter<T>, PromptTemplate, ChatAdvisor + AdvisorChain, ConversationMemory variant, Tool-Call Iteration Loop semantics supplement, AgentSession-as-Run-projection deliberate-non-SPI capture)
    cleanup_status: closed
    open_residual: |
      Implementation of the 19 new SPI interfaces (14 rc43 + 5 rc51) is
      W2-W4 staged per the ADRs:
        - W2 LLM gateway       → wires SpringAiChatModelGateway functional + ModelGateway.stream + StructuredOutputConverter
        - W2 skill registry    → wires SpringAiToolCallbackSkillAdapter functional
        - W2 prompt-rendering  → wires SpringAiPromptTemplateAdapter functional
        - W2 advisor binding   → wires ChatAdvisor chain into HookDispatcher (Telemetry Vertical co-arrival per ADR-0061 §7)
        - W2 chat memory       → first real ConversationMemory impl
        - W2 memory adapters   → first real MemoryStore impl
        - W3 RAG vertical      → SpringAiVectorStoreAdapter + Retriever + EmbeddingModel functional; RetrievalOptions gains cacheStrategy field per ADR-0135
        - W3 SDK GA            → AgentRegistry runtime + AgentExecutorDefinitionFactory wired
        - W4 planner           → first real Planner impl
      The contract surface gap is closed at rc51 by construction (all 19
      SPI interfaces compile, contract YAMLs registered design_only, 4-way
      parity (catalog ↔ metadata ↔ DFX ↔ L1 SPI Appendix) holds). The rc43
      closure-by-construction at one layer of agentic primitives left
      developer-ergonomics primitives (PromptTemplate, ChatAdvisor,
      StructuredOutputConverter) and the streaming output shape unmodelled;
      the rc50 post-closure senior-architect review surfaced this gap as
      a same-family second occurrence and rc51 closes it. Future addition
      of new L0-level primitives (e.g., Observability SPI, Audit SPI,
      Workflow SPI) MUST follow the same "land contract shape at L0 even
      when implementation defers" pattern this family establishes;
      scope-conflation between "structural skeleton" and "agent contract
      layer" (historical pre-Phase-C `agent-platform` Maven module was
      merged into agent-service via ADR-0078; this paragraph uses the
      generic noun phrase in the modern Audience-B narrative sense) must
      be flagged at each L0 final-release-readiness review, and the
      META-lesson from rc51 is: closure-by-construction at one primitive
      tier (rc43: Agent/Skill/Memory/Vector/Planner) can mask gaps at the
      adjacent ergonomics tier (rc51: Prompt/Advisor/StructuredOutput/
      Streaming) — every L0 closure review MUST also scan the developer-
      ergonomics surface.

  - id: F-agentic-contract-composition-gap
    title: Agentic Contract Composition and Semantic-Closure Gap
    first_observed_rc: rc51
    last_observed_rc: rc54-agentic-composition-corrective
    occurrences: [rc51-agentic-completeness-review, rc52-agentic-completeness-corrective, rc53-post-closure-agentic-composition-review, rc54-agentic-composition-corrective]
    root_cause: |
      A wave can land individually plausible L0 agentic primitives while
      failing to prove that the primitives compose: one contract declares
      streaming while its sibling advisor contract remains invoke-only;
      one memory surface claims a conversation window while its generic
      parent stores a single turn; one tool-loop contract treats
      `finishReason` as an enum while Java exposes an arbitrary string;
      one release note claims closure while the generated evidence records
      a dirty, non-formal candidate. The root mechanism is semantic closure
      being checked per surface rather than across the contract algebra.
      rc53 shows the same mechanism after the rc52 repair: `ChatAdvisor`
      exists as a primitive, but is not bound into `AgentDefinition`, while
      its same-package `AdvisedRequest` / `AdvisedResponse` carriers are
      schema-less maps with no canonical mapping to `ModelInvocation` /
      `ModelResponse`. rc54 closes that recurrence by adding
      `AgentDefinition.advisorBindings`, typed same-package advisor payloads,
      and a non-SPI adapter for model-carrier translation.
    surfaces:
      - "agent-middleware/src/main/java/com/huawei/ascend/middleware/{advisor,memory,model,retrieval}/spi/"
      - "docs/contracts/{chat-advisor,memory-store,model-invocation,model-streaming}.v1.yaml"
      - "docs/contracts/agent-definition.v1.yaml"
      - "docs/adr/0129-streaming-aware-model-gateway.yaml"
      - "docs/adr/0132-chat-advisor-spi.yaml"
      - "docs/adr/0133-conversation-memory-spi-variant.yaml"
      - "docs/adr/0134-tool-call-iteration-loop.yaml"
      - "docs/quickstart.md"
      - "agent-service/src/main/java/com/huawei/ascend/service/agent/spi/AgentDefinition.java"
      - "gate/lib/check_formal_release_transaction.py"
      - "docs/logs/releases/*.md (latest formal release only)"
    prevention_rules:
      - Rule R-D (strict SPI purity — no cross-SPI dependencies in agent-middleware SPI packages)
      - Rule G-8 / F-cross-authority-agreement (cross-surface parity discipline, widened here to semantic composition surfaces)
      - Formal-release transaction validator (rc52 — rejects dirty evidence, candidate SHA mismatch, non-formal latest-release evidence, and evidence-bundle path mismatch)
      - SpiPurityGeneralizedArchTest (rc52 — agent-middleware SPI packages import only java.* and same-package siblings)
      - Rule 129 contract_spi_count_truth (rc54 — fails when chat-advisor claims AgentDefinition composition without AgentDefinition / Java binding support, typed advisor carriers, and shared advisor/model hook sequence)
    cleanup_status: monitoring
    open_residual: |
      rc52 closes the cited surfaces by adding a streaming advisor sibling
      SPI, converting conversation memory to `MemoryStore<String,
      ConversationWindow>`, replacing free-string finish reasons with
      `ModelFinishReason`, introducing same-package retrieval/advisor
      carriers, and strengthening formal-release evidence validation. The
      family remains under monitoring because broader historical SPI
      packages outside agent-middleware still have intentional legacy
      cross-package relationships; if future reviews choose repo-wide SPI
      purity, those surfaces need a separate scoped refactor rather than
      being hidden under the rc52 agentic-contract closure.
      rc53 post-closure review keeps the family in monitoring because the
      same composition root cause recurred in a narrower form: advisor
      composition is claimed at AgentDefinition time but no AgentDefinition
      binding exists, and the map-based advisor envelopes are not yet a
      typed or schema-backed L0 developer contract. The canonical recurring
      family count remains 20 because this is a recurrence of the existing
      family, not a new root-cause class. rc54 closes the cited recurrence
      under strict no-cross-SPI-dependency design: advisor SPI payloads are
      typed same-package carriers, `AdvisorBinding` is a service-agent same-
      package carrier resolved by advisor name, and adapters live outside
      `.spi`. The family remains in monitoring for future adjacent-contract
      composition surfaces.

  - id: F-design-artifact-omits-tenant-spine
    title: Design Artefact Omits tenantId First-Class Field
    first_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    last_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    occurrences: [rc53-wave-1-agent-service-l1-4plus1-rewrite]
    root_cause: |
      Mermaid ER blocks / state-diagram blocks / field tables in L1
      and L2 design surfaces omit `tenantId` as a first-class field
      on Run / Task / Session / StateStore, burying tenant scope in
      opaque `metadata` strings or eliding it entirely. Future
      implementations inherit the design gap and risk Rule R-C.2.a
      (Run record mandatory tenantId + Objects.requireNonNull) plus
      Rule R-J.a (RLS on every tenant_id-bearing table) plus
      Principle P-J (storage-engine tenant isolation) violations at
      code time. This family is the L1-design-side sibling of the
      implementation-side family F-nonatomic-run-status-write —
      both rooted in "tenant invariant treated as a runtime
      concern, not a design concern". PR #71 §3.2 ER block omits
      tenantId entirely (only sessionId, taskId, metadata, version
      declared), which is the surfacing event for this family.
    surfaces:
      - docs/logs/reviews/*.md (design proposals + review responses)
      - docs/L2/*.md (when L2 directory is populated)
      - architecture/docs/L1/*/ARCHITECTURE.md (L1 architecture docs)
      - docs/contracts/*.yaml (schema declarations)
    prevention_rules:
      - ADR-0136 (this wave — declares Run vs Task entity distinction + reaffirms tenantId as first-class field on each)
      - ADR-0138 (this wave — §3 red-line "No tenantId-less data model")
      - Wave 2 Logical View ER block (canonical tenantId-first model)
      - candidate gate-rule for Wave 5+ — multi-line regex over `erDiagram` blocks in `docs/**/*.md` checking that every entity block under `^\s+SESSION|TASK|RUN|LIFECYCLE_STATE|STATE_STORE` declares `tenantId` / `tenant_id` field
    cleanup_status: monitoring
    open_residual: |
      This wave's structural fix is at the ADR + L1-rewrite level
      (ADR-0136 + ADR-0138 + Wave 2 ER block). A gate-rule that
      detects tenantId-less ER blocks in design surfaces is a Wave
      5+ candidate; until landed, family relies on review-time
      vigilance + the Per-Wave Acceptance Criteria sweep
      discipline declared in plan-file noble-stargazing-cookie.md
      §G-C row 1.

  - id: F-design-doc-violates-three-track-bus
    title: Design Artefact Proposes Queue / Event-Bus Abstraction Bypassing Rule R-E Three-Track Channels
    first_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    last_observed_rc: rc55-pr76-agent-service-interface-drift-review
    occurrences: [rc53-wave-1-agent-service-l1-4plus1-rewrite, rc55-pr76-agent-service-interface-drift-review]
    root_cause: |
      Design docs introduce "internal event queue" or "message bus"
      abstractions with their own durability axis (in-memory /
      semi-persistent / persistent) without binding to the canonical
      `docs/governance/bus-channels.yaml` three channels (`control`
      / `data` / `rhythm`). The family conflates two orthogonal axes:
      **physical isolation** (channels) vs **durability tier** (per-
      channel backend choice). PR #71 §3.3 proposes the single-queue
      + 3-storage-modes model that is the surfacing event for this
      family — head-on conflict with Rule R-E three-track physical
      isolation. Implementations would lose the priority / heavy /
      heartbeat isolation guarantee that the three-track design
      provides.
    surfaces:
      - docs/logs/reviews/*.md (esp. design proposals)
      - docs/L2/*.md (when populated)
      - docs/contracts/*.yaml (queue/bus schemas)
      - architecture/docs/L1/*/ARCHITECTURE.md
    prevention_rules:
      - ADR-0138 (this wave — §3 red-line "No single-tier internal queue + mode-based durability"; binds to bus-channels.yaml)
      - Rule R-E (Three-Track Channel Isolation — already enforces at runtime; this family adds upstream design-language enforcement)
      - Wave 3 Physical View three-track binding diagram (canonical reference for downstream design surfaces)
    cleanup_status: monitoring
    open_residual: |
      The 2026-05-22 reference template `docs/logs/reviews/
      2026-05-22-agent-service-l1-expansion-proposal.{en,cn}.md`
      uses "internal high-throughput event/task queue" prose
      without same-paragraph three-track binding citation —
      deferred sibling, Wave 5 follow-up. Sibling sweep result
      documented in Wave 1 review draft §8.4 + §9 row 1.

      rc55 PR #76 interface-drift review found the same root cause in the
      new L2 session/task/event-queue proposal: its wording treats tri-track
      delivery as an optional L2 mechanism, while canonical L1/ADR-0138/Rule
      R-E require every queue or event-bus design surface to bind control,
      data, and rhythm tracks as mandatory physical isolation. The proposed
      local-queue implementation can still be staged, but the architecture
      language must not demote the three-track invariant to a future option.

  - id: F-design-doc-language-bypasses-invariant
    title: Design Artefact Wording Implies Bypass of Reactive / RLS / No-Sleep Invariants
    first_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    last_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    occurrences: [rc53-wave-1-agent-service-l1-4plus1-rewrite]
    root_cause: |
      Design docs use casual language ("no mandatory persistence",
      "fast-path skips checkpoint", "lightweight synchronous",
      "memory-only path") that, when read by an implementer under
      time pressure, would license bypassing Rule R-G (reactive
      I/O), Rule R-H (no Thread.sleep), Rule R-J.a (RLS on
      tenant_id tables), or Rule R-C.2 (RunRepository.updateIfNotTerminal
      CAS). The language is the upstream cause; the implementation
      bug would be the downstream effect. The family is the
      "language-as-attack-surface" sibling of the structural-defect
      families — closing the implementation surface (e.g., Rule R-G
      ArchUnit) does NOT close this family; the design wording
      must also be tightened to deny the bypass interpretation.
      PR #71 §3.4.3 Fast-Path "no mandatory persistence, local
      synchronous resume" is the surfacing event.
    surfaces:
      - docs/logs/reviews/*.md (design proposals)
      - docs/L2/*.md
      - docs/adr/*.yaml (`context:` / `decision:` blocks)
      - architecture/docs/L1/*/ARCHITECTURE.md
    prevention_rules:
      - ADR-0139 (this wave — Fast-Path / Slow-Path narrowed semantics; explicit forbid of bypass-implying language)
      - Wave 2 Logical View narrowing prose (canonical L1 vocabulary)
      - candidate gate-rule for Wave 5+ — risk-phrase grep with same-paragraph invariant-preservation clause requirement
    cleanup_status: monitoring
    open_residual: |
      The 2026-05-22 reference template's "compact edge deployment"
      / "stateless and semi-persistence" prose is a partial sibling
      that did not trigger the strict regex but deserves an
      explicit invariant-preservation pin per ADR-0139. Deferred
      sibling, Wave 5 follow-up. The general gate-rule for risk-
      phrase + same-paragraph invariant-preservation clause is a
      Wave 5+ candidate; until landed, family relies on Per-Wave
      Acceptance Criteria sweep discipline.

  - id: F-placeholder-leaks-into-active-corpus
    title: Anonymous-Name Placeholders Leak Into Active Documentation Corpus
    first_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    last_observed_rc: pr71-agent-service-l1-review-wave-1
    occurrences: [rc53-wave-1-agent-service-l1-4plus1-rewrite, rc54-agentic-composition-corrective, pr71-agent-service-l1-review-wave-1]
    root_cause: |
      Anonymous-name placeholders (`xiaoming` 小明, `wanshoulu` 万寿路,
      `foo`, `bar`, `TBD`, `TODO-template`) leak into active design
      surfaces — file slugs, prose, code-block author tags — without
      being scrubbed before review. File slugs are particularly
      costly because they become stable URLs (PR review links,
      archive links, gh-page URLs), and post-hoc rename requires
      historical-snapshot markers + redirect strategy per
      `docs/governance/logs-folder-policy.md`. PR #71's filename
      `2026-05-25-xiaoming-agent-service-l1-review-wave-1.{en,md}` is
      the surfacing event for this family in design-doc form;
      `docs/logs/reviews/2026-05-13-{wanshoulu}-wave-N-request.md`
      is a pre-existing active-corpus leak.
    surfaces:
      - docs/logs/reviews/*.md (file slugs)
      - docs/L2/*.md (when populated)
      - docs/contracts/*.yaml (`title:` / `description:` text)
      - agent-*/src/main/java/**/*.java (variable / class / package names — Java side is largely guarded by Checkstyle but slugs in `@author` comments / Javadoc examples slip through)
    prevention_rules:
      - This wave's review-draft thematic-slug rename (`agent-service-l1-4plus1-rewrite-wave-N`)
      - Rule 127 current-release/current-response placeholder guard (rc54 — rejects live `TBD`, `TODO-template`, and evidence-placeholder tokens while allowing documented family-vocabulary citations)
      - candidate broad-corpus gate-rule for Wave 5+ — `Grep "\bxiaoming\b|\bwanshoulu\b|\bTODO-template\b|\bTBD\b"` over `docs/{logs,L2,contracts,adr}/**/*.md` + `agent-*/**/*.java`, with allow-list for documented citation contexts (ADR `context:` / review-draft sibling-sweep prose)
    cleanup_status: monitoring
    open_residual: |
      The `2026-05-13-{wanshoulu}-wave-N-request.md` file remains in
      the active corpus; Wave 5 rename + historical-snapshot marker
      will close that specific leak. PR #71's `xiaoming` slug
      becomes a historical artifact after Wave 8 closure; allow-
      listed citation contexts in ADR-0136 + this wave's review
      drafts + future wave drafts are NOT family hits but require
      gate-rule allow-list maintenance. rc54 closes the current-release-note
      placeholder recurrence by replacing the rc53 Wave 8 line-count token
      and adding the Rule 127 current-release/current-response guard. PR #71's
      original `xiaoming` review slugs remain in the current contributor PR;
      the branch keeps them for URL stability while the family records the
      recurrence and future slug guards remain a W5+ candidate.

  - id: F-l1-canonical-source-in-interaction-log
    title: Live L1 Architecture Artefact Points at Freeze-Marked Review Log as Canonical Source
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      An `agent-*/ARCHITECTURE.md` (L1 root per Rule G-1.a) delegates
      its "canonical 4+1 view source" to a file under
      `docs/logs/reviews/*.md`. The review file is an INTERACTION
      RECORD per `docs/governance/logs-folder-policy.md` and is
      frozen / read-only after wave closure. Promoting it to
      "authoritative L1 source" creates two compounding defects:
      (a) Rule G-1.a's L0/L1/L2 view discipline is bypassed —
      architecture lives where governance can't gate it;
      (b) the freeze-mark means the "live" architecture cannot
      evolve without writing a fresh review file + chasing the
      pointer. PR #72 rc53 surfaces the family in
      `agent-service/ARCHITECTURE.md` §0.5 which names
      `docs/logs/reviews/2026-05-26-agent-service-l1-4plus1-rewrite-wave-1.{en,cn}.md`
      as canonical. The fingerprint: any `agent-*/ARCHITECTURE.md`
      or `architecture/docs/L1/**/*.md` containing a markdown link to
      `docs/logs/reviews/.*\.md` where the words
      `canonical` / `authoritative` / `4+1 source` / `view source`
      appear within ±3 lines of the link.
    surfaces:
      - architecture/docs/L1/*/ARCHITECTURE.md
      - architecture/docs/L1/**/*.md
      - ARCHITECTURE.md (root)
    prevention_rules:
      - "ADR-0143 (rc55 — review-log demotion + L1 canonical move; agent-service/ARCHITECTURE.md §0.5 rewritten to point at architecture/docs/L1/agent-service/{scenarios,logical,process,physical,development}.md)"
      - "candidate gate-rule for Wave 5+ — Grep architecture/docs/L1/*/ARCHITECTURE.md + architecture/docs/L1/**/*.md for markdown links to docs/logs/reviews/.*\\.md with the proximity words {canonical, authoritative, 4+1 source, view source} within ±3 lines"
    cleanup_status: monitoring
    open_residual: |
      ADR-0143 demotes the rc53 review file and rewrites the
      §0.5 pointer; the canonical 4+1 source now lives at
      architecture/docs/L1/agent-service/ per the rc55 wave. Future review
      files MUST NOT be promoted to "canonical" status again;
      gate-rule for proximity-based detection of canonical/
      authoritative wording near review-log hyperlinks is a
      W5+ candidate. Sibling sweep across other modules
      (agent-execution-engine, agent-bus, agent-middleware,
      agent-client, agent-evolve) is run in this wave's W0
      under docs/logs/reviews/2026-05-26-agent-service-l1-sibling-sweep.en.md.

  - id: F-layer-decomposition-low-cohesion
    title: Logical-View Layer Owns Heterogeneous Responsibilities or Double-Homes With Another Layer
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      A logical-view layer in an L1 architecture document either
      (a) lists ≥4 heterogeneous component types as its
      responsibilities, becoming a "kitchen-sink" layer with no
      clear ownership boundary; OR (b) shares one or more
      responsibilities with a different layer in the same diagram,
      creating undefined ownership at the layer boundary. PR #72
      rc53 surfaces both shapes in the same diagram: review §15.1
      "Engine Adapter Layer" lists 7+ heterogeneous concerns
      (EngineRegistry + ExecutorAdapter + ChatAdvisor +
      RuntimeMiddleware + ContextProjector + PromptTemplate +
      StructuredOutputConverter) AND RuntimeMiddleware appears
      again in "Task-Centric Control Layer" — double-homing.
      Symptom of treating logical-view as a free-typed prose
      surface rather than a discipline.
    surfaces:
      - architecture/docs/L1/*/ARCHITECTURE.md
      - architecture/docs/L1/**/*.md
      - docs/L2/**/*.md
      - docs/logs/reviews/*.md (design proposals authoring L1 views)
    prevention_rules:
      - "ADR-0140 (rc55 — Engine Adapter Layer split into 5a Engine Dispatch & Execution + 5b Translation & Tool-Intercept; RuntimeMiddleware exclusively in Layer 4 Control)"
      - "ADR-0142 (rc55 — Run aggregate single-owner: Manager layer owns the aggregate; Control layer holds typed reference + invokes RunRepository.updateIfNotTerminal)"
      - "candidate gate-rule for Wave 5+ — pattern-match in architecture/docs/L1/*/ARCHITECTURE.md + architecture/docs/L1/**/*.md for `Layer N` headings; count bullet items per layer; FAIL if ≥4 OR if same component name appears under ≥2 layers"
    cleanup_status: monitoring
    open_residual: |
      The rc53 5-layer model (Access / Manager / Queue / Control /
      Adapter) is preserved with the ADR-0140 + ADR-0142
      narrowings. A gate-rule that scans layer-description blocks
      across all L1 docs for the same family pattern is a W5+
      candidate; until then, family relies on review-time
      vigilance + the Per-Wave Acceptance Criteria sweep.
      Sibling sweep across other modules (agent-execution-engine,
      agent-bus, agent-middleware, agent-client, agent-evolve)
      runs in this wave's W0 sibling-sweep report.
      2026-05-28 review: docs/logs/reviews/2026-05-28-agent-service-m1-m6-design-draft.cn.md
      (AgentService M1-M6 L1 feature spec + weather clarification scenario) audited
      against this family's root cause. Each of M1-M6 is a single-module spec with
      a single clear layer boundary; no "kitchen-sink" layer and no double-homing of
      responsibilities detected. File is NOT an instance of this defect.

  - id: F-frontmatter-claim-body-mismatch
    title: Architecture-Doc Frontmatter Declares Views the Body Does Not Author
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      An L0/L1/L2 architecture document's YAML frontmatter
      declares `view:` and/or `covers_views: [...]` that the
      document body does NOT actually author — no matching
      `## *Scenarios*` / `## *Logical*` / `## *Process*` /
      `## *Physical*` / `## *Development*` headings, no Mermaid
      diagrams for the claimed view, no per-view body content.
      The frontmatter therefore lies to the graph builder
      (`gate/build_architecture_graph.sh`) and to any L0/L1/L2
      consumer relying on frontmatter as the authoritative
      view declaration. PR #72 rc53 surfaces the family in
      `agent-service/ARCHITECTURE.md` whose frontmatter declares
      `view: scenarios` AND `covers_views: [logical, development,
      process, physical, scenarios]` while the body has no
      logical / process / physical / development view section —
      §0.5 punts every non-scenarios view to the rc53 review file.
    surfaces:
      - architecture/docs/L1/*/ARCHITECTURE.md
      - architecture/docs/L1/**/*.md
      - docs/L2/**/*.md
      - ARCHITECTURE.md (root)
    prevention_rules:
      - "rc55 W2 frontmatter discipline — every L1 view file declares exactly one `view:` value matching its body; `covers_views:` only used on index files where the body lists each covered view as a cross-link"
      - "candidate gate-rule for Wave 5+ — for every .md with `level:` frontmatter, parse `view:` + `covers_views:` and scan body for matching view headings (`## *Scenarios*`, `## *Logical*`, ...); FAIL on any frontmatter-declared view absent from body"
    cleanup_status: monitoring
    open_residual: |
      rc55 W2 ships the structural fix for agent-service: the
      ARCHITECTURE.md frontmatter is corrected to `view: scenarios`
      + `covers_views: [scenarios]`, and the other 4 views live
      under architecture/docs/L1/agent-service/{logical,process,physical,
      development}.md, each with its own per-view frontmatter.
      The repo-wide sibling sweep in this wave's W0 audits the
      other 5 modules' ARCHITECTURE.md for the same pattern.
      Gate-rule candidate for W5+.

  - id: F-logical-vs-structural-decomposition-conflation
    title: Single Architecture Artefact Carries Two Competing N-Element Decompositions Without a Mapping
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      A single architectural artefact contains TWO different
      N-element decompositions of the same scope (e.g. a
      5-layer LOGICAL decomposition and a 5-component
      PACKAGE-STRUCTURAL decomposition) without an explicit
      mapping section linking the two. Reader cannot tell which
      is canonical; implementer doesn't know which sub-package
      a "layer" maps to. Family adjacent to but distinct from
      F-cross-authority-agreement: that family is about TWO
      surfaces disagreeing; this one is about ONE surface
      carrying two un-mapped views internally. PR #72 rc53
      surfaces the family in `agent-service/ARCHITECTURE.md`:
      §11 "L1 Runtime-Role Decomposition" lists 5 components
      (Dispatcher/Orchestrator/Task/Session/Engine) per ADR-0100,
      while review §15 lists 5 layers (Access/Manager/Queue/
      Control/Adapter) per ADR-0138. Same scope, different
      decompositions, no mapping.
    surfaces:
      - architecture/docs/L1/*/ARCHITECTURE.md
      - architecture/docs/L1/**/*.md
      - docs/L2/**/*.md
    prevention_rules:
      - "ADR-0144 (rc55 — Layer↔Package Matrix: publishes the unified mapping table; declares 5-layer model as logical-view decomposition and 5-component model as package-structural decomposition; extends ADR-0100 + ADR-0138)"
      - "candidate gate-rule for Wave 5+ — detect ≥2 distinct numbered N-table blocks (`#### 1. ... #### 5.` OR `| # | Layer/Component |`) inside the same .md without a 'logical ↔ package mapping' section between them"
    cleanup_status: monitoring
    open_residual: |
      ADR-0144 publishes the canonical layer↔package matrix.
      Future architectural artefacts that introduce a NEW
      decomposition MUST extend ADR-0144 or supersede it.
      Repo-wide sibling sweep audits the other 5 modules for
      the same pattern; if found, ADR-0144 extends to cover
      them. Gate-rule for W5+.

  - id: F-design-only-mechanism-shown-as-shipped
