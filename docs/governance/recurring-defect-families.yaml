  - id: F-discriminator-without-discriminated-type
    title: Typed Discriminator Ships Without the Polymorphic Type It Discriminates
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      A typed discriminator (enum, sealed-marker class, `*Export`,
      `*Kind`, `*Type`) is shipped in production Java, but the
      polymorphic type the discriminator was meant to label does
      NOT exist on the classpath yet. Rule enforcers that
      depend on the discriminated type become VACUOUSLY TRUE
      (the rule has no inputs to check) and silently arm for
      future drift — a reader assumes the contract is gated
      when it isn't. PR #72 rc53 surfaces the family with
      `EvolutionExport` enum at
      `agent-service/src/main/java/com/huawei/ascend/service/runtime/evolution/EvolutionExport.java`
      whose javadoc declares it the discriminator for a sealed
      `RunEvent` hierarchy that does NOT yet exist; Rule R-M.e
      "Every emitted RunEvent declares EvolutionExport" is
      vacuously true because zero `RunEvent` types exist.
    surfaces:
      - agent-*/src/main/java/**/*Export.java
      - agent-*/src/main/java/**/*Kind.java
      - agent-*/src/main/java/**/evolution/*.java
      - docs/governance/enforcers.yaml (rules referencing armed-but-vacuous discriminators)
      # Note: `*Discriminator.java` surface was originally enumerated but the rc55 W6 freshness
      # gate WARNed that the glob matched zero files; removed to avoid Rule G-9 glob-zero-match
      # warning. The fingerprint logic still covers Discriminator-named types via
      # codegraph_callers when they appear (per the family's prevention_rules block).
    prevention_rules:
      - "ADR-0145 (rc55 — Sealed RunEvent Hierarchy specification; defines the sealed variants required by S1-S5 scenarios; specifies EvolutionExport binding; promotes Rule R-M.e from vacuously true to actively gated)"
      - "docs/contracts/run-event.v1.yaml (rc55 — design_only at W1; promoted to runtime_enforced when Java sealed type lands)"
      - "candidate gate-rule for Wave 5+ — scan all `agent-*/src/main/java/**/*Export.java` + `*Kind.java` enums; use codegraph_callers to count non-self call-sites; FAIL if a discriminator has 0-1 non-self callers AND a Rule kernel claims an enforcer over its consumers"
    cleanup_status: monitoring
    open_residual: |
      ADR-0145 + docs/contracts/run-event.v1.yaml are the
      design-side closures. The actual Java sealed RunEvent
      type lands in a follow-up impl-mode wave (rc55+1 or
      later); until then EvolutionExport remains
      design_only-armed. Repo-wide sweep audits all
      `*Export.java` / `*Kind.java` / `*Discriminator.java`
      types under agent-* for the same pattern (zero-callsite
      discriminator with armed-but-vacuous enforcer).

  - id: F-spi-package-bloat-with-carriers
    title: SPI Package Contains More Structural Carriers Than Extension Interfaces
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      An `*.spi.*` Java package contains more structural carriers
      (records / sealed / enums / value objects) than extension
      interfaces. The package's published-SPI surface count
      becomes inflated and the 4-way parity ledger (Rule R-D.e/
      .f/.g + Rule G-1.1.b) becomes confusing — carriers
      mistakenly show up as SPI rows, or are deliberately
      excluded from one surface but counted in another. Family
      adjacent to but distinct from F-l1-architecture-grounding-
      gap: that family is about the L1 doc lacking SPI
      enumeration; this is about the .spi package itself
      conflating "publish point" with "wire shape". Rule R-D.d
      explicitly mandates `*.spi.*` packages contain ONLY
      extension interfaces (carriers belong in the parent
      package), but no enforcer fires the rule at gate time.
      PR #72 rc53 surfaces the family at
      `agent-service/src/main/java/com/huawei/ascend/service/runtime/memory/spi/`
      which contains 13 types (1 root interface
      `GraphMemoryRepository` + 12 carriers — MemoryQuery,
      MemoryEntry, MemoryRef, MemoryMetadata, MemoryCategory,
      MemoryOwnership, SemanticFact, etc.).
    surfaces:
      - agent-*/src/main/java/**/spi/*.java
      - agent-*/module-metadata.yaml#spi_packages
      - docs/contracts/contract-catalog.md
      - docs/dfx/agent-*.yaml
    prevention_rules:
      - "Rule R-D.d (rc1 — `*.spi.*` package convention; mandates extension interfaces only in .spi sub-packages)"
      - "rc55 W5 SPI Appendix discipline — every .spi package audit explicitly lists `interfaces` (extension points) vs `carriers` (records/enums); carriers promoted out of .spi per Rule R-D.d"
      - "candidate gate-rule for Wave 5+ — for every `*.spi.*` package, parse public classes; count interfaces vs records vs sealed types vs enums; FAIL if (records + sealed + enums) > interfaces"
    cleanup_status: monitoring
    open_residual: |
      rc55 W5 audits the agent-service memory.spi package and
      either splits into focused sub-packages (memory.spi.read,
      memory.spi.write) OR promotes carriers out of .spi per
      Rule R-D.d. The bulk Java refactor (file moves) is
      deferred to a follow-up impl-mode wave; rc55 W5 documents
      the intended split with an ADR placeholder + `(impl
      rcNN+1)` marker. Repo-wide sibling sweep audits every
      `*.spi.*` package under agent-* for the same
      carrier-over-interface ratio.

  - id: F-half-built-state-machine
    title: Multi-State Enum Declares Lifecycle Members the Code Never Writes
    first_observed_rc: audit-2026-05-27
    last_observed_rc: dev-posture-run-execution (2026-05-28)
    occurrences: [audit-2026-05-27, dev-posture-run-execution-2026-05-28]
    root_cause: |
      An enum / sealed marker / hook-point taxonomy is declared with
      N members representing an intended lifecycle (CLAIMED →
      COMPLETED / FAILED; phase_2_fired hooks; suspend-reason placeholder
      records). The shipped code writes ≤K (K<N) of those members; the
      remaining members are aspirational / future-wave. Javadoc honestly
      admits the gap, but reviewers reading the type assume the full
      lifecycle is live. Sibling of F-discriminator-without-discriminated-type
      at the VALUE level rather than the TYPE level: there the discriminator
      ships without the polymorphic type; here the polymorphic type ships
      with values that have no producer. Surfaces at the 2026-05-27 audit
      include IdempotencyStore.Status.COMPLETED and .FAILED (only CLAIMED
      is ever written), RunStatus.EXPIRED (declared terminal but zero
      production write-paths), SuspendReason.{AwaitChild, AwaitTimer,
      AwaitExternal, AwaitApproval} (4 of 6 sealed-record variants with
      zero constructor call sites), Task.A2aState 5 values + Task.TaskKind
      4 values (entity record exists; no production write-path of any
      value), HookPoint.ON_YIELD (ships in yaml hooks list + Java enum
      but omitted from phase_2_mandatory_hooks_fired_by_orchestrator),
      and PlaceholderPreservationPolicy.WARN / .REWRITE (only PRESERVE
      has a single reference).
    surfaces:
      - agent-*/src/main/java/**/*Status.java
      - agent-*/src/main/java/**/*State.java
      - agent-*/src/main/java/**/*HookPoint.java
      - agent-*/src/main/java/**/*Reason.java
      - agent-*/src/main/java/**/*Policy.java
      - docs/contracts/engine-hooks.v1.yaml#phase_*_fired*
    prevention_rules:
      - "candidate gate-rule W5+ — for every enum declaration under */spi/*, service/platform/*, service/runtime/*, run codegraph for <EnumName>.<MEMBER> write-sites; FAIL if any member has 0 writers AND no (W2-deferred — ADR-NNNN) Javadoc marker"
      - "Component-level recurrence (2026-05-28): the AsyncRunDispatcher abstraction shipped with only the NoOpAsyncRunDispatcher producer in the running app — the orchestrating producer existed solely in RunCursorFlowIT test wiring, so POST /v1/runs never reached the SUCCEEDED write-path outside tests. Materialized for dev posture via OrchestratingAsyncRunDispatcher + Capability registry, with RunExecutionIT pinning the HTTP→orchestrator→SUCCEEDED path. The durable production producer stays deferred (ADR-0070, W2) with a posture-gated bean rather than a dateless stub."
    cleanup_status: incomplete
    open_residual: |
      AUD-IDEM-1 (IdempotencyStore.Status.COMPLETED + FAILED),
      AUD-EVT-4 (HookPoint.ON_YIELD declared in yaml but absent from
      phase_2_mandatory_hooks_fired_by_orchestrator), SBL-HBSM-1
      (RunStatus.EXPIRED), SBL-HBSM-2 (4 SuspendReason variants),
      SBL-HBSM-3 (Task.A2aState + TaskKind), SBL-HBSM-4
      (PlaceholderPreservationPolicy.WARN + REWRITE). Closure requires
      either annotating each unreached member with (W2-deferred —
      ADR-NNNN) Javadoc markers OR materializing the producer paths in
      an impl-mode wave. Sweep against all *Status.java / *State.java /
      *HookPoint.java / *Reason.java / *Policy.java under agent-*
      remains a Wave-5+ gate candidate.

  - id: F-discriminator-naming-drift-doc-vs-code
    title: Doc-Cited Enum / Method / Type Name Drifts From Java Source of Truth
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      Active doc surfaces (L1 view files, ADRs, review responses, contract
      catalogs, module ARCHITECTURE.md files) cite enum variants / method
      signatures / type names that disagree with the Java source — wrong
      case, truncated, wrong arity, wrong parameter type, or a name from
      an older naming wave. The doc lies to readers; gate-time path-truth
      rules (G-2.c) catch path drift but not name-form drift inside
      otherwise-resolvable references. The 2026-05-27 audit found 4
      distinct sub-shapes: (a) SuspendReason 3-name table at
      2026-05-22-...response.en.md:141 claims AwaitChildRun /
      AwaitToolResult / RequiresApproval while Java permits AwaitChild /
      AwaitExternal / AwaitApproval (per user precedence the DOC wins →
      Java rename); (b) SuspendReason.AwaitChildren plural in
      architecture/docs/L1/agent-service/process.md:171 and scenarios.md:83,85 vs Java
      singular AwaitChild; (c) RunRepository.updateIfNotTerminal(tid,
      runId, lambda) 3-arg signature cited in 6 lines of process.md and 3
      lines of physical.md vs actual 2-arg Java signature (PR77-P1-2);
      (d) HookPoint.before_tool lowercase + truncated cited in 5 doc
      sites vs Java HookPoint.BEFORE_TOOL_INVOCATION
      SCREAMING_SNAKE_CASE + full suffix. None of these drifts trip Rule
      G-2 path-truth because the type/method itself resolves — only the
      literal name is wrong.
    surfaces:
      - architecture/docs/L1/**/*.md
      - docs/logs/reviews/*.md
      - docs/adr/*.yaml
      - docs/contracts/contract-catalog.md
      - architecture/docs/L1/*/ARCHITECTURE.md
    prevention_rules:
      - "candidate gate-rule W5+ — for every HookPoint.<value> or SuspendReason.<value> or RunStatus.<value> or RunRepository.<method>( mention in active md/yaml, parse the Java type by codegraph_node and FAIL if the literal name does not match a declared member / method"
    cleanup_status: incomplete
    open_residual: |
      PR77-P1-2 (updateIfNotTerminal 3-arg-in-docs vs 2-arg-in-Java),
      PR76-IF-DRIFT-004, AUD-EVT-1 (SuspendReason 3-name drift), AUD-EVT-3
      (HookPoint.before_tool case + truncation), SBL-NAME-1
      (SuspendReason.AwaitChildren plural), SBL-NAME-2 (3 doc-only
      SuspendReason names that don't exist as Java types). Closure
      requires the per-symbol name-form gate-rule candidate above to
      materialize as Rule W5-1 (or equivalent) so that any
      <JavaType>.<member> mention in active md/yaml is parsed and
      verified against the codegraph at gate time.
      2026-05-28 review: docs/logs/reviews/2026-05-28-agent-service-m1-m6-design-draft.cn.md
      and docs/logs/reviews/2026-05-28-agent-service-design-self-audit.cn.md are design-only
      proposal documents (proposal_status: draft) that do not cite Java enum variants,
      method signatures, or type names — they describe module responsibilities and data
      contracts at the conceptual level. No code-level discriminator naming to drift. Files
      are NOT instances of this defect.

  - id: F-dfa-without-validator
    title: Documented State-Machine DFA Ships Without an Enforcement Validator
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      A state-typed field (e.g. Task.A2aState, Session.Status) has a
      documented DFA — Mermaid stateDiagram, ADR transition table,
      contract yaml transitions: block — that names specific illegal
      transitions (e.g. SUBMITTED → COMPLETED is illegal). The Java side
      ships the enum + the entity but no <Type>StateMachine.validate(from,
      to) class wired into the persistence write path. The analogous
      RunStateMachine exists and proves the pattern is achievable; the
      sibling DFA is unguarded — illegal transitions silently succeed
      because no code rejects them. Adjacent to F-half-built-state-machine
      (which is about UNREACHED enum members) but distinct: here ALL
      members are reachable but the EDGES between them are not gated.
    surfaces:
      - agent-*/src/main/java/com/huawei/ascend/service/*/spi/*.java
      - agent-service/src/main/java/com/huawei/ascend/service/runtime/runs/Run.java
      - architecture/docs/L1/**/*.md
      - docs/contracts/*.v1.yaml
    prevention_rules:
      - "candidate gate-rule W5+ — for every Mermaid stateDiagram-v2 block in architecture/docs/L1/**/*.md referencing a Java enum, codegraph_search for validate(<EnumName>...) in the same module; FAIL if zero results"
    cleanup_status: incomplete
    open_residual: |
      AUD-EVT-5 (Task.A2aState 5-state DFA has no Task.A2aStateMachine or
      equivalent validator class wired into TaskStateStore.save),
      SBL-DFAW-2 (Task.TaskKind structural discriminator with no routing
      validator — borderline). Closure requires either adding the
      validator OR explicitly marking the entity Javadoc as (design_only
      — W3+ state validation deferred).

  - id: F-create-path-not-enrolled-in-dedup-tx
    title: Resource-Create Path Bypasses the Idempotency-Claim Transaction
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      An HTTP endpoint (or orchestrator) creates a top-level or child
      resource with new T(UUID.randomUUID(), ...); repository.save(t);
      while the surrounding request bears an Idempotency-Key header (or
      the suspend/resume signal carries a parentNodeKey). The dedup-claim
      row is written by a filter / pre-step in a different transaction;
      the create happens unconditionally if the claim returns fresh. A
      TTL re-claim or suspend-resume re-entry produces a duplicate
      resource under a fresh UUID — the contract guarantee successful
      claim implies at-most-one resource is violated silently. Identified
      at top-level POST /v1/runs (RunController.java:101) AND child-run
      spawn inside SyncOrchestrator.executeLoop (line 204: UUID.randomUUID()
      immediately followed by runs.save(new Run(...)) with no idempotency
      derivation from parentRunId + parentNodeKey).
    surfaces:
      - agent-service/src/main/java/com/huawei/ascend/service/platform/web/**/*Controller.java
      - agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/SyncOrchestrator.java
      - agent-service/src/main/java/com/huawei/ascend/service/platform/idempotency/IdempotencyHeaderFilter.java
    prevention_rules:
      - "candidate gate-rule W5+ — codegraph_callers on IdempotencyHeaderFilter.claimOrFind; for each calling endpoint, walk callees for .save( invocations on RunRepository / TaskStateStore / SessionRepository and FAIL if the save is not transactionally enclosed (no @Transactional propagation, no deterministic-uuid derivation)"
    cleanup_status: incomplete
    open_residual: |
      AUD-IDEM-4 (top-level Run create non-atomic with idempotency claim),
      AUD-IDEM-5 (child Run spawn uses fresh randomUUID — parent retry
      duplicates children). Closure requires either deterministic-UUID
      derivation (uuidV5(tenantId, idempotencyKey) for top-level,
      uuidV5(parentRunId, parentNodeKey) for child) OR enrolling the
      create into the same @Transactional boundary as the
      IdempotencyStore.claimOrFind call.

  - id: F-vocabulary-identity-collision
    title: Two Same-Named Java Types Live in Different Packages of One Module
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      Two record (or class / interface) declarations share the same
