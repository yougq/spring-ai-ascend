      - docs/logs/reviews/2026-05-26-agent-service-l1-oss-comparison-review.cn.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-oss-comparison-review.en.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-oss-comparison-source.cn.md
      - docs/logs/reviews/2026-05-26-agent-service-module-capability-feature-list.cn.md
      - docs/logs/reviews/2026-05-26-agent-service-module-capability-feature-list.en.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-4plus1-consistency-review-wave-1.cn.md
