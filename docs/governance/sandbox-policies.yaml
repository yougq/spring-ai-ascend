# Sandbox permission subsumption policy (Rule 42).
#
# The L0 ironclad rule (LucioIT W1 §7.4) requires:
#   1. Pre-Authorized Access — capability-registration nodes bound to platform-issued credentials.
#   2. Sandbox Permission Subsumption — when bus issues execution permissions
#      downward, the logical authz scope MUST 1:1 map to system-level
#      restrictions of the physical sandbox (outbound IP whitelist, CPU cap).
#      A logical grant MUST NOT exceed what the physical sandbox enforces.
#
# Authority: ADR-0069 (L0 ironclad rules) + LucioIT W1 L0 draft §7.4.
# Enforced by gate rule 52 (sandbox_policies_yaml_present_and_wellformed).
# Consumed by SandboxExecutor SPI at runtime to refuse logical scope wider
# than physical limits.

version: 1
generated_at: 2026-05-15

# Post-rc2 status label (gate Rule 62 `contract_yaml_declares_status`): this
# file ships the policy SCHEMA + default_policy structure. Runtime
# enforcement of logical-grant subsumption by SandboxExecutor is deferred to
# W2 per CLAUDE-deferred.md 42.b. Per-skill rows below describe the TARGET
# physical-sandbox subsumption; SandboxExecutor refusing over-wide grants
# does not yet exist.
status: schema_shipped

# Default deny — any skill not explicitly declared below has zero outbound
# network access and zero filesystem access.
default_policy:
  outbound_network: deny_all
  filesystem_read: deny_all
  filesystem_write: deny_all
  cpu_cap_millicores: 100                             # 0.1 vCPU per skill instance
  memory_cap_megabytes: 128
  wall_clock_cap_seconds: 30
  syscalls: minimum_needed_seccomp_profile             # default seccomp profile, see deployment/sandbox/seccomp.json (W2)

# Financial-vertical baseline (v1.0 PC-003 + Persona-F mandate).
#
# Applies to v1.0 reference agents: loan-review-assistant, AML-screener,
# fraud-checker (see samples/finance-loan-review/). Conservative posture:
# outbound internet denied by default, filesystem writes confined to a
# scratch directory, CPU/memory/wall-clock bounded, PII MUST be redacted
# before reaching the model gateway.
#
# Per Rule R-L the physical sandbox MUST enforce a permission set ≥ the
# logical grants declared here; SandboxExecutor refuses any skill whose
# config widens these defaults without an explicit per-deployment
# override AND an architectural review entry under docs/adr/.
#
# Authority: PC-003 (financial-vertical mandate) + Persona-F
# certification checklist item #4 (docs/onboarding/compliance-reviewer.md).
financial_default:
  description: "Conservative sandbox policy for v1.0 financial-vertical agents (loan-review-assistant, AML-screener, fraud-checker). Per PC-003 + Persona-F mandate, denies outbound internet by default, caps CPU/memory/wall-clock, denies FS writes outside scratch dir, no PII egress to model gateway without explicit allow-list."
  outbound_network: deny                              # No outbound by default; per-skill allow-list required.
  outbound_network_allowlist: []                      # Per-deployment override; empty by default.
  filesystem_read:
    - "/var/agent-data/scratch"                       # Scratch only
    - "/etc/agent-config/readonly"
  filesystem_write:
    - "/var/agent-data/scratch"
  cpu_cap_millicores: 2000                            # 2 vCPU
  memory_cap_megabytes: 2048                          # 2 GiB
  wall_clock_cap_seconds: 60                          # Conservative: 1 minute per skill invocation
  pii_egress_to_model: false                          # No PII to LLM without explicit redaction
  syscall_allowlist: []                               # Per-deployment override
  product_claim: "PC-003"
  target_persona: "Persona-F"

# Per-skill overrides. Each explicitly widens the default policy and the
# SandboxExecutor enforces that the runtime cannot grant scope beyond what
# is declared here.
skills:
  - id: model-call
    description: "outbound HTTPS to model providers; no filesystem; bounded CPU"
    outbound_network:
      mode: allowlist
      destinations:
        - "api.openai.com:443"
        - "api.anthropic.com:443"
        - "pangu.ascend-cloud.com:443"
    filesystem_read: deny_all
    filesystem_write: deny_all
    cpu_cap_millicores: 200
    memory_cap_megabytes: 256
    wall_clock_cap_seconds: 60

  - id: memory-write
    description: "outbound to local pgvector + graph store; no external network"
    outbound_network:
      mode: allowlist
      destinations:
        - "127.0.0.1:5432"
        - "127.0.0.1:6379"
    filesystem_read: deny_all
    filesystem_write: deny_all
    cpu_cap_millicores: 100
    memory_cap_megabytes: 128
    wall_clock_cap_seconds: 5

# Future skills (code-interpreter, file-read, web-search) add rows here as the
# corresponding executors ship. Until then default_policy applies.
#
# The gate rule today validates schema well-formedness and the presence of
# default_policy with all six required keys. The runtime enforcement of
# logical-grant subsumption (subsumption_check) lands in W2 per
# CLAUDE-deferred.md 42.b.
