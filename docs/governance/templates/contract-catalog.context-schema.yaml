# Render-context schema for docs/governance/templates/contract-catalog.md.j2
#
# W5 initial migration: .md.j2 is a verbatim seed of the existing
# contract-catalog.md. The catalog becomes a generated artefact (edits flow
# through the .md.j2 source), and Rule G-13.b byte-identical regen is
# enforced — but the actual SPI / structural-carrier / HTTP-route TABLES
# are still inline prose. A W5-extended sub-wave will:
#   - add gate/lib/scan_spi_interfaces.py that walks every */src/main/java/**/spi/*.java
#     and emits a structured yaml of public interface declarations
#   - move the §2 Active SPI Interfaces table into a Jinja2 loop over the scan
#   - introduce docs/contracts/structural-carriers.yaml as a hand-authored
#     authority for §3, looped in the template
#   - introduce docs/contracts/http-routes.yaml as a hand-authored authority
#     for §4, looped in the template
# That sub-wave actually subsumes Rule G-8.b/e (per Rule G-13's W10
# retirement schedule). Until it ships, G-8.b/e remain as defence-in-depth.

context_loader: contract_catalog
schema_version: 1

required_keys: []      # W5 initial: template has no slots; rendering is byte-identical to the verbatim seed

optional_keys:
  - spi_interfaces            # filled by W5-extended scan_spi_interfaces.py output
  - structural_carriers       # filled by docs/contracts/structural-carriers.yaml loader
  - http_routes               # filled by docs/contracts/http-routes.yaml loader

iteration_keys:
  - spi_interfaces
  - structural_carriers
  - http_routes
