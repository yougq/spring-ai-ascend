# Surface classification registry — operationalises Rule G-13.a
# (Single-Source Rendering Coherence; authority ADR-0119).
#
# Every active markdown / yaml file in the corpus that contains a DYNAMIC
# claim (count, path, module name, SPI FQN, ADR id, family id, version tag,
# baseline metric, generated table row) MUST be classified here into one of
# three buckets:
#
#   templated  - fully rendered output; "DO NOT EDIT" header at top; the
#                rendered .md MUST be byte-identical to render(.md.j2, data).
#                Author edits the .md.j2 source under
#                docs/governance/templates/ AND the underlying authority
#                surfaces; the rendered .md is committed alongside.
#
#   hybrid     - file IS a .md.j2 source with author-prose AND `{{ ... }}`
#                placeholders interleaved; rendered to a .md sibling.
#                "DO NOT EDIT" banner on the rendered .md; the .md.j2 is
#                the edit surface.
#
#   inline     - authored source-of-truth, never rendered, never derived.
#                ADRs, rule cards, principle cards, architecture-status.yaml's
#                `allowed_claim` prose, recurring-defect-families.yaml,
#                module-metadata.yaml, principle-coverage.yaml, enforcers.yaml.
#                NOT registered here (this file lists only TEMPLATED + HYBRID).
#
# Schema (per template entry):
#   template            - path to the .md.j2 source under
#                         docs/governance/templates/ (templated bucket) OR
#                         the in-tree .md.j2 path (hybrid bucket).
#   output              - path to the rendered .md output.
#   context_loader      - plugin id in gate/lib/load_render_context.py
#                         (e.g. release_note, recurring_families).
#   context_schema      - path to the per-template context schema yaml.
#   bucket              - templated | hybrid.
#   authority_surfaces  - list of source files the loader reads; touching any
#                         of them implies a re-render is needed.
#   historical_grandfathered - optional list of pre-migration output files
#                         exempt from byte-identical regen.
#   wave                - W3..W9 — which wave introduced this template.
#
# Lifecycle:
#   - W0 (rc42 / ADR-0119): registry exists with EMPTY templates list;
#                            schema documented; Rule 126 gate verifies
#                            existence only.
#   - W1: render engine + general gate lands; registry still empty.
#   - W3..W8: each wave adds one or more entries.
#   - W9: CLAUDE.md + phase contracts hybrid entries added.
#   - W10: cleanup; superseded prevention rules retired.
#
# Authority: ADR-0119 (single-source rendering for derived architecture
# documents). Validated by gate Rule 126 (enforcer E174) + Rule G-13
# kernel.

