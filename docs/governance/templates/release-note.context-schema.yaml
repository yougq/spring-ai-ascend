# Render-context schema for docs/governance/templates/release-note.md.j2
#
# Declares the variable contract the release-note template consumes. The
# context is assembled by gate/lib/load_render_context.py's `release_note`
# plugin, which merges:
#   1. evidence-bundle output (build_release_evidence) — generated, byte-stable
#   2. per-release narrative seed yaml — hand-authored prose blocks
#
# Authority: ADR-0119 + Rule G-13 + docs/governance/release-readiness/release-readiness.schema.yaml#RenderContext

context_loader: release_note
schema_version: 1

required_keys:
  - repository                  # {commit_sha, branch, dirty}
  - baseline_metrics            # dict of canonical baselines from architecture-status.yaml
  - live_metrics                # dict of live counts extracted from the frozen tree
  - baseline_comparison         # dict[key] = {baseline, live, matches}
  - generated_at_utc            # ISO timestamp from build_release_evidence
  - release                     # release-level seed: title, decision, evidence_bundle_path, etc.

optional_keys:
  - release_transaction         # validator + generator pointers from build_release_evidence
  - latest_release              # latest release-note path resolved by build_release_evidence
  - fixes_completed             # list of {priority, title, body, refs}
  - pillar_status               # {performance, cost, developer_onboarding, governance}
  - current_forward_claims      # list of CurrentForwardClaim records
  - family_closures             # list of DefectFamilyClosure records
  - authority_refresh_rows      # list of AuthoritySurface records

iteration_keys:
  - baseline_comparison
  - baseline_metrics
  - fixes_completed
  - current_forward_claims
  - family_closures
  - authority_refresh_rows

release_subkeys:
  required:
    - title                     # human-readable release name (rendered as the H1)
    - decision                  # ship | hold | accepted-residual
    - evidence_bundle_path      # path to gate/release-ci-evidence/<id>.evidence.yaml
  optional:
    - formal_release            # bool; default true
    - status                    # frontmatter status; default formal-release-candidate
    - narrative_blocks          # list of paragraph strings rendered in the Summary section

closure_record_subkeys:
  required:
    - family_id
    - cited_findings
    - sibling_surfaces_checked
    - closure_result
    - residual_risk

forward_claim_subkeys:
  required:
    - subject
    - current_shipped_behavior
    - current_verified_by
    - forward_behavior
    - promotion_trigger
    - must_not_claim_before

authority_row_subkeys:
  required:
    - path
    - role                      # normative | workflow_evidence | generated | derived | historical
    - freshness_source
