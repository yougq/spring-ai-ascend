# Skill-dimensional capacity matrix (Rule R-K).
#
# The L0 ironclad rule (LucioIT W1 §7.3) requires a 2D defence net:
#     Tenant Quota × Global Skill Capacity
# preventing a single high-frequency skill (slow external API) from exhausting
# the cluster's connection pool. When a skill capacity pool is full, the
# scheduler precisely suspends only specific Agent compute processes that
# depend on that skill, yielding underlying OS thread resources to other
# Agent instances executing lightweight reasoning.
#
# Authority: ADR-0069 (L0 ironclad rules) + LucioIT W1 L0 draft §7.3.
# Enforced by gate rule 51 (skill_capacity_yaml_present_and_wellformed).
# Consumed by ResilienceContract.resolve(tenant, skill) at runtime.

version: 1
generated_at: 2026-05-15

# v1.0 financial-vertical default token budget (PC-003 / Persona-A + Persona-B + Persona-D).
# Conservative per-(tenant, agent) budget that banks override per-tenant via
# the 中台-mode deployment manifest (`deploy/middle-office-reference/values-bank-example.yaml`).
# Wire schema authority: `docs/contracts/cost-governance.v1.yaml#token_budget_schema`.
v1_0_financial_default_budget:
  description: "Conservative per-tenant per-agent token budget for v1.0 financial workloads. Banks override per-tenant via deployment manifest."
  daily_input_tokens: 1_000_000
  daily_output_tokens: 200_000
  monthly_input_tokens: 30_000_000
  monthly_output_tokens: 6_000_000
  enforcement_mode: block
  product_claim: PC-003


# Post-rc2 status label (gate Rule 62 `contract_yaml_declares_status`): this
# file ships the capacity SCHEMA + per-skill capacity declarations. The
# `model-call` + `memory-write` rows are runtime_enforced today via
# DefaultSkillResilienceContract.resolve (Rule R-K (legacy 41.b), gate Rule 54, enforcer
# E73). The `s2c.client.callback` row is schema_only at v2.0.0-rc2 —
# SyncOrchestrator.handleClientCallback does not yet consult capacity
# (see ResilienceContract integration deferred per CLAUDE-deferred.md 46.b).
status: schema_shipped

# Per-skill capacity declarations. At W1 entry the platform ships with two
# baseline skills wired into the runtime (model-call, memory-write); additional
# skills add rows here as they ship.
skills:
  - id: model-call
    description: "OpenAI / Anthropic / Ascend-Pangu model invocation"
    capacity_per_tenant: 8                            # max concurrent in-flight calls per tenant
    global_capacity: 256                              # max concurrent in-flight calls across cluster
    queue_strategy: suspend                           # suspend > fail; over-cap callers receive SkillResolution.reject(SuspendReason.RateLimited); W2 scheduler admission (Rule R-K.c, deferred per CLAUDE-deferred.md) maps that decision to Run.SUSPENDED. rc12 K-η rewording (rc11 review P2-2 closure; replaced prior "CHRONOS_HYDRATED, not rejected" overclaim).
    timeout_ms: 60000                                 # 60s upper bound; longer waits MUST go through resume mechanism
    realised_by:
      module_l0: agent-middleware
      reactor_module: agent-service              # current platform module hosts the gateway
      enforcer: ResilienceContract.resolve

  - id: memory-write
    description: "GraphMemory / vector store write"
    capacity_per_tenant: 32                           # higher per-tenant cap; memory writes are short-lived
    global_capacity: 1024
    queue_strategy: suspend
    timeout_ms: 5000
    realised_by:
      module_l0: agent-middleware
      reactor_module: spring-ai-ascend-graphmemory-starter
      enforcer: ResilienceContract.resolve

# Future skills (sandbox-execute, vector-search, tool-call) add rows here as
# the corresponding executors ship. Until then the gate rule only validates
# schema well-formedness, not coverage.

  - id: s2c.client.callback
    description: "Server-to-Client (S2C) capability callback (ADR-0074, W2.x Phase 3)"
    capacity_per_tenant: 4                            # short-lived RPC; smaller than model-call
    global_capacity: 64                               # bounded cluster footprint for client callbacks
    queue_strategy: suspend                           # TARGET: over-cap callers receive SuspendReason.RateLimited (W2 wiring per Rule 46.b)
    timeout_ms: 30000                                 # 30s upper bound; longer waits use AwaitClientCallback.deadline
    realised_by:
      module_l0: agent-service
      reactor_module: agent-service
      # rc2 truth alignment: SyncOrchestrator.handleClientCallback today only
      # validates the S2C response and transitions the Run to FAILED on the
      # five typed failure modes (E82 round-trip + E90 FAILED-transition IT).
      # It does NOT consult this capacity matrix. Capacity-driven admission
      # via ResilienceContract.resolve is deferred to W2 per ADR-0074 §Consequences
      # and CLAUDE-deferred.md 46.b. The capacity numbers above are advisory at
      # v2.0.0-rc2 and become binding at W2 wiring.
      enforcer: SyncOrchestrator.handleClientCallback (W2.x Phase 3 — transport + response validation only); ResilienceContract.resolve admission deferred to W2 per Rule 46.b
