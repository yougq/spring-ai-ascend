      docs/logs/reviews/2026-05-24-rc37-strategic-repositioning-audience-c-unfreeze.en.md, and the
      forward developer docs were de-financed in the same wave. Historical-corpus FSI references in
      ADRs 0009/0028/0031/0051/0063, review records, and docs/archive remain as decision history,
      marked-by-location, and are intentionally not rewritten.
    note: |
      [historical] Pre-resolution this was an OPEN founder decision on whether FSI stayed the lead
      W3+ vertical or the platform pivoted; resolved to "none — vertical-agnostic" (see resolution).

  brand_review:
    decision_status: resolved
    decision_owner: chao
    resolved_by: ADR-0117
    resolved_date: 2026-05-24
    surfaces_blocked: []
    resolution: |
      Resolved 2026-05-24 (ADR-0117, rc37): "Ascend" + "Kunpeng" is the deliberate brand identity —
      the Huawei-silicon hardware/software synergy IS the positioning, not an incidental regional read.
      The honest shipped-vs-roadmap boundary (hardware-agnostic kernel today; Ascend-optimised serving
      on the roadmap) is preserved so the brand does not overclaim shipped NPU optimisation.
    note: |
      [historical] Pre-resolution "Ascend" was flagged as possibly Huawei-NPU regional branding and
      tracked separately so the architecture review surface would not block on it; now resolved.

