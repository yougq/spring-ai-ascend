  audience_w3_vertical_positioning:
    decision_status: resolved
    decision_owner: chao
    resolved_by: ADR-0117
    resolved_date: 2026-05-24
    surfaces_blocked: []
    resolution: |
      Resolved 2026-05-24 (ADR-0117, rc37): the platform is repositioned as a vertical-agnostic,
      Ascend (NPU) + Kunpeng (CPU) hardware-synergy platform. FSI is dropped as the lead vertical;
      no single industry leads. ARCHITECTURE.md §1.1 Audience C was rewritten to "regulated-industry
      self-host operators (vertical-agnostic)" via the frozen-doc proposal
      docs/logs/reviews/2026-05-24-rc37-strategic-repositioning-audience-c-unfreeze.en.md, and the
      forward developer docs were de-financed in the same wave. Historical-corpus FSI references in
      ADRs 0009/0028/0031/0051/0063, review records, and docs/archive remain as decision history,
      marked-by-location, and are intentionally not rewritten.
    note: |
      [historical] Pre-resolution this was an OPEN founder decision on whether FSI stayed the lead
      W3+ vertical or the platform pivoted; resolved to "none — vertical-agnostic" (see resolution).

  brand_review:
    decision_status: resolved
    decision_owner: chao
    resolved_by: ADR-0117
    resolved_date: 2026-05-24
    surfaces_blocked: []
    resolution: |
      Resolved 2026-05-24 (ADR-0117, rc37): "Ascend" + "Kunpeng" is the deliberate brand identity —
      the Huawei-silicon hardware/software synergy IS the positioning, not an incidental regional read.
      The honest shipped-vs-roadmap boundary (hardware-agnostic kernel today; Ascend-optimised serving
      on the roadmap) is preserved so the brand does not overclaim shipped NPU optimisation.
    note: |
      [historical] Pre-resolution "Ascend" was flagged as possibly Huawei-NPU regional branding and
      tracked separately so the architecture review surface would not block on it; now resolved.

  audience_b_brand_commitment:
    decision_status: resolved
    decision_owner: chao
    resolved_by: ADR-0120
    resolved_date: 2026-05-25
    surfaces_blocked: []
    resolution: |
      Resolved 2026-05-25 (ADR-0120, Wave A1 of the L0 Agentic Contract Surface remediation):
      KEEP the `spring-ai-ascend` brand and the ARCHITECTURE.md §1.1 Audience B promise. The
      rc41 "L0 final release-ready" decision is re-scoped in framing — rc41 becomes "Runtime
      Kernel + Governance Skeleton GA" (real deliverable), and L0 Final Release-Ready is
      re-claimed at rc48 after Phase B (6 SPI shapes) + Phase C (integration adapters +
      worked example) + Phase D (governance lockstep) complete. Authorises the wave plan at
      `.claude/plans/d-chao-workspace-spring-ai-ascend-docs-eager-harp.md` and its 7
      downstream ADRs (ADR-0121 ModelGateway, ADR-0122 Tool-Skill resolution, ADR-0123
      Memory unified, ADR-0124 Vector/Retriever/Embedding, ADR-0125 Spring AI boundary,
      ADR-0126 Planner, ADR-0127 Skill SPI Tool unification, ADR-0128 Agent first-class).
    note: |
      Closes the L0 contract-shape gap identified in
      `docs/logs/reviews/2026-05-25-l0-senior-architect-reopen-recommendation.en.md`.
      Audience B (external Spring developers integrating into Spring Boot 4 + Java 21
      applications) gets non-vacuous extension seams across Agent / ModelGateway / Skill /
      MemoryStore / VectorStore / Planner; Rule R-A is non-vacuously satisfied after rc48.

