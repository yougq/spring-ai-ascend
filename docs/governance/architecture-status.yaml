    surfaces_blocked: []
    resolution: |
      Resolved 2026-05-24 (ADR-0117, rc37): the platform is repositioned as a vertical-agnostic,
      Ascend (NPU) + Kunpeng (CPU) hardware-synergy platform. FSI is dropped as the lead vertical;
      no single industry leads. architecture/docs/L0/ARCHITECTURE.md §1.1 Audience C was rewritten to "regulated-industry
