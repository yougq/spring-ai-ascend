# Module metadata for agent-execution-engine.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Authority: ADR-0066 + ADR-0072 (Engine Envelope + Strict Matching) + ADR-0088 (agent-runtime-core dissolution).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-execution-engine
kind: domain             # platform | domain | starter | bom | sample
version: 0.0.1-SNAPSHOT
semver_compatibility: experimental
description: "Heterogeneous execution engine module + orchestration SPI host. Owns: ExecutorAdapter / GraphExecutor / AgentLoopExecutor / EngineHookSurface / EngineMatchingException (engine.spi — team-facing SPI surface); EngineRegistry + EngineEnvelope (engine.runtime — implementation home for dispatch + envelope plumbing; relocated from service.runtime.engine in rc14 per ADR-0090 to align with semantic-home model and retire the ADR-0079 source-compat exception); RunMode + Checkpointer / Orchestrator / RunContext / SuspendSignal / TraceContext / ExecutorDefinition (engine.orchestration.spi — relocated here from agent-runtime-core per ADR-0088 dissolution). Reference adapters live in agent-service."
architecture_doc: agent-execution-engine/ARCHITECTURE.md
dfx_doc: docs/dfx/agent-execution-engine.yaml
spi_packages:
  # Engine-adapter SPI (ExecutorAdapter + GraphExecutor + AgentLoopExecutor +
  # EngineHookSurface + EngineMatchingException). Self-contained: orchestration
  # SPI now lives in the sibling package below.
  - com.huawei.ascend.engine.spi
  # Orchestration SPI (RunMode + RunContext + SuspendSignal + Checkpointer +
  # Orchestrator + TraceContext + ExecutorDefinition) — moved here per ADR-0088
  # to break the back-dep that originally motivated agent-runtime-core's existence.
  - com.huawei.ascend.engine.orchestration.spi
allowed_dependencies:
  - agent-middleware       # engine references HookPoint enum + RuntimeMiddleware listener
  - agent-bus              # engine registry consumes S2cCallbackTransport SPI from bus.spi.s2c per ADR-0088 (relocated from dissolved agent-runtime-core)
forbidden_dependencies:
  - agent-service          # engine is upstream of agent-service; reverse direction forbidden
  - agent-client
  - agent-evolve
deployment_plane: compute_control   # Rule R-I / P-I — engine runs in-process with the runtime kernel
