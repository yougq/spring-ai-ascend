# YAML/JSON schema for entries in architecture/facts/generated/*.json
# Authority: ADR-0154 (Fact-Layer Authority); Rule G-15 (Fact-Layer Integrity).
# DO NOT HAND-EDIT to evolve the schema mid-wave — bump schema_version, add
# fields under a new minor, and let extractors emit the new shape.
#
# This file is itself an `inline` source per Rule G-13 (it is the authoring
# source-of-truth for the fact schema; it is not rendered from anything).
# The fact files under architecture/facts/generated/ are `templated` outputs
# of their extractors; they ARE policed by Rule G-13.b for byte-identical
# regeneration and by Rule G-15 for the provenance / no-LLM-author contract.

schema_version: 1
spec_url: "https://json-schema.org/draft/2020-12/schema"
type: object
required:
  - fact_id
  - fact_kind
  - source_kind
  - source_path
  - extractor
  - extractor_version
  - repo_commit
  - observed_value
additionalProperties: false
properties:
  fact_id:
    type: string
    description: "Stable kebab-case identifier unique within the fact file; forward-slash is permitted as a namespace separator (e.g. 'adr/0154-fact-layer-authority' or 'build-module/agent-bus'). Once published, never reused (delete-then-recreate forbidden)."
    pattern: "^[a-z][a-z0-9/-]*[a-z0-9]$"
  fact_kind:
    type: string
    enum:
      - code_symbol         # public interface/record/enum/Spring stereotype/configuration class/method signature
      - contract_operation  # OpenAPI HTTP operation OR SPI method
      - schema              # JSON/YAML schema declaration referenced by a contract
      - test                # JUnit/Failsafe/ArchUnit/gate test class or method
      - build_module        # Maven module + dependencies + SPI packages
      - runtime_config      # Spring @ConfigurationProperties key with default + posture
      - adr                 # ADR id with status + decided_by / relates_to / extends edges
      - relationship        # cross-fact link (feature -> code symbol, fp -> test, etc.)
  source_kind:
    type: string
    enum: [code, contract, test, build, config, adr]
  source_path:
    type: string
    description: "Repo-relative path to the source authority. Forward slashes; no leading slash."
    pattern: "^[^/].*$"
  source_symbol:
    type: string
    description: "FQN, operation id, ADR id, YAML JSON-pointer anchor, or a similar canonical name within source_path. May be empty for whole-file facts."
  source_span:
    type: string
    description: "Optional line/column span. Format: 'startLine:startCol-endLine:endCol' or 'NA'."
  extractor:
    type: string
    description: "Stable id of the extractor binary that produced this fact. Convention: 'tools/architecture-workspace#<Cli>' or 'gate/lib/extractors/<script>'."
  extractor_version:
    type: string
    description: "Semver / build tag of the extractor module at extraction time. Stable across reruns at the same workspace HEAD."
  repo_commit:
    type: string
    description: "40-character lowercase git SHA-1 of the workspace HEAD when the extractor ran. Reproducibility anchor (SLSA-style)."
    pattern: "^[0-9a-f]{40}$"
  observed_value:
    type: object
    description: "Fact payload. Shape depends on fact_kind. See per-kind sub-schemas under architecture/facts/schema/by-kind/."
    additionalProperties: true
  source_refs:
    type: array
    description: "Optional list of fact_ids from OTHER fact files that this fact depends on. Used to express 'fp -> test_class' or 'feature -> code symbol' edges."
    items:
      type: string
      pattern: "^[a-z][a-z0-9/-]*[a-z0-9]$"
    default: []
  notes:
    type: string
    description: "Optional free-form note attached by the extractor. MUST NOT carry design intent or rationale (use ADRs for that)."

# Constraints policed by Rule G-15 beyond JSON-schema:
#   - The on-disk fact file MUST begin with the banner:
#         # DO NOT EDIT — generated by <extractor> at commit <repo_commit>
#         # See architecture/facts/README.md
#     This banner is checked by gate/lib/check_fact_layer_integrity.py.
#   - The on-disk file MUST be byte-identical to re-extraction at the same
#     workspace HEAD. Live timestamps (generated_at_utc) are intentionally
#     OMITTED — the repo_commit anchor is the provenance.
#   - LLMs MUST NOT author or refresh any file under
#     architecture/facts/generated/. The CI gate detects manual edits by
#     comparing committed content to extractor output.
