    const: spring-ai-ascend-architecture-profile
  version:
    type: integer
    minimum: 1
  authority_adr:
    pattern: "^ADR-[0-9]{4}$"
  description:
    type: string
  tags:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: "^SAA "
  relationship_property:
    const: saa.rel
  required_property_prefix:
    const: saa.
  relationship_tag:
    const: "SAA Relationship"
