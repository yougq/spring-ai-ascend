# dev compose: brings up Postgres + agent-service only (post-Phase-C / ADR-0078; pre-Phase-C the service was named agent-platform).
# W1 adds Keycloak; W2 adds Valkey + Vault; W3 adds OPA; W4 adds Temporal.
#
# Per docs/cross-cutting/deployment-topology.md sec-2.1 (dev posture).

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: springaiascend-postgres
    environment:
      POSTGRES_DB: springaiascend
      POSTGRES_USER: springaiascend
      POSTGRES_PASSWORD: springaiascend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springaiascend"]
      interval: 5s
      timeout: 3s
      retries: 12

  agent-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: springaiascend-platform
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_POSTURE: dev
      APP_SHA: dev
      DB_URL: jdbc:postgresql://postgres:5432/springaiascend
      DB_USER: springaiascend
      DB_PASS: springaiascend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
