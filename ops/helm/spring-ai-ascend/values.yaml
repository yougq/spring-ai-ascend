# Default values for spring-ai-ascend Helm chart.
# Maturity: L0 (skeleton; validated in W4).

replicaCount: 2

image:
  # Post-Phase-C / ADR-0078: image hosts agent-service (consolidates pre-Phase-C agent-platform + agent-runtime).
  repository: springaiascend/agent-service
  pullPolicy: IfNotPresent
  tag: "0.1.0-SNAPSHOT"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

env:
  APP_POSTURE: "dev"
  DATABASE_URL: ""
  OPENAI_API_KEY: ""

livenessProbe:
  httpGet:
    path: /v1/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /v1/health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 5
