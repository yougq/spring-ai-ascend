# mem0 REST API sidecar compose overlay.
# Activate with: docker compose -f ops/compose/sidecar-mem0.yml up -d
#
# Version tag tracks third_party/MANIFEST.md Section B mem0 entry (v2.0.2 / SHA 9043fbf).
# mem0 exposes REST API on port 8000 by default.
#
# spring-ai-ascend-mem0-starter connects via: com.huawei.ascend.mem0.base-url=http://localhost:8001
# (port 8001 avoids collision with agent-service on 8080 — post-Phase-C / ADR-0078;
#  pre-Phase-C this collision check named agent-platform on 8080 / other services on 8000)

services:
  mem0:
    image: mem0ai/mem0:v2.0.2
    container_name: spring-ai-ascend-mem0
    ports:
      - "8001:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      MEM0_VECTOR_STORE: "pgvector"
      MEM0_POSTGRES_URL: "postgresql://postgres:postgres@postgres:5432/mem0db"
    depends_on:
      - postgres
    networks:
      - spring-ai-ascend
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: spring-ai-ascend-mem0-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mem0db
    volumes:
      - mem0-pg-data:/var/lib/postgresql/data
    networks:
      - spring-ai-ascend
    restart: unless-stopped

volumes:
  mem0-pg-data:

networks:
  spring-ai-ascend:
    name: spring-ai-ascend
    external: true
