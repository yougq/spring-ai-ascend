# Graphiti graph-memory REST sidecar compose overlay.
# Activate with: docker compose -f ops/compose/sidecar-graphmemory.yml up -d
#
# Version tag tracks third_party/MANIFEST.md Section B Graphiti entry (v0.29.0 / SHA 56cf7b3).
# Graphiti exposes REST API on port 8000 by default.
#
# spring-ai-ascend-graphmemory-starter connects via:
#   com.huawei.ascend.graphmemory.base-url=http://localhost:8002
#
# Cycle-15 decision: Graphiti vs Cognee. This overlay wires Graphiti; swap
# Cognee by replacing the image when cycle-15 confirms the alternative.

services:
  graphiti:
    image: getzep/graphiti-service:v0.29.0
    container_name: spring-ai-ascend-graphiti
    ports:
      - "8002:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-graphiti-dev}"
    depends_on:
      - neo4j
    networks:
      - spring-ai-ascend
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20
    container_name: spring-ai-ascend-neo4j
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-graphiti-dev}"
    volumes:
      - neo4j-data:/data
    networks:
      - spring-ai-ascend
    restart: unless-stopped

volumes:
  neo4j-data:

networks:
  spring-ai-ascend:
    name: spring-ai-ascend
    external: true
