  open_residual: 'Rule 125 today is codegraph-specific (it hard-codes the

    @colbymchenry/codegraph package name + the tools/codegraph/ path).

    A future second project-local MCP tool either re-uses the same

    structural template (a sibling rule with its own package name + path

    pair) or the rule is generalized to walk all entries of

    `.mcp.json#mcpServers` and verify a `tools/<name>/` manifest exists

    per entry. Generalization is deferred until a second tool actually

    lands; current state is a single concrete enforcer matching the

    single concrete tool the platform ships.

    '
  prevention_rules:
  - "Rule R-A (rc1 \u2014 Business/Platform Decoupling + Developer Self-Service kernel)"
  - "Rule 125 / E173 (rc40 \u2014 codegraph_install_truth gate": exact-pin + lockfileVersion>=3
      + .mcp.json relative-shim ref; pinning-truth gate, not install-state)
  root_cause: "Project-local development tools wired into the Claude Code MCP layer\n\
    (or any equivalent contributor surface) keep three independent surfaces\nin lockstep:\
    \ a package.json that pins versions, a package-lock.json\nthat pins the integrity-hashed\
    \ dependency tree, and a .mcp.json (or\nequivalent) that names where the binary\
    \ lives. Each surface is easy to\nedit in isolation: a contributor relaxes the\
    \ version to a caret range\n(\"^0.9.4\") thinking npm will handle minor drift;\
    \ another regenerates\nthe lockfile against a registry that does not mirror per-platform\n\
    optionalDependencies; a third changes the shim path in .mcp.json\nthinking PATH\
    \ lookup will find the binary. Each change passes the\nshape-only review the file\
    \ gets. None of them announce themselves at\nruntime \u2014 Claude Code simply\
    \ fails to start the MCP server with an\nobscure error pointing nowhere \u2014\
    \ and the next contributor's `npm ci`\nsilently installs a different binary than\
    \ the previous contributor\nused, breaking the onboarding flow that Rule R-A's\
    \ \"first-agent\nexecution without platform-team intervention\" clause depends\
    \ on.\nRegistered preventively at the codegraph integration so the family is\n\
    gateable before any incident, rather than after the third one.\n"
  surfaces:
  - tools/codegraph/package.json
  - tools/codegraph/package-lock.json
  - .mcp.json
  title: Project-Local Dev-Tool Pin Drift and Manifest Inconsistency
