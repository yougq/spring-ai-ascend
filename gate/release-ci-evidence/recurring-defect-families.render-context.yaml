  open_residual: 'The bulk-regex scrub pattern is structurally fragile. Future

    Rule D-9 enforcement waves should switch to AST-aware tooling

    (JavaParser, libCST for python, shfmt for shell) so the deleted

    token''s neighbours can be properly re-bound. Until then this

    family will recur on every new metadata-scrub pass. Considered

    registering this in rc31 (commit 5597ed8 message acknowledged

    the pattern as a candidate family) but not formally landed

    until rc32.

    '
  prevention_rules:
  - "Rule D-9 (rc20 \u2014 the scrub being enforced)"
  - rc27 grandfather list (54 pre-existing files, sunset 2026-11-21)
  - "rc32 corrective \u2014 register family; future D-9 scrub passes MUST also strip\
    \ bounding punctuation OR use AST-aware tooling"
  root_cause: "Rule D-9 (no version/log metadata in code) is enforced by a bulk\n\
    per-line regex scrub across .java/.py/.sh files. The scrub deletes\ntokens like\
    \ \"per ADR-NNNN\", \"rcN\", \"(legacy Rule NN)\", \"Wave N\",\netc. \u2014 but\
    \ the surrounding punctuation that bound those tokens\n(open parens, leading commas,\
    \ sentence-final periods, trailing\n\"+\" connectors, \"(`)\" pointers) is preserved\
    \ by the regex. The\nresult is orphan punctuation: \".b)\" after stripping \"\
    legacy 41.b\",\n\", the relationship\" after stripping a leading clause, \"* .\"\
    \ on a\nline by itself, \"()\" empty parens after stripping the ref. The\npattern\
    \ recurred at rc27 D-9 scrub, rc28 ADV-9 (6 files patched),\nrc31 ADV4-1..3 +\
    \ 2 follow-ups (5 files), and again at rc32 (8\nresiduals in 6 package-info files).\
    \ The structural fix is to\nALSO scrub the punctuation that bounded the deleted\
    \ token, or\nto forbid bulk regex scrubs entirely in favour of per-file\nsemantic\
    \ review.\n"
  surfaces:
  - '**/*.java javadoc and inline comments'
  - '**/*.py docstrings and comments'
  - gate/**/*.sh comment headers
  title: Bulk Regex Scrub Leaves Orphan Punctuation in Code Comments
