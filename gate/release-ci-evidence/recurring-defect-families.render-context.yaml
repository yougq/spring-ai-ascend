  root_cause: "A Run status transition done as a separate re-read (`findById`) then\n\
    blind write (`save`) is not atomic relative to a parallel terminal\nwrite. A `RunController.cancel`\
    \ (or any surface) that writes CANCELLED\nbetween the re-read and the save is\
    \ silently overwritten: the mutator\nvalidates its transition against the STALE\
    \ snapshot (e.g. RUNNING \u2192\nSUCCEEDED passes) and blind-puts over the just-written\
    \ CANCELLED, so the\nuser's cancel is lost. The class recurred across four passes,\
    \ each\nclosing one set of call-sites while a sibling set survived:\nrc35-correctness-batch\
    \ closed the three terminal SUCCEEDED/FAILED sites;\nrc35-second-pass closed the\
    \ five non-terminal sites (PENDING\u2192RUNNING,\nRUNNING\u2192SUSPENDED \xD7\
    2, SUSPENDED\u2192RUNNING \xD72); rc36 closed the\n`RunController.cancel` half\
    \ via the new atomic\n`RunRepository.updateIfNotTerminal` compare-and-set; rc38\
    \ found that the\n`SyncOrchestrator`'s OWN private `mutateIfNotTerminal` helper\
    \ \u2014 the very\nindirection the earlier waves routed writes through \u2014\
    \ was STILL a\nnon-atomic `findById`-then-`save`, so a cancel interleaving between\
    \ its\nre-read and write was still lost. Closure: the helper now delegates to\n\
    `RunRepository.updateIfNotTerminal` (re-read + terminal-check + mutate +\nwrite\
    \ as one `computeIfPresent` step), and a deterministic single-threaded\nregression\
    \ test injects a cancel into the exact read-modify-write window\nthe prior latch-based\
    \ tests skipped. rc39 broadened the same family to\ntenant-owned runtime state\
    \ after `InMemoryTaskStateStore.save` was found\ndoing `get` \u2192 tenant-check\
    \ \u2192 `put`; it now uses\n`ConcurrentHashMap.compute` and has a two-tenant\
    \ race regression test.\nThe class was never registered as a family before rc38,\
    \ so the ledger\ncould not flag the recurrence.\n"
  surfaces:
  - agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/SyncOrchestrator.java
  - agent-service/src/main/java/com/huawei/ascend/service/platform/web/runs/RunController.java
  - agent-service/src/main/java/com/huawei/ascend/service/runtime/runs/spi/RunRepository.java
  - agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/InMemoryRunRegistry.java
  - agent-service/src/main/java/com/huawei/ascend/service/task/InMemoryTaskStateStore.java
  title: Non-Atomic Runtime State Write Loses Tenant or Terminal-State Invariants
