  root_cause: "117+ single-surface prevention rules can all pass while the\nsurfaces\
    \ themselves contradict each other \u2014 e.g.\narchitecture-status.yaml#baseline_metrics.architecture_graph_nodes\n\
    \u2260 architecture-graph.yaml#node_count. rc14 identified this as a\nstructurally-new\
    \ defect family (L-\u03B4 META): per-surface\nself-consistency is necessary but\
    \ not sufficient. Closed\nstructurally by Rule G-8 (rc14 mega-rule, 4 sub-checks)\
    \ +\nRule G-8.e (rc15 widening) + Rule 107/108/109 (rc16 namespace\nparity).\n\
    \n**rc33+rc34 forward-pointing-reference recurrence (2026-05-23).**\nrc33 committed\
    \ 23 `l0_decision: docs/adr/01{08..15}-*.yaml`\nreferences in `architecture-status.yaml`\
    \ BEFORE the referenced\nADR files existed on disk; rc34 ships the 8 referenced\
    \ ADRs to\nresolve. The Rule G-2.a path-truth gate does NOT fire on these\nrows\
    \ because they are `shipped: false` (only shipped:true rows\nrequire existing\
    \ path resolution). Rule G-8.a fired on the\ngraph node/edge baseline drift (rc33\
    \ didn't bump baseline for\nthe rc34-shipped ADRs because the ADR files arrived\
    \ in the\nfollow-up commit). This is the same family pattern \u2014 multiple\n\
    authority surfaces (status yaml capability rows, ADR files on\ndisk, graph yaml\
    \ node/edge counts, baseline_metrics) drifting\nrelative to each other across\
    \ a wave-pair. Closure: rc34 fixes\nbaseline_metrics 448\u2192464 / 756\u2192\
    826 / adr_count 92\u2192100 in\nlockstep with the 8 new ADR file additions.\n\n\
    **rc34-follow-up wave recurrence (2026-05-23, commit 6d730521).**\nAdversarial\
    \ review of rc34 branch found 5 additional forms of\ncross-authority drift, all\
    \ closed in the follow-up commit:\n(1) ADR-0112 Part A declares `Mono<StateDelta>`\
    \ value-based-yield\nSPI but shipped `StatelessEngine.java` returns synchronous\n\
    `StateDelta` and its javadoc declared the opposite direction \u2014\nclosed by\
    \ ADR prose \"Current shipped state\" callout + javadoc\nforward-direction reference.\n\
    (2) ADR-0108 declares 403 `tenant_mismatch` + WARN audit on\nGET/cancel but live\
    \ `RunController` returns 404 silently with\nno audit emission \u2014 closed by\
    \ ADR prose W1 widening direction\nclarification.\n(3) ADR-0114 / ADR-0115 / ADR-0111\
    \ / ADR-0109 reference 7\nnot-yet-authored cross-cutting + governance files\n\
    (`virtual-thread-pinning-hazards.md`,\n`agent-runtime-core-dissolution-migration.md`,\n\
    `agent-client-wire-contract-compatibility.md`,\n`otlp-tenant-routing.yaml`, `secret-lifecycle.yaml`,\n\
    `key-distribution.yaml`, `dual-track-routing-policy.yaml`) as\n\"Ships with this\
    \ ADR wave\" / \"(W2 NEW)\" / \"(W0 NEW)\" prose \u2014\nclosed by revising to\
    \ \"(W2 follow-up \u2014 not yet authored)\" /\n\"(W3 follow-up \u2014 not yet\
    \ authored)\" prose.\n(4) `gate/build_architecture_graph.py` silently dropped\n\
    ADR-0112's `supersedes_partial: [ADR-0019]` edge \u2014 closed by\nadding `supersedes_partial`\
    \ branch at line 286; surfaces 2 nodes\n+ 3 edges previously invisible; baseline_metrics\
    \ lockstep bump\n464/826 \u2192 466/829.\n(5) Rule R-C.2.a `scope_surfaces:` excluded\n\
    `service/task/**` + `service/session/**` even though `Task.java`\nvoluntarily\
    \ self-validates `tenantId`; E105 enforcer `asserts:`\ntext cited dissolved `agent-runtime-core`\
    \ path \u2014 closed by\nscope widening + path retargeting.\n\nThe rc34-follow-up\
    \ wave demonstrates the family's recurrence\npattern operates at TWO scales: cross-wave\
    \ (rc33\u2192rc34 ADR-shipped\nafter status-yaml row references it) AND in-wave\
    \ (rc34 ADR text\nasserts present-tense delivery for documents that don't exist\n\
    in the same commit). Strengthens the case for a W2 ADR\nfrontmatter-schema validation\
    \ pass (rejects unknown top-level\nkeys like `supersedes_partial:` until graph\
    \ builder adds branch;\nasserts every `references:` path resolves on disk).\n\n\
    **rc34-merge-train wave (2026-05-23, commits 769712f\u2192993deb4\u2192c87381b).**\n\
    THIRD scale of the family pattern surfaced: merge-train freshness\ndrift. PRs\
    \ #54 + #35 + #34 squash-merged to main in sequence over\n~2 minutes. PR #54 carried\
    \ families.yaml content-diff for G-9.b\ncompliance, but the squash collapsed it\
    \ into commit 769712f. The\nsubsequent squash-merges (993deb4 = docs-only PR #35;\
    \ c87381b =\nrun-dispatch Executor PR #34) did NOT carry their own families.yaml\n\
    diff because their head branches predated PR #54's family-yaml\nedit. Rule G-9.b's\
    \ first-parent comparison at c87381b sees\nfamilies.yaml unchanged from 993deb4\
    \ (its parent) \u2014 even though\nit IS changed from 4e7c31b (pre-PR-#54 main).\
    \ Result: c87381b's\npost-merge CI run on main fired G-9.b and turned main red.\n\
    Corrective: this branch + PR bumps families.yaml content-diff\nsatisfying G-9.b\
    \ at its tip; restores main green. Underlying\nroot cause: G-9.b first-parent\
    \ semantics interact poorly with\nmerge-train patterns where multiple PRs squash-merge\
    \ in rapid\nsuccession. W2 remediation candidates: (a) treat signal-commit\ndetection\
    \ as cumulative-since-last-families.yaml-bump rather\nthan nearest-signal-walking;\
    \ (b) add merge-train-pattern\ndetection to relax the per-commit requirement when\
    \ the squash\npayload itself bumped families.yaml; (c) require contributors\n\
    to rebase their PR head against latest main before merge so\nthe second PR in\
    \ a train inherits the first's family-yaml diff.\n\n**rc39 formal-release-transaction\
    \ recurrence (2026-05-25).**\nrc38 post-audit review found that HTTP cancel tenant\
    \ semantics,\nidempotency replay wording, agent-engine promotion status, pinned\n\
    OpenAPI fixtures, deferred clauses, and architecture-status claims\ncould all\
    \ be individually plausible while mutually inconsistent.\nClosure: rc39 aligns\
    \ the authority surfaces to W1 current behavior\nand W2 forward triggers, then\
    \ publishes a formal release note backed\nby generated evidence.\n\n**rc40 agent-execution-engine\
    \ proposal recurrence (2026-05-25).**\nThe L1 proposal document claimed immediate\
    \ W0/W1 scope while still\ncarrying pending boundary contracts, referenced non-current\
    \ package names\n(`com.huawei.ascend.agent.engine`) and a non-current executor\n\
    (`StatelessEngineExecutor`), and presented future dynamic compiler/APG/\nsandbox\
    \ capabilities as if they were deployable current work. Closure:\nthe proposal\
    \ now separates current L0/L1 behavior, accepted-forward\nADR-0112 direction,\
    \ and W2+ exploratory items; Rule 122/123/124 reject\nthe same contradiction class\
    \ in future proposal documents.\n"
