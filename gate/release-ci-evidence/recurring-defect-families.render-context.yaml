  open_residual: "Every newly-added rule carries the same risk. Rule G-9 (rc17)\n\
    requires every new rule declare `scope_surfaces:` frontmatter so\nkernel-vs-impl\
    \ drift becomes detectable at gate time.\nrc36 recurrence (worst observed instance):\
    \ Rules 96 + 99 \u2014 the two\nenforcers whose JOB is detecting kernel-vs-impl\
    \ drift \u2014 were\nthemselves silent-passes for ~20 waves because their heading-discovery\n\
    regexes stayed numeric (`^#### Rule [0-9]+`) after the rc16 D-/R-/G-/M-\nnamespace\
    \ migration, so they matched 0 of 42 live kernels. Closed by\nnamespace-aware\
    \ longest-prefix parent resolution + a NON-VACUITY GUARD\n(each rule now FAILS\
    \ if it resolves 0 sub-clauses/parents, so a future\nheading-format change can\
    \ never re-silence them). The non-vacuity guard\nis the structural generalisation:\
    \ a drift-detector that detects nothing\nmust fail loudly, not pass quietly.\n"
  prevention_rules:
  - Rule 82
  - Rule 99
  - Rule 100
  - Rule 106
  - Rule 107
