    \ of Code-as-Contract drift because the rule whose JOB is\npreventing drift itself\
    \ drifts. rc11 P1-3 documented \"kernel-narrow\nimpl-broad\" (Rule 96 said \"\
    kernel only\" but checked \"either\nsurface\"). rc15 found analogous drift in\
    \ Rule G-8 sub-checks.\n"
