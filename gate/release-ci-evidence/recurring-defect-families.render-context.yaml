  open_residual: "Every new rule MUST explicitly enumerate its authority surfaces\n\
    (Rule G-8.b/.c/.e + Rule 109 + Rule G-9 frontmatter). Drift will\nreappear only\
    \ if a rule introduces a new surface without declaring\nit.\n\nrc35-second-pass\
