  narrative_blocks:
  - "The rc42 wave lands the architectural decision that derived architecture documents\
    \ (release notes, READMEs, contract catalog, recurring-defect-families.md, root\
    \ and L1 ARCHITECTURE.md) MUST be machine-rendered from authority surfaces via\
    \ Jinja2 templates, with byte-identical regen enforced by Rule G-13. The 11-wave\
    \ roadmap (W0\u2013W10) ships in stages; this release covers W0 (policy + Rule\
    \ G-13 + governance index updates), W1 (render engine + general gate at gate/lib/render_template.py\
    \ / load_render_context.py / check_template_render_idempotency.py), W2 (refresh-order\
    \ orchestrator skill /refresh-architecture-doc + phase-contract integration),\
    \ and W3 (the release-note template itself \u2014 this very document is the first\
    \ rendered artefact)."
  - "The defect-class math: 14+ occurrences of F-numeric-drift, plus F-deleted-module-name-leakage,\
    \ F-authority-surface-path-drift, F-cross-authority-agreement, and F-l1-architecture-grounding-gap,\
    \ all share one mechanism \u2014 a human types a count, path, or module name into\
    \ prose, and that value drifts from the authority surface it reflects. Today's\
    \ gates catch the drift AFTER a draft is shipped, forcing 1\u20132 corrective\
    \ waves per release. Rule G-13 flips the paradigm: the prose IS the render of\
    \ the data. Drift is impossible by construction for every templated surface."
  - "rc42 is the smallest possible end-to-end proof of the pattern \u2014 one template\
    \ (release-note.md.j2), one context loader plugin (release_note via build_release_evidence),\
    \ one Rule G-13.b gate driver (check_template_render_idempotency.py). W4\u2013\
    W10 each migrate one further surface (recurring-families.md, contract-catalog.md,\
    \ root ARCHITECTURE.md, L1 ARCHITECTURE.md per module, README + gate/README, CLAUDE.md\
    \ rule-index table + phase-contract Active Rules tables), then W10 retires the\
    \ rules subsumed by G-13."
  status: formal-release-candidate
  title: "v2.0.0-rc42 \u2014 Single-Source Rendering Policy + Foundation Tooling +\
    \ Release-Note Render Pilot"
