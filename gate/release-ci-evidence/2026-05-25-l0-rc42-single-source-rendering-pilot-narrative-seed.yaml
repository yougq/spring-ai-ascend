# Per-release narrative seed for rc42 single-source-rendering pilot.
#
# This file is the hand-authored half of the rc42 release-note render
# context. Generated counts (baseline_metrics, live_metrics,
# baseline_comparison, repository SHA, generated_at_utc) come from
# build_release_evidence.py. Narrative prose, fix titles, family
# closures, and current-vs-forward claims live here.
#
# Authority: ADR-0119 + docs/governance/templates/release-note.context-schema.yaml.

release:
  title: "v2.0.0-rc42 — Single-Source Rendering Policy + Foundation Tooling + Release-Note Render Pilot"
  decision: "ship"
  formal_release: true
  status: "formal-release-candidate"
  evidence_bundle_path: "gate/release-ci-evidence/2026-05-25-l0-rc42-single-source-rendering-pilot.evidence.yaml"
  # Frozen values pinned at first render so the rendered .md is byte-identical
  # under every subsequent re-render (Rule G-13.b idempotency). These are
  # AUTHORITATIVE — do not edit unless this release is being re-cut.
  frozen_commit_sha: "a0a298ceec6e9c7f16050b64b7c1d008af9d3182"
  frozen_branch: "main"
  frozen_at_utc: "2026-05-25T09:00:00+00:00"
  narrative_blocks:
    - "The rc42 wave lands the architectural decision that derived architecture documents (release notes, READMEs, contract catalog, recurring-defect-families.md, root and L1 ARCHITECTURE.md) MUST be machine-rendered from authority surfaces via Jinja2 templates, with byte-identical regen enforced by Rule G-13. The 11-wave roadmap (W0–W10) ships in stages; this release covers W0 (policy + Rule G-13 + governance index updates), W1 (render engine + general gate at gate/lib/render_template.py / load_render_context.py / check_template_render_idempotency.py), W2 (refresh-order orchestrator skill /refresh-architecture-doc + phase-contract integration), and W3 (the release-note template itself — this very document is the first rendered artefact)."
    - "The defect-class math: 14+ occurrences of F-numeric-drift, plus F-deleted-module-name-leakage, F-authority-surface-path-drift, F-cross-authority-agreement, and F-l1-architecture-grounding-gap, all share one mechanism — a human types a count, path, or module name into prose, and that value drifts from the authority surface it reflects. Today's gates catch the drift AFTER a draft is shipped, forcing 1–2 corrective waves per release. Rule G-13 flips the paradigm: the prose IS the render of the data. Drift is impossible by construction for every templated surface."
    - "rc42 is the smallest possible end-to-end proof of the pattern — one template (release-note.md.j2), one context loader plugin (release_note via build_release_evidence), one Rule G-13.b gate driver (check_template_render_idempotency.py). W4–W10 each migrate one further surface (recurring-families.md, contract-catalog.md, root ARCHITECTURE.md, L1 ARCHITECTURE.md per module, README + gate/README, CLAUDE.md rule-index table + phase-contract Active Rules tables), then W10 retires the rules subsumed by G-13."

fixes_completed:
  - priority: "P1"
    title: "Rule G-13 (Single-Source Rendering Coherence) landed with three sub-clauses"
    body: "Sub-clause .a registers the surface-classification registry; sub-clause .b enforces byte-identical regen (gate Rule 126 / E174); sub-clause .c flags inline dynamic-claim leakage at W10 audit. Card at docs/governance/rules/rule-G-13.md; kernel byte-matches the CLAUDE.md paragraph."
    refs: ["ADR-0119", "Rule G-13", "E174"]
  - priority: "P1"
    title: "Render engine + context loader + general gate driver shipped"
    body: "gate/lib/render_template.py is a deterministic Jinja2 wrapper (sorted iteration, LC_ALL=C, fixed-precision floats, StrictUndefined, keep_trailing_newline). gate/lib/load_render_context.py is plugin-dispatched (release_note + recurring_families plugins land now; contract_catalog / root_architecture / l1_architecture / readme_root / readme_gate / claude_md_index / phase_contract_table plugins arrive in W4–W9). gate/lib/check_template_render_idempotency.py is the Rule G-13.b gate driver."
    refs: ["Rule G-13.b", "gate/lib/render_template.py", "gate/lib/load_render_context.py"]
  - priority: "P1"
    title: "/refresh-architecture-doc orchestrator skill drives the 9-stage refresh order"
    body: "Pre-flight → ADR → graph rebuild → status.yaml refresh → CLAUDE.md kernel + rule cards → recurring-families ledger → phase contracts → template render idempotency → README numeric mirrors → full gate. Replaces the ad-hoc refresh order that has produced 14+ F-numeric-drift recurrences. /formal-release-transaction now delegates to it for upstream stages."
    refs: ["Rule G-13", ".claude/skills/refresh-architecture-doc.md"]
  - priority: "P2"
    title: "First templated release note is THIS document"
    body: "Proves end-to-end render path: build_release_evidence → load_render_context release_note plugin → render_template → byte-identical .md. The Generated Evidence table, Architecture Baseline table, and per-row counts in this note are 100% rendered; no hand-typed counts."
    refs: ["docs/governance/templates/release-note.md.j2", "Rule G-13.b"]

