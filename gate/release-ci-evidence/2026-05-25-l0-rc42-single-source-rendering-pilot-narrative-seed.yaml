    forward_behavior: "every subsequent release note renders from this template; historical rc1–rc41 stay frozen and are grandfathered"
    promotion_trigger: "W4–W10 wave landings extend the rendered-surface set to families.md, contract-catalog.md, root + L1 ARCHITECTURE.md, READMEs, CLAUDE.md rule index, phase contracts"
    must_not_claim_before: "do not claim full architecture-document render coverage before W10 cleanup wave closes"
  - subject: "Subsumed reactive prevention rules"
