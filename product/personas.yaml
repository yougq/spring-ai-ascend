# Personas registry for spring-ai-ascend.
#
# Authority: product/PRODUCT.md + plan file D:\.claude\plans\ai-l0-adr-ai-l1-adr-adr-ai-ai-1-2-3-ai-effervescent-flask.md
# Source ADR: ADR-0156 (Product Authority and Traceability Chain)
#
# Each persona names a single archetypal user of the platform. AI sessions
# may draft refinements; final wording is product-owner authority.

schema_version: "1.0"
last_updated: "2026-05-28"
v1_0_primary_persona: Persona-F     # financial-vertical compliance mandate

personas:

  - id: Persona-A
    role: Platform Team Lead
    deployment_pattern: 中台模式 (middle-office)
    org_context: >
      Large enterprise with strong middle-office structure. A central platform
      team owns the agent service offering. Business centers consume agent
      runtime as a hosted service from the central team.
    daily_job:
      - Standardize agent service offerings the business centers consume
      - Define SLA for hosted agents (latency, throughput, isolation)
      - Govern which agents enter production
      - Deprecate underperforming agents
    success_criteria:
      - Business centers self-onboard with minimal platform-team intervention
      - Multi-tenant isolation provable for internal audit
      - Capacity matrix predictable across tenants
    pain_points_today:
      - Every business unit rebuilds its own agent runtime
      - Tenant isolation is ad-hoc (no storage-engine enforcement)
      - No shared governance across business-unit agent runtimes
    v1_0_priority: secondary    # 中台 reference deployment manifest ships in v1.0

  - id: Persona-B
    role: Enterprise IT Capability Provider
    deployment_pattern: 能力复用模式 (capability-reuse)
    org_context: >
      Federated enterprise where the central IT department provides only
      middleware and model services. Business units own their own agent
      runtime layer, consuming central middleware/model as platform.
    daily_job:
      - Maintain enterprise middleware (Auth, MQ, observability) + model gateway
      - Provide middleware as a platform to business units
      - Let business units self-build the agent layer
    success_criteria:
      - Business units get production-grade middleware without IT becoming a bottleneck
      - Consistent governance hooks across self-built agent layers
      - Cost attribution per business unit
    pain_points_today:
      - Business units re-invent agent runtime per project
      - Observability fragmented across business-unit-built runtimes
      - Cost reporting opaque
    v1_0_priority: deferred     # 能力复用 ships in v1.1+

  - id: Persona-C
    role: Enterprise Agent Developer
    background: Spring / microservices (~90% of agent-developer population per user input 2026-05-28)
    org_context: >
      Application developer in a business center. Builds agents for specific
      business processes (loan review, AML screening, customer service, fraud
      detection, etc. in the v1.0 financial vertical).
    daily_job:
      - Configure & build agents to automate business processes
      - Integrate agents with existing business systems (DB, MQ, internal APIs)
      - Wire models + skills via config, not framework boilerplate
    success_criteria:
      - Ships first agent in days, not months
      - Reuses familiar Spring middleware (Boot starters, ConfigurationProperties, DI)
      - Pipeline from dev → research → prod posture works without rewrites
    pain_points_today:
      - Agent frameworks demand a new programming model (Python or new Java conventions)
      - Spring middleware reuse broken in existing JVM agent libraries
      - Learning curve > 2 weeks even for senior developers
    v1_0_priority: primary_developer

  - id: Persona-D
    role: Enterprise SRE / Production Operator
    org_context: >
      Operates agent services at scale. v1.0 customers include large banks
      with 10K-card-class AI infrastructure; capacity planning + SLA
      monitoring is the daily job.
    daily_job:
      - SLA monitoring (latency p50/p95/p99, throughput, error rate per tenant)
      - Capacity planning across the skill capacity matrix
      - Incident response on agent failures
      - Tenant isolation audit
      - Posture promotion (dev → research → prod) per workload
      - Cost governance per tenant per agent
    success_criteria:
      - Agents enter core production with operational rigor matching microservices
      - Failures contained per-tenant; no cross-tenant blast radius
      - Cost attributable per tenant per agent (token + infra)
    pain_points_today:
      - Agent runtimes lack reactive non-blocking I/O
      - Thread-blocking sleeps in business code (Thread.sleep ban not enforced)
      - No posture-aware default model (dev permissive vs prod fail-closed)
      - Cost reporting absent at the agent-instance granularity
    v1_0_priority: primary_operator

  - id: Persona-E
    role: Enterprise Agent Architect
    org_context: >
      Owns framework-choice and evolution strategy across multiple business
      agents. Often the bridge between Persona-C (developer) and Persona-D
      (operator) on framework + model + evolution decisions.
    daily_job:
      - Evaluate agent frameworks (graph / ReAct / supervisor-worker / external)
      - Design which agents evolve and how
      - Own the RL trajectory export pipeline
      - Select model providers per agent class (cost / latency / quality tradeoff)
    success_criteria:
      - Framework choice is reversible per agent
      - Evolution is measurable (knowledge delta, skill success-rate delta over time)
      - Can mix frameworks per agent without governance fragmentation
    pain_points_today:
      - Framework lock-in once chosen
      - No observable evolution trajectory
      - RL training data extraction is ad-hoc per framework
    v1_0_priority: primary_for_pc004_pc005_conversations

  - id: Persona-F
    role: Enterprise Compliance / Risk Officer
    org_context: >
      Risk / compliance / audit function in a regulated enterprise. For v1.0
      this is specifically the financial-industry compliance officer in a
      bank / insurer / securities firm / fintech. Subject-matter: 等保 2.0/3.0,
      关键信息基础设施, PIPL, 数据安全法, JR/T 0223-2021 (金融数据安全
      数据生命周期安全规范); 国际 SOC 2, ISO 27001, SR 11-7 model risk.
    daily_job:
      - Audit agent behavior for regulatory submissions
      - Certify compliance with regulatory requirements before production rollout
      - Review sandbox policies for PII / sensitive-data handling
      - Sign off on production promotion
      - Investigate incidents involving agent actions
    success_criteria:
      - Every agent action traceable end-to-end (RunId → toolCall → modelInvocation → userId)
      - Sandbox policy enforceable at the physical layer, not advisory
      - PII handling auditable through immutable event log
      - Agent identity matches the delegating user's identity in downstream calls
    pain_points_today:
      - Existing agent platforms have no audit trail format suitable for regulatory submission
      - Sandbox is honor-system (logical grant > physical enforcement)
      - Agent identity is "the service principal", not the user — breaks attribution
      - No standard format for risk model documentation under SR 11-7
    v1_0_priority: PRIMARY_PERSONA_v1_0    # financial-vertical mandate per HC-1 of plan
    v1_0_must_haves:
      - immutable_audit_trail_schema_in_contracts
      - iam_bridge_oauth2_oidc_tenant_claim
      - financial_sandbox_policy_template
      - sandbox_subsumption_runtime_enforced
      - sr_11_7_model_documentation_template

# Cross-persona notes
#
# - Persona-A and Persona-B are mutually exclusive per deployment — an enterprise
#   adopts ONE topology pattern (中台 or 能力复用), not both.
# - Persona-C / D / E exist in BOTH deployment patterns, in different org locations.
# - Persona-F sign-off is a release gate for v1.0; without Persona-F approval an
#   agent does not enter financial-industry production.
