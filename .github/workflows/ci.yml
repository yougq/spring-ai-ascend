name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Maven build + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # rc18 Wave 1 / ADR-0095: full history required for Gate Rule 111
          # (architecture_refresh_defect_family_re_eval_required) freshness
          # check — yaml file's own git commit date vs latest refresh-signal
          # commit date. Shallow clone (default fetch-depth=1) fails the
          # rule per fix 1h (shallow-clone fail-closed, was silent pass).
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven verify (compile + unit + integration tests)
        run: ./mvnw -T 1C -B -ntp --strict-checksums -Pquality verify

      - name: Install Python deps for architecture-graph generation
        # Required by Rule 34 (architecture_graph_well_formed) — the gate
        # checks gate/build_architecture_graph.py output exists. The graph
        # file (docs/governance/architecture-graph.yaml) is gitignored per
        # gate/README.md; regenerate on each CI run.
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r gate/requirements.txt

      - name: Regenerate architecture graph
        run: python3 gate/build_architecture_graph.py

      - name: Shell syntax check (gate scripts)
        # bash -n on every gate/*.sh catches dropped braces / missing fi /
        # heredoc-EOF problems at CI time instead of at gate execution time.
        # Cheap (parses, doesn't execute) and fails fast before the long
        # parallel orchestrator step.
        run: find gate -type f -name '*.sh' -print0 | xargs -0 -I{} bash -n {}

      - name: Architecture-sync gate (parallel)
        # The parallel wrapper runs the same 63+ rules across 8 workers,
        # cutting wall-clock from ~24min to ~7min on Windows/git-bash and
        # ~3x faster on Linux CI runners. Identical PASS/FAIL semantics.
        # Set GATE_PARALLEL=0 to fall back to the serial canonical script.
        run: bash gate/check_parallel.sh

      - name: Architecture-sync self-test
        run: bash gate/test_architecture_sync_gate.sh

      # Operator-shape smoke gate is intentionally NOT in CI until W0 build verification
      # lands (cycle-14 A1 user-chosen variant). The gate/run_operator_shape_smoke.sh script
      # exits 1 with FAIL_NEEDS_BUILD until 'mvn package' produces a JAR. Keeping it out of
      # CI (rather than masking with || true) makes CI status honest.
      # Reintroduce as a blocking step (no || true, no continue-on-error) once
      # agent-service/target/agent-service-*.jar is produced by mvn verify on CI
      # (post-Phase-C / ADR-0078; pre-Phase-C this was agent-platform/target/agent-platform-*.jar).

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
